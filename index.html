        text-align: left !important;
        font-size: 13px !important;

        display: inline-block !important;
        margin-right: 14px !important;
        vertical-align: middle !important;
      }
      /* The trailing chevron/arrow cell — push to the right and dim */
      body td[align="right"]:last-child {
        float: right;
        margin-right: 0 !important;
        color: #5a5a5a;
      }
      /* The + Add row (uses colspan) → full-width accent button-style */
      body tr td[colspan] {
        display: block !important;
        text-align: center !important;
        color: #B3E635 !important;
        font-weight: 600 !important;
        padding: 14px !important;
        margin: 0 !important;
        font-size: 14px !important;
        border-bottom: none !important;
      }

        background: transparent !important;
        border: 1px dashed #2a2a2a !important;
      }

      [style*="border-radius: 16px"] { border-radius: 12px !important; }
      /* Cards inside cards (KPIs) take full width */
      [style*="background: rgb(20, 20, 20)"] { width: 100% !important; box-sizing: border-box !important; }

      /* Hide top operator tab strip on mobile */
      .tabs-strip { display: none !important; }
      /* Add safe area at bottom for bottom nav */
      body { padding-bottom: 72px !important; }

      .bottom-nav {
        display: flex !important;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(20, 20, 20, 0.96);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid #1f1f1f;
        z-index: 100;
        padding: 6px 4px calc(8px + env(safe-area-inset-bottom)) 4px;
        justify-content: space-around;
        gap: 2px;
      }

        flex: 1; background: transparent; border: 0; cursor: pointer;
        padding: 8px 4px; font-family: inherit; font-size: 10px; font-weight: 600;

        align-items: center; justify-content: center; gap: 4px; min-height: 48px;
        letter-spacing: 0.4px; text-transform: uppercase;
        position: relative;
      }

        height: 2px; background: #B3E635; border-radius: 0 0 2px 2px;

        position: absolute; top: 4px; right: 12px;

        border-radius: 999px; padding: 1px 5px; min-width: 14px; text-align: center;
        font-family: "JetBrains Mono", monospace;
      }
    }

      [style*="padding: 32px"] { padding: 16px !important; }
      [style*="padding: 24px"] { padding: 14px !important; }
      h1 { font-size: 26px !important; }
      /* 4-col KPI grids → 2-col on tablet */
      [style*="repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      /* Tables horizontally scroll via parent :has() */
      :has(> table) {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        max-width: 100% !important;
      }
      /* Topbar reduces padding */
      .topbar { padding: 10px 14px !important; }

      /* Topbar wraps */

        flex-wrap: wrap !important;
        gap: 8px !important;
        padding: 8px 12px !important;

        flex-wrap: nowrap !important;

const NOW_MIN = 11 * 60 + 5; // 11:05

function calcHours(clockIn, breakMin, clockOut) {
  const [h, m] = clockIn.split(':').map(Number);
  const start = h * 60 + m;
  const end = clockOut
    ? (() => { const [eh, em] = clockOut.split(':').map(Number); return eh * 60 + em; })()
    : NOW_MIN;
  return Math.max(0, (end - start - breakMin) / 60);
}

const fmtHours = (h) => h.toFixed(2);
const fmtMoney = (n) => '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });

function useHash() {
  const [hash, setHash] = useState(() => window.location.hash.replace(/^#/, '') || '/');
  useEffect(() => {
    const h = () => setHash(window.location.hash.replace(/^#/, '') || '/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const navigate = (to) => { window.location.hash = to; };
  return [hash, navigate];
}

function EditableText({ value, onSave, multiline, mono, placeholder, style = {} }) {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState(value || '');
  useEffect(() => setV(value || ''), [value]);
  const commit = () => { if (v !== (value || '')) onSave(v); setEditing(false); };
  const cancel = () => { setV(value || ''); setEditing(false); };
  if (editing) {
    const Tag = multiline ? 'textarea' : 'input';
    return (
      <Tag value={v} onChange={e => setV(e.target.value)} onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter' && !multiline) { e.preventDefault(); commit(); } if (e.key === 'Escape') cancel(); }}
        onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}
        autoFocus rows={multiline ? 2 : undefined} placeholder={placeholder || ''}
        style={{ background: C.bg, color: 'inherit', border: `1px solid ${C.accent}`, padding: '4px 8px', borderRadius: R.sm, fontFamily: mono ? F.mono : 'inherit', fontSize: 'inherit', fontWeight: 'inherit', letterSpacing: 'inherit', minWidth: 60, width: '100%', boxSizing: 'border-box', ...style }} />
    );
  }
  return (
    <span
      onClick={(e) => { e.stopPropagation(); e.preventDefault(); setEditing(true); }}
      onMouseDown={e => e.stopPropagation()}
      style={{ cursor: 'text', padding: '3px 6px', margin: '-3px -6px', borderRadius: 4, transition: 'background 80ms', display: 'inline-block', minWidth: 18, ...style }}
      onMouseEnter={e => e.currentTarget.style.background = 'rgba(179,230,53,0.12)'}
      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
      title="Click to edit">
      {value || <span style={{ color: C.inkFaint }}>{placeholder || '—'}</span>}
    </span>
  );
}

function AdminProjects({ db, setDb, navigate }) {
  const [showAdd, setShowAdd] = useState(false);
  const updateProject = (id, patch) => setDb(prev => ({ ...prev, projects: prev.projects.map(p => p.id === id ? { ...p, ...patch } : p) }));
  const addProject = (form) => {
    const id = form.code.replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase() || 'NEW' + Math.floor(Math.random()*99);
    setDb(prev => ({ ...prev, projects: [...prev.projects, { id, ...form, material: ['CF'] }] }));
    setShowAdd(false);
  };
  const projects = db.projects.map(p => {
    const ops = db.operators.filter(o => o.projectIds.includes(p.id));
    const trucks = db.trucks.filter(t => t.projectId === p.id);
    const trucksActive = trucks.filter(t => t.driverId && db.hours.some(h => h.truckId === t.id && h.status === 'open')).length;
    const totalLoads = db.loads.filter(l => l.projectId === p.id && l.status === 'approved').length;
    const pendingLoads = db.loads.filter(l => l.projectId === p.id && l.status === 'pending').length;
    const totalHours = db.hours.filter(h => h.projectId === p.id).reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
    const totalRevenue = db.hours.filter(h => h.projectId === p.id).reduce((s, h) => {
      const t = db.trucks.find(t => t.id === h.truckId);
      const rate = t ? db.rates[t.type] : 0;
      return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * rate;
    }, 0);
    return { ...p, ops, trucks, trucksActive, totalLoads, pendingLoads, totalHours, totalRevenue };
  });
  const active = projects.filter(p => (p.status || 'active') === 'active');
  const upcoming = projects.filter(p => p.status === 'upcoming');
  const completed = projects.filter(p => p.status === 'completed');
  const totals = {
    activeProjects: active.length,
    totalTrucksActive: active.reduce((s, p) => s + p.trucksActive, 0),
    totalLoadsAll: active.reduce((s, p) => s + p.totalLoads, 0),
    totalRevenueAll: active.reduce((s, p) => s + p.totalRevenue, 0),
  };

  const statusOptions = [
    { value: 'active', label: 'Active' },
    { value: 'upcoming', label: 'Upcoming' },
    { value: 'completed', label: 'Completed' },

function AdminOperator({ projectId, operatorId, db, setDb, navigate }) {
  const [showAdd, setShowAdd] = useState(false);
  const project = db.projects.find(p => p.id === projectId);
  const operator = db.operators.find(o => o.id === operatorId);
  if (!project || !operator) return <NotFound navigate={navigate} />;
  const trucks = db.trucks.filter(t => t.projectId === projectId && t.operatorId === operatorId);
  const truckIds = new Set(trucks.map(t => t.id));
  const hours = db.hours.filter(h => h.projectId === projectId && truckIds.has(h.truckId));
  const loads = db.loads.filter(l => l.projectId === projectId && truckIds.has(l.truckId));
  const updateOperator = (patch) => setDb(prev => ({ ...prev, operators: prev.operators.map(o => o.id === operator.id ? { ...o, ...patch } : o) }));
  const updateTruck = (id, patch) => setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === id ? { ...t, ...patch } : t) }));
  const updateRate = (type, newRate) => setDb(prev => ({ ...prev, rates: { ...prev.rates, [type]: parseInt(newRate) || 0 } }));
  const addTruck = (form) => {
    const id = 'tk-' + Math.random().toString(36).substring(2, 7);
    setDb(prev => ({ ...prev, trucks: [...prev.trucks, { id, ...form, projectId, operatorId, driverId: null }] }));
    setShowAdd(false);
  };
  const typeOptions = TRUCK_TYPES.map(t => ({ value: t.code, label: t.label }));

  const totalHours = hours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
  const totalRevenue = hours.reduce((s, h) => {
    const t = trucks.find(x => x.id === h.truckId);
    return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * (t ? db.rates[t.type] : 0);
  }, 0);
  const pendingHrs = hours.filter(h => h.status === 'pending').length;
  const pendingLoads = loads.filter(l => l.status === 'pending').length;

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: project.name, to: `/admin/p/${projectId}` }, { label: operator.name }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'center', gap: S[4], marginBottom: S[5] }}>
        <Avatar name={operator.name} size={56} color={C.accent} />
        <div style={{ flex: 1 }}>
          <Label color={C.accent}>Operator on {project.code}</Label>
          <h1 style={{ fontFamily: F.display, fontSize: 32, fontWeight: 700, letterSpacing: -1, margin: '4px 0 0', color: C.ink }}>
            <EditableText value={operator.name} onSave={(v) => updateOperator({ name: v })} />
          </h1>
          <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>
            <EditableText value={operator.phone} onSave={(v) => updateOperator({ phone: v })} mono /> ·{' '}
            <EditableText value={operator.email} onSave={(v) => updateOperator({ email: v })} mono />
          </div>
        </div>
        <Btn variant="secondary" size="sm">Message</Btn>
      </div>

      {/* Operator KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>
        <Card padding={S[4]}><Stat label="Trucks" value={trucks.length} sub={`${trucks.filter(t => t.driverId).length} with driver`} /></Card>
        <Card padding={S[4]}><Stat label="Total loads" value={loads.filter(l => l.status === 'approved').length} sub={`${pendingLoads} pending`} /></Card>
        <Card padding={S[4]}><Stat label="Total hours" value={fmtHours(totalHours)} /></Card>
        <Card padding={S[4]}><Stat label="Total revenue" value={fmtMoney(totalRevenue)} /></Card>
      </div>

      <div style={{ marginBottom: S[3], display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <Label>Trucks on {project.name}</Label>
        <span style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim }}>Click any value to edit. Click row to drill into truck.</span>
      </div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr><Th>Plate</Th><Th>Type</Th><Th align="right">Rate</Th><Th>Driver</Th><Th>Status</Th><Th align="right">Total hours</Th><Th align="right">Total loads</Th><Th align="right">Total revenue</Th><Th></Th></tr>
          </thead>
          <tbody>
            {trucks.map(t => {
              const driver = db.drivers.find(d => d.id === t.driverId);
              const hr = db.hours.find(h => h.truckId === t.id);
              const truckHours = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;
              const truckLoadsAll = db.loads.filter(l => l.truckId === t.id);
              const rate = db.rates[t.type];
              const revenue = truckHours * rate;
              return (
                <Tr key={t.id} onClick={() => navigate(`/admin/p/${projectId}/o/${operatorId}/t/${t.id}`)}>
                  <Td mono><span style={{ color: C.accent }}>#<EditableText value={t.plate} onSave={(v) => updateTruck(t.id, { plate: v })} mono /></span></Td>
                  <Td><Pill color={C.inkDim} soft="rgba(255,255,255,0.05)"><EditableSelect value={t.type} options={typeOptions} onSave={(v) => updateTruck(t.id, { type: v })} /></Pill></Td>
                  <Td align="right" mono>$<EditableText value={String(rate || 0)} onSave={(v) => updateRate(t.type, v)} mono />/hr</Td>
                  <Td>{driver ? driver.name : <span style={{ color: C.inkFaint }}>— unassigned</span>}</Td>
                  <Td>{hr ? <StatusPill status={hr.status} /> : <Pill color={C.inkFaint} soft="rgba(255,255,255,0.04)">Off</Pill>}</Td>
                  <Td align="right" mono>{fmtHours(truckHours)}</Td>
                  <Td align="right" mono>{truckLoadsAll.filter(l => l.status === 'approved').length}{truckLoadsAll.filter(l => l.status === 'pending').length > 0 && <span style={{ color: C.warn, marginLeft: 4 }}>+{truckLoadsAll.filter(l => l.status === 'pending').length}p</span>}</Td>
                  <Td align="right" mono style={{ fontWeight: 600 }}>{fmtMoney(revenue)}</Td>
                  <Td align="right" dim>{'>'}</Td>
                </Tr>
              );
            })}
            <tr onClick={() => setShowAdd(true)} style={{ cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background = C.surfaceHi}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <td colSpan={9} style={{ padding: '14px 14px', borderBottom: `1px solid ${C.rule}`, fontFamily: F.display, fontSize: 13, color: C.accent, fontWeight: 600, textAlign: 'center' }}>+ Add truck to this project</td>
            </tr>
          </tbody>
        </table>
      </Card>
      {showAdd && <AddTruckForm onAdd={addTruck} onCancel={() => setShowAdd(false)} />}

      {/* Approvals */}
      {(pendingLoads + pendingHrs > 0) && (
        <div style={{ marginTop: S[7] }}>
          <OperatorApprovals projectId={projectId} hours={hours} loads={loads} db={db} setDb={setDb} />
        </div>
      )}

      {/* Invoices */}
      <div style={{ marginTop: S[7] }}>
        <OperatorInvoices operator={operator} projectId={projectId} project={project} trucks={trucks} hours={hours} db={db} setDb={setDb} />
      </div>
    </div>
  );
}

function AdminTruck({ projectId, operatorId, truckId, db, setDb, navigate }) {
  const project = db.projects.find(p => p.id === projectId);
  const operator = db.operators.find(o => o.id === operatorId);
  const truck = db.trucks.find(t => t.id === truckId);
  if (!project || !operator || !truck) return <NotFound navigate={navigate} />;
  const driver = db.drivers.find(d => d.id === truck.driverId);
  const hr = db.hours.find(h => h.truckId === truckId);
  const truckLoads = db.loads.filter(l => l.truckId === truckId).sort((a, b) => a.time.localeCompare(b.time));
  const rate = db.rates[truck.type];
  const truckType = TRUCK_TYPES.find(tt => tt.code === truck.type);
  const truckHours = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;

  // Field updaters
  const updateTruck = (patch) => setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === truck.id ? { ...t, ...patch } : t) }));
  const updateDriver = (patch) => driver && setDb(prev => ({ ...prev, drivers: prev.drivers.map(d => d.id === driver.id ? { ...d, ...patch } : d) }));
  const updateRate = (newRate) => setDb(prev => ({ ...prev, rates: { ...prev.rates, [truck.type]: parseInt(newRate) || 0 } }));
  const updateHr = (patch) => hr && setDb(prev => ({ ...prev, hours: prev.hours.map(h => h.id === hr.id ? { ...h, ...patch } : h) }));
  const updateLoad = (id, patch) => setDb(prev => ({ ...prev, loads: prev.loads.map(l => l.id === id ? { ...l, ...patch } : l) }));
  const deleteLoad = (id) => { if (confirm('Delete this load?')) setDb(prev => ({ ...prev, loads: prev.loads.filter(l => l.id !== id) })); };
  const reassignDriver = (newDriverId) => updateTruck({ driverId: newDriverId || null });

  const driverOptions = [
    { value: '', label: '— Unassigned —' },
    ...db.drivers.map(d => ({ value: d.id, label: d.name + ' · ' + d.phone })),
  ];
  const typeOptions = TRUCK_TYPES.map(t => ({ value: t.code, label: t.label + ' (' + t.cap + ')' }));
  const materialOptions = MATERIALS.map(m => ({ value: m.code, label: m.label }));
  const statusOptions = [
    { value: 'open', label: 'Active' },
    { value: 'pending', label: 'Pending' },
    { value: 'approved', label: 'Approved' },
    { value: 'closed', label: 'Closed' },
  ];

  return (
    <div style={{ padding: S[6], maxWidth: 1480, margin: '0 auto' }}>
      <Crumbs items={[
        { label: 'Admin', to: '/admin' },
        { label: project.name, to: `/admin/p/${projectId}` },

                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, alignItems: 'center' }}>
                    <Label>Status</Label>
                    <span style={{ fontFamily: F.mono, fontSize: 12, color: C.accent, fontWeight: 700 }}>
                      <EditableSelect value={hr.status} options={statusOptions} onSave={(v) => updateHr({ status: v })} />

                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>

function OperatorEntry({ db, navigate }) {
  const [opId, setOpId] = useState(db.operators[0].id);
  const operator = db.operators.find(o => o.id === opId);
  const operatorProjects = operator.projectIds.map(pid => db.projects.find(p => p.id === pid)).filter(Boolean);

  return (
    <div>
      <Topbar navigate={navigate} role="Operator" current="Pick a project to enter" />
      <div style={{ padding: S[6], maxWidth: 880, margin: '0 auto' }}>
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', flexWrap: 'wrap', gap: S[3], marginBottom: S[5] }}>
          <div>
            <Label color={C.accent} style={{ marginBottom: 6 }}>Sign in as</Label>
            <h1 style={{ fontFamily: F.display, fontSize: 36, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>
              {operator.name}
            </h1>
            <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 6 }}>{operator.phone} · {operator.email}</div>
          </div>
          <select value={opId} onChange={e => setOpId(e.target.value)}
            style={{ background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '12px 16px', borderRadius: R.pill, fontFamily: F.body, fontSize: 14, fontWeight: 600 }}>
            {db.operators.map(o => <option key={o.id} value={o.id}>Switch to: {o.name}</option>)}
          </select>
        </div>

        <Label style={{ marginBottom: S[3] }}>Your projects ({operatorProjects.length})</Label>
        {operatorProjects.length === 0 ? (
          <Card><div style={{ textAlign: 'center', color: C.inkDim, padding: S[5] }}>You're not assigned to any projects yet. Ask an admin to add you.</div></Card>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: S[3] }}>
            {operatorProjects.map(p => {
              const myTrucks = db.trucks.filter(t => t.projectId === p.id && t.operatorId === opId);
              const myTruckIds = new Set(myTrucks.map(t => t.id));
              const myHours = db.hours.filter(h => myTruckIds.has(h.truckId));
              const myLoads = db.loads.filter(l => myTruckIds.has(l.truckId));
              const myPending = myLoads.filter(l => l.status === 'pending').length + myHours.filter(h => h.status === 'pending').length;
              const totalH = myHours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
              const totalRev = myHours.reduce((s, h) => { const t = myTrucks.find(x => x.id === h.truckId); return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * (t ? db.rates[t.type] : 0); }, 0);
              return (
                <button key={p.id} onClick={() => navigate(`/admin/p/${p.id}/o/${opId}`)}
                  style={{ textAlign: 'left', background: C.surface, border: 'none', borderRadius: R.lg, padding: S[5], cursor: 'pointer', color: C.ink, position: 'relative' }}
                  onMouseEnter={e => e.currentTarget.style.background = C.surfaceHi}
                  onMouseLeave={e => e.currentTarget.style.background = C.surface}>
                  {myPending > 0 && (
                    <div style={{ position: 'absolute', top: 12, right: 12 }}>
                      <Pill color={C.warn} soft={C.warnSoft}>{myPending} pending</Pill>
                    </div>
                  )}
                  <Label color={C.accent} style={{ marginBottom: 6 }}>{p.code}</Label>
                  <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, letterSpacing: -0.6, marginBottom: 6 }}>{p.name}</div>
                  <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: S[4] }}>{p.gc} · {p.address}</div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: S[2] }}>
                    <div><Label style={{ marginBottom: 4 }}>Trucks</Label><div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700 }}>{myTrucks.length}</div></div>
                    <div><Label style={{ marginBottom: 4 }}>Hours</Label><div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700 }}>{fmtHours(totalH)}</div></div>
                    <div><Label style={{ marginBottom: 4 }}>Revenue</Label><div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700, color: C.accent }}>{fmtMoney(totalRev)}</div></div>
                  </div>
                  <div style={{ marginTop: S[3], fontFamily: F.mono, fontSize: 11, color: C.inkFaint }}>Open {'→'}</div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function OperatorOverview({ project, trucks, hours, loads, db, navigate, setDb }) {
  const totalHours = hours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
  const totalRevenue = hours.reduce((s, h) => {
    const t = trucks.find(x => x.id === h.truckId);
    return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * (t ? db.rates[t.type] : 0);
  }, 0);
  const pendingHrs = hours.filter(h => h.status === 'pending').length;
  const pendingLoads = loads.filter(l => l.status === 'pending').length;
  const updateDriver = (id, patch) => setDb(prev => ({ ...prev, drivers: prev.drivers.map(d => d.id === id ? { ...d, ...patch } : d) }));

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <h1 style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink }}>
        {project.name} <span style={{ color: C.inkFaint, fontWeight: 500 }}>· today</span>
      </h1>
      <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 6, marginBottom: S[5] }}>
        {project.gc} · {project.address}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>
        <Card padding={S[4]}><Stat label="Trucks active" value={`${trucks.filter(t => t.driverId && hours.some(h => h.truckId === t.id && h.status === 'open')).length}`} sub={`${trucks.length} on roster`} /></Card>
        <Card padding={S[4]}><Stat label="Loads" value={loads.filter(l => l.status === 'approved').length} sub={`${pendingLoads} pending`} /></Card>
        <Card padding={S[4]}><Stat label="Hours" value={fmtHours(totalHours)} /></Card>
        <Card padding={S[4]}><Stat label="Revenue" value={fmtMoney(totalRevenue)} /></Card>
      </div>

      {(pendingHrs + pendingLoads > 0) && (
        <Card style={{ marginBottom: S[5], borderLeft: `3px solid ${C.warn}` }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontFamily: F.display, fontSize: 16, fontWeight: 600, color: C.ink }}>{pendingHrs + pendingLoads} item{pendingHrs + pendingLoads === 1 ? '' : 's'} need your approval</div>
              <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginTop: 2 }}>
                {pendingLoads} load{pendingLoads === 1 ? '' : 's'} · {pendingHrs} hour ticket{pendingHrs === 1 ? '' : 's'}
              </div>
            </div>
            <Btn size="sm" onClick={() => navigate('/operator/approvals')}>Review {'→'}</Btn>
          </div>
        </Card>
      )}

      <div style={{ marginBottom: S[3] }}><Label>Trucks running now</Label></div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr><Th>Truck</Th><Th>Driver</Th><Th>Clock-in</Th><Th align="right">Hours</Th><Th align="right">Loads</Th><Th>Status</Th></tr>
          </thead>
          <tbody>
            {trucks.map(t => {
              const driver = db.drivers.find(d => d.id === t.driverId);
              const hr = hours.find(h => h.truckId === t.id);
              const truckLoads = loads.filter(l => l.truckId === t.id);
              return (
                <Tr key={t.id}>
                  <Td><span style={{ color: C.accent, fontFamily: F.mono }}>#{t.plate}</span> <span style={{ color: C.inkDim, fontFamily: F.mono, fontSize: 11 }}>{t.type}</span></Td>
                  <Td>{driver ? <EditableText value={driver.name} onSave={(v) => updateDriver(driver.id, { name: v })} /> : <span style={{ color: C.inkFaint }}>unassigned</span>}</Td>
                  <Td mono>{hr ? hr.clockIn : '—'}</Td>
                  <Td align="right" mono>{hr ? fmtHours(calcHours(hr.clockIn, hr.breakMin, hr.clockOut)) : '0.00'}</Td>
                  <Td align="right" mono>{truckLoads.filter(l => l.status === 'approved').length}</Td>
                  <Td>{hr ? <StatusPill status={hr.status} /> : <Pill color={C.inkFaint} soft="rgba(255,255,255,0.04)">Off</Pill>}</Td>
                </Tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

function OperatorTrucks({ projectId, opId, trucks, db, setDb }) {
  const [showAdd, setShowAdd] = useState(false);
  const addTruck = (form) => {
    const id = 'tk-' + Math.random().toString(36).substring(2, 7);
    setDb(prev => ({ ...prev, trucks: [...prev.trucks, { id, ...form, projectId, operatorId: opId, driverId: null }] }));
    setShowAdd(false);
  };
  const removeTruck = (id) => {
    if (!confirm('Remove this truck from the project?')) return;
    setDb(prev => ({ ...prev, trucks: prev.trucks.filter(t => t.id !== id) }));
  };
  const updateTruck = (id, patch) => setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === id ? { ...t, ...patch } : t) }));
  const updateRate = (type, newRate) => setDb(prev => ({ ...prev, rates: { ...prev.rates, [type]: parseInt(newRate) || 0 } }));
  const typeOptions = TRUCK_TYPES.map(t => ({ value: t.code, label: t.label }));
  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[4] }}>
        <div>
          <h1 style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink }}>Trucks</h1>
          <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>{trucks.length} truck{trucks.length === 1 ? '' : 's'} on this project · click any value to edit · rate updates all trucks of that type</div>
        </div>
      </div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><Th>Plate</Th><Th align="right">Rate</Th><Th>Type</Th><Th>Driver</Th><Th></Th></tr></thead>
          <tbody>
            {trucks.map(t => {
              const driver = db.drivers.find(d => d.id === t.driverId);
              return (
                <Tr key={t.id}>
                  <Td mono><span style={{ color: C.accent }}>#<EditableText value={t.plate} onSave={(v) => updateTruck(t.id, { plate: v })} mono /></span></Td>
                  <Td align="right" mono>$<EditableText value={String(db.rates[t.type] || 0)} onSave={(v) => updateRate(t.type, v)} mono />/hr</Td>
                  <Td><Pill color={C.inkDim} soft="rgba(255,255,255,0.05)"><EditableSelect value={t.type} options={typeOptions} onSave={(v) => updateTruck(t.id, { type: v })} /></Pill></Td>
                  <Td>{driver ? driver.name : <span style={{ color: C.inkFaint }}>-- unassigned</span>}</Td>
                  <Td align="right"><Btn variant="danger" size="xs" onClick={() => removeTruck(t.id)}>Remove</Btn></Td>
                </Tr>
              );
            })}
            <tr onClick={() => setShowAdd(true)} style={{ cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background = C.surfaceHi}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <td colSpan={5} style={{ padding: '14px 14px', borderBottom: `1px solid ${C.rule}`, fontFamily: F.display, fontSize: 13, color: C.accent, fontWeight: 600, textAlign: 'center' }}>+ Add truck</td>
            </tr>
          </tbody>
        </table>
      </Card>
      {showAdd && <AddTruckForm onAdd={addTruck} onCancel={() => setShowAdd(false)} />}
    </div>
  );
}

function AddTruckForm({ onAdd, onCancel }) {
  const [plate, setPlate] = useState('');
  const [type, setType] = useState('TRI');
  const [hauler, setHauler] = useState('');
  const inputStyle = { background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '10px 12px', borderRadius: R.sm, fontFamily: F.body, fontSize: 14, width: '100%' };
  return (
    <Card style={{ marginTop: S[4] }}>
      <Label style={{ marginBottom: S[3] }}>New truck</Label>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 2fr auto', gap: S[3], alignItems: 'flex-end' }}>
        <div><div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>Plate</div><input value={plate} onChange={e => setPlate(e.target.value)} placeholder="e.g. 419" style={inputStyle} /></div>
        <div><div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>Type</div><select value={type} onChange={e => setType(e.target.value)} style={inputStyle}>{TRUCK_TYPES.map(t => <option key={t.code} value={t.code}>{t.label}</option>)}</select></div>
        <div><div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>Hauler</div><input value={hauler} onChange={e => setHauler(e.target.value)} placeholder="Hauler company" style={inputStyle} /></div>
        <div style={{ display: 'flex', gap: 8 }}>
          <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
          <Btn onClick={() => { if (plate && hauler) onAdd({ plate, type, hauler }); }} disabled={!plate || !hauler}>Add truck</Btn>

    </Card>
  );
}

function OperatorDrivers({ projectId, trucks, db, setDb }) {
  const assignedIds = new Set(trucks.filter(t => t.driverId).map(t => t.driverId));
  const available = db.drivers.filter(d => !assignedIds.has(d.id));
  const assign = (truckId, driverId) => {
    setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === truckId ? { ...t, driverId } : t) }));
  };
  const updateDriver = (id, patch) => setDb(prev => ({ ...prev, drivers: prev.drivers.map(d => d.id === id ? { ...d, ...patch } : d) }));
  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <div style={{ marginBottom: S[4] }}>
        <h1 style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink }}>Driver assignments</h1>
        <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>Assign one driver to each truck. Click name or phone to edit.</div>
      </div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><Th>Truck</Th><Th>Assigned driver</Th><Th>Phone</Th><Th></Th></tr></thead>
          <tbody>
            {trucks.map(t => {
              const driver = db.drivers.find(d => d.id === t.driverId);
              const choices = [...(driver ? [driver] : []), ...available];
              return (
                <Tr key={t.id}>
                  <Td mono><span style={{ color: C.accent }}>#{t.plate}</span> <span style={{ color: C.inkDim, fontSize: 11 }}>{t.type}</span></Td>
                  <Td>
                    <select value={t.driverId || ''} onChange={e => assign(t.id, e.target.value || null)} style={{ background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '8px 12px', borderRadius: R.sm, fontFamily: F.body, fontSize: 13, minWidth: 180 }}>
                      <option value="">-- Unassigned --</option>
                      {choices.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                    </select>
                    {driver && <span style={{ marginLeft: 8 }}><EditableText value={driver.name} onSave={(v) => updateDriver(driver.id, { name: v })} /></span>}
                  </Td>
                  <Td mono dim>{driver ? <EditableText value={driver.phone} onSave={(v) => updateDriver(driver.id, { phone: v })} mono /> : '—'}</Td>
                  <Td align="right">{driver && <Btn variant="ghost" size="xs" onClick={() => assign(t.id, null)}>Unassign</Btn>}</Td>
                </Tr>
              );
            })}
          </tbody>
        </table>

function OperatorInvoices({ operator, projectId, project, trucks, hours, db, setDb }) {
  const [showDraft, setShowDraft] = useState(false);
  const invoices = (db.invoices || []).filter(i => i.operatorId === operator.id && i.projectId === projectId);

  const buildDraft = () => {
    const today = new Date().toISOString().slice(0, 10);
    const lineItems = trucks.filter(t => hours.some(h => h.truckId === t.id)).map(t => {
      const hr = hours.find(h => h.truckId === t.id);
      const driver = db.drivers.find(d => d.id === t.driverId);
      const truckHours = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;
      const rate = db.rates[t.type];
      return {
        id: 'li-' + Math.random().toString(36).substring(2, 7),
        truckPlate: t.plate, truckType: t.type, driverName: driver ? driver.name : '—',
        hours: parseFloat(truckHours.toFixed(2)), rate, amount: parseFloat((truckHours * rate).toFixed(2)),
      };
    });
    const loadCount = db.loads.filter(l => l.projectId === projectId && l.status === 'approved').length;
    const totalCY = db.loads.filter(l => l.projectId === projectId && l.status === 'approved').reduce((s, l) => s + (l.cy || 0), 0);
    return {
      id: 'inv-' + Date.now(),
      operatorId: operator.id, projectId,
      number: 'INV-' + String(Math.floor(Math.random() * 9000) + 1000),
      periodStart: today, periodEnd: today,
      issuedDate: today,
      billTo: project.gc,
      lineItems,
      loadCount, totalCY,
      notes: '',
      status: 'draft',
    };
  };

  const [draft, setDraft] = useState(null);
  const startDraft = () => { setDraft(buildDraft()); setShowDraft(true); };

  const updateDraft = (patch) => setDraft(d => ({ ...d, ...patch }));
  const updateLine = (idx, patch) => setDraft(d => ({ ...d, lineItems: d.lineItems.map((li, i) => i === idx ? { ...li, ...patch, amount: parseFloat((((patch.hours != null ? patch.hours : li.hours) * (patch.rate != null ? patch.rate : li.rate))).toFixed(2)) } : li) }));
  const removeLine = (idx) => setDraft(d => ({ ...d, lineItems: d.lineItems.filter((_, i) => i !== idx) }));

  const sendInvoice = () => {
    const finalDraft = { ...draft, status: 'sent', sentAt: new Date().toISOString() };
    setDb(prev => ({ ...prev, invoices: [...(prev.invoices || []), finalDraft] }));
    alert('Invoice ' + finalDraft.number + ' sent to ' + finalDraft.billTo + '.');
    setShowDraft(false);
    setDraft(null);
  };

  const draftTotal = draft ? draft.lineItems.reduce((s, li) => s + li.amount, 0) : 0;

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>

        </div>
        {!showDraft && <Btn onClick={startDraft}>+ New invoice</Btn>}

      {showDraft && draft && (
        <div className="invoice-print" style={{ marginBottom: S[5], border: `1px solid ${C.accent}`, background: C.surface, borderRadius: R.lg, padding: S[5] }}>

              </div>

              <Label style={{ marginBottom: 6 }}>Bill to</Label>

      <Card padding={0}>

function DriverHome({ driver, truck, db, setDb, navigate }) {
  const project = db.projects.find(p => p.id === truck.projectId);
  const truckType = TRUCK_TYPES.find(t => t.code === truck.type);
  const hr = db.hours.find(h => h.truckId === truck.id && h.driverId === driver.id && h.status === 'open');
  const todayLoads = db.loads.filter(l => l.driverId === driver.id && l.truckId === truck.id);
  const isPaused = !!(hr && hr.pausedAt);
  const isOpen = !!(hr && hr.status === 'open');

  // Live ticker — re-render every second while clocked in (and not paused)
  const [, force] = useState(0);
  useEffect(() => {
    if (!isOpen) return;
    const id = setInterval(() => force(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [isOpen, isPaused, hr ? hr.id : null]);

  // Compute elapsed milliseconds since clock-in, minus any paused time
  let elapsedMs = 0;
  if (hr) {
    if (hr.clockedInAt) {
      let pausedMs = hr.pausedMs || 0;
      if (hr.pausedAt) pausedMs += Date.now() - hr.pausedAt;
      const end = hr.clockedOutAt || Date.now();
      elapsedMs = Math.max(0, end - hr.clockedInAt - pausedMs);
    } else {
      // Fallback for seed data without timestamps
      elapsedMs = Math.floor(calcHours(hr.clockIn, hr.breakMin, hr.clockOut) * 3600 * 1000);
    }
  }
  const fmtElapsed = (ms) => {
    const t = Math.floor(ms / 1000);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = t % 60;
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  };
  const fmtClock = (d) => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

  const clockIn = () => {
    const now = Date.now();
    setDb(prev => ({
      ...prev,
      hours: [...prev.hours, {
        id: 'hr-' + Math.random().toString(36).substring(2, 7),
        driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
        clockIn: fmtClock(new Date(now)), clockedInAt: now, clockOut: null, clockedOutAt: null,
        breakMin: 0, pausedMs: 0, pausedAt: null, status: 'open',
      }],
    }));
  };

  const togglePause = () => {
    if (!hr) return;
    if (hr.pausedAt) {
      const addedMs = Date.now() - hr.pausedAt;
      setDb(prev => ({
        ...prev,
        hours: prev.hours.map(h => h.id === hr.id ? {
          ...h, pausedMs: (h.pausedMs || 0) + addedMs, pausedAt: null,
          breakMin: Math.round(((h.pausedMs || 0) + addedMs) / 60000),
        } : h),
      }));
    } else {
      setDb(prev => ({
        ...prev,
        hours: prev.hours.map(h => h.id === hr.id ? { ...h, pausedAt: Date.now() } : h),
      }));
    }
  };

  const clockOut = () => {
    if (!hr) return;
    if (!confirm('End your shift?')) return;
    const now = Date.now();
    setDb(prev => ({
      ...prev,
      hours: prev.hours.map(h => {
        if (h.id !== hr.id) return h;
        let pausedMs = h.pausedMs || 0;
        if (h.pausedAt) pausedMs += now - h.pausedAt;
        return {
          ...h, clockOut: fmtClock(new Date(now)), clockedOutAt: now,
          pausedAt: null, pausedMs, breakMin: Math.round(pausedMs / 60000),
          status: 'pending',
        };
      }),
    }));
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px` }}>
      <div style={{ marginBottom: S[3] }}>
        <Label color={C.accent}>Today {fmtClock(new Date())}</Label>
        <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: C.ink, marginTop: 4 }}>Hi, {driver.name.split(' ').pop()}</div>
      </div>

      {/* Truck card */}
      <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3] }}>
          <Label>Your truck</Label>
          {!hr && <Pill color={C.inkFaint} soft="rgba(255,255,255,0.04)">Off the clock</Pill>}
          {isOpen && !isPaused && <StatusPill status="open" />}
          {isOpen && isPaused && <Pill color={C.warn} soft={C.warnSoft}>Paused</Pill>}
          {hr && hr.status !== 'open' && <Pill color={C.inkDim} soft="rgba(255,255,255,0.06)">Shift ended</Pill>}
        </div>
        <div style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, color: C.accent }}>#{truck.plate}</div>
        <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>{truckType.label} · {truckType.cap} · {truck.hauler}</div>
        <div style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
          <Label style={{ marginBottom: 4 }}>On project</Label>
          <div style={{ fontFamily: F.display, fontSize: 16, fontWeight: 600, color: C.ink }}>{project.code} · {project.name}</div>
          <div style={{ fontFamily: F.body, fontSize: 11, color: C.inkDim, marginTop: 2 }}>{project.address}</div>
        </div>
      </div>

      {/* Running clock or off-state */}
      {hr ? (
        <div style={{ background: isPaused ? C.warnSoft : C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3], border: isPaused ? `1px solid ${C.warn}` : 'none' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: S[2] }}>
            <Label color={isPaused ? C.warn : C.accent}>{isPaused ? 'Paused' : (isOpen ? 'On the clock' : 'Shift submitted')}</Label>
            <span style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>started {hr.clockIn}{hr.clockOut ? ' · ended ' + hr.clockOut : ''}</span>
          </div>
          <div style={{ fontFamily: F.mono, fontSize: 44, fontWeight: 700, color: isPaused ? C.warn : C.accent, lineHeight: 1, letterSpacing: -1, fontVariantNumeric: 'tabular-nums' }}>
            {fmtElapsed(elapsedMs)}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: S[3], alignItems: 'flex-end' }}>
            <div>
              <Label style={{ marginBottom: 4 }}>Loads</Label>
              <div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.length}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <Label style={{ marginBottom: 4 }}>Total CY</Label>
              <div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.reduce((s, l) => s + (l.cy || 0), 0)}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <Label style={{ marginBottom: 4 }}>Break</Label>
              <div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700, color: C.inkDim, lineHeight: 1 }}>{Math.round(((hr.pausedMs || 0) + (hr.pausedAt ? Date.now() - hr.pausedAt : 0)) / 60000)}m</div>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ background: C.surfaceHi, borderRadius: R.lg, padding: S[4], marginBottom: S[3], display: 'flex', alignItems: 'center', gap: S[3] }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.inkFaint }} />
          <div><Label>Status</Label><div style={{ fontFamily: F.display, fontSize: 16, color: C.inkDim, fontWeight: 600, marginTop: 2 }}>Not clocked in</div></div>
        </div>
      )}

      <div style={{ flex: 1 }} />

      {!hr && (
        <button onClick={clockIn} style={{ width: '100%', height: 84, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontFamily: F.display, fontSize: 22, fontWeight: 700, letterSpacing: -0.6 }}>Clock in</button>
      )}
      {isOpen && (
        <>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: S[2], marginBottom: S[2] }}>
            <button onClick={() => navigate('/driver/log')} disabled={isPaused} style={{ height: 84, border: 'none', cursor: isPaused ? 'not-allowed' : 'pointer', background: isPaused ? C.surfaceHi : C.accent, color: isPaused ? C.inkFaint : C.bg, borderRadius: R.lg, fontFamily: F.display, fontSize: 18, fontWeight: 700, letterSpacing: -0.4, opacity: isPaused ? 0.5 : 1 }}>+ Log load</button>
            <button onClick={togglePause} style={{ height: 84, border: `1px solid ${isPaused ? C.accent : C.warn}`, cursor: 'pointer', background: isPaused ? C.accentSoft : 'transparent', color: isPaused ? C.accent : C.warn, borderRadius: R.lg, fontFamily: F.display, fontSize: 18, fontWeight: 700, letterSpacing: -0.4 }}>{isPaused ? 'Resume' : 'Pause'}</button>
          </div>
          <button onClick={clockOut} style={{ width: '100%', height: 56, border: `1px solid ${C.warn}`, cursor: 'pointer', background: 'transparent', color: C.warn, borderRadius: R.lg, fontFamily: F.display, fontSize: 16, fontWeight: 600 }}>End shift / Clock out</button>
        </>
      )}

      {todayLoads.length > 0 && (
        <div style={{ marginTop: S[4] }}>
          <Label style={{ marginBottom: S[2] }}>Today's loads</Label>
          {todayLoads.slice().reverse().slice(0, 6).map(l => {
            const m = MATERIALS.find(m => m.code === l.material);
            return (
              <div key={l.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: `${S[2]}px 0`, borderBottom: `1px solid ${C.rule}`, fontFamily: F.body, fontSize: 13 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
                  {l.photo ? <img src={l.photo} alt="" style={{ width: 32, height: 32, borderRadius: 4, objectFit: 'cover' }} /> : <div style={{ width: 32, height: 32, borderRadius: 4, background: C.surfaceMax, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>📷</div>}
                  <div>
                    <div style={{ fontFamily: F.display, fontWeight: 600 }}>{l.cy != null ? l.cy + ' CY' : l.ticketNo} · {m.label}</div>
                    <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkDim, marginTop: 2 }}>{l.time}</div>
                  </div>
                </div>
                <StatusPill status={l.status} />
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function DriverLogLoad({ driver, truck, db, setDb, navigate }) {
  const proj = db.projects.find(p => p.id === truck.projectId);
  const [material, setMaterial] = useState((proj && proj.material[0]) || 'CF');
  const [cy, setCy] = useState('');
  const [photo, setPhoto] = useState(null);
  const fileRef = useRef(null);

  const onPick = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => setPhoto(ev.target.result);
    reader.readAsDataURL(f);
  };

  const submit = () => {
    if (!canSubmit) return;
    const now = new Date();
    const hhmm = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    setDb(prev => ({
      ...prev,
      loads: [...prev.loads, {
        id: 'ld-' + Math.random().toString(36).substring(2, 7),
        driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
        material, cy: parseFloat(cy), photo, time: hhmm, status: 'pending',
      }],
    }));
    navigate('/driver');
  };

  const canSubmit = cy && parseFloat(cy) > 0 && photo;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px`, overflowY: 'auto' }}>
      <button onClick={() => navigate('/driver')} style={{ background: 'transparent', border: 'none', color: C.inkDim, fontFamily: F.body, fontSize: 13, padding: 0, marginBottom: S[3], cursor: 'pointer', textAlign: 'left' }}>← Back</button>
      <Label color={C.accent} style={{ marginBottom: 6 }}>New load · #{truck.plate}</Label>
      <div style={{ fontFamily: F.display, fontSize: 24, fontWeight: 700, letterSpacing: -0.6, marginBottom: S[4] }}>Log a load</div>

      <Label style={{ marginBottom: 6 }}>Material</Label>
      <select value={material} onChange={e => setMaterial(e.target.value)} style={{ background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, borderRadius: R.md, padding: '16px 16px', fontFamily: F.display, fontSize: 16, fontWeight: 600, marginBottom: S[4], appearance: 'menulist', width: '100%', boxSizing: 'border-box' }}>
        {MATERIALS.map(m => (
          <option key={m.code} value={m.code}>{m.label}</option>
        ))}
      </select>

      <Label style={{ marginBottom: 6 }}>Cubic yards (CY)</Label>
      <input type="number" inputMode="decimal" value={cy} onChange={e => setCy(e.target.value)} placeholder="e.g. 16" min="0" step="0.5" autoFocus
        style={{ background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, borderRadius: R.md, padding: '18px 16px', fontFamily: F.mono, fontSize: 28, fontWeight: 700, marginBottom: S[4], textAlign: 'center', letterSpacing: -0.6, boxSizing: 'border-box', width: '100%' }} />

      <Label style={{ marginBottom: 6 }}>Photo (required)</Label>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onPick} style={{ display: 'none' }} />
      {!photo ? (
        <button onClick={() => fileRef.current && fileRef.current.click()} style={{
          height: 140, border: `2px dashed ${C.ruleHi}`, cursor: 'pointer', background: C.surface,
          color: C.inkDim, borderRadius: R.md, fontFamily: F.display, fontSize: 14, fontWeight: 600,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, marginBottom: S[4],
        }}>
          <span style={{ fontSize: 32 }}>📷</span>
          <span>Take photo of load</span>
          <span style={{ fontSize: 11, color: C.inkFaint, fontWeight: 500 }}>Required to submit</span>
        </button>
      ) : (
        <div style={{ position: 'relative', marginBottom: S[4] }}>
          <img src={photo} alt="Load" style={{ width: '100%', height: 180, objectFit: 'cover', borderRadius: R.md, border: `1px solid ${C.accent}`, display: 'block' }} />
          <button onClick={() => { setPhoto(null); if (fileRef.current) fileRef.current.value = ''; }} style={{
            position: 'absolute', top: 8, right: 8, background: 'rgba(0,0,0,0.7)', color: C.ink, border: 'none',
            padding: '6px 12px', borderRadius: R.pill, fontFamily: F.body, fontSize: 11, cursor: 'pointer', fontWeight: 600,
          }}>Retake</button>
        </div>
      )}

      <div style={{ flex: 1, minHeight: S[3] }} />

      <button onClick={submit} disabled={!canSubmit} style={{
        height: 64, border: 'none', cursor: canSubmit ? 'pointer' : 'not-allowed',
        background: C.accent, color: C.bg, borderRadius: R.lg,
        fontFamily: F.display, fontSize: 18, fontWeight: 700, letterSpacing: -0.4,
        opacity: canSubmit ? 1 : 0.4,
      }}>Submit load</button>
      <div style={{ fontFamily: F.body, fontSize: 11, color: C.inkDim, textAlign: 'center', marginTop: S[2] }}>
        Operator will review and approve.
      </div>
    </div>
  );
}

function AdminShell({ db, setDb, navigate, hash }) {
  const parts = hash.split('/').filter(Boolean);
  return (
    <div>
      <Topbar navigate={navigate} role="Admin" current="Admin - all projects" />
      {parts.length === 1 && <AdminProjects db={db} setDb={setDb} navigate={navigate} />}
      {parts.length === 3 && parts[1] === 'p' && <AdminProject projectId={parts[2]} db={db} setDb={setDb} navigate={navigate} />}
      {parts.length === 5 && parts[3] === 'o' && <AdminOperator projectId={parts[2]} operatorId={parts[4]} db={db} setDb={setDb} navigate={navigate} />}
      {parts.length === 7 && parts[5] === 't' && <AdminTruck projectId={parts[2]} operatorId={parts[4]} truckId={parts[6]} db={db} setDb={setDb} navigate={navigate} />}
    </div>
  );
}

function App() {
  const [hash, navigate] = useHash();
  const [db, setDb] = useState({
    projects: PROJECTS_SEED,
    operators: OPERATORS_SEED,
    trucks: TRUCKS_SEED,
    drivers: DRIVERS_SEED,
    hours: HOURS_SEED,
    loads: LOADS_SEED,
    invoices: INVOICES_SEED,
    rates: RATES_INIT,
  });
  const route = (hash || '/').split('/')[1] || '';
  return (
    <div>
      {route === '' && <Landing navigate={navigate} />}
      {route === 'admin' && <AdminShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
      {route === 'operator' && <OperatorEntry db={db} navigate={navigate} />}
      {route === 'driver' && <DriverShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
