  <style>

    .boot svg { width: 56px; height: 56px; }
    .boot .spinner {

    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 6px; }
    *::-webkit-scrollbar-thumb:hover { background: #2a2a2a; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }


    /* === Tier 2: tables → cards on mobile === */
    @media (max-width: 700px) {
      /* Tables become vertical card stacks */
      body table, body thead, body tbody, body tr, body td {
        display: block !important;
        width: auto !important;
      }
      body thead { display: none !important; }
      body table {
        border-collapse: separate !important;
        border-spacing: 0 8px !important;
        margin: 0 !important;
      }
      body tr {
        background: #141414 !important;
        border-radius: 12px !important;
        margin-bottom: 8px !important;
        padding: 12px 14px !important;
        border: 1px solid #1f1f1f !important;
        cursor: inherit;
      }
      body td {
        border: none !important;
        padding: 3px 0 !important;
        text-align: left !important;
        font-size: 13px !important;
        white-space: normal !important;
      }
      body td:first-child {
        font-size: 17px !important;
        font-weight: 700 !important;
        padding: 0 0 8px 0 !important;
        margin-bottom: 4px !important;
        border-bottom: 1px solid rgba(255,255,255,0.06) !important;
      }
      /* All cells after first display inline so they flow as metadata chips */
      body td:not(:first-child) {
        display: inline-block !important;
        margin-right: 14px !important;
        vertical-align: middle !important;
      }
      /* The trailing chevron/arrow cell — push to the right and dim */
      body td[align="right"]:last-child {
        float: right;
        margin-right: 0 !important;
        color: #5a5a5a;
      }
      /* The + Add row (uses colspan) → full-width accent button-style */
      body tr td[colspan] {
        display: block !important;
        text-align: center !important;
        color: #B3E635 !important;
        font-weight: 600 !important;
        padding: 14px !important;
        margin: 0 !important;
        font-size: 14px !important;
        border-bottom: none !important;
      }
      body tr:has(td[colspan]) {
        background: transparent !important;
        border: 1px dashed #2a2a2a !important;
      }
      /* Tighter card padding */
      [style*="border-radius: 16px"] { border-radius: 12px !important; }
      /* Cards inside cards (KPIs) take full width */
      [style*="background: rgb(20, 20, 20)"] { width: 100% !important; box-sizing: border-box !important; }
    }

    /* === Tier 1 mobile responsive === */
    @media (max-width: 900px) {
      [style*="padding: 32px"] { padding: 16px !important; }
      [style*="padding: 24px"] { padding: 14px !important; }
      h1 { font-size: 32px !important; line-height: 1.15 !important; }
      /* 4-col KPI grids → 2-col on tablet */
      [style*="repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      /* Tables horizontally scroll via parent :has() */
      :has(> table) {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        max-width: 100% !important;
      }
      /* Topbar reduces padding */
      .topbar { padding: 10px 14px !important; }
    }
    @media (max-width: 600px) {
      [style*="padding: 32px"] { padding: 12px !important; }
      [style*="padding: 24px"] { padding: 10px !important; }
      h1 { font-size: 26px !important; line-height: 1.15 !important; letter-spacing: -0.6px !important; }
      /* All multi-col grids → single column on phone */
      [style*="display: grid"] {
        grid-template-columns: 1fr !important;
      }
      /* Flex headers (h1 + button) wrap */
      [style*="justify-content: space-between"][style*="display: flex"] {
        flex-wrap: wrap !important;
        gap: 12px !important;
      }
      /* Inputs at 16px to prevent iOS zoom on focus */
      input, select, textarea {
        font-size: 16px !important;
      }
      /* Topbar wraps */
      .topbar {
        flex-wrap: wrap !important;
        gap: 8px !important;
        padding: 8px 12px !important;
      }
      .topbar > div { gap: 12px !important; }
      /* Driver phone frame fills the actual phone */
      .phone-frame-outer {
        padding: 0 !important;
        background: #0A0A0A !important;
      }
      .phone-frame-outer > .brand-frame-chrome,
      .phone-frame-outer > .phone-frame-caption {
        display: none !important;
      }
      .phone-frame-outer > .phone-bezel {
        width: 100% !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
      }
      .phone-frame-outer .phone-screen {
        border-radius: 0 !important;
        min-height: 100vh !important;
      }
      .phone-frame-outer .phone-notch { display: none !important; }
    }

    /* === Mobile responsiveness pass — 2026-05 === */
    /* Tap-target floor: inputs/selects/textareas inside the shells must be at least 44px tall under 700px. */
    @media (max-width: 700px) {
      input:not([type="file"]):not([type="checkbox"]):not([type="radio"]),
      select,
      textarea {
        min-height: 44px !important;
        padding: 12px 14px !important;
        box-sizing: border-box !important;
      }
      /* Btn size="sm" (height:32) and size="xs" (height:26) → bump to 44px on mobile.
         The Btn component renders inline height in the style attribute; match it. */
      button[style*="height: 32px"],
      button[style*="height: 26px"] {
        min-height: 44px !important;
        height: auto !important;
        padding-top: 8px !important;
        padding-bottom: 8px !important;
      }
    }

    /* DriverShell mini-KPI grids should stay 3-col on phone, not collapse via the global 1fr rule.
       More specific than [style*="display: grid"]. Matches the explicit 3-col templates used in
       DriverTruckDetail and DriverMultiTruckHome. */
    @media (max-width: 600px) {
      [style*="grid-template-columns: 1fr 1fr 1fr"],
      [style*="gridTemplateColumns: 1fr 1fr 1fr"] {
        grid-template-columns: 1fr 1fr 1fr !important;
        gap: 8px !important;
      }
    }

    /* OperatorLogLoadForm row: 90px / 1fr / 1fr / 100px / auto.
       Default grid override collapses it to 1-col on ≤600 (still acceptable — inputs stack).
       At 700px window we keep the grid but reflow it so it doesn't horizontally squeeze. */
    @media (max-width: 900px) and (min-width: 601px) {
      [style*="90px 1fr 1fr 100px auto"] {
        grid-template-columns: 1fr 1fr !important;
        gap: 12px !important;
      }
    }

    /* DriverLogLoad photo placeholder: on very narrow phones, switch from fixed 140px height
       to aspect-ratio so the icon+labels never feel cramped at 320–360px viewports. */
    @media (max-width: 600px) {
      button[style*="height: 140px"][style*="dashed"] {
        height: auto !important;
        aspect-ratio: 16 / 10 !important;
        min-height: 120px !important;
      }
    }

    /* Topbar at very narrow widths (≤500px): hide the breadcrumb/current text,
       keep brand + role pill + Switch button visible. The role Pill is the first
       <span> child; the breadcrumb is the second <span> sibling. Hide only the
       second one. */
    @media (max-width: 500px) {
      .topbar > div:first-child > div > span:nth-child(2) {
        display: none !important;
      }
    }

    /* Horizontal-scroll safety net for unbroken IDs / emails / long plate strings.
       Use `overflow-x: clip` (not `hidden`) so we don't create a scroll containing block,
       which would break the sticky Topbar in iOS Safari and older Chromium. */
    @media (max-width: 600px) {
      html, body { overflow-x: clip; }
    }
    @media print {
      html, body { background: #fff !important; color: #000 !important; }

      .invoice-print { position: absolute; left: 0; top: 0; width: 100%; padding: 24px !important; background: #fff !important; color: #000 !important; border: 0 !important; }
      .invoice-print *, .invoice-print *:before, .invoice-print *:after { color: #000 !important; background: transparent !important; border-color: #ccc !important; box-shadow: none !important; }
      .invoice-print th, .invoice-print td { border-bottom: 1px solid #ccc !important; padding: 8px !important; }
      .no-print { display: none !important; }
    }

// =====================================================================
// Helpers
// =====================================================================
const NOW_MIN = 11 * 60 + 5; // 11:05

function calcHours(clockIn, breakMin, clockOut) {
  const [h, m] = clockIn.split(':').map(Number);
  const start = h * 60 + m;
  const end = clockOut
    ? (() => { const [eh, em] = clockOut.split(':').map(Number); return eh * 60 + em; })()
    : NOW_MIN;
  return Math.max(0, (end - start - breakMin) / 60);
}

const fmtHours = (h) => h.toFixed(2);
const fmtMoney = (n) => '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });

// =====================================================================
// Hash router
// =====================================================================
function useHash() {
  const [hash, setHash] = useState(() => window.location.hash.replace(/^#/, '') || '/');
  useEffect(() => {
    const h = () => setHash(window.location.hash.replace(/^#/, '') || '/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const navigate = (to) => { window.location.hash = to; };
  return [hash, navigate];
}

function HexLogo({ size = 24 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <path d="M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z" fill={C.accent} />
      <text x="32" y="44" textAnchor="middle" fontFamily={F.display} fontSize="34" fontWeight="800" fill={C.bg}>J</text>
    </svg>
  );
}

function Brand({ size = 'sm' }) {
  const fs = size === 'lg' ? 20 : 15;
  const ls = size === 'lg' ? 28 : 22;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
      <HexLogo size={ls} />
      <span style={{ fontFamily: F.display, fontSize: fs, fontWeight: 700, letterSpacing: -0.4, color: C.ink }}>
        Jobsite<span style={{ color: C.accent }}>Exchange</span>
      </span>
    </div>
  );
}

function Label({ children, color = C.inkFaint, style = {} }) {
  return (
    <div style={{
      fontFamily: F.mono, fontSize: 10, color, letterSpacing: 0.8,
      textTransform: 'uppercase', fontWeight: 600, ...style,
    }}>{children}</div>
  );
}

function Btn({ children, onClick, variant = 'primary', size = 'md', disabled, fullWidth, style = {} }) {
  const variants = {
    primary:   { background: C.accent, color: C.bg, border: 'none' },
    secondary: { background: 'transparent', color: C.ink, border: `1px solid ${C.ruleHi}` },
    ghost:     { background: 'transparent', color: C.inkDim, border: 'none' },
    danger:    { background: 'transparent', color: C.warn, border: `1px solid ${C.warn}` },
    ok:        { background: C.ok, color: C.bg, border: 'none' },
  };
  const sizes = {
    lg: { height: 52, fontSize: 16, padding: `0 ${S[5]}px`, fontWeight: 600 },
    md: { height: 40, fontSize: 14, padding: `0 ${S[4]}px`, fontWeight: 600 },
    sm: { height: 32, fontSize: 13, padding: `0 ${S[3]}px`, fontWeight: 500 },
    xs: { height: 26, fontSize: 12, padding: `0 ${S[2]}px`, fontWeight: 500 },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{
      ...variants[variant], ...sizes[size], borderRadius: R.pill,
      cursor: disabled ? 'not-allowed' : 'pointer', fontFamily: F.display, letterSpacing: -0.2,
      width: fullWidth ? '100%' : 'auto', opacity: disabled ? 0.35 : 1,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: S[2],
      ...style,
    }}>{children}</button>
  );
}

function Pill({ children, color = C.accent, soft = C.accentSoft, style = {} }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '4px 10px', borderRadius: R.pill, background: soft, color,
      fontFamily: F.mono, fontSize: 10, fontWeight: 700, letterSpacing: 0.8, textTransform: 'uppercase',
      ...style,
    }}>{children}</span>
  );
}

function StatusPill({ status }) {
  const map = {
    open:      { color: C.accent, soft: C.accentSoft, label: 'Active' },
    active:    { color: C.accent, soft: C.accentSoft, label: 'Active' },
    pending:   { color: C.warn,   soft: C.warnSoft,   label: 'Pending' },
    approved:  { color: C.ok,     soft: C.okSoft,     label: 'Approved' },
    closed:    { color: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: 'Closed' },
    upcoming:  { color: C.info,   soft: C.infoSoft,   label: 'Upcoming' },
    completed: { color: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: 'Completed' },
    inservice: { color: C.ok,     soft: C.okSoft,     label: 'In service' },
    idle:      { color: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: 'Idle' },
  };
  const v = map[status] || map.closed;
  return <Pill color={v.color} soft={v.soft}>{v.label}</Pill>;
}

function Card({ children, padding = S[5], style = {} }) {
  return <div style={{ background: C.surface, borderRadius: R.lg, padding, ...style }}>{children}</div>;
}

function Stat({ label, value, sub, align = 'left' }) {
  return (
    <div style={{ textAlign: align }}>
      <Label style={{ marginBottom: 6 }}>{label}</Label>
      <div style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, color: C.ink, lineHeight: 1.05 }}>{value}</div>
      {sub && <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function Avatar({ name, size = 28, color }) {
  const initials = name.split(/\s+/).map(s => s[0]).join('').slice(0, 2).toUpperCase();
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: color || C.surfaceMax, color: color ? C.bg : C.ink,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: F.display, fontSize: size * 0.42, fontWeight: 700,
    }}>{initials}</div>
  );
}

function EmptyState({ icon, title, body, action }) {
  // icon may be a string (legacy unicode glyph) OR a React element (e.g. <TruckIcon size={36} />)

function EditableText({ value, onSave, multiline, mono, placeholder, style = {} }) {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState(value || '');
  useEffect(() => setV(value || ''), [value]);
  const commit = () => { if (v !== (value || '')) onSave(v); setEditing(false); };
  const cancel = () => { setV(value || ''); setEditing(false); };
  if (editing) {
    const Tag = multiline ? 'textarea' : 'input';
    return (
      <Tag value={v} onChange={e => setV(e.target.value)} onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter' && !multiline) { e.preventDefault(); commit(); } if (e.key === 'Escape') cancel(); }}
        onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}
        autoFocus rows={multiline ? 2 : undefined} placeholder={placeholder || ''}
        style={{ background: C.bg, color: 'inherit', border: `1px solid ${C.accent}`, padding: '4px 8px', borderRadius: R.sm, fontFamily: mono ? F.mono : 'inherit', fontSize: 'inherit', fontWeight: 'inherit', letterSpacing: 'inherit', minWidth: 60, width: '100%', boxSizing: 'border-box', ...style }} />
    );
  }
  return (
    <span
      onClick={(e) => { e.stopPropagation(); e.preventDefault(); setEditing(true); }}
      onMouseDown={e => e.stopPropagation()}
      style={{ cursor: 'text', padding: '3px 6px', margin: '-3px -6px', borderRadius: 4, transition: 'background 80ms', display: 'inline-block', minWidth: 18, ...style }}
      onMouseEnter={e => e.currentTarget.style.background = 'rgba(179,230,53,0.12)'}
      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
      title="Click to edit">
      {value || <span style={{ color: C.inkFaint }}>{placeholder || '—'}</span>}
    </span>
  );
}

function EditableSelect({ value, options, onSave, style = {} }) {
  const [editing, setEditing] = useState(false);
  const opt = options.find(o => o.value === value) || { label: value || '—' };
  if (editing) {
    return (
      <select value={value || ''} onChange={e => { onSave(e.target.value); setEditing(false); }} onBlur={() => setEditing(false)} autoFocus
        onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}
        style={{ background: C.bg, color: C.ink, border: `1px solid ${C.accent}`, padding: '4px 8px', borderRadius: R.sm, fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 'inherit', ...style }}>
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    );
  }
  return (
    <span
      onClick={(e) => { e.stopPropagation(); e.preventDefault(); setEditing(true); }}
      onMouseDown={e => e.stopPropagation()}
      style={{ cursor: 'pointer', padding: '3px 6px', margin: '-3px -6px', borderRadius: 4, transition: 'background 80ms', display: 'inline-block', minWidth: 18, ...style }}
      onMouseEnter={e => e.currentTarget.style.background = 'rgba(179,230,53,0.12)'}
      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
      title="Click to edit">{opt.label}</span>
  );
}

function AdminProjects({ db, setDb, navigate }) {
  const updateProject = (id, patch) => setDb(prev => ({ ...prev, projects: prev.projects.map(p => p.id === id ? { ...p, ...patch } : p) }));
  const projects = db.projects.map(p => {
    const ops = db.operators.filter(o => o.projectIds.includes(p.id));
    const trucks = db.trucks.filter(t => t.projectId === p.id);
    const trucksActive = trucks.filter(t => t.driverId && db.hours.some(h => h.truckId === t.id && h.status === 'open')).length;
    const totalLoads = db.loads.filter(l => l.projectId === p.id && l.status === 'approved').length;
    const pendingLoads = db.loads.filter(l => l.projectId === p.id && l.status === 'pending').length;
    const totalHours = db.hours.filter(h => h.projectId === p.id).reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
    const totalRevenue = db.hours.filter(h => h.projectId === p.id).reduce((s, h) => {
      const t = db.trucks.find(t => t.id === h.truckId);
      const rate = t ? db.rates[t.type] : 0;
      return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * rate;
    }, 0);
    return { ...p, ops, trucks, trucksActive, totalLoads, pendingLoads, totalHours, totalRevenue };
  });
  const active = projects.filter(p => (p.status || 'active') === 'active');
  const upcoming = projects.filter(p => p.status === 'upcoming');
  const completed = projects.filter(p => p.status === 'completed');
  const totals = {
    activeProjects: active.length,
    totalTrucksActive: active.reduce((s, p) => s + p.trucksActive, 0),
    totalLoadsAll: active.reduce((s, p) => s + p.totalLoads, 0),
    totalRevenueAll: active.reduce((s, p) => s + p.totalRevenue, 0),
  };

  const statusOptions = [
    { value: 'active', label: 'Active' },
    { value: 'upcoming', label: 'Upcoming' },
    { value: 'completed', label: 'Completed' },
  ];

  const renderRow = (p, dim) => (
    <Tr key={p.id} onClick={() => navigate(`/admin/p/${p.id}`)}
      style={dim ? { opacity: 0.6 } : {}}>
      <Td>
        <div style={{ fontWeight: 600 }}><EditableText value={p.name} onSave={(v) => updateProject(p.id, { name: v })} /></div>
        <div style={{ fontSize: 11, color: C.inkDim, marginTop: 2 }}><EditableText value={p.address} onSave={(v) => updateProject(p.id, { address: v })} /></div>
      </Td>
      <Td dim><EditableText value={p.gc} onSave={(v) => updateProject(p.id, { gc: v })} /></Td>
      <Td><EditableSelect value={p.status || 'active'} options={statusOptions} onSave={(v) => updateProject(p.id, { status: v })} /></Td>
      <Td align="right">{p.ops.length}</Td>
      <Td align="right" mono>{p.trucksActive} <span style={{ color: C.inkFaint }}>/ {p.trucks.length}</span></Td>
      <Td align="right" mono>{p.totalLoads}</Td>
      <Td align="right">{p.pendingLoads > 0 ? <Pill color={C.warn} soft={C.warnSoft}>{p.pendingLoads}</Pill> : <span style={{ color: C.inkFaint }}>—</span>}</Td>
      <Td align="right" mono>{fmtHours(p.totalHours)}</Td>
      <Td align="right" mono style={{ fontWeight: 600 }}>{fmtMoney(p.totalRevenue)}</Td>
      <Td align="right" dim>{'>'}</Td>
    </Tr>
  );

  const head = (
    <thead>
      <tr>
        <Th>Project</Th><Th>GC</Th><Th>Status</Th>
        <Th align="right">Operators</Th>
        <Th align="right">Trucks active</Th>
        <Th align="right">Total loads</Th>
        <Th align="right">Pending</Th>
        <Th align="right">Total hours</Th>
        <Th align="right">Total revenue</Th>
        <Th></Th>
      </tr>
    </thead>
  );

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin' }, { label: 'Projects' }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: S[5] }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Active projects · {String(new Date().getHours()).padStart(2,'0')}:{String(new Date().getMinutes()).padStart(2,'0')}</Label>
          <h1 style={{ fontFamily: F.display, fontSize: 36, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>Projects overview</h1>
          <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 6 }}>Click any value to edit. Click row to drill in. Change Status to move a project between sections.</div>
        </div>
        <div style={{ display: 'flex', gap: S[2] }}>
          <Btn variant="secondary" size="sm">Export CSV</Btn>
          <Btn variant="primary" size="sm" onClick={() => navigate('/admin/new')}>+ New project</Btn>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>
        <Card padding={S[4]}><Stat label="Active projects" value={totals.activeProjects} /></Card>
        <Card padding={S[4]}><Stat label="Trucks running now" value={totals.totalTrucksActive} /></Card>
        <Card padding={S[4]}><Stat label="Total loads delivered" value={totals.totalLoadsAll} sub="across active" /></Card>
        <Card padding={S[4]}><Stat label="Total revenue" value={fmtMoney(totals.totalRevenueAll)} sub="across active" /></Card>

      {/* Active section */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>

            </tr>
          </tbody>
        </table>
      </Card>

      {/* Upcoming section */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.info || C.inkDim}>Upcoming</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>{upcoming.length}</span>
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          {head}
          <tbody>
            {upcoming.map(p => renderRow(p, false))}
            {upcoming.length === 0 && <tr><td colSpan={11} style={{ padding: S[5], textAlign: 'center', color: C.inkDim, fontFamily: F.body, fontSize: 13 }}>No upcoming projects.</td></tr>}
          </tbody>
        </table>
      </Card>

      {/* Completed section */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.inkDim}>Completed</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />

      <Card padding={0}>

function AdminProject({ projectId, db, setDb, navigate }) {
  const [showAdd, setShowAdd] = useState(false);
  const project = db.projects.find(p => p.id === projectId);
  if (!project) return <NotFound navigate={navigate} />;
  const operators = db.operators.filter(o => o.projectIds.includes(projectId));
  const trucks = db.trucks.filter(t => t.projectId === projectId);
  const hours = db.hours.filter(h => h.projectId === projectId);
  const loads = db.loads.filter(l => l.projectId === projectId);
  const updateProject = (patch) => setDb(prev => ({ ...prev, projects: prev.projects.map(p => p.id === project.id ? { ...p, ...patch } : p) }));
  const addOperator = (form) => {
    const id = 'op-' + Math.random().toString(36).substring(2, 7);
    setDb(prev => ({ ...prev, operators: [...prev.operators, { id, ...form, projectIds: [projectId] }] }));
    setShowAdd(false);

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Projects', to: '/admin' }, { label: project.name }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: S[5] }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: 6 }}>
            <span style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim }}>started <EditableText value={project.startDate} onSave={(v) => updateProject({ startDate: v })} mono placeholder="YYYY-MM-DD" /></span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[3], flexWrap: 'wrap' }}>
            <h1 style={{ fontFamily: F.display, fontSize: 32, fontWeight: 700, letterSpacing: -1, margin: 0, color: C.ink }}>
              <EditableText value={project.name} onSave={(v) => updateProject({ name: v })} />
            </h1>
            <StatusPill status={project.status || 'active'} />
          </div>
          <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 6 }}>
            <EditableText value={project.gc} onSave={(v) => updateProject({ gc: v })} /> · <EditableText value={project.address} onSave={(v) => updateProject({ address: v })} />
          </div>
          {project.material && project.material.length > 0 && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: S[2], marginTop: S[3] }}>
              {project.material.map(mc => {
                const m = MATERIALS.find(x => x.code === mc);

            </div>
          )}
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>
        <Card padding={S[4]}><Stat label="Operators" value={operators.length} /></Card>
        <Card padding={S[4]}><Stat label="Trucks" value={trucks.length} sub={`${trucks.filter(t => t.driverId).length} assigned`} /></Card>
        <Card padding={S[4]}><Stat label="Total loads" value={loads.filter(l => l.status === 'approved').length} sub={`${loads.filter(l => l.status === 'pending').length} pending`} /></Card>
        <Card padding={S[4]}><Stat label="Total hours" value={fmtHours(hours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0))} /></Card>
      </div>
      <div style={{ marginBottom: S[3] }}><Label>Operators on this project</Label></div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><Th>Operator</Th><Th>Contact</Th><Th align="right">Trucks managed</Th><Th align="right">Active now</Th><Th align="right">Total hours</Th><Th></Th></tr></thead>
          <tbody>
            {operators.map(op => {
              const opTrucks = trucks.filter(t => t.operatorId === op.id);
              const opTruckIds = new Set(opTrucks.map(t => t.id));
              const opActive = opTrucks.filter(t => t.driverId && hours.some(h => h.truckId === t.id && h.status === 'open')).length;
              const opHours = hours.filter(h => opTruckIds.has(h.truckId)).reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
              return (
                <Tr key={op.id} onClick={() => navigate(`/admin/p/${projectId}/o/${op.id}`)}>
                  <Td>
                    <div style={{ display: 'flex', alignItems: 'center', gap: S[3] }}>
                      <Avatar name={op.name} color={C.accent} />
                      <div>
                        <div style={{ fontWeight: 600 }}>{op.name}</div>
                        <div style={{ fontSize: 11, color: C.inkDim, marginTop: 2 }}>Operator · {op.projectIds.length > 1 ? `${op.projectIds.length} projects` : '1 project'}</div>
                      </div>
                    </div>
                  </Td>
                  <Td dim mono style={{ fontSize: 12 }}>{op.phone}<br/>{op.email}</Td>
                  <Td align="right" mono>{opTrucks.length}</Td>
                  <Td align="right" mono>{opActive}</Td>
                  <Td align="right" mono>{fmtHours(opHours)}</Td>
                  <Td align="right" dim>{'>'}</Td>
                </Tr>
              );
            })}
            <tr onClick={() => setShowAdd(true)} style={{ cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background = C.surfaceHi}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <td colSpan={6} style={{ padding: '14px 14px', borderBottom: `1px solid ${C.rule}`, fontFamily: F.display, fontSize: 13, color: C.accent, fontWeight: 600, textAlign: 'center' }}>+ Assign operator to this project</td>
            </tr>
          </tbody>
        </table>
      </Card>
      {showAdd && <AddOperatorForm onAdd={addOperator} onCancel={() => setShowAdd(false)} />}
    </div>
  );
}

function AddOperatorForm({ onAdd, onCancel }) {

  const [phone, setPhone] = useState('');
  const [email, setEmail] = useState('');
  const inputStyle = { background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '10px 12px', borderRadius: R.sm, fontFamily: F.body, fontSize: 14, width: '100%', boxSizing: 'border-box' };
  return (
    <Card style={{ marginTop: S[4] }}>
      <Label style={{ marginBottom: S[3] }}>Assign operator</Label>
      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 2fr auto', gap: S[3], alignItems: 'flex-end' }}>
        <div><div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>Name</div><input value={name} onChange={e => setName(e.target.value)} placeholder="Full name" style={inputStyle} autoFocus /></div>
        <div><div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>Phone</div><input value={phone} onChange={e => setPhone(e.target.value)} placeholder="(555) 555-1234" style={inputStyle} /></div>
        <div><div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>Email</div><input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="email@company.com" style={inputStyle} /></div>
        <div style={{ display: 'flex', gap: 8 }}>

}

function AdminOperator({ projectId, operatorId, db, setDb, navigate }) {
  const [showAdd, setShowAdd] = useState(false);
  const project = db.projects.find(p => p.id === projectId);
  const operator = db.operators.find(o => o.id === operatorId);
  if (!project || !operator) return <NotFound navigate={navigate} />;
  const trucks = db.trucks.filter(t => t.projectId === projectId && t.operatorId === operatorId);
  const truckIds = new Set(trucks.map(t => t.id));
  const hours = db.hours.filter(h => h.projectId === projectId && truckIds.has(h.truckId));
  const loads = db.loads.filter(l => l.projectId === projectId && truckIds.has(l.truckId));
  const updateOperator = (patch) => setDb(prev => ({ ...prev, operators: prev.operators.map(o => o.id === operator.id ? { ...o, ...patch } : o) }));
  const updateTruck = (id, patch) => setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === id ? { ...t, ...patch } : t) }));
  const updateRate = (type, newRate) => setDb(prev => ({ ...prev, rates: { ...prev.rates, [type]: parseInt(newRate) || 0 } }));
  const addTruck = (form) => {
    const id = 'tk-' + Math.random().toString(36).substring(2, 7);
    setDb(prev => ({ ...prev, trucks: [...prev.trucks, { id, ...form, projectId, operatorId, driverId: null }] }));
    setShowAdd(false);
  };
  const typeOptions = TRUCK_TYPES.map(t => ({ value: t.code, label: t.label }));

  const totalHours = hours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
  const totalRevenue = hours.reduce((s, h) => {
    const t = trucks.find(x => x.id === h.truckId);
    return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * (t ? db.rates[t.type] : 0);
  }, 0);
  const pendingHrs = hours.filter(h => h.status === 'pending').length;
  const pendingLoads = loads.filter(l => l.status === 'pending').length;

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: project.name, to: `/admin/p/${projectId}` }, { label: operator.name }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'center', gap: S[4], marginBottom: S[5] }}>
        <Avatar name={operator.name} size={56} color={C.accent} />
        <div style={{ flex: 1 }}>
          <Label color={C.accent}>Operator on {project.name}</Label>
          <h1 style={{ fontFamily: F.display, fontSize: 32, fontWeight: 700, letterSpacing: -1, margin: '4px 0 0', color: C.ink }}>
            <EditableText value={operator.name} onSave={(v) => updateOperator({ name: v })} />
          </h1>
          <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>
            <EditableText value={operator.phone} onSave={(v) => updateOperator({ phone: v })} mono /> ·{' '}
            <EditableText value={operator.email} onSave={(v) => updateOperator({ email: v })} mono />
          </div>
        </div>
        <Btn variant="secondary" size="sm">Message</Btn>
      </div>

      {/* Operator KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>
        <Card padding={S[4]}><Stat label="Trucks" value={trucks.length} sub={`${trucks.filter(t => t.driverId).length} with driver`} /></Card>
        <Card padding={S[4]}><Stat label="Total loads" value={loads.filter(l => l.status === 'approved').length} sub={`${pendingLoads} pending`} /></Card>
        <Card padding={S[4]}><Stat label="Total hours" value={fmtHours(totalHours)} /></Card>
        <Card padding={S[4]}><Stat label="Total revenue" value={fmtMoney(totalRevenue)} /></Card>
      </div>

      <div style={{ marginBottom: S[3], display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <Label>Trucks on {project.name}</Label>
        <span style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim }}>Click any value to edit. Click row to drill into truck.</span>
      </div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr><Th>Plate</Th><Th>Type</Th><Th align="right">Rate</Th><Th>Driver</Th><Th>Status</Th><Th align="right">Total hours</Th><Th align="right">Total loads</Th><Th align="right">Total revenue</Th><Th></Th><Th></Th></tr>
          </thead>
          <tbody>
            {trucks.map(t => {
              const driver = db.drivers.find(d => d.id === t.driverId);
              const hr = db.hours.find(h => h.truckId === t.id);
              const truckHours = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;
              const truckLoadsAll = db.loads.filter(l => l.truckId === t.id);
              const rate = db.rates[t.type];
              const revenue = truckHours * rate;
              return (
                <Tr key={t.id} onClick={() => navigate(`/admin/p/${projectId}/o/${operatorId}/t/${t.id}`)}>
                  <Td mono><span style={{ color: C.accent }}>#<EditableText value={t.plate} onSave={(v) => updateTruck(t.id, { plate: v })} mono /></span></Td>
                  <Td><Pill color={C.inkDim} soft="rgba(255,255,255,0.05)"><EditableSelect value={t.type} options={typeOptions} onSave={(v) => updateTruck(t.id, { type: v })} /></Pill></Td>
                  <Td align="right" mono>$<EditableText value={String(rate || 0)} onSave={(v) => updateRate(t.type, v)} mono />/hr</Td>
                  <Td>{driver ? driver.name : <span style={{ color: C.inkFaint }}>— unassigned</span>}</Td>
                  <Td>{hr ? <StatusPill status={hr.status} /> : <Pill color={C.inkFaint} soft="rgba(255,255,255,0.04)">Off</Pill>}</Td>
                  <Td align="right" mono>{fmtHours(truckHours)}</Td>
                  <Td align="right" mono>{truckLoadsAll.filter(l => l.status === 'approved').length}{truckLoadsAll.filter(l => l.status === 'pending').length > 0 && <span style={{ color: C.warn, marginLeft: 4 }}>+{truckLoadsAll.filter(l => l.status === 'pending').length}p</span>}</Td>
                  <Td align="right" mono style={{ fontWeight: 600 }}>{fmtMoney(revenue)}</Td>
                  <Td align="right">{driver ? <button onClick={(e) => { e.stopPropagation(); navigate(`/driver/${driver.id}`); }} title={`Open driver widget for ${driver.name}`} style={{ background: 'transparent', border: `1px solid ${C.ruleHi}`, color: C.accent, padding: '4px 10px', borderRadius: R.pill, fontFamily: F.mono, fontSize: 10, fontWeight: 600, cursor: 'pointer', letterSpacing: 0.4, textTransform: 'uppercase' }}>Widget {'↗'}</button> : <span style={{ color: C.inkFaint }}>—</span>}</Td>
                  <Td align="right" dim>{'>'}</Td>
                </Tr>
              );
            })}
            <tr onClick={() => setShowAdd(true)} style={{ cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background = C.surfaceHi}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <td colSpan={10} style={{ padding: '14px 14px', borderBottom: `1px solid ${C.rule}`, fontFamily: F.display, fontSize: 13, color: C.accent, fontWeight: 600, textAlign: 'center' }}>+ Add truck to this project</td>
            </tr>
          </tbody>
        </table>
      </Card>
      {showAdd && <AddTruckForm onAdd={addTruck} onCancel={() => setShowAdd(false)} />}

      {/* Approvals */}
      {(pendingLoads + pendingHrs > 0) && (
        <div style={{ marginTop: S[7] }}>
          <OperatorApprovals projectId={projectId} hours={hours} loads={loads} db={db} setDb={setDb} />
        </div>
      )}

      {/* Invoices */}
      <div style={{ marginTop: S[7] }}>
        <OperatorInvoices operator={operator} projectId={projectId} project={project} trucks={trucks} hours={hours} db={db} setDb={setDb} />
      </div>
    </div>
  );
}

function AdminTruck({ projectId, operatorId, truckId, db, setDb, navigate }) {
  const project = db.projects.find(p => p.id === projectId);
  const operator = db.operators.find(o => o.id === operatorId);
  const truck = db.trucks.find(t => t.id === truckId);
  if (!project || !operator || !truck) return <NotFound navigate={navigate} />;
  const driver = db.drivers.find(d => d.id === truck.driverId);
  const hr = db.hours.find(h => h.truckId === truckId);
  const truckLoads = db.loads.filter(l => l.truckId === truckId).sort((a, b) => a.time.localeCompare(b.time));
  const rate = db.rates[truck.type];
  const truckType = TRUCK_TYPES.find(tt => tt.code === truck.type);
  const truckHours = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;

  // Field updaters
  const updateTruck = (patch) => setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === truck.id ? { ...t, ...patch } : t) }));
  const updateDriver = (patch) => driver && setDb(prev => ({ ...prev, drivers: prev.drivers.map(d => d.id === driver.id ? { ...d, ...patch } : d) }));
  const updateRate = (newRate) => setDb(prev => ({ ...prev, rates: { ...prev.rates, [truck.type]: parseInt(newRate) || 0 } }));
  const updateHr = (patch) => hr && setDb(prev => ({ ...prev, hours: prev.hours.map(h => h.id === hr.id ? { ...h, ...patch } : h) }));
  const updateLoad = (id, patch) => setDb(prev => ({ ...prev, loads: prev.loads.map(l => l.id === id ? { ...l, ...patch } : l) }));
  const deleteLoad = (id) => { if (confirm('Delete this load?')) setDb(prev => ({ ...prev, loads: prev.loads.filter(l => l.id !== id) })); };
  const reassignDriver = (newDriverId) => updateTruck({ driverId: newDriverId || null });

  const driverOptions = [
    { value: '', label: '— Unassigned —' },
    ...db.drivers.map(d => ({ value: d.id, label: d.name + ' · ' + d.phone })),
  ];
  const typeOptions = TRUCK_TYPES.map(t => ({ value: t.code, label: t.label + ' (' + t.cap + ')' }));
  const materialOptions = MATERIALS.map(m => ({ value: m.code, label: m.label }));
  const statusOptions = [
    { value: 'open', label: 'Active' },
    { value: 'pending', label: 'Pending' },
    { value: 'approved', label: 'Approved' },
    { value: 'closed', label: 'Closed' },
  ];

  return (
    <div style={{ padding: S[6], maxWidth: 1480, margin: '0 auto' }}>
      <Crumbs items={[
        { label: 'Admin', to: '/admin' },
        { label: project.name, to: `/admin/p/${projectId}` },
        { label: operator.name, to: `/admin/p/${projectId}/o/${operatorId}` },
        { label: `Truck #${truck.plate}` },
      ]} navigate={navigate} />

      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: S[5], marginBottom: S[5] }}>
        <div style={{ flex: 1 }}>
          <Label color={C.accent}>
            <EditableText value={truck.hauler} onSave={(v) => updateTruck({ hauler: v })} style={{ color: C.accent }} />
          </Label>
          <h1 style={{ fontFamily: F.display, fontSize: 32, fontWeight: 700, letterSpacing: -1, margin: '4px 0 6px', color: C.ink }}>
            Truck <span style={{ color: C.accent }}>#</span>
            <EditableText value={truck.plate} onSave={(v) => updateTruck({ plate: v })} mono />
          </h1>
          <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim }}>
            <EditableSelect value={truck.type} options={typeOptions} onSave={(v) => updateTruck({ type: v })} /> · {truckType.axles} · ${' '}
            <EditableText value={String(rate)} onSave={updateRate} mono /><span>/hr</span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: S[2], alignItems: 'center' }}>
          {hr && <StatusPill status={hr.status} />}
          <Btn variant="secondary" size="sm" onClick={() => alert('In real app: re-assign truck to different project/operator')}>Reassign…</Btn>
        </div>
      </div>

      <div style={{ marginBottom: S[5] }}>
        <div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: S[4], marginBottom: S[5] }}>
            <Card>
              <Label style={{ marginBottom: S[3] }}>Driver</Label>
              <EditableSelect value={truck.driverId || ''} options={driverOptions} onSave={reassignDriver} style={{ display: 'inline-block', marginBottom: S[3], color: C.accent, fontWeight: 600 }} />
              {driver ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: S[3] }}>
                  <Avatar name={driver.name} size={44} />
                  <div>
                    <div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700 }}>
                      <EditableText value={driver.name} onSave={(v) => updateDriver({ name: v })} />
                    </div>
                    <div style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim, marginTop: 2 }}>
                      <EditableText value={driver.phone} onSave={(v) => updateDriver({ phone: v })} mono />
                    </div>
                  </div>
                </div>
              ) : <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkFaint, marginTop: S[3] }}>No driver assigned. Operator (or admin) will assign one.</div>}
              {hr && (
                <div style={{ marginTop: S[4], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, alignItems: 'center' }}>
                    <Label>Clocked in</Label>
                    <span style={{ fontFamily: F.mono, fontSize: 12, color: C.ink, fontWeight: 600 }}>
                      <EditableText value={hr.clockIn} onSave={(v) => updateHr({ clockIn: v })} mono placeholder="HH:MM" />
                    </span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, alignItems: 'center' }}>
                    <Label>Break</Label>
                    <span style={{ fontFamily: F.mono, fontSize: 12, color: C.ink }}>
                      <EditableText value={String(hr.breakMin)} onSave={(v) => updateHr({ breakMin: parseInt(v) || 0 })} mono /> min
                    </span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, alignItems: 'center' }}>
                    <Label>Status</Label>
                    <span style={{ fontFamily: F.mono, fontSize: 12, color: C.accent, fontWeight: 700 }}>
                      <EditableSelect value={hr.status} options={statusOptions} onSave={(v) => updateHr({ status: v })} />
                    </span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <Label color={C.accent}>Hours so far</Label>
                    <span style={{ fontFamily: F.mono, fontSize: 12, color: C.accent, fontWeight: 700 }}>{fmtHours(truckHours)}</span>
                  </div>
                </div>
              )}
            </Card>
            <Card>
              <Label style={{ marginBottom: S[3] }}>Today summary</Label>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[4] }}>
                <Stat label="Hours" value={fmtHours(truckHours)} />
                <Stat label="Loads (approved)" value={truckLoads.filter(l => l.status === 'approved').length} />
                <Stat label="Pending" value={truckLoads.filter(l => l.status === 'pending').length} />
                <Stat label="Revenue" value={fmtMoney(truckHours * rate)} sub="approved hours" />
              </div>
            </Card>
          </div>
          <div style={{ marginBottom: S[3], display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <Label>Today's loads</Label>
            <span style={{ fontFamily: F.body, fontSize: 11, color: C.inkFaint }}>Click any value to edit</span>
          </div>
          <Card padding={0}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr><Th width={70}>Time</Th><Th>CY</Th><Th>Material</Th><Th width={50}>Photo</Th><Th>Status</Th><Th></Th></tr>
              </thead>
              <tbody>
                {truckLoads.length === 0 && (
                  <tr><td colSpan="6" style={{ padding: S[6], textAlign: 'center' }}>
                    <div style={{ color: C.inkFaint, marginBottom: S[2], display: 'inline-flex' }}><TruckIcon size={28} /></div>
                    <div style={{ ...T.h3, fontSize: 15, color: C.ink, marginBottom: 4 }}>No loads logged yet today</div>
                    <div style={{ ...T.body, fontSize: 12, color: C.inkDim }}>Loads logged by the driver will appear here.</div>
                  </td></tr>
                )}
                {truckLoads.map(l => (
                  <Tr key={l.id}>
                    <Td mono><EditableText value={l.time} onSave={(v) => updateLoad(l.id, { time: v })} mono placeholder="HH:MM" /></Td>
                    <Td mono><span style={{ color: C.accent, fontWeight: 700 }}><EditableText value={String(l.cy != null ? l.cy : '')} onSave={(v) => updateLoad(l.id, { cy: parseFloat(v) || 0 })} mono /> CY</span></Td>

function OperatorLogLoadForm({ truck, driver, project, db, setDb }) {
  const defaultMat = (project && project.material && project.material[0]) || 'CF';
  const [material, setMaterial] = useState(defaultMat);
  const [cy, setCy] = useState('');
  const [ticketNo, setTicketNo] = useState('');
  const [time, setTime] = useState(() => {
    const d = new Date();
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  });

  const inputStyle = { background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '10px 12px', borderRadius: R.sm, fontFamily: F.body, fontSize: 14, width: '100%', boxSizing: 'border-box' };
  const canSubmit = cy && parseFloat(cy) > 0;

  const submit = () => {
    if (!canSubmit) return;
    const existing = db.loads.map(l => parseInt((l.id || '').replace(/^ld-/, ''), 10)).filter(n => !isNaN(n));
    const nextNum = existing.length ? Math.max(...existing) + 1 : 1001;
    const newLoad = {
      id: 'ld-' + nextNum,
      driverId: driver ? driver.id : null,
      truckId: truck.id,
      projectId: truck.projectId,
      material,
      cy: parseFloat(cy),
      ticketNo: ticketNo || null,
      time,
      status: 'pending',
    };
    setDb(prev => ({ ...prev, loads: [...prev.loads, newLoad] }));
    setCy('');
    setTicketNo('');
    const d = new Date();
    setTime(String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'));
  };

  return (
    <div style={{ marginBottom: S[3] }}>
      <Label style={{ marginBottom: S[3] }}>Log new load · #{truck.plate}</Label>
      <Card>
        <div style={{ display: 'grid', gridTemplateColumns: '90px 1fr 1fr 100px auto', gap: S[3], alignItems: 'flex-end' }}>

            <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>Time</div>

          </div>
          <div>
            <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>Material</div>
            <select value={material} onChange={e => setMaterial(e.target.value)} style={inputStyle}>

            <input value={ticketNo} onChange={e => setTicketNo(e.target.value)} placeholder="e.g. T-44801" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
          <div>
            <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginBottom: 4 }}>CY</div>

}

    setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === truckId ? { ...t, driverId } : t) }));

  const updateDriver = (id, patch) => setDb(prev => ({ ...prev, drivers: prev.drivers.map(d => d.id === id ? { ...d, ...patch } : d) }));

    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>

                  <Td>
                    <select value={t.driverId || ''} onChange={e => assign(t.id, e.target.value || null)} style={{ background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '8px 12px', borderRadius: R.sm, fontFamily: F.body, fontSize: 13, minWidth: 180 }}>

                <div style={{ display: 'flex', alignItems: 'center', gap: S[3] }}>
                  <Avatar name={d.name} />
                  <div>
                    <div style={{ fontFamily: F.display, fontSize: 14, fontWeight: 600 }}><EditableText value={d.name} onSave={(v) => updateDriver(d.id, { name: v })} /></div>
                    <div style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim, marginTop: 2 }}><EditableText value={d.phone} onSave={(v) => updateDriver(d.id, { phone: v })} mono /></div>

function OperatorApprovals({ projectId, hours, loads, db, setDb }) {
  const pendingLoads = loads.filter(l => l.status === 'pending');
  const pendingHrs = hours.filter(h => h.status === 'pending');
  const updateLoad = (id, patch) => setDb(prev => ({ ...prev, loads: prev.loads.map(l => l.id === id ? { ...l, ...patch } : l) }));
  const updateHr = (id, patch) => setDb(prev => ({ ...prev, hours: prev.hours.map(h => h.id === id ? { ...h, ...patch } : h) }));
  const approveLoad = (id) => updateLoad(id, { status: 'approved' });
  const rejectLoad = (id) => setDb(prev => ({ ...prev, loads: prev.loads.filter(l => l.id !== id) }));
  const approveHr = (id) => updateHr(id, { status: 'open' });
  const materialOptions = MATERIALS.map(m => ({ value: m.code, label: m.label }));
  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <h1 style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink, marginBottom: 6 }}>Approvals</h1>
      <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginBottom: S[5] }}>Click any value to fix typos before approving.</div>
      <div style={{ marginBottom: S[3], display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <Label>Pending loads ({pendingLoads.length})</Label>
        {pendingLoads.length > 0 && <Btn variant="secondary" size="sm" onClick={() => pendingLoads.forEach(l => approveLoad(l.id))}>Approve all</Btn>}
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        {pendingLoads.length === 0 ? (
          <div style={{ padding: S[5], textAlign: 'center', color: C.inkDim, fontFamily: F.body, fontSize: 13 }}>Nothing pending.</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead><tr><Th>Time</Th><Th>Truck</Th><Th>Driver</Th><Th>Material</Th><Th>CY</Th><Th>Photo</Th><Th></Th></tr></thead>
            <tbody>
              {pendingLoads.map(l => {
                const t = db.trucks.find(t => t.id === l.truckId);
                const d = db.drivers.find(d => d.id === l.driverId);
                return (
                  <Tr key={l.id}>
                    <Td mono><EditableText value={l.time} onSave={(v) => updateLoad(l.id, { time: v })} mono placeholder="HH:MM" /></Td>
                    <Td mono><span style={{ color: C.accent }}>#{t.plate}</span></Td>
                    <Td>{d.name}</Td>
                    <Td><EditableSelect value={l.material} options={materialOptions} onSave={(v) => updateLoad(l.id, { material: v })} /></Td>
                    <Td mono><span style={{ color: C.accent, fontWeight: 700 }}><EditableText value={String(l.cy != null ? l.cy : '')} onSave={(v) => updateLoad(l.id, { cy: parseFloat(v) || 0 })} mono /> CY</span></Td>
                    <Td>{l.photo ? <img src={l.photo} alt="" style={{ width: 32, height: 32, borderRadius: 4, objectFit: 'cover', cursor: 'pointer' }} onClick={() => window.open(l.photo, '_blank')} /> : <span style={{ color: C.inkFaint, fontSize: 11 }}>—</span>}</Td>
                    <Td align="right">
                      <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                        <Btn variant="ghost" size="xs" onClick={() => rejectLoad(l.id)}>Reject</Btn>
                        <Btn variant="ok" size="xs" onClick={() => approveLoad(l.id)}>Approve</Btn>
                      </div>
                    </Td>
                  </Tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
      <div style={{ marginBottom: S[3] }}><Label>Pending hour adjustments ({pendingHrs.length})</Label></div>
      <Card padding={0}>
        {pendingHrs.length === 0 ? (
          <div style={{ padding: S[5], textAlign: 'center', color: C.inkDim, fontFamily: F.body, fontSize: 13 }}>Nothing pending.</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead><tr><Th>Driver</Th><Th>Truck</Th><Th>Clock-in</Th><Th>Break</Th><Th align="right">Hours</Th><Th></Th></tr></thead>
            <tbody>
              {pendingHrs.map(h => {
                const t = db.trucks.find(t => t.id === h.truckId);
                const d = db.drivers.find(d => d.id === h.driverId);
                return (
                  <Tr key={h.id}>
                    <Td>{d.name}</Td>
                    <Td mono><span style={{ color: C.accent }}>#{t.plate}</span></Td>
                    <Td mono><EditableText value={h.clockIn} onSave={(v) => updateHr(h.id, { clockIn: v })} mono placeholder="HH:MM" /></Td>
                    <Td mono><EditableText value={String(h.breakMin)} onSave={(v) => updateHr(h.id, { breakMin: parseInt(v) || 0 })} mono /> min</Td>
                    <Td align="right" mono>{fmtHours(calcHours(h.clockIn, h.breakMin, h.clockOut))}</Td>
                    <Td align="right"><Btn variant="ok" size="xs" onClick={() => approveHr(h.id)}>Approve</Btn></Td>
                  </Tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function OperatorInvoices({ operator, projectId, project, trucks, hours, db, setDb }) {
  const [showDraft, setShowDraft] = useState(false);
  const invoices = (db.invoices || []).filter(i => i.operatorId === operator.id && i.projectId === projectId);

  const buildDraft = () => {
    const today = new Date().toISOString().slice(0, 10);
    const lineItems = trucks.filter(t => hours.some(h => h.truckId === t.id)).map(t => {
      const hr = hours.find(h => h.truckId === t.id);
      const driver = db.drivers.find(d => d.id === t.driverId);
      const truckHours = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;
      const rate = db.rates[t.type];
      return {
        id: 'li-' + Math.random().toString(36).substring(2, 7),
        truckPlate: t.plate, truckType: t.type, driverName: driver ? driver.name : '—',
        hours: parseFloat(truckHours.toFixed(2)), rate, amount: parseFloat((truckHours * rate).toFixed(2)),
      };
    });
    const loadCount = db.loads.filter(l => l.projectId === projectId && l.status === 'approved').length;
    const totalCY = db.loads.filter(l => l.projectId === projectId && l.status === 'approved').reduce((s, l) => s + (l.cy || 0), 0);
    return {
      id: 'inv-' + Date.now(),
      operatorId: operator.id, projectId,
      number: 'INV-' + String(Math.floor(Math.random() * 9000) + 1000),
      periodStart: today, periodEnd: today,
      issuedDate: today,
      billTo: project.gc,
      lineItems,
      loadCount, totalCY,
      notes: '',
      status: 'draft',
    };
  };

  const [draft, setDraft] = useState(null);
  const startDraft = () => { setDraft(buildDraft()); setShowDraft(true); };

  const updateDraft = (patch) => setDraft(d => ({ ...d, ...patch }));
  const updateLine = (idx, patch) => setDraft(d => ({ ...d, lineItems: d.lineItems.map((li, i) => i === idx ? { ...li, ...patch, amount: parseFloat((((patch.hours != null ? patch.hours : li.hours) * (patch.rate != null ? patch.rate : li.rate))).toFixed(2)) } : li) }));
  const removeLine = (idx) => setDraft(d => ({ ...d, lineItems: d.lineItems.filter((_, i) => i !== idx) }));

  const sendInvoice = () => {
    const finalDraft = { ...draft, status: 'sent', sentAt: new Date().toISOString() };
    setDb(prev => ({ ...prev, invoices: [...(prev.invoices || []), finalDraft] }));
    alert('Invoice ' + finalDraft.number + ' sent to ' + finalDraft.billTo + '.');
    setShowDraft(false);
    setDraft(null);
  };

  const draftTotal = draft ? draft.lineItems.reduce((s, li) => s + li.amount, 0) : 0;

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[5] }}>
        <div>
          <h1 style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink }}>Invoices</h1>
          <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>Bill {project.gc} for hours and CY hauled on {project.name}.</div>
        </div>
        {!showDraft && <Btn onClick={startDraft}>+ New invoice</Btn>}
      </div>

      {showDraft && draft && (
        <div className="invoice-print" style={{ marginBottom: S[5], border: `1px solid ${C.accent}`, background: C.surface, borderRadius: R.lg, padding: S[5] }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: S[5] }}>
            <div>
              <Label color={C.accent} style={{ marginBottom: 6 }}>Draft invoice · click any value to edit</Label>
              <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: C.ink }}>
                <EditableText value={draft.number} onSave={(v) => updateDraft({ number: v })} mono />
              </div>
              <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>
                For period <EditableText value={draft.periodStart} onSave={(v) => updateDraft({ periodStart: v })} mono /> {'→'} <EditableText value={draft.periodEnd} onSave={(v) => updateDraft({ periodEnd: v })} mono />
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <Label style={{ marginBottom: 6 }}>Bill to</Label>
              <div style={{ fontFamily: F.display, fontSize: 16, fontWeight: 600, color: C.ink }}>
                <EditableText value={draft.billTo} onSave={(v) => updateDraft({ billTo: v })} />
              </div>
              <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginTop: 2 }}>From {operator.name}</div>
            </div>
          </div>

          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: S[4] }}>
            <thead><tr><Th>Truck</Th><Th>Type</Th><Th>Driver</Th><Th align="right">Hours</Th><Th align="right">Rate</Th><Th align="right">Amount</Th><Th></Th></tr></thead>
            <tbody>
              {draft.lineItems.map((li, idx) => (
                <Tr key={li.id}>
                  <Td mono><span style={{ color: C.accent }}>#{li.truckPlate}</span></Td>
                  <Td>{li.truckType}</Td>
                  <Td dim>{li.driverName}</Td>
                  <Td align="right" mono><EditableText value={String(li.hours)} onSave={(v) => updateLine(idx, { hours: parseFloat(v) || 0 })} mono /></Td>
                  <Td align="right" mono>${' '}<EditableText value={String(li.rate)} onSave={(v) => updateLine(idx, { rate: parseFloat(v) || 0 })} mono /></Td>
                  <Td align="right" mono style={{ fontWeight: 600 }}>{fmtMoney(li.amount)}</Td>
                  <Td align="right"><Btn variant="ghost" size="xs" onClick={() => removeLine(idx)}>Remove</Btn></Td>
                </Tr>
              ))}
              <tr style={{ background: C.surfaceHi }}>
                <td colSpan={5} style={{ padding: '14px 14px', borderBottom: `1px solid ${C.rule}`, textAlign: 'right', fontFamily: F.display, fontSize: 14, fontWeight: 600, color: C.ink }}>Total</td>
                <Td align="right" mono style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700, color: C.accent }}>{fmtMoney(draftTotal)}</Td>
                <Td></Td>
              </tr>
            </tbody>
          </table>

          <div style={{ marginBottom: S[4] }}>
            <Label style={{ marginBottom: 6 }}>Notes (optional)</Label>
            <EditableText value={draft.notes} onSave={(v) => updateDraft({ notes: v })} multiline placeholder="Add a note for the GC..." style={{ display: 'block', minHeight: 28 }} />
          </div>

          <div className="no-print" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: S[3], borderTop: `1px solid ${C.rule}` }}>
            <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim }}>
              {draft.lineItems.length} line item{draft.lineItems.length === 1 ? '' : 's'} · {draft.loadCount} loads · {draft.totalCY} CY
            </div>
            <div style={{ display: 'flex', gap: S[2] }}>
              <Btn variant="ghost" onClick={() => { setShowDraft(false); setDraft(null); }}>Cancel</Btn>
              <Btn variant="secondary" onClick={() => alert('In real app: download PDF')}>Download PDF</Btn>
              <Btn variant="secondary" onClick={() => window.print()}>Print</Btn>
              <Btn onClick={sendInvoice} disabled={draft.lineItems.length === 0}>Send invoice</Btn>
            </div>
          </div>
        </div>
      )}

      <div style={{ marginBottom: S[3] }}><Label>Past invoices ({invoices.length})</Label></div>
      <Card padding={0}>
        {invoices.length === 0 ? (
          <div style={{ padding: S[5], textAlign: 'center', color: C.inkDim, fontFamily: F.body, fontSize: 13 }}>
            No invoices yet. Generate one above when you're ready to bill.
          </div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead><tr><Th>Number</Th><Th>Period</Th><Th>Bill to</Th><Th align="right">Lines</Th><Th align="right">Amount</Th><Th>Status</Th></tr></thead>
            <tbody>
              {invoices.slice().reverse().map(inv => {
                const total = inv.lineItems.reduce((s, li) => s + li.amount, 0);
                return (
                  <Tr key={inv.id}>
                    <Td mono><span style={{ color: C.accent }}>{inv.number}</span></Td>
                    <Td mono dim>{inv.periodStart} {'→'} {inv.periodEnd}</Td>
                    <Td>{inv.billTo}</Td>
                    <Td align="right" mono>{inv.lineItems.length}</Td>
                    <Td align="right" mono style={{ fontWeight: 600 }}>{fmtMoney(total)}</Td>
                    <Td><Pill color={inv.status === 'paid' ? C.ok : C.accent} soft={inv.status === 'paid' ? C.okSoft : C.accentSoft}>{inv.status}</Pill></Td>
                  </Tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function DriverShell({ db, setDb, navigate, hash }) {

          {db.drivers.map(d => {

      {trucks.length === 1 && sub === 'log' && !parts[2] && <DriverLogLoad driver={driver} truck={trucks[0]} db={db} setDb={setDb} navigate={navigate} />}
      {trucks.length > 1 && sub === 'home' && <DriverMultiTruckHome driver={driver} trucks={trucks} db={db} navigate={navigate} />}
      {trucks.length >= 1 && sub === 'truck' && (() => {
        const tId = parts[2];
        const truck = trucks.find(t => t.id === tId);
        if (!truck) return <DriverTruckNotFound navigate={navigate} />;
        return <DriverTruckDetail driver={driver} truck={truck} trucks={trucks} db={db} setDb={setDb} navigate={navigate} />;
      })()}
      {trucks.length >= 1 && sub === 'log' && parts[2] && (() => {

        if (!truck) return <DriverTruckNotFound navigate={navigate} />;
