          ) : <Pill color={C.inkFaint} soft="rgba(255,255,255,0.04)">No driver</Pill>}
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>
        <Card padding={S[4]}><Stat label="Today loads" value={truckLoads.filter(l => l.status === 'approved').length} sub={`${truckLoads.filter(l => l.status === 'pending').length} pending`} /></Card>
        <Card padding={S[4]}><Stat label="Today CY" value={todayCY} /></Card>
        <Card padding={S[4]}><Stat label="Hours" value={fmtHours(todayHours)} /></Card>
        <Card padding={S[4]}><Stat label="Revenue" value={fmtMoney(todayHours * rate)} /></Card>
      </div>

      <div style={{ marginBottom: S[3] }}><Label>Today's loads</Label></div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr><Th width={70}>Time</Th><Th>Ticket</Th><Th>Material</Th><Th align="right">CY</Th><Th>Status</Th></tr>
          </thead>
          <tbody>
            {truckLoads.length === 0 && (
              <tr><td colSpan={5} style={{ padding: S[5], textAlign: 'center' }}>
                <div style={{ color: C.inkFaint, marginBottom: S[2], display: 'inline-flex' }}><TruckIcon size={24} /></div>
                <div style={{ ...T.bodySm, color: C.inkDim }}>No loads yet today.</div>
              </td></tr>
            )}
            {truckLoads.map(l => (
              <Tr key={l.id}>
                <Td mono><EditableText value={l.time} onSave={(v) => updateLoad(l.id, { time: v })} mono placeholder="HH:MM" /></Td>
                <Td mono dim><EditableText value={l.ticketNo || ''} onSave={(v) => updateLoad(l.id, { ticketNo: v })} mono placeholder="Ticket #" /></Td>
                <Td><EditableSelect value={l.material} options={loadMaterialOptions} onSave={(v) => updateLoad(l.id, { material: v })} /></Td>
                <Td align="right" mono><span style={{ color: C.accent, fontWeight: 700 }}><EditableText value={String(l.cy != null ? l.cy : '')} onSave={(v) => updateLoad(l.id, { cy: parseFloat(v) || 0 })} mono /> CY</span></Td>
                <Td><EditableSelect value={l.status} options={loadStatusOptions} onSave={(v) => updateLoad(l.id, { status: v })} /></Td>
              </Tr>
            ))}
          </tbody>
        </table>
      </Card>

      <div style={{ marginBottom: S[3] }}><Label>Today's hours</Label></div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr><Th>Driver</Th><Th>Clock-in</Th><Th>Clock-out</Th><Th align="right">Break</Th><Th align="right">Hours</Th><Th>Status</Th></tr>
          </thead>
          <tbody>
            {truckHoursRows.length === 0 && (
              <tr><td colSpan={6} style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>No hours logged for this truck yet.</td></tr>
            )}
            {truckHoursRows.map(h => {
              const d = db.drivers.find(dr => dr.id === h.driverId);
              return (
                <Tr key={h.id}>
                  <Td>{d ? d.name : <span style={{ color: C.inkFaint }}>—</span>}</Td>
                  <Td mono>{h.clockIn}</Td>
                  <Td mono>{h.clockOut || <span style={{ color: C.inkFaint }}>—</span>}</Td>
                  <Td align="right" mono>{h.breakMin} min</Td>
                  <Td align="right" mono>{fmtHours(calcHours(h.clockIn, h.breakMin, h.clockOut))}</Td>
                  <Td><StatusPill status={h.status} /></Td>
                </Tr>
              );
            })}
          </tbody>
        </table>
      </Card>

      <HaulerLogLoadForm truck={truck} driver={driver} project={project} db={db} setDb={setDb} />
    </div>
  );
}

function HaulerLogLoadForm({ truck, driver, project, db, setDb }) {
  const defaultMat = (project && project.material && project.material[0]) || 'CF';
  const [material, setMaterial] = useState(defaultMat);
  const [cy, setCy] = useState('');
  const [ticketNo, setTicketNo] = useState('');
  const [time, setTime] = useState(() => {
    const d = new Date();
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  });

  const inputStyle = { ...T.body, background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '10px 12px', borderRadius: R.sm, width: '100%', boxSizing: 'border-box' };
  const canSubmit = cy && parseFloat(cy) > 0;

  const submit = () => {
    if (!canSubmit) return;
    const existing = db.loads.map(l => parseInt((l.id || '').replace(/^ld-/, ''), 10)).filter(n => !isNaN(n));
    const nextNum = existing.length ? Math.max(...existing) + 1 : 1001;
    const newLoad = {
      id: 'ld-' + nextNum,
      driverId: driver ? driver.id : null,
      truckId: truck.id,
      projectId: truck.projectId,
      material,
      cy: parseFloat(cy),
      ticketNo: ticketNo || null,
      time,
      status: 'pending',
    };
    setDb(prev => appendActivity(
      { ...prev, loads: [...prev.loads, newLoad] },
      {
        type: 'load.logged',
        actorRole: 'driver',
        actorId: newLoad.driverId,
        summary: `${driver ? driver.name : 'A driver'} logged ${newLoad.cy} CY of ${materialLabel(newLoad.material)} on #${truck.plate}`,
        refId: newLoad.id,
      }
    ));
    setCy('');
    setTicketNo('');
    const d = new Date();
    setTime(String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'));
  };

  return (
    <div style={{ marginBottom: S[3] }}>
      <Label style={{ marginBottom: S[3] }}>Log new load · #{truck.plate}</Label>
      <Card>
        <div style={{ display: 'grid', gridTemplateColumns: '90px 1fr 1fr 100px auto', gap: S[3], alignItems: 'flex-end' }}>
          <div>
            <div style={{ ...T.caption, marginBottom: S[1] }}>Time</div>
            <input value={time} onChange={e => setTime(e.target.value)} placeholder="HH:MM" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: S[1] }}>Material</div>
            <select value={material} onChange={e => setMaterial(e.target.value)} style={inputStyle}>
              {MATERIALS.map(m => <option key={m.code} value={m.code}>{m.label}</option>)}
            </select>
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: S[1] }}>Ticket # (optional)</div>
            <input value={ticketNo} onChange={e => setTicketNo(e.target.value)} placeholder="e.g. T-44801" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: S[1] }}>CY</div>
            <input type="number" min="0" step="0.5" value={cy} onChange={e => setCy(e.target.value)} placeholder="e.g. 16" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
          <div>
            <Btn onClick={submit} disabled={!canSubmit}>+ Log load</Btn>
          </div>
        </div>
        <div style={{ ...T.micro, color: C.inkFaint, marginTop: S[3] }}>
          Driver: {driver ? driver.name : 'unassigned'} · Submits as pending for review.
        </div>
      </Card>
    </div>
  );
}

function HaulerTrucks({ projectId, opId, trucks, db, setDb }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({ plate: '', type: '', rate: '' });
  const addTruck = (form) => {
    const id = 'tk-' + Math.random().toString(36).substring(2, 7);
    setDb(prev => appendActivity(
      { ...prev, trucks: [...prev.trucks, { id, ...form, projectId, haulerId: opId, driverId: null }] },
      { type: 'truck.created', actorRole: 'hauler', actorId: opId, summary: `${haulerName(prev, opId)} added truck #${form.plate} on ${projectName(prev, projectId)}`, refId: id }
    ));
    setShowAdd(false);
  };
  const removeTruck = (id) => {
    if (!confirm('Remove this truck from the haul?')) return;
    setDb(prev => ({ ...prev, trucks: prev.trucks.filter(t => t.id !== id) }));
  };
  const beginEditTruck = (t) => {
    setEditingId(t.id);
    setDraft({ plate: t.plate, type: t.type, rate: String(db.rates[t.type] || 0) });
  };
  const cancelEditTruck = () => { setEditingId(null); };
  const saveEditTruck = (id) => {
    const rateNum = parseInt(draft.rate);
    setDb(prev => ({
      ...prev,
      trucks: prev.trucks.map(t => t.id === id ? { ...t, plate: draft.plate.trim() || t.plate, type: draft.type } : t),
      rates: Number.isFinite(rateNum) && rateNum > 0 ? { ...prev.rates, [draft.type]: rateNum } : prev.rates,
    }));
    setEditingId(null);
  };
  const inlineInput = { ...T.bodySm, padding: '6px 8px', borderRadius: R.sm, border: `1px solid ${C.ruleHi}`, background: C.surface, color: C.ink, fontFamily: F.mono, width: 90 };
  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[4] }}>
        <div>
          <h1 style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink }}>Trucks</h1>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: S[1] }}>{trucks.length} truck{trucks.length === 1 ? '' : 's'} on this haul · click Edit on a row to change plate / type / rate</div>
        </div>
      </div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><Th>Plate</Th><Th align="right">Rate</Th><Th>Type</Th><Th>Driver</Th><Th></Th></tr></thead>
          <tbody>
            {trucks.map(t => {
              const driver = db.drivers.find(d => d.id === t.driverId);
              const isEditing = editingId === t.id;
              if (isEditing) {
                return (
                  <Tr key={t.id} style={{ background: C.surfaceHi }}>
                    <Td mono><span style={{ color: C.accent }}>#</span><input value={draft.plate} onChange={e => setDraft(d => ({ ...d, plate: e.target.value }))} style={inlineInput} /></Td>
                    <Td align="right" mono>$<input value={draft.rate} onChange={e => setDraft(d => ({ ...d, rate: e.target.value }))} style={{ ...inlineInput, width: 70 }} />/hr</Td>
                    <Td>
                      <select value={draft.type} onChange={e => setDraft(d => ({ ...d, type: e.target.value, rate: String(db.rates[e.target.value] || 0) }))} style={{ ...inlineInput, fontFamily: F.body, width: 'auto' }}>
                        {TRUCK_TYPES.map(tt => <option key={tt.code} value={tt.code}>{tt.label}</option>)}
                      </select>
                    </Td>
                    <Td>{driver ? driver.name : <span style={{ color: C.inkFaint }}>— unassigned</span>}</Td>
                    <Td align="right">
                      <div style={{ display: 'flex', gap: S[1], justifyContent: 'flex-end' }}>
                        <Btn variant="primary" size="xs" onClick={() => saveEditTruck(t.id)}>Save</Btn>
                        <Btn variant="ghost" size="xs" onClick={cancelEditTruck}>Cancel</Btn>
                      </div>
                    </Td>
                  </Tr>
                );
              }
              return (
                <Tr key={t.id}>
                  <Td mono><span style={{ color: C.accent }}>#{t.plate}</span></Td>
                  <Td align="right" mono>${db.rates[t.type] || 0}/hr</Td>
                  <Td><Pill color={C.inkDim} soft="rgba(255,255,255,0.05)">{(TRUCK_TYPES.find(tt => tt.code === t.type) || {}).label || t.type}</Pill></Td>
                  <Td>{driver ? driver.name : <span style={{ color: C.inkFaint }}>— unassigned</span>}</Td>
                  <Td align="right">
                    <div style={{ display: 'flex', gap: S[1], justifyContent: 'flex-end' }}>
                      <Btn variant="secondary" size="xs" onClick={() => beginEditTruck(t)}>Edit</Btn>
                      <Btn variant="danger" size="xs" onClick={() => removeTruck(t.id)}>Remove</Btn>
                    </div>
                  </Td>
                </Tr>
              );
            })}
            <tr onClick={() => setShowAdd(true)} style={{ cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background = C.surfaceHi}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <td colSpan={5} style={{ ...T.bodySm, padding: '14px 14px', borderBottom: `1px solid ${C.rule}`, fontFamily: F.display, color: C.accent, fontWeight: 600, textAlign: 'center' }}>+ Add truck</td>
            </tr>
          </tbody>
        </table>
      </Card>
      {showAdd && <AddTruckForm onAdd={addTruck} onCancel={() => setShowAdd(false)} />}
    </div>
  );
}

function HaulerDrivers({ projectId, trucks, db, setDb }) {
  const assignedIds = new Set(trucks.filter(t => t.driverId).map(t => t.driverId));
  const available = db.drivers.filter(d => !assignedIds.has(d.id));
  const assign = (truckId, driverId) => {
    setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === truckId ? { ...t, driverId } : t) }));
  };
  const updateDriver = (id, patch) => setDb(prev => ({ ...prev, drivers: prev.drivers.map(d => d.id === id ? { ...d, ...patch } : d) }));
  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <div style={{ marginBottom: S[4] }}>
        <h1 style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink }}>Driver assignments</h1>
        <div style={{ ...T.bodySm, color: C.inkDim, marginTop: S[1] }}>Assign one driver to each truck. Click name or phone to edit.</div>
      </div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><Th>Truck</Th><Th>Assigned driver</Th><Th>Phone</Th><Th></Th></tr></thead>
          <tbody>
            {trucks.map(t => {
              const driver = db.drivers.find(d => d.id === t.driverId);
              const choices = [...(driver ? [driver] : []), ...available];
              return (
                <Tr key={t.id}>
                  <Td mono><span style={{ color: C.accent }}>#{t.plate}</span> <span style={{ ...T.micro, color: C.inkDim}}>{t.type}</span></Td>
                  <Td>
                    <select value={t.driverId || ''} onChange={e => assign(t.id, e.target.value || null)} style={{ ...T.bodySm, background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '8px 12px', borderRadius: R.sm, minWidth: 180 }}>
                      <option value="">-- Unassigned --</option>
                      {choices.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                    </select>
                    {driver && <span style={{ marginLeft: S[2] }}><EditableText value={driver.name} onSave={(v) => updateDriver(driver.id, { name: v })} /></span>}
                  </Td>
                  <Td mono dim>{driver ? <EditableText value={driver.phone} onSave={(v) => updateDriver(driver.id, { phone: v })} mono /> : '—'}</Td>
                  <Td align="right">{driver && <Btn variant="ghost" size="xs" onClick={() => assign(t.id, null)}>Unassign</Btn>}</Td>
                </Tr>
              );
            })}
          </tbody>
        </table>
      </Card>
      {available.length > 0 && (
        <div style={{ marginTop: S[6] }}>
          <Label style={{ marginBottom: S[3] }}>Available drivers ({available.length})</Label>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: S[3] }}>
            {available.map(d => (
              <Card key={d.id} padding={S[3]}>
                <div style={{ display: 'flex', alignItems: 'center', gap: S[3] }}>
                  <Avatar name={d.name} />
                  <div>
                    <div style={{ ...T.body, fontFamily: F.display, fontWeight: 600 }}><EditableText value={d.name} onSave={(v) => updateDriver(d.id, { name: v })} /></div>
                    <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}><EditableText value={d.phone} onSave={(v) => updateDriver(d.id, { phone: v })} mono /></div>
                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function HaulerApprovals({ projectId, hours, loads, hauler, db, setDb }) {
  const pendingLoads = loads.filter(l => l.status === 'pending');
  const pendingHrs = hours.filter(h => h.status === 'pending');
  const updateLoad = (id, patch) => setDb(prev => ({ ...prev, loads: prev.loads.map(l => l.id === id ? { ...l, ...patch } : l) }));
  const updateHr = (id, patch) => setDb(prev => ({ ...prev, hours: prev.hours.map(h => h.id === id ? { ...h, ...patch } : h) }));
  const actorName = hauler ? hauler.name : 'A hauler';
  const actorId = hauler ? hauler.id : null;
  const approveLoad = (id) => {
    const ld = db.loads.find(l => l.id === id);
    setDb(prev => appendActivity(
      { ...prev, loads: prev.loads.map(l => l.id === id ? { ...l, status: 'approved' } : l) },
      {
        type: 'load.approved',
        actorRole: 'hauler',
        actorId,
        summary: ld ? `${actorName} approved ${ld.cy} CY of ${materialLabel(ld.material)}` : `${actorName} approved a load`,
        refId: id,
      }
    ));
  };
  const rejectLoad = (id) => {
    const ld = db.loads.find(l => l.id === id);
    setDb(prev => appendActivity(
      { ...prev, loads: prev.loads.filter(l => l.id !== id) },
      {
        type: 'load.rejected',
        actorRole: 'hauler',
        actorId,
        summary: ld ? `${actorName} rejected ${ld.cy} CY of ${materialLabel(ld.material)}` : `${actorName} rejected a load`,
        refId: null,
      }
    ));
  };
  const approveHr = (id) => {
    const hr = db.hours.find(h => h.id === id);
    const drv = hr ? db.drivers.find(d => d.id === hr.driverId) : null;
    const hrsCalc = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;
    setDb(prev => appendActivity(
      { ...prev, hours: prev.hours.map(h => h.id === id ? { ...h, status: 'open' } : h) },
      {
        type: 'hours.approved',
        actorRole: 'hauler',
        actorId,
        summary: drv ? `${actorName} approved ${fmtHours(hrsCalc)} hrs for ${drv.name}` : `${actorName} approved hours`,
        refId: null,
      }
    ));
  };
  const materialOptions = MATERIALS.map(m => ({ value: m.code, label: m.label }));
  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <h1 style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink, marginBottom: 6 }}>Approvals</h1>
      <div style={{ ...T.bodySm, color: C.inkDim, marginBottom: S[5] }}>Click any value to fix typos before approving.</div>
      <div style={{ marginBottom: S[3], display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <Label>Pending loads ({pendingLoads.length})</Label>
        {pendingLoads.length > 0 && <Btn variant="secondary" size="sm" onClick={() => pendingLoads.forEach(l => approveLoad(l.id))}>Approve all</Btn>}
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        {pendingLoads.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>Nothing pending.</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead><tr><Th>Time</Th><Th>Truck</Th><Th>Driver</Th><Th>Material</Th><Th>CY</Th><Th>Photo</Th><Th></Th></tr></thead>
            <tbody>
              {pendingLoads.map(l => {
                const t = db.trucks.find(t => t.id === l.truckId);
                const d = db.drivers.find(d => d.id === l.driverId);
                return (
                  <Tr key={l.id}>
                    <Td mono><EditableText value={l.time} onSave={(v) => updateLoad(l.id, { time: v })} mono placeholder="HH:MM" /></Td>
                    <Td mono><span style={{ color: C.accent }}>#{t.plate}</span></Td>
                    <Td>{d.name}</Td>
                    <Td><EditableSelect value={l.material} options={materialOptions} onSave={(v) => updateLoad(l.id, { material: v })} /></Td>
                    <Td mono><span style={{ color: C.accent, fontWeight: 700 }}><EditableText value={String(l.cy != null ? l.cy : '')} onSave={(v) => updateLoad(l.id, { cy: parseFloat(v) || 0 })} mono /> CY</span></Td>
                    <Td>{l.photo ? <img src={l.photo} alt="" style={{ width: 32, height: 32, borderRadius: R.xs, objectFit: 'cover', cursor: 'pointer' }} onClick={() => window.open(l.photo, '_blank')} /> : <span style={{ ...T.micro, color: C.inkFaint}}>—</span>}</Td>
                    <Td align="right">
                      <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                        <Btn variant="ghost" size="xs" onClick={() => rejectLoad(l.id)}>Reject</Btn>
                        <Btn variant="ok" size="xs" onClick={() => approveLoad(l.id)}>Approve</Btn>
                      </div>
                    </Td>
                  </Tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
      <div style={{ marginBottom: S[3] }}><Label>Pending hour adjustments ({pendingHrs.length})</Label></div>
      <Card padding={0}>
        {pendingHrs.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>Nothing pending.</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>

    const today = new Date().toISOString().slice(0, 10);
    const lineItems = trucks.filter(t => hours.some(h => h.truckId === t.id)).map(t => {
      const hr = hours.find(h => h.truckId === t.id);
      const driver = db.drivers.find(d => d.id === t.driverId);
      const truckHours = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;
      const rate = db.rates[t.type];
      return {
        id: 'li-' + Math.random().toString(36).substring(2, 7),
        truckPlate: t.plate, truckType: t.type, driverName: driver ? driver.name : '—',
        hours: parseFloat(truckHours.toFixed(2)), rate, amount: parseFloat((truckHours * rate).toFixed(2)),
      };
    });
    const loadCount = db.loads.filter(l => l.projectId === projectId && l.status === 'approved').length;
    const totalCY = db.loads.filter(l => l.projectId === projectId && l.status === 'approved').reduce((s, l) => s + (l.cy || 0), 0);
    const hoursTotal = parseFloat(lineItems.reduce((s, li) => s + (li.hours || 0), 0).toFixed(2));

function DriverShell({ db, setDb, navigate, hash }) {
  // Hash forms supported:

  //   /driver/<driverId>/truck/<truckId>   -> driver's truck detail
  //   /driver/<driverId>/log/<truckId>     -> log-load for that truck
  //   /driver/truck/<truckId>              -> legacy form (uses pickedId)
  //   /driver/log/<truckId>                -> legacy form
  const parts = hash.split('/').filter(Boolean); // ['driver', ...]
  // A driver id has the prefix 'dr-'; sub-routes ('home','truck','log') do not.
  const urlDriverId = parts[1] && parts[1].startsWith('dr-') ? parts[1] : null;
  const [pickedId, setPickedId] = useState('dr-001');
  const drId = urlDriverId || pickedId;
  // Keep pickedId in sync when the URL changes externally
  useEffect(() => { if (urlDriverId && urlDriverId !== pickedId) setPickedId(urlDriverId); }, [urlDriverId]);
  const driver = db.drivers.find(d => d.id === drId);
  const trucks = db.trucks.filter(t => t.driverId === drId);
  const subIdx = urlDriverId ? 2 : 1;
  const sub = parts[subIdx] || 'home';

  const basePrefix = urlDriverId ? `/driver/${urlDriverId}` : '/driver';

      <div style={{ padding: '4px 16px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

          {db.drivers.map(d => {

          })}

      </div>
      {!driver && <DriverNoTruck driver={{ name: 'Unknown driver' }} />}
      {driver && trucks.length === 0 && <DriverNoTruck driver={driver} />}
      {driver && trucks.length === 1 && sub === 'home' && <DriverHome driver={driver} truck={trucks[0]} db={db} setDb={setDb} navigate={navigate} />}
      {driver && trucks.length === 1 && sub === 'log' && !subArg && <DriverLogLoad driver={driver} truck={trucks[0]} db={db} setDb={setDb} navigate={navigate} />}
      {driver && trucks.length > 1 && sub === 'home' && <DriverMultiTruckHome driver={driver} trucks={trucks} db={db} setDb={setDb} navigate={navigate} />}
      {driver && trucks.length >= 1 && sub === 'truck' && (() => {
        const tId = subArg;
        const truck = trucks.find(t => t.id === tId);
        if (!truck) return <DriverTruckNotFound navigate={navigate} />;
        return <DriverTruckDetail driver={driver} truck={truck} trucks={trucks} db={db} setDb={setDb} navigate={navigate} />;
      })()}
      {driver && trucks.length >= 1 && sub === 'log' && subArg && (() => {
        const tId = subArg;

        if (!truck) return <DriverTruckNotFound navigate={navigate} />;
        return <DriverLogLoad driver={driver} truck={truck} db={db} setDb={setDb} navigate={navigate} returnTo={`${basePrefix}/truck/${truck.id}`} />;
      })()}

function DriverHome({ driver, truck, db, setDb, navigate, embedded = false, onOpenLogLoad }) {
  const project = db.projects.find(p => p.id === truck.projectId);
  const truckType = TRUCK_TYPES.find(t => t.code === truck.type);
  const hr = db.hours.find(h => h.truckId === truck.id && h.driverId === driver.id && h.status === 'open');
  const todayLoads = db.loads.filter(l => l.driverId === driver.id && l.truckId === truck.id && isToday(l.date));
  const isPaused = !!(hr && hr.pausedAt);
  const isOpen = !!(hr && hr.status === 'open');

  // Live ticker — re-render every second while clocked in (and not paused)
  const [, force] = useState(0);
  useEffect(() => {
    if (!isOpen) return;
    const id = setInterval(() => force(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [isOpen, isPaused, hr ? hr.id : null]);

  // Compute elapsed milliseconds since clock-in, minus any paused time
  let elapsedMs = 0;
  if (hr) {
    if (hr.clockedInAt) {
      let pausedMs = hr.pausedMs || 0;
      if (hr.pausedAt) pausedMs += Date.now() - hr.pausedAt;
      const end = hr.clockedOutAt || Date.now();
      elapsedMs = Math.max(0, end - hr.clockedInAt - pausedMs);
    } else {
      // Fallback for seed data without timestamps
      elapsedMs = Math.floor(calcHours(hr.clockIn, hr.breakMin, hr.clockOut) * 3600 * 1000);
    }
  }
  const fmtElapsed = (ms) => {
    const t = Math.floor(ms / 1000);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = t % 60;
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  };
  const fmtClock = (d) => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

  const clockIn = () => {
    const now = Date.now();
    setDb(prev => appendActivity(
      {
        ...prev,
        hours: [
          ...prev.hours.map(h => (h.driverId === driver.id && h.status === 'open') ? { ...h, status: 'closed', clockOut: fmtClock(new Date(now)), clockedOutAt: now } : h),
          {
            id: 'hr-' + Math.random().toString(36).substring(2, 7),
            driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
            clockIn: fmtClock(new Date(now)), clockedInAt: now, clockOut: null, clockedOutAt: null,
            breakMin: 0, pausedMs: 0, pausedAt: null, status: 'open', date: TODAY_ISO,
          },
        ],
      },
      {
        type: 'shift.started',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} clocked in on #${truck.plate}`,
        refId: truck.id,
      }
    ));
  };

  const togglePause = () => {
    if (!hr) return;
    if (hr.pausedAt) {
      const addedMs = Date.now() - hr.pausedAt;
      setDb(prev => ({
        ...prev,
        hours: prev.hours.map(h => h.id === hr.id ? {
          ...h, pausedMs: (h.pausedMs || 0) + addedMs, pausedAt: null,
          breakMin: Math.round(((h.pausedMs || 0) + addedMs) / 60000),
        } : h),
      }));
    } else {
      setDb(prev => ({
        ...prev,
        hours: prev.hours.map(h => h.id === hr.id ? { ...h, pausedAt: Date.now() } : h),
      }));
    }
  };

  const clockOut = () => {
    if (!hr) return;
    if (!confirm('End your shift?')) return;
    const now = Date.now();
    setDb(prev => appendActivity(
      {
        ...prev,
        hours: prev.hours.map(h => {
          if (h.id !== hr.id) return h;
          let pausedMs = h.pausedMs || 0;
          if (h.pausedAt) pausedMs += now - h.pausedAt;
          return {
            ...h, clockOut: fmtClock(new Date(now)), clockedOutAt: now,
            pausedAt: null, pausedMs, breakMin: Math.round(pausedMs / 60000),
            status: 'pending',
          };
        }),
      },
      {
        type: 'shift.ended',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} ended shift on #${truck.plate}`,
        refId: truck.id,
      }
    ));
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px` }}>
      {!embedded && (
        <div style={{ marginBottom: S[3] }}>
          <Label color={C.accent}>Today {fmtClock(new Date())}</Label>
          <div style={{ ...T.statValue, fontWeight: 700, color: C.ink, marginTop: 4 }}>Hi, {driver.name.split(' ').pop()}</div>
        </div>
      )}

      {/* Truck card */}
      <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3] }}>
          <Label>Your truck</Label>
          {!hr && <Pill color={C.inkFaint} soft="rgba(255,255,255,0.04)">Off the clock</Pill>}
          {isOpen && !isPaused && <StatusPill status="open" />}
          {isOpen && isPaused && <Pill color={C.warn} soft={C.warnSoft}>Paused</Pill>}

function DriverLogLoad({ driver, truck, db, setDb, navigate, returnTo, onSubmitted, onCancel }) {
  const back = returnTo || '/driver';
  const goBack = () => { if (onCancel) onCancel(); else navigate(back); };
  const afterSubmit = () => { if (onSubmitted) onSubmitted(); else navigate(back); };
  const proj = db.projects.find(p => p.id === truck.projectId);
  const [material, setMaterial] = useState((proj && proj.material[0]) || 'CF');
  const [cy, setCy] = useState('');
  const [photo, setPhoto] = useState(null);
  const fileRef = useRef(null);

  const onPick = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => setPhoto(ev.target.result);
    reader.readAsDataURL(f);
  };

  const submit = () => {
    if (!canSubmit) return;
    const now = new Date();
    const hhmm = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    const newLoad = {
      id: 'ld-' + Math.random().toString(36).substring(2, 7),
      driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
      material, cy: parseFloat(cy), photo, time: hhmm, date: TODAY_ISO, status: 'pending',
    };
    setDb(prev => appendActivity(
      { ...prev, loads: [...prev.loads, newLoad] },
      {
        type: 'load.logged',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} logged ${newLoad.cy} CY of ${materialLabel(newLoad.material)} on #${truck.plate}`,
        refId: newLoad.id,
      }
    ));
    afterSubmit();
  };

  const canSubmit = cy && parseFloat(cy) > 0;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px`, overflowY: 'auto' }}>
      <button onClick={goBack} style={{ ...T.bodySm, background: 'transparent', border: 'none', color: C.inkDim, padding: 0, marginBottom: S[3], cursor: 'pointer', textAlign: 'left' }}>← Back</button>
      <Label color={C.accent} style={{ marginBottom: 6 }}>New load · #{truck.plate} · {proj ? proj.name : ''}</Label>
      <div style={{ fontFamily: F.display, fontSize: 24, fontWeight: 700, letterSpacing: -0.6, marginBottom: S[4] }}>Log a load</div>

      <Label style={{ marginBottom: 6 }}>Material</Label>
      <select value={material} onChange={e => setMaterial(e.target.value)} style={{ ...T.bodyLg, background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, borderRadius: R.md, padding: '16px 16px', fontFamily: F.display, fontWeight: 600, marginBottom: S[4], appearance: 'menulist', width: '100%', boxSizing: 'border-box' }}>
        {MATERIALS.map(m => (
          <option key={m.code} value={m.code}>{m.label}</option>
        ))}
      </select>

      <Label style={{ marginBottom: 6 }}>Cubic yards (CY)</Label>
      <input type="number" inputMode="decimal" value={cy} onChange={e => setCy(e.target.value)} placeholder="e.g. 16" min="0" step="0.5" autoFocus
        style={{ ...T.h2, background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, borderRadius: R.md, padding: '18px 16px', fontFamily: F.mono, fontWeight: 700, marginBottom: S[4], textAlign: 'center', letterSpacing: -0.6, boxSizing: 'border-box', width: '100%' }} />

      <Label style={{ marginBottom: 6 }}>Photo (required)</Label>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onPick} style={{ display: 'none' }} />
      {!photo ? (
        <button onClick={() => fileRef.current && fileRef.current.click()} style={{
          ...T.body, height: 140, border: `2px dashed ${C.ruleHi}`, cursor: 'pointer', background: C.surface,
          color: C.inkDim, borderRadius: R.md, fontFamily: F.display, fontWeight: 600,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, marginBottom: S[4],
        }}>
          <span style={{ fontSize: 32 }}>📷</span>
          <span>Take photo of load</span>
          <span style={{ ...T.micro, color: C.inkFaint, fontWeight: 500 }}>Required to submit</span>
        </button>
      ) : (
        <div style={{ position: 'relative', marginBottom: S[4] }}>
          <img src={photo} alt="Load" style={{ width: '100%', height: 180, objectFit: 'cover', borderRadius: R.md, border: `1px solid ${C.accent}`, display: 'block' }} />
          <button onClick={() => { setPhoto(null); if (fileRef.current) fileRef.current.value = ''; }} style={{
            ...T.micro, position: 'absolute', top: 8, right: 8, background: 'rgba(0,0,0,0.7)', color: C.ink, border: 'none',
            padding: '6px 12px', borderRadius: R.pill, cursor: 'pointer', fontWeight: 600,
          }}>Retake</button>
        </div>
      )}

      <div style={{ flex: 1, minHeight: S[3] }} />

      <button onClick={submit} disabled={!canSubmit} style={{
        ...T.h4, height: 64, border: 'none', cursor: canSubmit ? 'pointer' : 'not-allowed',
        background: C.accent, color: C.bg, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.4,
        opacity: canSubmit ? 1 : 0.4,
      }}>Submit load</button>
      <div style={{ ...T.micro, color: C.inkDim, textAlign: 'center', marginTop: S[2] }}>
        Hauler will review and approve.
      </div>
    </div>
  );
}

// Driver "incoming requests" card — surfaces pending haul requests on the
// driver's project(s) and lets them Accept or Pass. Shared by both the
// multi-truck home screen and the single-truck detail screen. Passing on a
// request keeps it pending in the admin pool but hides it from this driver.
function DriverIncomingRequests({ db, setDb, driver, projectIds }) {
  const requests = (db.haulRequests || []).filter(r =>
    r.status === 'pending'
    && projectIds.includes(r.projectId)
    && !(r.passedBy || []).includes(driver.id)
  );

  const acceptRequest = (reqId) => {
    const req = (db.haulRequests || []).find(r => r.id === reqId);
    if (!req) return;
    const matLabel = materialLabel(req.materialCode);
    setDb(prev => appendActivity(
      {
        ...prev,
        haulRequests: prev.haulRequests.map(r => r.id === reqId
          ? { ...r, status: 'accepted', acceptedByDriver: driver.id }
          : r),
      },
      {
        type: 'haulRequest.accepted',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} accepted ${req.volumeCY} CY of ${matLabel}`,
        refId: reqId,
      }
    ));
  };

  const passRequest = (reqId) => {
    const req = (db.haulRequests || []).find(r => r.id === reqId);
    if (!req) return;
    const matLabel = materialLabel(req.materialCode);
    setDb(prev => appendActivity(
      {
        ...prev,
        haulRequests: prev.haulRequests.map(r => r.id === reqId
          ? { ...r, passedBy: [...(r.passedBy || []), driver.id] }
          : r),
      },
      {
        type: 'haulRequest.passed',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} passed on ${req.volumeCY} CY of ${matLabel}`,
        refId: reqId,
      }
    ));
  };

  return (
    <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3] }}>
        <Label>Incoming requests</Label>
        <Pill color={requests.length > 0 ? C.warn : C.inkDim} soft={requests.length > 0 ? C.warnSoft : 'rgba(255,255,255,0.06)'}>{requests.length}</Pill>
      </div>
      {requests.length === 0 ? (
        <div style={{ ...T.bodySm, color: C.inkDim, padding: `${S[2]}px 0` }}>Nothing waiting right now.</div>
      ) : requests.map((r, i) => {
        const project = db.projects.find(p => p.id === r.projectId);
        const matLabel = materialLabel(r.materialCode);
        return (
          <div key={r.id} style={{
            padding: `${S[3]}px 0`,
            borderTop: i === 0 ? 'none' : `1px solid ${C.rule}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: S[2], marginBottom: 4 }}>
              <div style={{ fontFamily: F.display, fontSize: 15, fontWeight: 600, color: C.ink }}>{project ? project.name : '—'}</div>
              <Pill color={C.accent} soft={C.accentSoft}>{matLabel}</Pill>
            </div>
            <div style={{ ...T.monoSm, color: C.inkDim, marginBottom: S[3] }}>{r.volumeCY} CY · {r.requestedAt}</div>
            <div style={{ display: 'flex', gap: S[2] }}>
              <button onClick={() => acceptRequest(r.id)} style={{
                ...T.bodySm, flex: 1, height: 40, border: 'none', cursor: 'pointer',
                background: C.accent, color: C.bg, borderRadius: R.md, fontFamily: F.display, fontWeight: 700,
                letterSpacing: -0.2,
              }}>Accept</button>
              <button onClick={() => passRequest(r.id)} style={{
                ...T.bodySm, flex: 1, height: 40, border: `1px solid ${C.ruleHi}`, cursor: 'pointer',
                background: 'transparent', color: C.inkDim, borderRadius: R.md, fontFamily: F.display, fontWeight: 600,
              }}>Pass</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function DriverTruckDetail({ driver, truck, trucks, db, setDb, navigate, embedded = false, onOpenLogLoad }) {
  const truckType = TRUCK_TYPES.find(t => t.code === truck.type);
  const project = db.projects.find(p => p.id === truck.projectId);
  const hr = db.hours.find(h => h.truckId === truck.id && h.driverId === driver.id && h.status === 'open');
  const isOpen = !!hr;
  const isPaused = !!(hr && hr.pausedAt);
  const todayLoads = db.loads.filter(l => l.driverId === driver.id && l.truckId === truck.id && isToday(l.date));
  const totalCY = todayLoads.reduce((s, l) => s + (l.cy || 0), 0);
  const backHref = '/driver';

  // Live ticker for elapsed shift display
  const [, force] = useState(0);
  useEffect(() => {
    if (!isOpen) return;
    const id = setInterval(() => force(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [isOpen, isPaused, hr ? hr.id : null]);

  let elapsedMs = 0;
  if (hr && hr.clockedInAt) {
    let pausedMs = hr.pausedMs || 0;
    if (hr.pausedAt) pausedMs += Date.now() - hr.pausedAt;
    const end = hr.clockedOutAt || Date.now();
    elapsedMs = Math.max(0, end - hr.clockedInAt - pausedMs);
  }

  const fmtClock = (d) => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

  const clockIn = () => {
    const now = Date.now();
    setDb(prev => appendActivity(
      {
        ...prev,
        hours: [
          ...prev.hours.map(h => (h.driverId === driver.id && h.status === 'open') ? { ...h, status: 'closed', clockOut: fmtClock(new Date(now)), clockedOutAt: now } : h),
          {
            id: 'hr-' + Math.random().toString(36).substring(2, 7),
            driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
            clockIn: fmtClock(new Date(now)), clockedInAt: now, clockOut: null, clockedOutAt: null,
            breakMin: 0, pausedMs: 0, pausedAt: null, status: 'open', date: TODAY_ISO,
          },
        ],
      },
      {
        type: 'shift.started',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} clocked in on #${truck.plate}`,
        refId: truck.id,
      }
    ));
  };

  const clockOut = () => {
    if (!hr) return;
    if (!confirm('End your shift on this truck?')) return;
    const now = Date.now();
    setDb(prev => appendActivity(
      {
        ...prev,
        hours: prev.hours.map(h => {
          if (h.id !== hr.id) return h;
          let pausedMs = h.pausedMs || 0;
          if (h.pausedAt) pausedMs += now - h.pausedAt;
          return {
            ...h, clockOut: fmtClock(new Date(now)), clockedOutAt: now,
            pausedAt: null, pausedMs, breakMin: Math.round(pausedMs / 60000),
            status: 'pending',
          };
        }),
      },
      {
        type: 'shift.ended',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} ended shift on #${truck.plate}`,
        refId: truck.id,
      }
    ));
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px`, overflowY: 'auto' }}>
      {!embedded && (
        <button onClick={() => navigate(backHref)} style={{ ...T.bodySm, background: 'transparent', border: 'none', color: C.inkDim, padding: 0, marginBottom: S[3], cursor: 'pointer', textAlign: 'left' }}>← All my trucks</button>
      )}

      {!embedded && <DriverIncomingRequests db={db} setDb={setDb} driver={driver} projectIds={truck.projectId ? [truck.projectId] : []} />}

      {/* Truck header */}
      <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[2] }}>
          <Label>Truck</Label>
          {isOpen && !isPaused && <StatusPill status="open" />}
          {isOpen && isPaused && <Pill color={C.warn} soft={C.warnSoft}>Paused</Pill>}
          {!isOpen && <StatusPill status="idle" />}
        </div>
        <div style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, color: C.accent }}>#{truck.plate}</div>
        <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 4 }}>{truckType ? truckType.label : truck.type} · {truckType ? truckType.cap : ''} · {truck.hauler}</div>
        <div style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
          <Label style={{ marginBottom: 4 }}>On haul</Label>
          <div style={{ ...T.bodyLg, fontFamily: F.display, fontWeight: 600, color: C.ink }}>{project ? project.name : '—'}</div>
          <div style={{ ...T.micro, color: C.inkDim, marginTop: 2 }}>{project ? project.gc : ''}</div>
          <div style={{ ...T.micro, color: C.inkDim, marginTop: 2 }}>{project ? project.address : ''}</div>
        </div>
      </div>

      {/* KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: S[2], marginBottom: S[3] }}>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Loads</Label>
          <div style={{ ...T.statValue, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.length}</div>
        </Card>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Total CY</Label>
          <div style={{ ...T.statValue, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{totalCY}</div>
        </Card>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Shift</Label>
          <div style={{ ...T.statValue, fontWeight: 700, color: isOpen ? C.accent : C.inkDim, lineHeight: 1 }}>{isOpen ? (elapsedMs / 3600000).toFixed(1) + 'h' : '—'}</div>
        </Card>
      </div>

      {/* Primary actions */}
      {!isOpen ? (
        <button onClick={clockIn} style={{ ...T.h4, width: '100%', height: 64, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.4, marginBottom: S[2] }}>Clock in (this truck)</button>
      ) : (
        <>
          <button onClick={() => embedded ? (onOpenLogLoad && onOpenLogLoad(truck)) : navigate(`/driver/log/${truck.id}`)} style={{ ...T.h4, width: '100%', height: 64, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.4, marginBottom: S[2] }}>+ Log load (this truck)</button>
          <button onClick={clockOut} style={{ ...T.body, width: '100%', height: 48, border: `1px solid ${C.warn}`, cursor: 'pointer', background: 'transparent', color: C.warn, borderRadius: R.lg, fontFamily: F.display, fontWeight: 600, marginBottom: S[2] }}>End shift on this truck</button>
        </>
      )}

      {/* Today's loads list */}
      <div style={{ marginTop: S[3] }}>
        <Label style={{ marginBottom: S[2] }}>Today's loads on #{truck.plate}</Label>
        {todayLoads.length === 0 ? (
          <EmptyState
            icon={<TruckIcon size={32} />}
            title="No loads logged yet"
            body="Use the + Log load button above to log your first load on this truck."
          />
        ) : (
          todayLoads.slice().reverse().map(l => {
            const m = MATERIALS.find(m => m.code === l.material);
            return (
              <div key={l.id} style={{ ...T.bodySm, display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: `${S[2]}px 0`, borderBottom: `1px solid ${C.rule}`}}>
                <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
                  {l.photo ? <img src={l.photo} alt="" style={{ width: 32, height: 32, borderRadius: R.xs, objectFit: 'cover' }} /> : <div style={{ ...T.body, width: 32, height: 32, borderRadius: R.xs, background: C.surfaceMax, display: 'flex', alignItems: 'center', justifyContent: 'center'}}>📷</div>}
                  <div>
                    <div style={{ fontFamily: F.display, fontWeight: 600 }}>{l.cy != null ? l.cy + ' CY' : l.ticketNo} · {m ? m.label : l.material}</div>
                    <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkDim, marginTop: 2 }}>{l.time}</div>
                  </div>
                </div>
                <StatusPill status={l.status} />
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}
  </script>

  <script type="text/babel" data-presets="react">
// === BLOCK 7: APP + MOUNT ===
// Context broadcast a monotonic nonce whenever this tab's db was rehydrated
// from another tab's localStorage write. Components subscribe to flash a cue.
const RemoteUpdateContext = React.createContext(0);

// Small fixed-position chip in the bottom-right corner that surfaces the
// cloud-sync state. Hidden when 'online' so it doesn't add noise; visible
// while bootstrapping ("Syncing...") and when the cloud is unreachable
// ("Offline — local cache only"). Phase 3 also reuses this for the
// "couldn't save to cloud" toast when a write fails.
function CloudStatusChip({ status, message }) {
  if (status === 'online') return null;
  const palette = status === 'offline'
    ? { bg: 'rgba(244, 162, 97, 0.12)', border: 'rgba(244, 162, 97, 0.55)', fg: '#F4A261' }
    : { bg: 'rgba(179, 230, 53, 0.12)', border: 'rgba(179, 230, 53, 0.55)', fg: '#B3E635' };
  const label = message || (status === 'offline' ? 'Offline — local cache only' : 'Syncing with cloud…');
  return (
    <div role="status" aria-live="polite" style={{
      position: 'fixed', bottom: 16, right: 16, zIndex: 9000,
      display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '8px 14px', borderRadius: 999,
      background: palette.bg, border: `1px solid ${palette.border}`, color: palette.fg,
      fontFamily: 'ui-monospace, "JetBrains Mono", monospace', fontSize: 12,
      letterSpacing: 0.2, backdropFilter: 'blur(8px)',
      boxShadow: '0 4px 18px rgba(0,0,0,0.35)',
      pointerEvents: 'none',
    }}>
      <span aria-hidden="true" style={{
        width: 8, height: 8, borderRadius: '50%', background: palette.fg,
        animation: status === 'loading' ? 'jse-pulse 1.6s ease-out infinite' : 'none',
      }} />
      <span>{label}</span>
    </div>
  );
}

function App() {
  const [hash, navigate] = useHash();
  const [db, setDbRaw] = useState(() => {
    try {
      return hydrateDb(window.localStorage.getItem(DB_STORAGE_KEY));
    } catch (e) {
      return buildSeed();
    }
  });
  // Cloud-sync state: 'loading' while bootstrapCloud is in flight, 'online'
  // once Supabase data is in db, 'offline' if any fetch failed (the UI keeps
  // working from localStorage; the chip in the corner makes the state visible).
  const [cloudStatus, setCloudStatus] = useState('loading');
  const [remoteUpdateNonce, setRemoteUpdateNonce] = useState(0);
  // Phase 3 wrapped setter — diff prev/next and push changed rows to Supabase.
  // Bootstrap, Realtime arrivals, and the cross-tab storage handler all bypass
  // this via setDbRaw so they don't re-sync data we already have on the server.
  const setDb = React.useCallback((updater) => {
    setDbRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      // Fire-and-forget; React state already updated optimistically.
      Promise.resolve().then(() => syncDbToCloud(prev, next));
      return next;
    });
  }, []);
  // Track the last serialized payload we wrote (or received) so we can skip
  // redundant writes — including the write that would otherwise echo back the
  // value we just received from another tab.
  const lastSerializedRef = useRef(null);
  useEffect(() => {
    try {
      const serialized = JSON.stringify(db);
      if (lastSerializedRef.current === serialized) return;
      lastSerializedRef.current = serialized;
      window.localStorage.setItem(DB_STORAGE_KEY, serialized);
    } catch (e) {
      // localStorage unavailable / quota exceeded — silently no-op
    }
  }, [db]);
  // v18: Backfill the geocode cache for any haul-request address that's
  // missing or invalid. Runs after hydrate and whenever the haul-request list
  // changes (so addresses edited via AddressAutocomplete that don't write
  // their own coords also get resolved). The Set guard ensures we don't loop
  // on addresses that won't resolve — one attempt per address per session.
  const geocodeBackfillRef = useRef(new Set());
  useEffect(() => {
    const requests = (db && db.haulRequests) || [];
    const cache = (db && db.geocode) || {};
    const todo = [];
    for (const r of requests) {
      for (const loc of [r && r.pickupLocation, r && r.dropoffLocation]) {
        const addr = loc && loc.address;
        if (!addr || !String(addr).trim()) continue;
        if (geocodeBackfillRef.current.has(addr)) continue;
        const existing = cache[addr];
        if (existing && isFinite(existing.lat) && isFinite(existing.lng) && existing.lat !== 0 && existing.lng !== 0) continue;
        todo.push(addr);
        geocodeBackfillRef.current.add(addr);
      }
    }
    if (todo.length === 0) return undefined;
    let cancelled = false;
    (async () => {
      for (const addr of todo) {
        if (cancelled) return;
        const res = await geocodeAddress(addr);
        if (cancelled) return;
        if (res && isFinite(res.lat) && isFinite(res.lng)) {
          setDb(prev => ({ ...prev, geocode: { ...(prev.geocode || {}), [addr]: res } }));
        }
        await new Promise(r => setTimeout(r, 200));
      }
    })();
    return () => { cancelled = true; };
  }, [db.haulRequests, setDb]);
  // Cloud bootstrap: on mount, fetch every Supabase table and replace `db`
  // with the merged cloud state. Per-table seed fills any empty tables. On
  // any failure, leave the localStorage-hydrated db in place + flip the chip.
  // Uses setDbRaw so the initial assemble doesn't re-upsert what we just read.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const result = await bootstrapCloud(db);
      if (cancelled) return;
      if (result.status === 'online') {
        setDbRaw(result.db);
      }
      setCloudStatus(result.status);
    })();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  // Phase 3 Realtime: once bootstrap reports 'online', subscribe to
  // postgres_changes on every table + rates + meta. Echoes of this tab's own
  // writes are dropped via recentLocalWrites + jsonEq compare; remote changes
  // call setDbRaw (bypassing the syncDbToCloud wrapper — the row is already
  // on the server, we'd just re-upsert what we just received) and bump
  // remoteUpdateNonce so the existing jse-pulse cue fires on listening panels.
  useEffect(() => {
    if (cloudStatus !== 'online') return;
    const cleanup = subscribeRealtime(setDbRaw, () => setRemoteUpdateNonce(n => n + 1));
    return cleanup;
  }, [cloudStatus]);
  // Cross-tab sync (same-browser fallback): when another tab writes to
  // jse_db_v1, hydrate the new value here. Uses setDbRaw so we don't re-sync
  // the change back to Supabase (the originating tab already did).
  useEffect(() => {
    const onStorage = (e) => {
      if (e.key !== DB_STORAGE_KEY) return;
      const next = hydrateDb(e.newValue);
      lastSerializedRef.current = e.newValue == null ? null : JSON.stringify(next);
      setDbRaw(next);
      setRemoteUpdateNonce(n => n + 1);
    };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);
  // Derive document.title from the current hash so the browser tab reflects context.
  useEffect(() => {
    const h = hash || '/';
    const parts = h.split('/').filter(Boolean);
    let title = 'Jobsite Exchange';
    if (h === '/' || h === '') title = 'Jobsite Exchange';
    else if (h.startsWith('/admin/reporting')) title = 'JSE — Reports';
    else if (h.startsWith('/admin/reports')) title = 'JSE — Live stats';
    else if (h.startsWith('/admin/payments')) {
      if (parts[2] && db && db.invoices) {
        const i = db.invoices.find(x => x.id === parts[2]);
        title = i ? `JSE — Invoice ${i.number}` : 'JSE — Payments';
      } else {
        title = 'JSE — Payments';
      }
    }
    else if (h.startsWith('/admin/trucks/active')) title = 'JSE — Active Trucks';
    else if (h.startsWith('/admin/trucks/new/for/') && parts[4] && db && db.haulers) {
      const op = db.haulers.find(o => o.id === parts[4]);
      title = op ? `JSE — New truck for ${op.name}` : 'JSE — New truck';
    }
    else if (h.startsWith('/admin/trucks/new')) title = 'JSE — New truck';
    else if (h.startsWith('/admin/new')) title = 'JSE — New Haul';
    else if (h.startsWith('/admin/activity')) title = 'JSE — Activity';
    else if (h.startsWith('/admin/requests')) {
      if (parts[2] && db && db.haulRequests) {
        const r = db.haulRequests.find(x => x.id === parts[2]);
        title = r ? `JSE — ${haulRequestLabel(db, r)}` : 'JSE — Haul Requests';
      } else {
        title = 'JSE — Haul Requests';
      }
    }
    else if (h.startsWith('/admin/haulers')) {
      if (parts[2] && db && db.haulers) {
        const op = db.haulers.find(o => o.id === parts[2]);
        title = op ? `JSE — Hauler — ${op.name}` : 'JSE — Haulers';
      } else {
        title = 'JSE — Haulers';
      }
    }
    else if (parts[0] === 'admin' && parts[1] === 'p' && parts[2]) {
      const proj = db && db.projects ? db.projects.find(p => p.id === parts[2]) : null;
      if (proj && parts[3] === 'o' && parts[4]) {
        const op = db.haulers.find(o => o.id === parts[4]);
        title = op ? `JSE — Admin — ${proj.name} / ${op.name}` : `JSE — Admin — ${proj.name}`;
      } else {
        title = proj ? `JSE — Admin — ${proj.name}` : 'JSE — Admin';
      }
    }
    else if (h.startsWith('/admin')) title = 'JSE — Admin';
    else if (parts[0] === 'hauler' && parts[1] === 'o' && parts[2]) {
      const op = db && db.haulers ? db.haulers.find(o => o.id === parts[2]) : null;
      if (op && parts[3] === 'p' && parts[4]) {
        const proj = db.projects.find(p => p.id === parts[4]);
        title = proj ? `JSE — Hauler — ${op.name} / ${proj.name}` : `JSE — Hauler — ${op.name}`;
      } else {
        title = op ? `JSE — Hauler — ${op.name}` : 'JSE — Hauler';
      }
    }
    else if (h.startsWith('/hauler')) title = 'JSE — Hauler';
    else if (parts[0] === 'driver' && parts[1] === 'log') {
      title = 'JSE — Driver — Log load';
    }
    else if (parts[0] === 'driver' && parts[1] === 'truck' && parts[2]) {
      const tr = db && db.trucks ? db.trucks.find(t => t.id === parts[2]) : null;
      title = tr ? `JSE — Driver — Truck #${tr.plate}` : 'JSE — Driver';
    }
    else if (h.startsWith('/driver')) title = 'JSE — Driver';
    document.title = title;
  }, [hash, db]);
  const route = (hash || '/').split('/')[1] || '';
  return (
    <RemoteUpdateContext.Provider value={remoteUpdateNonce}>
      <div>
        {route === '' && <Landing navigate={navigate} />}
        {route === 'admin' && <AdminShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
        {route === 'hauler' && <HaulerShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
        {route === 'driver' && <DriverShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
        <CloudStatusChip status={cloudStatus} />
      </div>
    </RemoteUpdateContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>

</body>
