<!-- Jobsite Exchange — single-file React mockup. See README.md. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobsite Exchange — Role Dashboards</title>
  <meta name="description" content="Admin / Hauler / Driver dashboards for hourly hauling — Jobsite Exchange." />
  <meta property="og:title" content="Jobsite Exchange — Role Dashboards" />
  <meta property="og:description" content="Hierarchy: Admin → Hauls → Haulers → Trucks → Drivers." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z' fill='%23B3E635'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='sans-serif' font-size='34' font-weight='800' fill='%230A0A0A'%3EJ%3C/text%3E%3C/svg%3E" />
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff; font-family: "Inter", -apple-system, system-ui, sans-serif; }
    #root { min-height: 100vh; }
    .boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; background: #000; color: #B3E635;
      font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 13px;
    }
    .boot svg { width: 56px; height: 56px; }
    .boot .spinner {
      width: 22px; height: 22px; border: 2px solid #1F1F1F; border-top-color: #B3E635;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Cross-tab sync flash: a subtle accent pulse on elements that just hydrated
       from another browser tab's localStorage write. */
    @keyframes jsePulse {
      0%   { box-shadow: 0 0 0 0 rgba(179, 230, 53, 0.55); }
      60%  { box-shadow: 0 0 0 12px rgba(179, 230, 53, 0); }
      100% { box-shadow: 0 0 0 0 rgba(179, 230, 53, 0); }
    }
    .jse-pulse {
      animation: jsePulse 1.2s ease-out;
      border-radius: 16px;
    }
    @media (prefers-reduced-motion: reduce) {
      .jse-pulse { animation: none; }
    }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 6px; }
    *::-webkit-scrollbar-thumb:hover { background: #2a2a2a; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* === Marketing landing: smooth in-page nav ===
       Honor reduced-motion preferences and the headless capture env. */
    @media (prefers-reduced-motion: no-preference) {
      html { scroll-behavior: smooth; }
    }
    /* Compensate for any sticky header so section anchors land below it */
    section[id] { scroll-margin-top: 24px; }
    /* Hero headline: force the second clause onto its own line only at desktop widths.
       At â‰¤900px the span flows inline so the headline wraps naturally with no double-wrap. */
    @media (min-width: 901px) {
      [data-hero-line="break"] { display: block; }
    }


    /* === Tier 2: tables → cards on mobile === */
    @media (max-width: 700px) {
      /* Tables become vertical card stacks */
      body table, body thead, body tbody, body tr, body td {
        display: block !important;
        width: auto !important;
      }
      body thead { display: none !important; }
      body table {
        border-collapse: separate !important;
        border-spacing: 0 8px !important;
        margin: 0 !important;
      }
      body tr {
        background: #141414 !important;
        border-radius: 12px !important;
        margin-bottom: 8px !important;
        padding: 12px 14px !important;
        border: 1px solid #1f1f1f !important;
        cursor: inherit;
      }
      body td {
        border: none !important;
        padding: 3px 0 !important;
        text-align: left !important;
        font-size: 13px !important;
        white-space: normal !important;
      }
      body td:first-child {
        font-size: 17px !important;
        font-weight: 700 !important;
        padding: 0 0 8px 0 !important;
        margin-bottom: 4px !important;
        border-bottom: 1px solid rgba(255,255,255,0.06) !important;
      }
      /* All cells after first display inline so they flow as metadata chips */
      body td:not(:first-child) {
        display: inline-block !important;
        margin-right: 14px !important;
        vertical-align: middle !important;
      }
      /* The trailing chevron/arrow cell — push to the right and dim */
      body td[align="right"]:last-child {
        float: right;
        margin-right: 0 !important;
        color: #5a5a5a;
      }
      /* The + Add row (uses colspan) → full-width accent button-style */
      body tr td[colspan] {
        display: block !important;
        text-align: center !important;
        color: #B3E635 !important;
        font-weight: 600 !important;
        padding: 14px !important;
        margin: 0 !important;
        font-size: 14px !important;
        border-bottom: none !important;
      }
      body tr:has(td[colspan]) {
        background: transparent !important;
        border: 1px dashed #2a2a2a !important;
      }
      /* Tighter card padding */
      [style*="border-radius: 16px"] { border-radius: 12px !important; }
      /* Cards inside cards (KPIs) take full width */
      [style*="background: rgb(20, 20, 20)"] { width: 100% !important; box-sizing: border-box !important; }
    }

    /* === Tier 1 mobile responsive === */
    @media (max-width: 900px) {
      [style*="padding: 32px"] { padding: 16px !important; }
      [style*="padding: 24px"] { padding: 14px !important; }
      h1 { font-size: 32px !important; line-height: 1.15 !important; }
      /* 4-col KPI grids → 2-col on tablet */
      [style*="repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      /* Tables horizontally scroll via parent :has() */
      :has(> table) {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        max-width: 100% !important;
      }
      /* Topbar reduces padding */
      .topbar { padding: 10px 14px !important; }
    }
    @media (max-width: 600px) {
      [style*="padding: 32px"] { padding: 12px !important; }
      [style*="padding: 24px"] { padding: 10px !important; }
      h1 { font-size: 26px !important; line-height: 1.15 !important; letter-spacing: -0.6px !important; }
      /* All multi-col grids → single column on phone */
      [style*="display: grid"] {
        grid-template-columns: 1fr !important;
      }
      /* Flex headers (h1 + button) wrap */
      [style*="justify-content: space-between"][style*="display: flex"] {
        flex-wrap: wrap !important;
        gap: 12px !important;
      }
      /* Inputs at 16px to prevent iOS zoom on focus */
      input, select, textarea {
        font-size: 16px !important;
      }
      /* Topbar wraps */
      .topbar {
        flex-wrap: wrap !important;
        gap: 8px !important;
        padding: 8px 12px !important;
      }
      .topbar > div { gap: 12px !important; }
      /* Driver phone frame fills the actual phone */
      .phone-frame-outer {
        padding: 0 !important;
        background: #0A0A0A !important;
      }
      .phone-frame-outer > .brand-frame-chrome,
      .phone-frame-outer > .phone-frame-caption {
        display: none !important;
      }
      .phone-frame-outer > .phone-bezel {
        width: 100% !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
      }
      .phone-frame-outer .phone-screen {
        border-radius: 0 !important;
        min-height: 100vh !important;
      }
      .phone-frame-outer .phone-notch { display: none !important; }
    }

    /* === Mobile responsiveness pass — 2026-05 === */
    /* Tap-target floor: inputs/selects/textareas inside the shells must be at least 44px tall under 700px. */
    @media (max-width: 700px) {
      input:not([type="file"]):not([type="checkbox"]):not([type="radio"]),
      select,
      textarea {
        min-height: 44px !important;
        padding: 12px 14px !important;
        box-sizing: border-box !important;
      }
      /* Btn size="sm" (height:32) and size="xs" (height:26) → bump to 44px on mobile.
         The Btn component renders inline height in the style attribute; match it. */
      button[style*="height: 32px"],
      button[style*="height: 26px"] {
        min-height: 44px !important;
        height: auto !important;
        padding-top: 8px !important;
        padding-bottom: 8px !important;
      }
    }

    /* DriverShell mini-KPI grids should stay 3-col on phone, not collapse via the global 1fr rule.
       More specific than [style*="display: grid"]. Matches the explicit 3-col templates used in
       DriverTruckDetail and DriverMultiTruckHome. */
    @media (max-width: 600px) {
      [style*="grid-template-columns: 1fr 1fr 1fr"],
      [style*="gridTemplateColumns: 1fr 1fr 1fr"] {
        grid-template-columns: 1fr 1fr 1fr !important;
        gap: 8px !important;
      }
    }

    /* HaulerLogLoadForm row: 90px / 1fr / 1fr / 100px / auto.
       Default grid override collapses it to 1-col on â‰¤600 (still acceptable — inputs stack).
       At 700px window we keep the grid but reflow it so it doesn't horizontally squeeze. */
    @media (max-width: 900px) and (min-width: 601px) {
      [style*="90px 1fr 1fr 100px auto"] {
        grid-template-columns: 1fr 1fr !important;
        gap: 12px !important;
      }
    }

    /* DriverLogLoad photo placeholder: on very narrow phones, switch from fixed 140px height
       to aspect-ratio so the icon+labels never feel cramped at 320–360px viewports. */
    @media (max-width: 600px) {
      button[style*="height: 140px"][style*="dashed"] {
        height: auto !important;
        aspect-ratio: 16 / 10 !important;
        min-height: 120px !important;
      }
    }

    /* Reports date range picker: show preset pill row on desktop, select dropdown on phone.
       Used by DateRangePicker in AdminReports. */
    .jse-rangepicker-pills { display: inline-flex; flex-wrap: wrap; gap: 6px; }
    .jse-rangepicker-select { display: none; }
    @media (max-width: 700px) {
      .jse-rangepicker-pills { display: none; }
      .jse-rangepicker-select { display: block; width: 100%; }
    }

    /* The 7-day bar chart needs to be tappable on mobile. Show the tooltip on the
       active bar (mouseover or focus) — implementation toggles a state class. */
    .jse-bar { cursor: pointer; transition: opacity 120ms ease; }
    .jse-bar:hover, .jse-bar:focus { opacity: 0.85; }

    /* Topbar at very narrow widths (â‰¤500px): hide the breadcrumb/current text,
       keep brand + role pill + Switch button visible. The role Pill is the first
       <span> child; the breadcrumb is the second <span> sibling. Hide only the
       second one. */
    @media (max-width: 500px) {
      .topbar > div:first-child > div > span:nth-child(2) {
        display: none !important;
      }
    }

    /* Horizontal-scroll safety net for unbroken IDs / emails / long plate strings.
       Use `overflow-x: clip` (not `hidden`) so we don't create a scroll containing block,
       which would break the sticky Topbar in iOS Safari and older Chromium. */
    @media (max-width: 600px) {
      html, body { overflow-x: clip; }
    }
    /* === Admin sidebar + mobile drawer ===
       Desktop (>900px): permanent 240px sidebar to the left of the main content.
       Mobile (â‰¤900px): sidebar hides; a hamburger button in the Topbar opens
       a slide-in drawer with the same nav items. Backdrop dims the page. */
    .admin-mobile-nav-trigger { display: none; }
    @media (max-width: 900px) {
      .admin-sidebar { display: none !important; }
      .admin-mobile-nav-trigger {
        display: inline-flex !important;
        align-items: center; justify-content: center;
        background: transparent; border: 1px solid #2A2A2A; color: #9A9A9A;
        width: 36px; height: 36px; border-radius: 999px; cursor: pointer;
      }
      .admin-mobile-nav-trigger:hover { color: #fff; border-color: #B3E635; }
    }
    @keyframes adminDrawerSlideIn {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes adminDrawerFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .admin-drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 80; animation: adminDrawerFade 180ms ease-out;
    }
    .admin-drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 280px; background: #141414; border-right: 1px solid #1F1F1F;
      z-index: 90; padding: 16px; box-sizing: border-box;
      animation: adminDrawerSlideIn 200ms ease-out;
      overflow-y: auto;
    }
    @media (prefers-reduced-motion: reduce) {
      .admin-drawer, .admin-drawer-backdrop { animation: none !important; }
    }

    @media print {
      html, body { background: #fff !important; color: #000 !important; }
      body * { visibility: hidden; }
      .invoice-print, .invoice-print * { visibility: visible; }
      .invoice-print { position: absolute; left: 0; top: 0; width: 100%; padding: 24px !important; background: #fff !important; color: #000 !important; border: 0 !important; }
      .invoice-print *, .invoice-print *:before, .invoice-print *:after { color: #000 !important; background: transparent !important; border-color: #ccc !important; box-shadow: none !important; }
      .invoice-print th, .invoice-print td { border-bottom: 1px solid #ccc !important; padding: 8px !important; }
      .no-print { display: none !important; }
    }
  </style>
</head>

  <div id="root">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
// === BLOCK 1: TOKENS + SHARED COMPONENTS ===
const { useState, useEffect, useMemo, useRef, useContext } = React;

// =====================================================================
// Design tokens — preserved from Phase 1 mockup
// =====================================================================
const C = {
  bg: '#0A0A0A', bgDeep: '#000000',
  surface: '#141414', surfaceHi: '#1C1C1C', surfaceMax: '#222222',
  ink: '#FFFFFF', inkDim: '#9A9A9A', inkFaint: '#5A5A5A',
  rule: '#1F1F1F', ruleHi: '#2A2A2A',
  accent: '#B3E635',
  accentSoft: 'rgba(179, 230, 53, 0.10)',
  accentMuted: 'rgba(179, 230, 53, 0.04)',
  warn: '#FF6B47', warnSoft: 'rgba(255, 107, 71, 0.08)',
  ok: '#5BC97C', okSoft: 'rgba(91, 201, 124, 0.08)',
  info: '#5AAEFF', infoSoft: 'rgba(90, 174, 255, 0.08)',
};
const F = {
  display: '"Inter Tight", "Inter", -apple-system, system-ui, sans-serif',
  body: '"Inter", -apple-system, system-ui, sans-serif',
  mono: '"JetBrains Mono", "SF Mono", Menlo, monospace',
};
const R = { xs: 4, sm: 8, md: 12, lg: 16, pill: 999 };
const S = { 1: 4, 2: 8, 3: 12, 4: 16, 5: 24, 6: 32, 7: 48, 8: 64 };

// Typography tokens — single source of truth for type. Inline `fontSize:` values
// throughout the app should spread from these tokens instead of using raw numbers.
const T = {
  h1:        { fontFamily: F.display, fontSize: 44, fontWeight: 700, lineHeight: 1.1, letterSpacing: -1 },
  h2Lg:      { fontFamily: F.display, fontSize: 36, fontWeight: 700, lineHeight: 1.15, letterSpacing: -1 },
  h2:        { fontFamily: F.display, fontSize: 28, fontWeight: 700, lineHeight: 1.2, letterSpacing: -0.5 },
  statValue: { fontFamily: F.display, fontSize: 22, fontWeight: 700, lineHeight: 1.1 },
  h3:        { fontFamily: F.display, fontSize: 20, fontWeight: 600, lineHeight: 1.3 },
  h4:        { fontFamily: F.display, fontSize: 18, fontWeight: 600, lineHeight: 1.3 },
  bodyLg:    { fontFamily: F.body, fontSize: 16, lineHeight: 1.5 },
  body:      { fontFamily: F.body, fontSize: 14, lineHeight: 1.5 },
  bodySm:    { fontFamily: F.body, fontSize: 13, lineHeight: 1.5 },
  caption:   { fontFamily: F.body, fontSize: 12, lineHeight: 1.4, color: C.inkDim },
  micro:     { fontFamily: F.body, fontSize: 11, lineHeight: 1.35 },
  mono:      { fontFamily: F.mono, fontSize: 12, lineHeight: 1.4 },
  monoSm:    { fontFamily: F.mono, fontSize: 11, lineHeight: 1.4 },
};

// =====================================================================
// Date anchors (declared before seeds so LOADS_SEED / HOURS_SEED can reference them)
// =====================================================================
// Frozen reference dates for deterministic mockup behavior. All loads/hours dates
// are real ISO strings (YYYY-MM-DD), generated relative to TODAY_ISO so the demo
// produces stable charts regardless of when the page is opened.
const TODAY_ISO = '2026-05-19';

// Helper: returns ISO date N days before TODAY_ISO. dayOffset 0 = today, 1 = yesterday, etc.
function isoDaysAgo(dayOffset) {
  const [y, m, d] = TODAY_ISO.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() - dayOffset);
  return dt.toISOString().slice(0, 10);
}

const YESTERDAY_ISO = isoDaysAgo(1);

// Tiny helpers so consumers don't compare raw strings.
function isToday(iso)     { return iso === TODAY_ISO; }
function isYesterday(iso) { return iso === YESTERDAY_ISO; }
function isInRange(iso, startIso, endIso) {
  return iso >= startIso && iso <= endIso;
}

// Pretty short weekday label for chart axes: 'Mon', 'Tue', ...
function isoToWeekdayShort(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getUTCDay()];
}

// Pretty short date label: 'May 19'
function isoToShortDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getUTCMonth()];
  return `${mo} ${dt.getUTCDate()}`;
}

// =====================================================================
// Seed data
// =====================================================================
const TRUCK_TYPES = [
  { code: 'TAN', label: 'Tandem',     axles: '2-axle', cap: '10-12 yd', rate: 85 },
  { code: 'SD',  label: 'Side Dump',  axles: 'Semi',   cap: '20-24 yd', rate: 125 },
  { code: 'ED',  label: 'End Dump',   axles: 'Semi',   cap: '20-24 yd', rate: 125 },
  { code: 'BD',  label: 'Belly Dump', axles: 'Semi',   cap: '22-26 yd', rate: 125 },
  { code: 'HS',  label: 'High Side',  axles: 'Semi',   cap: '24-28 yd', rate: 140 },
];
const RATES_INIT = Object.fromEntries(TRUCK_TYPES.map(t => [t.code, t.rate]));

const MATERIALS = [
  { code: 'CF', label: 'Clean Fill' },
  { code: 'TS', label: 'Topsoil' },
  { code: 'CR', label: 'Class 5 Road Base' },
  { code: 'EX', label: 'Export / Spoils' },
  { code: 'SD', label: 'Sand' },
  { code: 'GR', label: 'Gravel' },
  { code: 'CO', label: 'Concrete' },
  { code: 'AC', label: 'Asphalt Millings' },
  { code: 'RR', label: 'Rip Rap' },
  { code: 'MU', label: 'Mulch' },
];
// =====================================================================
// Helpers
// =====================================================================
const NOW_MIN = 11 * 60 + 5; // 11:05

function calcHours(clockIn, breakMin, clockOut) {
  const [h, m] = clockIn.split(':').map(Number);
  const start = h * 60 + m;
  const end = clockOut
    ? (() => { const [eh, em] = clockOut.split(':').map(Number); return eh * 60 + em; })()
    : NOW_MIN;
  return Math.max(0, (end - start - breakMin) / 60);
}

const fmtHours = (h) => h.toFixed(2);
const fmtMoney = (n) => '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
// =====================================================================
// Hash router
// =====================================================================
function useHash() {
  // Read + normalize. Canonical route is `#/hauler/...`; the legacy `#/operator/...`
  // alias is rewritten so old shared links keep working after the v4 rename.
  const read = () => {
    let h = window.location.hash.replace(/^#/, '') || '/';
    if (h === '/operator' || h.startsWith('/operator/')) {
      h = '/hauler' + h.slice('/operator'.length);
    }
    return h;
  };
  const [hash, setHash] = useState(read);
  useEffect(() => {
    const onChange = () => setHash(read());
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  const navigate = (to) => { window.location.hash = to; };
  return [hash, navigate];
}
// =====================================================================
// Atoms
// =====================================================================
function HexLogo({ size = 24 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <path d="M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z" fill={C.accent} />
      <text x="32" y="44" textAnchor="middle" fontFamily={F.display} fontSize="34" fontWeight="800" fill={C.bg}>J</text>
    </svg>
  );
}

function Brand({ size = 'sm' }) {
  const fs = size === 'lg' ? 20 : 15;
  const ls = size === 'lg' ? 28 : 22;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
      <HexLogo size={ls} />
      <span style={{ fontFamily: F.display, fontSize: fs, fontWeight: 700, letterSpacing: -0.4, color: C.ink }}>
        Jobsite<span style={{ color: C.accent }}>Exchange</span>
      </span>
    </div>
  );
}

function Label({ children, color = C.inkFaint, style = {} }) {
  return (
    <div style={{
      fontFamily: F.mono, fontSize: 10, color, letterSpacing: 0.8,
      textTransform: 'uppercase', fontWeight: 600, ...style,
    }}>{children}</div>
  );
}

function Btn({ children, onClick, variant = 'primary', size = 'md', disabled, fullWidth, style = {} }) {
  const variants = {
    primary:   { background: C.accent, color: C.bg, border: 'none' },
    secondary: { background: 'transparent', color: C.ink, border: `1px solid ${C.ruleHi}` },
    ghost:     { background: 'transparent', color: C.inkDim, border: 'none' },
    danger:    { background: 'transparent', color: C.warn, border: `1px solid ${C.warn}` },
    ok:        { background: C.ok, color: C.bg, border: 'none' },
  };
  const sizes = {
    lg: { height: 52, fontSize: 16, padding: `0 ${S[5]}px`, fontWeight: 600 },
    md: { height: 40, fontSize: 14, padding: `0 ${S[4]}px`, fontWeight: 600 },
    sm: { height: 32, fontSize: 13, padding: `0 ${S[3]}px`, fontWeight: 500 },
    xs: { height: 26, fontSize: 12, padding: `0 ${S[2]}px`, fontWeight: 500 },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{
      ...variants[variant], ...sizes[size], borderRadius: R.pill,

function EditableText({ value, onSave, multiline, mono, placeholder, style = {} }) {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState(value || '');
  useEffect(() => setV(value || ''), [value]);
  const commit = () => { if (v !== (value || '')) onSave(v); setEditing(false); };
  const cancel = () => { setV(value || ''); setEditing(false); };
  if (editing) {
    const Tag = multiline ? 'textarea' : 'input';
    return (
      <Tag value={v} onChange={e => setV(e.target.value)} onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter' && !multiline) { e.preventDefault(); commit(); } if (e.key === 'Escape') cancel(); }}
        onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}
        autoFocus rows={multiline ? 2 : undefined} placeholder={placeholder || ''}
        style={{ background: C.bg, color: 'inherit', border: `1px solid ${C.accent}`, padding: '4px 8px', borderRadius: R.sm, fontFamily: mono ? F.mono : 'inherit', fontSize: 'inherit', fontWeight: 'inherit', letterSpacing: 'inherit', minWidth: 60, width: '100%', boxSizing: 'border-box', ...style }} />
    );
  }
  return (
    <span
      onClick={(e) => { e.stopPropagation(); e.preventDefault(); setEditing(true); }}
      onMouseDown={e => e.stopPropagation()}
      style={{ cursor: 'text', padding: '3px 6px', margin: '-3px -6px', borderRadius: R.xs, transition: 'background 80ms', display: 'inline-block', minWidth: 18, ...style }}
      onMouseEnter={e => e.currentTarget.style.background = 'rgba(179,230,53,0.12)'}
      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
      title="Click to edit">
      {value || <span style={{ color: C.inkFaint }}>{placeholder || '—'}</span>}
    </span>
  );
}

// =====================================================================
// Activity feed
// =====================================================================
// Append an activity event onto a db-like object. Use inside setDb composers:
//   setDb(prev => appendActivity({ ...prev, loads: [...] }, { type, actorRole, actorId, summary, refId }))
function appendActivity(state, evt) {
  const event = {
    id: 'act-' + Math.random().toString(36).substring(2, 7),
    type: evt.type,
    actorRole: evt.actorRole,
    actorId: evt.actorId || null,
    summary: evt.summary,
    refId: evt.refId || null,
    timestamp: Date.now(),
  };
  return { ...state, activity: [...(state.activity || []), event] };
}

// Small lookup helpers used to build activity summary strings.
function driverName(state, id) {
  const d = state && state.drivers ? state.drivers.find(x => x.id === id) : null;
  return d ? d.name : 'A driver';
}
function haulerName(state, id) {
  const h = state && state.haulers ? state.haulers.find(x => x.id === id) : null;
  return h ? h.name : 'A hauler';
}
function projectName(state, id) {
  const p = state && state.projects ? state.projects.find(x => x.id === id) : null;
  return p ? p.name : 'a haul';
}
function truckPlate(state, id) {
  const t = state && state.trucks ? state.trucks.find(x => x.id === id) : null;
  return t ? t.plate : '?';
}
function materialLabel(code) {
  const m = MATERIALS.find(x => x.code === code);
  return m ? m.label : code;
}

// Parse a stored localStorage payload (or null) into a valid db.
// Used both at initial mount and when a sibling tab writes to `jse_db_v1`.
function hydrateDb(raw) {
  const seed = buildSeed();
  if (raw == null) return seed;
  try {
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') return seed;
    // The required-keys list includes newer collections that older payloads
    // won't have. Check only the keys present in every schema version so we
    // can migrate forward instead of dropping a populated db on the floor.
    // `haulers` (v4) was named `operators` in v1–v3, so we accept either.
    const baselineKeys = ['projects', 'trucks', 'drivers', 'hours', 'loads', 'invoices', 'rates'];
    const valid = baselineKeys.every(k => k in parsed) && ('haulers' in parsed || 'operators' in parsed);
    if (!valid) return seed;
    if (parsed.schemaVersion === DB_SCHEMA_VERSION) return parsed;
    if (parsed.schemaVersion > DB_SCHEMA_VERSION) return seed;
    // Schema migration. Apply each forward-step in order:
    //   v1 → v2: backfill missing date fields on loads/hours.
    //   v2 → v3: seed `haulRequests` if missing.
    //   v3 → v4: rename `operators` collection → `haulers`,
    //            rename `operatorId` field → `haulerId` on trucks + invoices.
    //   v4 → v5: load/hours `date` fields migrate from 'today'/'yesterday' label
    //            strings to ISO date strings (YYYY-MM-DD).
    //   v5 → v6: add `activity` collection + `activityLastReadAt` mark-as-read pointer.
    //   v6 → v7: backfill `acceptedByDriver` (null) + `passedBy` ([]) on haulRequests;
    //            new `accepted` status enum value for driver-opt-in flow.
    //   v7 → v8: add `assignments[]` to every haulRequest. Multi-truck, multi-day,
    //            per-truck load tracking. Legacy `matchedHaulerId`/`matchedTruckId`
    //            preserved for compat; `assignments[]` is the new source of truth.
    //   v8 → v9: backfill `attachments: []` on every hauler (W-9/Insurance/MSA/Other
    //            docs). Backfill any missing `rates` key from TRUCK_TYPES defaults so
    //            new truck types (e.g. HS at $140) light up after a stale-cache load.
    //   v9 → v10: restore seeded attachments by hauler id for haulers whose
    //            attachments array is empty (fixes v8→v9 which over-blanked them).
    //            Promote any rate that still matches a `RATES_PREV_DEFAULTS` entry
    //            but not the current TRUCK_TYPES default (e.g. HS $125 → $140).
    const { operators: legacyOperators, ...rest } = parsed;
    const haulersBeforeRestore = (Array.isArray(rest.haulers)
      ? rest.haulers
      : (Array.isArray(legacyOperators) ? legacyOperators : HAULERS_SEED)
    ).map(h => h && !Array.isArray(h.attachments) ? { ...h, attachments: [] } : h);
    // v9 → v10: re-seed attachments for haulers whose array is empty AND the
    // seed has docs for that id. User-edited (non-empty) attachments preserved.
    const migratedHaulers = haulersBeforeRestore.map(h => {
      if (!h || !Array.isArray(h.attachments) || h.attachments.length > 0) return h;
      const seedHauler = HAULERS_SEED.find(s => s.id === h.id);
      if (seedHauler && Array.isArray(seedHauler.attachments) && seedHauler.attachments.length > 0) {
        return { ...h, attachments: seedHauler.attachments };
      }
      return h;
    });
    const migratedRates = (() => {
      const out = { ...RATES_INIT, ...(rest.rates && typeof rest.rates === 'object' ? rest.rates : {}) };
      // Preserve user-edited values; only fill in keys missing from the cached payload.
      TRUCK_TYPES.forEach(t => { if (out[t.code] == null) out[t.code] = t.rate; });
      // v9 → v10: if a rate still matches the prior default (user never edited)
      // but the canonical TRUCK_TYPES default has moved on, bump to the new default.
      TRUCK_TYPES.forEach(t => {
        const prev = RATES_PREV_DEFAULTS[t.code];
        if (prev != null && out[t.code] === prev && prev !== t.rate) {
          out[t.code] = t.rate;
        }
      });
      return out;
    })();
    const renameOpField = (rows) => Array.isArray(rows)
      ? rows.map(r => {
          if (!r || typeof r !== 'object' || !('operatorId' in r)) return r;
          const { operatorId, ...restRow } = r;
          return { ...restRow, haulerId: operatorId };
        })
      : rows;
    // v4 → v5: 'today' / 'yesterday' string labels → ISO date strings.
    const migrateDate = (val) => {
      if (val === 'today') return TODAY_ISO;
      if (val === 'yesterday') return YESTERDAY_ISO;
      return val; // already ISO, or null/undefined (handled by v1→v2 backfill below)
    };
    const isoBackfill = (val) => val == null ? YESTERDAY_ISO : migrateDate(val);
    return {
      ...rest,
      haulers: migratedHaulers,
      rates: migratedRates,
      trucks: renameOpField(rest.trucks),
      invoices: renameOpField(rest.invoices),
      loads: Array.isArray(rest.loads)
        ? rest.loads.map(l => l ? { ...l, date: isoBackfill(l.date) } : l)
        : rest.loads,
      hours: Array.isArray(rest.hours)
        ? rest.hours.map(h => h ? { ...h, date: isoBackfill(h.date) } : h)
        : rest.hours,
      // v6 → v7: backfill `acceptedByDriver` / `passedBy` defaults on existing
      // haul requests. v7 → v8: synthesize `assignments[]` from legacy
      // `matchedTruckId` so old-shape rows behave like the new multi-truck model.
      // Spread `r` last so a v8+ payload preserves real values (including a
      // populated `assignments`); only the legacy path builds a synthesized one.
      haulRequests: (Array.isArray(rest.haulRequests) ? rest.haulRequests : HAUL_REQUESTS_SEED).map(r => {
        if (!r) return r;
        // Already on v8 shape? leave it (defaults still applied for safety).
        if (Array.isArray(r.assignments)) return { acceptedByDriver: null, passedBy: [], ...r };
        // Legacy single-truck row → synthesize a one-truck, one-day, zero-loads assignment.
        if (r.matchedTruckId) {
          const truck = (Array.isArray(rest.trucks) ? rest.trucks : []).find(t => t.id === r.matchedTruckId);
          return {
            acceptedByDriver: null, passedBy: [], ...r,
            assignments: [{
              truckId: r.matchedTruckId,
              haulerId: r.matchedHaulerId || (truck ? truck.haulerId : null),
              addedAt: Date.now(),
              days: [{ date: TODAY_ISO, startTime: r.requestedAt || '08:00', loads: [] }],
            }],
          };
        }
        // Pending row, no truck matched yet → empty assignments.
        return { acceptedByDriver: null, passedBy: [], assignments: [], ...r };
      }),
      // v5 → v6: add activity collection + activityLastReadAt mark-as-read pointer.
      activity: Array.isArray(rest.activity) ? rest.activity : ACTIVITY_SEED,
      activityLastReadAt: typeof rest.activityLastReadAt === 'number' ? rest.activityLastReadAt : 0,
      schemaVersion: DB_SCHEMA_VERSION,
    };
  } catch (e) {
    return seed;
  }
}
  </script>

  <script type="text/babel" data-presets="react">
// === BLOCK 4: ADMIN + WIZARDS ===
// =====================================================================
// WizardShell — shared chrome for multi-step creation flows (projects,
// haulers, drivers, trucks). Renders breadcrumb + eyebrow/title + step
// indicator + child card + Cancel/Back/Next/Submit footer.
// Scrolls to top whenever currentStep changes.
//
// Single-step wizards: pass steps={['Details']} (or similar) — the step
// indicator hides itself and only Cancel + Submit show in the footer.
// =====================================================================
function WizardShell({
  steps, currentStep, onCancel, onBack, onNext, onSubmit,
  nextDisabled, submitDisabled, submitLabel = 'Create',
  crumbs, eyebrow, title, children, navigate,
}) {
  useEffect(() => { window.scrollTo(0, 0); }, [currentStep]);
  const total = steps.length;
  const showSteps = total > 1;
  const isLast = currentStep === total;

  const StepDot = ({ n, label }) => {
    const active = currentStep === n;
    const done = currentStep > n;
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: S[2], flex: 1, minWidth: 0 }}>
        <div style={{
          ...T.mono, width: 28, height: 28, borderRadius: '50%',
          background: active ? C.accent : (done ? C.accentSoft : C.surfaceHi),
          color: active ? C.bg : (done ? C.accent : C.inkDim),
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, flexShrink: 0,
          border: active ? 'none' : `1px solid ${C.ruleHi}`,
        }}>{n}</div>
        <div style={{ ...T.monoSm, color: active ? C.ink : C.inkDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{label}</div>
      </div>
    );
  };

  return (
    <div style={{ padding: S[6], maxWidth: 880, margin: '0 auto' }}>
      {crumbs && <Crumbs items={crumbs} navigate={navigate} />}
      {(eyebrow || title) && (
        <div style={{ marginBottom: S[5] }}>
          {eyebrow && <Label color={C.accent} style={{ marginBottom: 6 }}>{eyebrow}</Label>}
          {title && <h1 style={{ fontFamily: F.display, fontSize: 32, fontWeight: 700, letterSpacing: -1, margin: 0, color: C.ink }}>{title}</h1>}
        </div>
      )}
      {showSteps && (
        <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[5], flexWrap: 'wrap' }}>
          {steps.map((s, i) => <StepDot key={i} n={i + 1} label={s} />)}
        </div>
      )}
      <Card>{children}</Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', gap: S[3], marginTop: S[5], flexWrap: 'wrap' }}>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
        <div style={{ display: 'flex', gap: S[2] }}>
          {showSteps && <Btn variant="secondary" onClick={onBack} disabled={currentStep === 1}>Back</Btn>}
          {showSteps && !isLast && (
            <Btn variant="primary" onClick={onNext} disabled={nextDisabled}>Next</Btn>
          )}
          {(isLast || !showSteps) && (
            <Btn variant="primary" size="lg" onClick={onSubmit} disabled={submitDisabled}>{submitLabel}</Btn>
          )}
        </div>
      </div>
    </div>
  );
}

const WIZARD_INPUT_STYLE = { background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '12px 14px', borderRadius: R.sm, fontFamily: F.body, fontSize: 15, width: '100%', boxSizing: 'border-box' };

function AdminProjects({ db, setDb, navigate }) {
  const updateProject = (id, patch) => setDb(prev => ({ ...prev, projects: prev.projects.map(p => p.id === id ? { ...p, ...patch } : p) }));
  const projects = db.projects.map(p => {
    const ops = db.haulers.filter(o => o.projectIds.includes(p.id));
    const trucks = db.trucks.filter(t => t.projectId === p.id);
    const trucksActive = trucks.filter(t => t.driverId && db.hours.some(h => h.truckId === t.id && h.status === 'open')).length;
    const totalLoads = db.loads.filter(l => l.projectId === p.id && l.status === 'approved').length;
    const pendingLoads = db.loads.filter(l => l.projectId === p.id && l.status === 'pending').length;
    const totalHours = db.hours.filter(h => h.projectId === p.id).reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
    const totalRevenue = db.hours.filter(h => h.projectId === p.id).reduce((s, h) => {
      const t = db.trucks.find(t => t.id === h.truckId);
      const rate = t ? db.rates[t.type] : 0;
      return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * rate;
    }, 0);
    return { ...p, ops, trucks, trucksActive, totalLoads, pendingLoads, totalHours, totalRevenue };
  });
  const active = projects.filter(p => (p.status || 'active') === 'active');
  const upcoming = projects.filter(p => p.status === 'upcoming');
  const completed = projects.filter(p => p.status === 'completed');
  const totals = {
    activeProjects: active.length,
    totalTrucksActive: active.reduce((s, p) => s + p.trucksActive, 0),
    totalLoadsAll: active.reduce((s, p) => s + p.totalLoads, 0),
    totalRevenueAll: active.reduce((s, p) => s + p.totalRevenue, 0),
  };

  const statusOptions = [
    { value: 'active', label: 'Active' },
    { value: 'upcoming', label: 'Upcoming' },
    { value: 'completed', label: 'Completed' },
  ];

  const renderRow = (p, dim) => (
    <Tr key={p.id} onClick={() => navigate(`/admin/p/${p.id}`)}
      style={dim ? { opacity: 0.6 } : {}}>
      <Td>
        <div style={{ fontWeight: 600 }}><EditableText value={p.name} onSave={(v) => updateProject(p.id, { name: v })} /></div>
        <div style={{ ...T.micro, color: C.inkDim, marginTop: 2 }}><EditableText value={p.address} onSave={(v) => updateProject(p.id, { address: v })} /></div>
      </Td>
      <Td dim><EditableText value={p.gc} onSave={(v) => updateProject(p.id, { gc: v })} /></Td>
      <Td><EditableSelect value={p.status || 'active'} options={statusOptions} onSave={(v) => updateProject(p.id, { status: v })} /></Td>
      <Td align="right">{p.ops.length}</Td>
      <Td align="right" mono>{p.trucksActive} <span style={{ color: C.inkFaint }}>/ {p.trucks.length}</span></Td>
      <Td align="right" mono>{p.totalLoads}</Td>
      <Td align="right">{p.pendingLoads > 0 ? <Pill color={C.warn} soft={C.warnSoft}>{p.pendingLoads}</Pill> : <span style={{ color: C.inkFaint }}>—</span>}</Td>
      <Td align="right" mono>{fmtHours(p.totalHours)}</Td>
      <Td align="right" mono style={{ fontWeight: 600 }}>{fmtMoney(p.totalRevenue)}</Td>
      <Td align="right" style={{ color: C.accent }}><ChevronRight /></Td>
    </Tr>
  );

  const head = (
    <thead>
      <tr>
        <Th>Haul</Th><Th>GC</Th><Th>Status</Th>
        <Th align="right">Haulers</Th>
        <Th align="right">Trucks active</Th>
        <Th align="right">Total loads</Th>
        <Th align="right">Pending</Th>
        <Th align="right">Total hours</Th>
        <Th align="right">Total revenue</Th>
        <Th></Th>
      </tr>
    </thead>
  );

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin' }, { label: 'Hauls' }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: S[5] }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Active hauls · {String(new Date().getHours()).padStart(2,'0')}:{String(new Date().getMinutes()).padStart(2,'0')}</Label>
          <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>Hauling Overview</h1>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>Click any value to edit. Click row to drill in. Change Status to move a haul between sections.</div>
        </div>
        <div style={{ display: 'flex', gap: S[2] }}>
          <Btn variant="secondary" size="sm">Export CSV</Btn>
          <Btn variant="primary" size="sm" onClick={() => navigate('/admin/new')}>+ New haul</Btn>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>
        <Card padding={S[4]}><Stat label="Active hauls" value={totals.activeProjects} /></Card>
        <Card padding={S[4]}><Stat label="Trucks running now" value={totals.totalTrucksActive} /></Card>
        <Card padding={S[4]}><Stat label="Total loads delivered" value={totals.totalLoadsAll} sub="across active" /></Card>
        <Card padding={S[4]}><Stat label="Total revenue" value={fmtMoney(totals.totalRevenueAll)} sub="across active" /></Card>
      </div>

      {/* Active section */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.accent}>Active</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ ...T.monoSm, color: C.inkDim }}>{active.length}</span>
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          {head}
          <tbody>
            {active.map(p => renderRow(p, false))}
            {active.length === 0 && <tr><td colSpan={11} style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>No active hauls.</td></tr>}
            <tr onClick={() => navigate('/admin/new')} style={{ cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background = C.surfaceHi}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <td colSpan={11} style={{ ...T.bodySm, padding: '14px 14px', borderBottom: `1px solid ${C.rule}`, fontFamily: F.display, color: C.accent, fontWeight: 600, textAlign: 'center' }}>+ Add new haul</td>
            </tr>
          </tbody>
        </table>
      </Card>

      {/* Upcoming section */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.info || C.inkDim}>Upcoming</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ ...T.monoSm, color: C.inkDim }}>{upcoming.length}</span>
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          {head}
          <tbody>
            {upcoming.map(p => renderRow(p, false))}
            {upcoming.length === 0 && <tr><td colSpan={11} style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>No upcoming hauls.</td></tr>}
          </tbody>
        </table>
      </Card>

      {/* Completed section */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.inkDim}>Completed</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ ...T.monoSm, color: C.inkDim }}>{completed.length}</span>
      </div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          {head}
          <tbody>
            {completed.map(p => renderRow(p, true))}
            {completed.length === 0 && <tr><td colSpan={11} style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>No completed hauls.</td></tr>}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

function AdminProject({ projectId, db, setDb, navigate }) {
  const [showAdd, setShowAdd] = useState(false);

  if (!project) return <NotFound navigate={navigate} />;
  const haulers = db.haulers.filter(o => o.projectIds.includes(projectId));
  const trucks = db.trucks.filter(t => t.projectId === projectId);
  const hours = db.hours.filter(h => h.projectId === projectId);
  const loads = db.loads.filter(l => l.projectId === projectId);
  const updateProject = (patch) => setDb(prev => ({ ...prev, projects: prev.projects.map(p => p.id === project.id ? { ...p, ...patch } : p) }));
  const addHauler = (form) => {
    const id = 'op-' + Math.random().toString(36).substring(2, 7);
    setDb(prev => appendActivity(
      { ...prev, haulers: [...prev.haulers, { id, ...form, projectIds: [projectId] }] },

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Hauls', to: '/admin' }, { label: project.name }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: S[5] }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: 6 }}>
            <span style={{ ...T.caption }}>started <EditableText value={project.startDate} onSave={(v) => updateProject({ startDate: v })} mono placeholder="YYYY-MM-DD" /></span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[3], flexWrap: 'wrap' }}>
            <h1 style={{ fontFamily: F.display, fontSize: 32, fontWeight: 700, letterSpacing: -1, margin: 0, color: C.ink }}>
              <EditableText value={project.name} onSave={(v) => updateProject({ name: v })} />
            </h1>
            <StatusPill status={project.status || 'active'} />
          </div>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>
            <EditableText value={project.gc} onSave={(v) => updateProject({ gc: v })} /> · <EditableText value={project.address} onSave={(v) => updateProject({ address: v })} />
          </div>
          {project.material && project.material.length > 0 && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: S[2], marginTop: S[3] }}>
              {project.material.map(mc => {
                const m = MATERIALS.find(x => x.code === mc);

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>

        <Card padding={S[4]}><Stat label="Trucks" value={trucks.length} sub={`${trucks.filter(t => t.driverId).length} assigned`} /></Card>
        <Card padding={S[4]}><Stat label="Total loads" value={loads.filter(l => l.status === 'approved').length} sub={`${loads.filter(l => l.status === 'pending').length} pending`} /></Card>
        <Card padding={S[4]}><Stat label="Total hours" value={fmtHours(hours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0))} /></Card>
      </div>
      <div style={{ marginBottom: S[3] }}><Label>Haulers on this haul</Label></div>
      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><Th>Hauler</Th><Th>Contact</Th><Th align="right">Trucks managed</Th><Th align="right">Active now</Th><Th align="right">Total hours</Th><Th></Th></tr></thead>
          <tbody>
            {haulers.map(op => {
              const opTrucks = trucks.filter(t => t.haulerId === op.id);
              const opTruckIds = new Set(opTrucks.map(t => t.id));

          </tbody>
        </table>
      </Card>
      {showAdd && <AddHaulerForm onAdd={addHauler} onCancel={() => setShowAdd(false)} />}
    </div>
  );
}

function AdminNewProject({ db, setDb, navigate }) {
  const [step, setStep] = useState(1);
  const [basics, setBasics] = useState({ name: '', code: '', gc: '', address: '', startDate: '', status: 'active', materials: [] });
  const [haulerIds, setHaulerIds] = useState([]);
  const [trucks, setTrucks] = useState([]);
  const [onlyUnassigned, setOnlyUnassigned] = useState(false);
  const [codeTouched, setCodeTouched] = useState(false);

  const inputStyle = WIZARD_INPUT_STYLE;

  const deriveCode = (name) => {
    const words = (name || '').trim().split(/\s+/).filter(Boolean);
    if (words.length === 0) return '';
    if (words.length === 1) return words[0].replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase();
    return words.map(w => w[0]).join('').replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase();
  };
  const effectiveCode = codeTouched ? basics.code.toUpperCase() : deriveCode(basics.name);

  const existingIds = new Set(db.projects.map(p => p.id));
  const codeDuplicate = effectiveCode && existingIds.has(effectiveCode);
  const duplicateOwner = codeDuplicate ? db.projects.find(p => p.id === effectiveCode) : null;
  const codeValid = effectiveCode.length >= 2 && effectiveCode.length <= 4 && !codeDuplicate;

  const basicsValid = !!basics.name.trim() && codeValid && !!basics.gc.trim() && !!basics.address.trim() && !!basics.startDate && basics.materials.length > 0;
  const haulersValid = haulerIds.length > 0;
  const trucksValid = trucks.every(t => t.haulerId && haulerIds.includes(t.haulerId));

  const toggleMaterial = (mcode) => setBasics(b => ({ ...b, materials: b.materials.includes(mcode) ? b.materials.filter(x => x !== mcode) : [...b.materials, mcode] }));
  const toggleHauler = (opId) => {
    const wasSelected = haulerIds.includes(opId);
    setHaulerIds(prev => wasSelected ? prev.filter(x => x !== opId) : [...prev, opId]);
    if (wasSelected) setTrucks(prev => prev.map(t => t.haulerId === opId ? { ...t, haulerId: '' } : t));
  };
  const toggleTruck = (truckId, defaultOpId) => {
    setTrucks(prev => {
      const exists = prev.find(t => t.truckId === truckId);
      if (exists) return prev.filter(t => t.truckId !== truckId);
      return [...prev, { truckId, haulerId: defaultOpId || '' }];
    });
  };
  const setTruckHauler = (truckId, opId) => setTrucks(prev => prev.map(t => t.truckId === truckId ? { ...t, haulerId: opId } : t));

  const cancel = () => navigate('/admin');
  const back = () => setStep(s => Math.max(1, s - 1));
  const next = () => setStep(s => Math.min(4, s + 1));

  const submit = () => {
    const id = effectiveCode;
    const newProject = {
      id,
      code: id + '-' + String(db.projects.length + 1).padStart(2, '0'),
      name: basics.name.trim(),
      gc: basics.gc.trim(),
      address: basics.address.trim(),
      startDate: basics.startDate,
      status: basics.status,
      material: basics.materials,
    };
    setDb(prev => appendActivity(
      {
        ...prev,
        projects: [...prev.projects, newProject],
        haulers: prev.haulers.map(o => haulerIds.includes(o.id) ? { ...o, projectIds: [...o.projectIds, id] } : o),
        trucks: prev.trucks.map(t => {
          const sel = trucks.find(x => x.truckId === t.id);
          return sel ? { ...t, projectId: id, haulerId: sel.haulerId } : t;
        }),
      },
      {
        type: 'project.created',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin created project ${newProject.name}`,
        refId: newProject.id,
      }
    ));
    navigate('/admin/p/' + id);
  };

  const Chip = ({ active, onClick, children, warn }) => (
    <button onClick={onClick} style={{
      ...T.bodySm, background: active ? C.accent : 'transparent',
      color: active ? C.bg : (warn ? C.warn : C.ink),
      border: `1px solid ${active ? C.accent : (warn ? C.warn : C.ruleHi)}`,
      borderRadius: R.pill, padding: '8px 14px', fontWeight: 600,
      cursor: 'pointer',
    }}>{children}</button>
  );

  const nextDisabled = (step === 1 && !basicsValid) || (step === 2 && !haulersValid) || (step === 3 && !trucksValid);
  const allValid = basicsValid && haulersValid && trucksValid;

  return (
    <WizardShell
      navigate={navigate}
      steps={['Basics', 'Haulers', 'Trucks', 'Review']}
      currentStep={step}
      onCancel={cancel}
      onBack={back}
      onNext={next}
      onSubmit={submit}
      nextDisabled={nextDisabled}
      submitDisabled={!allValid}
      submitLabel="Create haul"
      crumbs={[{ label: 'Admin', to: '/admin' }, { label: 'Hauls', to: '/admin' }, { label: 'New haul' }]}
      eyebrow="New haul"
      title="Create a new haul"
    >
        {step === 1 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
            <Label>Step 1 — Haul basics</Label>
            <div>
              <div style={{ ...T.caption, marginBottom: 4 }}>Haul name</div>
              <input value={basics.name} onChange={e => setBasics(b => ({ ...b, name: e.target.value }))} placeholder="e.g., West Side Phase 2" style={inputStyle} autoFocus />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3] }}>
              <div>
                <div style={{ ...T.caption, marginBottom: 4 }}>Code (2–4 chars)</div>
                <input value={effectiveCode} onChange={e => {
                  const v = e.target.value;
                  setCodeTouched(v.length > 0);
                  setBasics(b => ({ ...b, code: v }));
                }} placeholder="e.g., WSP" style={{ ...inputStyle, fontFamily: F.mono, textTransform: 'uppercase' }} maxLength={4} />
                {codeDuplicate && (
                  <div style={{ ...T.caption, color: C.warn, marginTop: 6 }}>
                    Code "{effectiveCode}" is already used by "{duplicateOwner.name}".
                  </div>
                )}
                {!codeDuplicate && effectiveCode && effectiveCode.length < 2 && (
                  <div style={{ ...T.caption, color: C.warn, marginTop: 6 }}>Code must be at least 2 characters.</div>
                )}
              </div>
              <div>
                <div style={{ ...T.caption, marginBottom: 4 }}>Start date</div>
                <input type="date" value={basics.startDate} onChange={e => setBasics(b => ({ ...b, startDate: e.target.value }))} style={inputStyle} />
              </div>
              <div>
                <div style={{ ...T.caption, marginBottom: 4 }}>Status</div>
                <select value={basics.status} onChange={e => setBasics(b => ({ ...b, status: e.target.value }))} style={inputStyle}>
                  <option value="active">Active</option>
                  <option value="upcoming">Upcoming</option>
                </select>
              </div>
            </div>
            <div>
              <div style={{ ...T.caption, marginBottom: 4 }}>General contractor</div>
              <input value={basics.gc} onChange={e => setBasics(b => ({ ...b, gc: e.target.value }))} placeholder="e.g., Acme Contractors" style={inputStyle} />
            </div>
            <div>
              <div style={{ ...T.caption, marginBottom: 4 }}>Address</div>
              <input value={basics.address} onChange={e => setBasics(b => ({ ...b, address: e.target.value }))} placeholder="e.g., 1234 Main St, Denver CO" style={inputStyle} />
            </div>
            <div>
              <div style={{ ...T.caption, marginBottom: S[2] }}>Materials (pick one or more)</div>

                const currentOp = t.haulerId ? db.haulers.find(o => o.id === t.haulerId) : null;

                      <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>

                    </div>
                    {reassign && <Pill color={C.warn} soft={C.warnSoft}>Reassign</Pill>}

                      <select value={sel.haulerId} onChange={e => setTruckHauler(t.id, e.target.value)} style={{ ...T.bodySm, ...inputStyle, width: 'auto', padding: '8px 10px'}}>

                        {haulerIds.map(opId => {

                    )}

            <div style={{ ...T.caption }}>

                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Address</div><div style={{ fontFamily: F.body, color: C.ink }}>{basics.address}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Start date</div><div style={{ fontFamily: F.mono, color: C.ink }}>{basics.startDate}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Status</div><div style={{ fontFamily: F.body, color: C.ink, textTransform: 'capitalize' }}>{basics.status}</div></div>

                    const typeLabel = t ? ((TRUCK_TYPES.find(x => x.code === t.type) || {}).label || t.type) : '?';

  );
}

// =====================================================================
// AdminNewHauler — 3-step wizard. /admin/haulers/new
//   1. Details (name, email, phone, optional company)
//   2. Assignments (multi-select active/upcoming projects, optional)
//   3. Review + Create
// On submit, creates a new hauler record with id 'op-xxxxx'.
// =====================================================================
function AdminNewHauler({ db, setDb, navigate }) {
  const [step, setStep] = useState(1);
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [phone, setPhone] = useState('');
  const [company, setCompany] = useState('');
  const [projectIds, setProjectIds] = useState([]);

  const inputStyle = WIZARD_INPUT_STYLE;
  const emailValid = /.+@.+\..+/.test(email.trim());
  const detailsValid = !!name.trim() && emailValid && !!phone.trim();

  const eligibleProjects = db.projects.filter(p => p.status === 'active' || p.status === 'upcoming');
  const toggleProject = (pid) =>
    setProjectIds(prev => prev.includes(pid) ? prev.filter(x => x !== pid) : [...prev, pid]);

  const cancel = () => navigate('/admin/haulers');
  const back   = () => setStep(s => Math.max(1, s - 1));
  const next   = () => setStep(s => Math.min(3, s + 1));
  const submit = () => {
    const newId = 'op-' + Math.random().toString(36).substring(2, 7);
    const newHauler = {
      id: newId,
      name: name.trim(),
      email: email.trim(),
      phone: phone.trim(),
      projectIds,
      ...(company.trim() ? { company: company.trim() } : {}),
    };
    setDb(prev => appendActivity(
      { ...prev, haulers: [...prev.haulers, newHauler] },
      {
        type: 'hauler.created',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin onboarded hauler ${newHauler.name}`,
        refId: newId,
      }
    ));
    navigate('/admin/haulers/' + newId);
  };

  const nextDisabled = step === 1 && !detailsValid;

  return (
    <WizardShell
      navigate={navigate}
      steps={['Details', 'Assignments', 'Review']}
      currentStep={step}
      onCancel={cancel}
      onBack={back}
      onNext={next}
      onSubmit={submit}
      nextDisabled={nextDisabled}
      submitDisabled={!detailsValid}
      submitLabel="Create hauler"
      crumbs={[{ label: 'Admin', to: '/admin' }, { label: 'Haulers', to: '/admin/haulers' }, { label: 'New hauler' }]}
      eyebrow="New hauler"
      title="Add a hauler to your network"
    >
      {step === 1 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
          <Label>Step 1 — Contact details</Label>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Name</div>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g., Jane Smith" style={inputStyle} autoFocus />
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3] }}>
            <div>
              <div style={{ ...T.caption, marginBottom: 4 }}>Email</div>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="e.g., jane@haulco.com" style={inputStyle} />
              {email && !emailValid && <div style={{ ...T.caption, color: C.warn, marginTop: 6 }}>Please enter a valid email.</div>}
            </div>
            <div>
              <div style={{ ...T.caption, marginBottom: 4 }}>Phone</div>
              <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="e.g., (303) 555-0150" style={inputStyle} />
            </div>
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Company (optional)</div>
            <input value={company} onChange={e => setCompany(e.target.value)} placeholder="e.g., Haulco Transport, LLC" style={inputStyle} />
          </div>
        </div>
      )}

      {step === 2 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: S[3] }}>
          <Label>Step 2 — Assign to hauls</Label>
          <div style={{ ...T.bodySm, color: C.inkDim }}>Optional — pick the active or upcoming hauls this hauler will run. You can change this later.</div>
          {eligibleProjects.length === 0 ? (
            <div style={{ ...T.bodySm, color: C.inkDim, background: C.surfaceHi, borderRadius: R.md, padding: S[3] }}>No active or upcoming hauls yet.</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
              {eligibleProjects.map(p => {
                const selected = projectIds.includes(p.id);
                return (
                  <div key={p.id} onClick={() => toggleProject(p.id)} style={{
                    display: 'flex', alignItems: 'center', gap: S[3], padding: S[3],
                    background: selected ? C.accentSoft : C.surfaceHi,
                    border: `1px solid ${selected ? C.accent : C.ruleHi}`,
                    borderRadius: R.md, cursor: 'pointer', flexWrap: 'wrap',
                  }}>
                    <div style={{
                      ...T.body, width: 22, height: 22, borderRadius: 6,
                      background: selected ? C.accent : 'transparent',
                      border: `2px solid ${selected ? C.accent : C.ruleHi}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: C.bg, fontFamily: F.display, fontWeight: 700, flexShrink: 0,
                    }}>{selected ? '✓' : ''}</div>
                    <div style={{ flex: 1, minWidth: 140 }}>
                      <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink }}>{p.name}</div>
                      <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>{p.gc} · {p.address}</div>
                    </div>
                    <StatusPill status={p.status || 'active'} />
                  </div>
                );
              })}
            </div>
          )}
          <div style={{ ...T.caption }}>{projectIds.length} project{projectIds.length === 1 ? '' : 's'} selected</div>
        </div>
      )}

      {step === 3 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
          <Label>Step 3 — Review</Label>
          <div>
            <Label style={{ marginBottom: S[2] }}>Contact</Label>
            <div style={{ background: C.surfaceHi, borderRadius: R.md, padding: S[3], display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: S[3] }}>
              <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Name</div><div style={{ fontFamily: F.body, color: C.ink }}>{name}</div></div>
              <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Email</div><div style={{ fontFamily: F.mono, color: C.ink }}>{email}</div></div>
              <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Phone</div><div style={{ fontFamily: F.mono, color: C.ink }}>{phone}</div></div>
              {company.trim() && <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Company</div><div style={{ fontFamily: F.body, color: C.ink }}>{company}</div></div>}
            </div>
          </div>
          <div>
            <Label style={{ marginBottom: S[2] }}>Hauls ({projectIds.length})</Label>
            {projectIds.length === 0 ? (
              <div style={{ ...T.bodySm, color: C.inkDim, background: C.surfaceHi, borderRadius: R.md, padding: S[3] }}>No hauls assigned yet — you can assign them later.</div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
                {projectIds.map(pid => {
                  const p = db.projects.find(x => x.id === pid);
                  return p ? (
                    <div key={pid} style={{ display: 'flex', alignItems: 'center', gap: S[3], background: C.surfaceHi, borderRadius: R.md, padding: S[3] }}>
                      <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink, flex: 1 }}>{p.name}</div>
                      <div style={{ ...T.monoSm, color: C.inkDim }}>{p.gc}</div>
                      <StatusPill status={p.status || 'active'} />
                    </div>
                  ) : null;
                })}
              </div>
            )}
          </div>
        </div>
      )}
    </WizardShell>
  );
}

// =====================================================================
// AdminNewDriver — single-step wizard. /admin/drivers/new
// Fields: name (required), licenseNumber (optional), phone (required),
// default truck (optional — assigns this driver to a currently-unassigned
// truck on submit).
// =====================================================================
function AdminNewDriver({ db, setDb, navigate }) {
  const [name, setName] = useState('');
  const [licenseNumber, setLicenseNumber] = useState('');
  const [phone, setPhone] = useState('');
  const [defaultTruckId, setDefaultTruckId] = useState('');

  const inputStyle = WIZARD_INPUT_STYLE;
  const detailsValid = !!name.trim() && !!phone.trim();
  const unassignedTrucks = db.trucks.filter(t => !t.driverId);

  const cancel = () => navigate('/admin/haulers');
  const submit = () => {
    const newId = 'dr-' + Math.random().toString(36).substring(2, 7);
    const newDriver = {
      id: newId,
      name: name.trim(),
      phone: phone.trim(),
      ...(licenseNumber.trim() ? { licenseNumber: licenseNumber.trim() } : {}),
    };
    setDb(prev => appendActivity(
      {
        ...prev,
        drivers: [...prev.drivers, newDriver],
        trucks: defaultTruckId
          ? prev.trucks.map(t => t.id === defaultTruckId ? { ...t, driverId: newId } : t)
          : prev.trucks,
      },
      {
        type: 'driver.created',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin added driver ${newDriver.name}`,
        refId: newId,
      }
    ));
    // If a truck was selected, land on that truck's hauler page when known;
    // otherwise return to the haulers list (no flat driver index exists).
    if (defaultTruckId) {
      const t = db.trucks.find(x => x.id === defaultTruckId);
      if (t && t.haulerId) { navigate('/admin/haulers/' + t.haulerId); return; }
    }
    navigate('/admin/haulers');
  };

  return (
    <WizardShell
      navigate={navigate}
      steps={['Details']}
      currentStep={1}
      onCancel={cancel}
      onSubmit={submit}
      submitDisabled={!detailsValid}
      submitLabel="Create driver"
      crumbs={[{ label: 'Admin', to: '/admin' }, { label: 'Haulers', to: '/admin/haulers' }, { label: 'New driver' }]}
      eyebrow="New driver"
      title="Add a driver to your network"
    >
      <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
        <Label>Driver details</Label>
        <div>
          <div style={{ ...T.caption, marginBottom: 4 }}>Name</div>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g., Jane Smith" style={inputStyle} autoFocus />
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3] }}>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Phone</div>
            <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="e.g., (303) 555-0150" style={inputStyle} />
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>License number (optional)</div>
            <input value={licenseNumber} onChange={e => setLicenseNumber(e.target.value)} placeholder="e.g., CDL-A 12345678" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
        </div>
        <div>
          <div style={{ ...T.caption, marginBottom: 4 }}>Default truck (optional)</div>
          <select value={defaultTruckId} onChange={e => setDefaultTruckId(e.target.value)} style={inputStyle}>
            <option value="">— Leave unassigned —</option>
            {unassignedTrucks.map(t => {
              const typeLabel = (TRUCK_TYPES.find(x => x.code === t.type) || {}).label || t.type;
              return <option key={t.id} value={t.id}>#{t.plate} · {typeLabel} · {t.hauler || 'Bench'}</option>;
            })}
          </select>
          {unassignedTrucks.length === 0 && (
            <div style={{ ...T.caption, color: C.inkDim, marginTop: 6 }}>No trucks are currently unassigned. You can assign this driver to a truck later.</div>
          )}
        </div>
      </div>
    </WizardShell>
  );
}

// =====================================================================

//   1. Details (plate, type, hauler-company text, optional make/model/cap)
//   2. Assignments (optional project + hauler from existing records)
//   3. Review + Create
// =====================================================================
function AdminNewTruck({ db, setDb, navigate, prefillHaulerId }) {
  const prefillHauler = prefillHaulerId ? db.haulers.find(h => h.id === prefillHaulerId) : null;
  const [step, setStep] = useState(1);
  const [plate, setPlate] = useState('');
  const [type, setType] = useState(TRUCK_TYPES[0].code);
  const [haulerCompany, setHaulerCompany] = useState(prefillHauler ? prefillHauler.name : '');
  const [make, setMake] = useState('');
  const [model, setModel] = useState('');
  const [capacityCY, setCapacityCY] = useState('');
  const [projectId, setProjectId] = useState('');
  const [haulerId, setHaulerId] = useState(prefillHauler ? prefillHauler.id : '');

  const inputStyle = WIZARD_INPUT_STYLE;
  const detailsValid = !!plate.trim() && !!type;

  const eligibleProjects = db.projects.filter(p => p.status === 'active' || p.status === 'upcoming');

  const cancel = () => navigate('/admin/haulers');
  const back   = () => setStep(s => Math.max(1, s - 1));
  const next   = () => setStep(s => Math.min(3, s + 1));
  const submit = () => {
    const newId = 'tk-' + Math.random().toString(36).substring(2, 7);
    const capNum = parseFloat(capacityCY);
    const newTruck = {
      id: newId,

// Tiny line+area sparkline. `data` is an array of numbers (oldest → newest).
function Sparkline({ data, width = 120, height = 32, color = C.accent }) {
  if (!data || data.length === 0) return null;
  const max = Math.max(...data, 1);
  const stepX = width / Math.max(data.length - 1, 1);
  const points = data.map((v, i) => `${i * stepX},${height - (v / max) * height}`).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} aria-hidden="true" style={{ display: 'block' }}>
      <polygon points={`0,${height} ${points} ${width},${height}`} fill={color} opacity="0.18" />
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" />
    </svg>
  );
}

// Progress donut. `pct` is 0-100. Hand-rolled SVG, two concentric circles —
// surfaceHi rail + accent fill via stroke-dasharray. Used on AdminHaulRequestDetail
// to show per-truck completion of a multi-truck haul.
function Donut({ pct, size = 80, stroke = 8, label }) {
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  // Stroke arc always clamps to 100; text shows the raw % even when over-delivered
  // so an overage reads honestly. Over-100 also switches the stroke to C.warn.
  const raw = pct || 0;
  const clamped = Math.max(0, Math.min(1, raw / 100));
  const filled = clamped * circumference;
  const empty = circumference - filled;
  const isOver = raw > 100;
  const arcColor = isOver ? C.warn : C.accent;
  const textColor = isOver ? C.warn : C.ink;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-hidden="true" style={{ display: 'block' }}>
        <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke={C.surfaceHi} strokeWidth={stroke} />
        <circle
          cx={size / 2} cy={size / 2} r={radius} fill="none"
          stroke={arcColor} strokeWidth={stroke}
          strokeDasharray={`${filled} ${empty}`}
          strokeDashoffset={circumference / 4}
          transform={`rotate(-90 ${size / 2} ${size / 2})`}
          strokeLinecap="round"
        />
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        alignItems: 'center', justifyContent: 'center', flexDirection: 'column',
      }}>
        <div style={{ ...T.body, fontWeight: 700, color: textColor, lineHeight: 1 }}>{Math.round(raw)}%</div>
        {label && <div style={{ ...T.micro, color: C.inkDim, marginTop: 2 }}>{label}</div>}
      </div>
    </div>
  );
}

// 7-day bar chart. `data` is an array of { iso, count }. Hover/focus a bar →
// tooltip with date + count. SVG scales to its container via viewBox.
function BarChart({ data, color = C.accent, height = 180 }) {
  const [hovered, setHovered] = useState(null);
  const w = 560, h = height;
  const padL = 32, padR = 12, padT = 16, padB = 28;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const max = Math.max(...data.map(d => d.count), 1);
  // Round the y-axis max up to a "nice" number so labels read cleanly.
  const niceMax = (() => {
    if (max <= 5) return 5;
    if (max <= 10) return 10;
    if (max <= 20) return 20;
    if (max <= 50) return 50;
    return Math.ceil(max / 10) * 10;
  })();
  const barCount = data.length;
  const barSlot = innerW / barCount;
  const barW = Math.max(8, barSlot * 0.55);

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{ display: 'block', overflow: 'visible' }} role="img" aria-label="Loads per day, last 7 days">
        {/* Y-axis gridlines + labels at 0, max/2, max */}
        {[0, 0.5, 1].map((frac, i) => {
          const y = padT + innerH - frac * innerH;
          const labelVal = Math.round(niceMax * frac);
          return (
            <g key={i}>
              <line x1={padL} x2={w - padR} y1={y} y2={y} stroke={C.rule} strokeWidth="1" />
              <text x={padL - 8} y={y + 4} fill={C.inkFaint} fontSize="10" fontFamily={F.mono} textAnchor="end">{labelVal}</text>
            </g>
          );
        })}
        {/* Bars */}
        {data.map((d, i) => {
          const barH = (d.count / niceMax) * innerH;
          const x = padL + i * barSlot + (barSlot - barW) / 2;
          const y = padT + innerH - barH;
          const isHover = hovered === i;
          return (
            <g key={d.iso}>
              <rect
                className="jse-bar"
                x={x} y={y} width={barW} height={Math.max(barH, 2)}
                fill={d.iso === TODAY_ISO ? C.accent : color} opacity={isHover ? 1 : (d.iso === TODAY_ISO ? 1 : 0.7)}
                rx="3"
                onMouseEnter={() => setHovered(i)}
                onMouseLeave={() => setHovered(null)}
                onFocus={() => setHovered(i)}
                onBlur={() => setHovered(null)}
                tabIndex={0}
                aria-label={`${d.count} loads on ${isoToShortDate(d.iso)}`}
              />
              {/* Bar count above bar when hovered */}
              {isHover && (
                <text x={x + barW / 2} y={y - 6} fill={C.ink} fontSize="11" fontFamily={F.mono} textAnchor="middle" fontWeight="700">{d.count}</text>
              )}
              {/* Weekday label */}
              <text
                x={padL + i * barSlot + barSlot / 2}
                y={h - padB + 14}
                fill={d.iso === TODAY_ISO ? C.accent : C.inkFaint}
                fontSize="10"
                fontFamily={F.mono}
                textAnchor="middle"
                fontWeight={d.iso === TODAY_ISO ? 700 : 500}
              >
                {isoToWeekdayShort(d.iso)}
              </text>
            </g>
          );
        })}
      </svg>
      {/* Hover tooltip (HTML overlay, positioned with bar index) */}
      {hovered != null && (
        <div style={{
          position: 'absolute', top: 4, right: 4,
          background: C.surfaceMax, border: `1px solid ${C.ruleHi}`, borderRadius: R.md,
          padding: '6px 10px', pointerEvents: 'none',
          fontFamily: F.mono, fontSize: 11, color: C.ink,
        }}>
          <div style={{ color: C.inkDim, fontSize: 10, letterSpacing: 0.6, textTransform: 'uppercase' }}>{isoToShortDate(data[hovered].iso)}</div>
          <div style={{ color: C.accent, fontWeight: 700, marginTop: 2 }}>{data[hovered].count} {data[hovered].count === 1 ? 'load' : 'loads'}</div>
        </div>
      )}
    </div>
  );
}

const RANGE_PRESETS = [
  { key: 'today',     label: 'Today',         days: 1 },
  { key: 'yesterday', label: 'Yesterday',     days: 1 },
  { key: '7d',        label: 'Last 7 days',   days: 7 },
  { key: '30d',       label: 'Last 30 days',  days: 30 },
  { key: 'custom',    label: 'Custom',        days: null },
];

function rangeFromPreset(key, customStart, customEnd) {
  if (key === 'today')     return { startIso: TODAY_ISO, endIso: TODAY_ISO };
  if (key === 'yesterday') return { startIso: YESTERDAY_ISO, endIso: YESTERDAY_ISO };
  if (key === '7d')        return { startIso: isoDaysAgo(6), endIso: TODAY_ISO };
  if (key === '30d')       return { startIso: isoDaysAgo(29), endIso: TODAY_ISO };
  // custom — fall back to today if either input missing
  const s = customStart || TODAY_ISO;
  const e = customEnd || TODAY_ISO;
  return s <= e ? { startIso: s, endIso: e } : { startIso: e, endIso: s };
}

function DateRangePicker({ preset, setPreset, customStart, setCustomStart, customEnd, setCustomEnd }) {

              style={{
                background: active ? C.accent : 'transparent',
