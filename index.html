}

// =====================================================================
// AdminReporting — placeholder financial / payout / period reports shell
// at /admin/reporting. Distinct from /admin/reports (live KPIs / loads-per-day);
// this view is for accounting + statements rather than operational stats.
// =====================================================================
function AdminReporting({ db, setDb, navigate }) {
  // Cheap derived totals from existing data — gives the placeholders something
  // realistic-looking until the real reports get wired up.
  const invoices = db.invoices || [];
  const paidTotal = invoices.filter(i => i.status === 'paid').reduce((s, i) => s + (i.lineItems || []).reduce((a, li) => a + (li.amount || 0), 0), 0);
  const openTotal = invoices.filter(i => i.status === 'sent').reduce((s, i) => s + (i.lineItems || []).reduce((a, li) => a + (li.amount || 0), 0), 0);
  const openCount = invoices.filter(i => i.status === 'sent').length;
  const totalCY = (db.loads || []).filter(l => l.status === 'approved').reduce((s, l) => s + (l.cy || 0), 0);

  const placeholderCards = [
    { label: 'Hauler payouts', value: fmtMoney(paidTotal), sub: `${invoices.filter(i => i.status === 'paid').length} invoices paid YTD`, hint: 'Weekly + monthly disbursement statements per hauler.' },
    { label: 'Outstanding A/R', value: fmtMoney(openTotal), sub: `${openCount} invoice${openCount === 1 ? '' : 's'} unpaid`, hint: 'Aging buckets (0–30 / 30–60 / 60+) and GC follow-up.', to: '/admin/payments?filter=sent' },
    { label: 'Tonnage hauled', value: totalCY.toLocaleString() + ' CY', sub: 'all-time approved loads', hint: 'Period-over-period change by material + project.' },
    { label: 'Margin estimate', value: '— coming soon', sub: 'rate × hours minus payouts', hint: 'Per-haul gross margin + cost-plus markup math.' },
  ];

  // ===== Per-hauler / per-haul invoicing =====
  // Each hauler gets a section. Inside each, one row per haul-request the
  // hauler is assigned to, with status + actions for the haul-scoped invoice
  // (auto-generated from delivered loads via INVOICE_CY_RATE). Status flow
  // reuses the v11 invoice state machine (draft → sent → paid).
  const haulRequests = db.haulRequests || [];
  const haulsForHauler = (haulerId) => haulRequests
    .filter(r => (r.assignments || []).some(a => a.haulerId === haulerId))
    .map(r => {
      const myAssignments = (r.assignments || []).filter(a => a.haulerId === haulerId);
      const deliveredCY = myAssignments.reduce((s, a) =>
        s + a.days.reduce((s2, d) => s2 + d.loads.reduce((s3, l) => s3 + (l.cy || 0), 0), 0), 0);
      const invoice = invoices.find(i => i.haulerId === haulerId && i.haulRequestId === r.id);
      return { req: r, myAssignments, deliveredCY, invoice };
    });

  const generateInvoiceForHaul = (haulerId, reqId) => {
    const hauler = db.haulers.find(h => h.id === haulerId);
    const req = haulRequests.find(r => r.id === reqId);
    if (!hauler || !req) return;
    const project = db.projects.find(p => p.id === req.projectId);
    const myAssignments = (req.assignments || []).filter(a => a.haulerId === haulerId);
    const today = new Date().toISOString().slice(0, 10);
    // CY-based line item per truck assigned to this haul. We tuck deliveredCY
    // into the existing line item shape; hours/rate are kept (set to 0/CY-rate)
    // so legacy print views don't trip on missing fields.
    const lineItems = myAssignments.map(a => {
      const truck = db.trucks.find(t => t.id === a.truckId);
      const cy = a.days.reduce((s, d) => s + d.loads.reduce((s2, l) => s2 + (l.cy || 0), 0), 0);
      const cyRate = (truck && INVOICE_CY_RATE[truck.type]) || 20;
      const driver = truck ? db.drivers.find(d => d.id === truck.driverId) : null;
      return {
        id: 'li-' + Math.random().toString(36).substring(2, 7),
        truckPlate: truck ? truck.plate : '?',
        truckType: truck ? truck.type : '',
        driverName: driver ? driver.name : '—',
        deliveredCY: cy,
        cyRate,
        // Preserve hours/rate shape for compatibility with the AdminPayments
        // print view — we just zero hours and put CY × cyRate into amount.
        hours: 0, rate: cyRate,
        amount: parseFloat((cy * cyRate).toFixed(2)),
      };
    });
    const totalCYForInv = lineItems.reduce((s, li) => s + li.deliveredCY, 0);
    const nowIso = new Date().toISOString();
    const newInvoice = {
      id: 'inv-' + Date.now(),
      haulerId, projectId: req.projectId, haulRequestId: req.id,
      number: 'INV-' + String(Math.floor(Math.random() * 9000) + 1000),
      periodStart: today, periodEnd: today, issuedDate: today,
      createdAt: nowIso,
      billTo: project ? project.gc : '—',
      lineItems,
      loadCount: myAssignments.reduce((s, a) => s + a.days.reduce((s2, d) => s2 + d.loads.length, 0), 0),
      totalCY: totalCYForInv,
      notes: '',
      status: 'draft',
    };
    setDb(prev => appendActivity(
      { ...prev, invoices: [...(prev.invoices || []), newInvoice] },
      {
        type: 'invoice.drafted',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin drafted ${newInvoice.number} for ${hauler.name} on ${project ? project.name : 'a haul'}`,
        refId: req.id,
      }
    ));
  };

  const sendDraftInvoice = (invoiceId) => {
    const inv = invoices.find(i => i.id === invoiceId);
    if (!inv) return;
    const sentAt = new Date().toISOString();
    const h = db.haulers.find(x => x.id === inv.haulerId);
    setDb(prev => appendActivity(
      { ...prev, invoices: prev.invoices.map(i => i.id === invoiceId ? { ...i, status: 'sent', sentAt } : i) },
      {
        type: 'invoice.sent',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin sent invoice ${inv.number} to ${inv.billTo} (${h ? h.name : 'hauler'})`,
        refId: null,
      }
    ));
  };

  const markInvoicePaid = (invoiceId) => {
    const inv = invoices.find(i => i.id === invoiceId);
    if (!inv) return;
    const ref = window.prompt('Payment reference (ACH / check / wire #) for ' + inv.number + '?');
    if (ref == null) return;
    const trimmed = ref.trim();
    if (!trimmed) { alert('Payment reference is required.'); return; }
    const paidAt = new Date().toISOString();
    const h = db.haulers.find(x => x.id === inv.haulerId);
    setDb(prev => appendActivity(
      { ...prev, invoices: prev.invoices.map(i => i.id === invoiceId ? { ...i, status: 'paid', paidAt, paymentRef: trimmed } : i) },
      {
        type: 'invoice.paid',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin marked invoice ${inv.number} paid (ref: ${trimmed}) for ${h ? h.name : 'hauler'}`,
        refId: null,
      }
    ));
  };

  const discardDraftInvoice = (invoiceId) => {
    if (!confirm('Discard this draft invoice?')) return;
    setDb(prev => ({ ...prev, invoices: prev.invoices.filter(i => i.id !== invoiceId) }));
  };

  const reportRows = [
    { title: 'Weekly payout statement', range: 'Mon → Sun, per hauler', status: 'placeholder' },
    { title: 'Monthly GC billing summary', range: '1st → last of month, per project', status: 'placeholder' },
    { title: 'Per-haul margin report', range: 'Selectable period', status: 'placeholder' },
    { title: 'Material tonnage by GC', range: 'Last 30 days', status: 'placeholder' },
    { title: 'Year-end 1099 packet', range: 'Calendar year, per hauler', status: 'placeholder' },
  ];

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Reports' }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: S[5], gap: S[3], flexWrap: 'wrap' }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Reports</Label>
          <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>Financial &amp; payout reporting.</h1>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>Statements, payouts, and period summaries. Live KPIs still live under <a href="#/admin/reports" style={{ color: C.accent, textDecoration: 'none' }}>Live stats</a>.</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3], marginBottom: S[6] }}>
        {placeholderCards.map(c => {
          const clickable = !!c.to;
          return (
            <Card key={c.label} padding={0}>
              <div
                onClick={clickable ? () => navigate(c.to) : undefined}
                style={{ padding: S[4], cursor: clickable ? 'pointer' : 'default' }}
              >
                <Stat label={c.label} value={c.value} sub={c.sub} />
                <div style={{ ...T.caption, color: C.inkFaint, marginTop: S[3], paddingTop: S[3], borderTop: `1px solid ${C.rule}` }}>{c.hint}</div>
              </div>
            </Card>
          );
        })}
      </div>

      {/* ===== Per-hauler invoicing =====
          One section per hauler. Inside each section, a row per haul the
          hauler is assigned to. Invoices auto-generate from delivered loads
          (CY × INVOICE_CY_RATE). Admin then steps each invoice through
          draft → sent → paid. State persists via db.invoices (schema v12+).
      */}
      <div style={{ marginBottom: S[3], display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: S[3], flexWrap: 'wrap' }}>
        <div>
          <Label>Per-hauler invoicing</Label>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 4 }}>
            One section per hauler. Sub-row per haul they're on. Auto-generates an invoice from delivered loads at the truck-type CY rate.
          </div>
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: S[4], marginBottom: S[6] }}>
        {db.haulers.length === 0 && (
          <Card><div style={{ ...T.bodySm, color: C.inkDim, textAlign: 'center', padding: S[3] }}>No haulers yet.</div></Card>
        )}
        {db.haulers.map(hauler => {
          const hauls = haulsForHauler(hauler.id);
          const haulerInvoices = invoices.filter(i => i.haulerId === hauler.id);
          const haulScopedInvoices = haulerInvoices.filter(i => i.haulRequestId);
          const haulerTotal = haulScopedInvoices.reduce((s, i) => s + (i.lineItems || []).reduce((a, li) => a + (li.amount || 0), 0), 0);
          const haulerOpen = haulScopedInvoices.filter(i => i.status === 'sent').reduce((s, i) => s + (i.lineItems || []).reduce((a, li) => a + (li.amount || 0), 0), 0);
          return (
            <Card key={hauler.id} padding={S[5]}>
              <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[4], flexWrap: 'wrap' }}>
                <Avatar name={hauler.name} color={C.accent} size={40} logo={hauler.logo} />
                <div style={{ flex: 1, minWidth: 200 }}>
                  <div style={{ ...T.h4, fontWeight: 700, color: C.ink, letterSpacing: -0.3 }}>{hauler.name}</div>
                  <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>
                    {hauls.length} haul{hauls.length === 1 ? '' : 's'} · {haulScopedInvoices.length} haul-scoped invoice{haulScopedInvoices.length === 1 ? '' : 's'}
                  </div>
                </div>
                <div style={{ display: 'flex', gap: S[5], textAlign: 'right' }}>
                  <div>
                    <Label style={{ marginBottom: 2 }}>Invoiced total</Label>
                    <div style={{ ...T.h4, fontWeight: 700, color: C.ink, letterSpacing: -0.3 }}>{fmtMoney(haulerTotal)}</div>
                  </div>
                  <div>
                    <Label style={{ marginBottom: 2 }}>Open A/R</Label>
                    <div style={{ ...T.h4, fontWeight: 700, color: haulerOpen > 0 ? C.warn : C.inkFaint, letterSpacing: -0.3 }}>{fmtMoney(haulerOpen)}</div>
                  </div>
                </div>
              </div>

              {hauls.length === 0 ? (
                <div style={{ ...T.bodySm, color: C.inkFaint, padding: S[3], textAlign: 'center', background: C.surfaceHi, borderRadius: R.md }}>
                  No active hauls assigned to this hauler.
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
                  {hauls.map(({ req, deliveredCY, invoice }) => {
                    const project = db.projects.find(p => p.id === req.projectId);
                    const material = MATERIALS.find(m => m.code === req.materialCode);
                    const invoiceTotal = invoice ? (invoice.lineItems || []).reduce((s, li) => s + (li.amount || 0), 0) : 0;
                    return (
                      <div key={req.id} style={{ padding: S[3], background: C.surfaceHi, borderRadius: R.md, display: 'flex', alignItems: 'center', gap: S[3], flexWrap: 'wrap' }}>
                        <div style={{ flex: 1, minWidth: 240 }}>
                          <div style={{ ...T.bodySm, fontWeight: 700, color: C.ink }}>
                            {project ? project.name : '—'}
                            <span style={{ ...T.caption, color: C.inkDim, marginLeft: S[2], fontWeight: 500 }}>
                              {material ? material.label : req.materialCode} · {deliveredCY} of {req.volumeCY} CY delivered
                            </span>
                          </div>
                          {invoice && (
                            <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>
                              {invoice.number} · {fmtMoney(invoiceTotal)} · issued {invoice.issuedDate}
                            </div>
                          )}
                        </div>
                        {invoice ? (
                          <>
                            <StatusPill status={invoice.status} />
                            {invoice.status === 'draft' && (
                              <>
                                <Btn variant="primary" size="xs" onClick={() => sendDraftInvoice(invoice.id)}>Mark sent</Btn>
                                <Btn variant="ghost" size="xs" onClick={() => discardDraftInvoice(invoice.id)}>Discard</Btn>
                              </>
                            )}
                            {invoice.status === 'sent' && (
                              <Btn variant="primary" size="xs" onClick={() => markInvoicePaid(invoice.id)}>Mark paid</Btn>
                            )}
                          </>
                        ) : (
                          <Btn
                            variant="primary"
                            size="xs"
                            disabled={deliveredCY === 0}
                            onClick={() => generateInvoiceForHaul(hauler.id, req.id)}
                          >Generate invoice</Btn>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>
          );
        })}
      </div>

      <div style={{ marginBottom: S[3] }}><Label>Available reports</Label></div>

      <Card padding={0}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><Th>Report</Th><Th>Period / scope</Th><Th align="right">Status</Th><Th></Th></tr></thead>
          <tbody>
            {reportRows.map(r => (
              <Tr key={r.title}>
                <Td><span style={{ fontWeight: 600, color: C.ink }}>{r.title}</span></Td>
                <Td dim>{r.range}</Td>
                <Td align="right"><Pill color={C.inkDim} soft="rgba(255,255,255,0.05)">Coming soon</Pill></Td>
                <Td align="right" style={{ color: C.inkFaint }}>—</Td>
              </Tr>
            ))}
          </tbody>
        </table>
      </Card>

      <div style={{ marginTop: S[6], padding: S[5], background: C.surfaceHi, borderRadius: R.md, ...T.bodySm, color: C.inkDim }}>
        <Label style={{ marginBottom: S[2] }}>What's here vs. Live stats</Label>
        This view is for accountants and ops leads — statements you print, send, or attach to a payout. The <a href="#/admin/reports" style={{ color: C.accent, textDecoration: 'none' }}>Live stats</a> view is for the dispatcher checking what's happening right now.
      </div>
    </div>
  );
}

// =====================================================================
// AdminPayments — KPI dashboard + invoice table at /admin/payments. Reads
// db.invoices (v11 schema: draft → sent → paid, plus void). Status-conditional
// actions (Generate / Mark paid / View receipt) emit appendActivity events.
// Filter tab state can be initialized from `?filter=<status>` on the URL so
// other views (e.g. AdminReporting's "Outstanding A/R" card) can deep-link.
// =====================================================================
function AdminPayments({ db, setDb, navigate, hash }) {
  const invoices = db.invoices || [];
  const invoiceTotal = (inv) => (inv.lineItems || []).reduce((s, li) => s + (li.amount || 0), 0);
  const invoiceHours = (inv) => (inv.lineItems || []).reduce((s, li) => s + (li.hours || 0), 0);

  // === KPI computations ===
  const sentInvoices  = invoices.filter(i => i.status === 'sent');
  const paidInvoices  = invoices.filter(i => i.status === 'paid');
  const draftInvoices = invoices.filter(i => i.status === 'draft');
  const outstandingAmount = sentInvoices.reduce((s, i) => s + invoiceTotal(i), 0);
  // "Paid this period" = paidAt within current month of TODAY_ISO (2026-05-*)
  const monthPrefix = TODAY_ISO.slice(0, 7); // '2026-05'
  const paidThisMonth = paidInvoices.filter(i => i.paidAt && i.paidAt.slice(0, 7) === monthPrefix);
  const paidThisMonthAmount = paidThisMonth.reduce((s, i) => s + invoiceTotal(i), 0);
  // Overdue: status=sent AND sentAt more than 30 days before TODAY_ISO
  const isOverdue = (inv) => {
    if (inv.status !== 'sent' || !inv.sentAt) return false;
    const sentDay = inv.sentAt.slice(0, 10);
    return sentDay <= isoDaysAgo(30);
  };
  const overdueInvoices = sentInvoices.filter(isOverdue);

  const kpiCards = [
    { label: 'Outstanding balance', value: fmtMoney(outstandingAmount), sub: `${sentInvoices.length} sent invoice${sentInvoices.length === 1 ? '' : 's'}` },
    { label: 'Paid this month',     value: fmtMoney(paidThisMonthAmount), sub: `${paidThisMonth.length} cleared in ${monthPrefix}` },
    { label: 'Invoices in draft',   value: draftInvoices.length, sub: 'awaiting send' },
    { label: 'Overdue',             value: overdueInvoices.length, sub: '> 30 days since sent' },
  ];

  // === Filter state — initialized from ?filter=<status> on the hash ===
  const initialFilter = (() => {
    const params = new URLSearchParams((hash || '').split('?')[1] || '');
    const f = params.get('filter') || 'all';
    return ['all', 'draft', 'sent', 'paid', 'void', 'overdue'].includes(f) ? f : 'all';
  })();
  const [filter, setFilter] = useState(initialFilter);

  const filtered = (() => {
    if (filter === 'all') return invoices;
    if (filter === 'overdue') return invoices.filter(isOverdue);
    return invoices.filter(i => i.status === filter);
  })();
  const counts = {
    all: invoices.length,
    draft: draftInvoices.length,
    sent: sentInvoices.length,
    paid: paidInvoices.length,
    void: invoices.filter(i => i.status === 'void').length,
    overdue: overdueInvoices.length,
  };

  const sortedFiltered = [...filtered].sort((a, b) => {
    const akey = a.createdAt || (a.issuedDate ? a.issuedDate + 'T00:00:00Z' : '');
    const bkey = b.createdAt || (b.issuedDate ? b.issuedDate + 'T00:00:00Z' : '');
    return bkey.localeCompare(akey);
  });

  const Tab = ({ k, label }) => {
    const active = filter === k;
    return (
      <button onClick={() => setFilter(k)} style={{
        ...T.bodySm, background: active ? C.accent : 'transparent',
        color: active ? C.bg : C.inkDim,
        border: `1px solid ${active ? C.accent : C.ruleHi}`,
        borderRadius: R.pill, padding: '6px 14px', fontWeight: 600, cursor: 'pointer',
      }}>{label} <span style={{ opacity: 0.65, marginLeft: 4 }}>({counts[k]})</span></button>
    );
  };

  // === Status transition helpers ===
  const sendDraft = (inv) => {
    const sentAt = new Date().toISOString();
    const h = db.haulers.find(x => x.id === inv.haulerId);
    const hName = h ? h.name : 'A hauler';
    setDb(prev => appendActivity(
      {
        ...prev,
        invoices: prev.invoices.map(i => i.id === inv.id ? { ...i, status: 'sent', sentAt } : i),
      },
      {
        type: 'invoice.sent',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin sent invoice ${inv.number} to ${inv.billTo} (${hName})`,
        refId: null,
      }
    ));
    alert('Invoice ' + inv.number + ' sent to ' + inv.billTo + '.');
  };

  const markPaid = (inv) => {
    const ref = window.prompt('Payment reference (ACH / check / wire #) for ' + inv.number + '?');
    if (ref == null) return;
    const trimmed = ref.trim();
    if (!trimmed) { alert('Payment reference is required.'); return; }
    const paidAt = new Date().toISOString();
    const h = db.haulers.find(x => x.id === inv.haulerId);
    const hName = h ? h.name : 'A hauler';
    setDb(prev => appendActivity(
      {
        ...prev,
        invoices: prev.invoices.map(i => i.id === inv.id ? { ...i, status: 'paid', paidAt, paymentRef: trimmed } : i),
      },
      {
        type: 'invoice.paid',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin marked invoice ${inv.number} paid (ref: ${trimmed}) for ${hName}`,
        refId: null,
      }
    ));
  };

  // === Run payout batch modal ===
  const [showBatch, setShowBatch] = useState(false);
  const [batchSel, setBatchSel] = useState({}); // { [invId]: true }
  const toggleBatchSel = (id) => setBatchSel(prev => ({ ...prev, [id]: !prev[id] }));
  const openBatch = () => {
    // Pre-select every draft so the default action is "send them all".
    const next = {};
    draftInvoices.forEach(i => { next[i.id] = true; });
    setBatchSel(next);
    setShowBatch(true);
  };
  const closeBatch = () => { setShowBatch(false); setBatchSel({}); };
  const selectedDraftIds = Object.keys(batchSel).filter(id => batchSel[id]);
  const confirmBatch = () => {
    if (selectedDraftIds.length === 0) return;
    const sentAt = new Date().toISOString();
    const selectedInvs = invoices.filter(i => selectedDraftIds.includes(i.id) && i.status === 'draft');
    setDb(prev => {
      let next = {
        ...prev,
        invoices: prev.invoices.map(i => selectedDraftIds.includes(i.id) && i.status === 'draft'
          ? { ...i, status: 'sent', sentAt }
          : i),
      };
      // One activity event per transitioned invoice.
      selectedInvs.forEach(inv => {
        const h = (prev.haulers || []).find(x => x.id === inv.haulerId);
        const hName = h ? h.name : 'A hauler';
        next = appendActivity(next, {
          type: 'invoice.sent',
          actorRole: 'admin',
          actorId: null,
          summary: `Admin sent invoice ${inv.number} to ${inv.billTo} (${hName}) via payout batch`,
          refId: null,
        });
      });
      return next;
    });
    closeBatch();
  };

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Payments' }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: S[5], gap: S[3], flexWrap: 'wrap' }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Payments</Label>
          <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>Hauler payouts &amp; GC billing.</h1>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>Who's owed money, who owes us, and what to send next.</div>
        </div>
        <div style={{ display: 'flex', gap: S[2], alignItems: 'center', flexWrap: 'wrap' }}>
          <Btn variant="primary" size="sm" onClick={openBatch} disabled={draftInvoices.length === 0}>Run payout batch</Btn>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3], marginBottom: S[6] }}>
        {kpiCards.map(c => (
          <Card key={c.label} padding={S[4]}>
            <Stat label={c.label} value={c.value} sub={c.sub} />
          </Card>
        ))}
      </div>

      <div style={{ display: 'flex', gap: S[2], flexWrap: 'wrap', marginBottom: S[4] }}>
        <Tab k="all" label="All" />
        <Tab k="draft" label="Draft" />
        <Tab k="sent" label="Sent" />
        <Tab k="paid" label="Paid" />
        <Tab k="void" label="Void" />
        <Tab k="overdue" label="Overdue" />
      </div>

      <Card padding={0}>
        {sortedFiltered.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[6], textAlign: 'center', color: C.inkDim }}>
            No invoices match this filter.
          </div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr>
                <Th>Invoice</Th>
                <Th>Hauler</Th>
                <Th>Period</Th>
                <Th align="right">Hours</Th>
                <Th align="right">Loads</Th>
                <Th align="right">Amount</Th>
                <Th>Status</Th>
                <Th align="right">Action</Th>
              </tr>
            </thead>
            <tbody>
              {sortedFiltered.map(inv => {
                const h = db.haulers.find(x => x.id === inv.haulerId);
                const hName = h ? h.name : '—';
                const total = invoiceTotal(inv);
                const hrs = invoiceHours(inv);
                return (
                  <Tr key={inv.id} onClick={() => navigate(`/admin/payments/${inv.id}`)}>
                    <Td mono><span style={{ color: C.accent }}>{inv.number}</span></Td>
                    <Td>{hName}</Td>
                    <Td mono dim>{inv.periodStart} {'→'} {inv.periodEnd}</Td>
                    <Td align="right" mono>{fmtHours(hrs)}</Td>
                    <Td align="right" mono>{inv.loadCount || 0}</Td>
                    <Td align="right" mono style={{ fontWeight: 600 }}>{fmtMoney(total)}</Td>
                    <Td><StatusPill status={inv.status} /></Td>
                    <Td align="right">
                      {inv.status === 'draft' && (
                        <Btn size="xs" onClick={(e) => { e.stopPropagation(); sendDraft(inv); }}>Generate</Btn>
                      )}
                      {inv.status === 'sent' && (
                        <Btn size="xs" onClick={(e) => { e.stopPropagation(); markPaid(inv); }}>Mark paid</Btn>
                      )}
                      {inv.status === 'paid' && (
                        <Btn variant="ghost" size="xs" onClick={(e) => { e.stopPropagation(); navigate(`/admin/payments/${inv.id}`); }}>View receipt</Btn>
                      )}
                      {inv.status === 'void' && (
                        <span style={{ color: C.inkFaint }}>—</span>
                      )}
                    </Td>
                  </Tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>

      {showBatch && (
        <div role="dialog" aria-modal="true" aria-label="Run payout batch"
          onClick={closeBatch}
          style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', zIndex: 200,
            display: 'flex', alignItems: 'center', justifyContent: 'center', padding: S[4] }}>
          <div onClick={e => e.stopPropagation()}
            style={{ background: C.bg, borderRadius: R.lg, width: 'min(560px, 100%)', maxHeight: '90vh',
              overflow: 'auto', border: `1px solid ${C.ruleHi}`, boxShadow: '0 24px 64px rgba(0,0,0,0.5)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: `${S[3]}px ${S[4]}px`, borderBottom: `1px solid ${C.rule}` }}>
              <div>
                <Label color={C.accent}>Run payout batch</Label>
                <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 2 }}>Pick draft invoices to send.</div>
              </div>
              <button onClick={closeBatch} aria-label="Close" style={{
                background: 'transparent', border: 'none', color: C.inkFaint, cursor: 'pointer',
                width: 32, height: 32, borderRadius: R.sm, fontSize: 22, lineHeight: 1, padding: 0,
              }}
                onMouseEnter={e => { e.currentTarget.style.color = C.ink; e.currentTarget.style.background = C.surfaceHi; }}
                onMouseLeave={e => { e.currentTarget.style.color = C.inkFaint; e.currentTarget.style.background = 'transparent'; }}
              >×</button>
            </div>
            <div style={{ padding: S[4] }}>
              {draftInvoices.length === 0 ? (
                <div style={{ ...T.bodySm, color: C.inkDim, padding: `${S[4]}px 0`, textAlign: 'center' }}>
                  No draft invoices to send.
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
                  {draftInvoices.map(inv => {
                    const h = db.haulers.find(x => x.id === inv.haulerId);
                    const hName = h ? h.name : '—';
                    const total = invoiceTotal(inv);
                    const checked = !!batchSel[inv.id];
                    return (
                      <label key={inv.id} style={{
                        display: 'flex', alignItems: 'center', gap: S[3],
                        padding: `${S[2]}px ${S[3]}px`, borderRadius: R.sm,
                        background: C.surface, border: `1px solid ${C.rule}`, cursor: 'pointer',
                      }}>
                        <input type="checkbox" checked={checked} onChange={() => toggleBatchSel(inv.id)}
                          style={{ accentColor: C.accent, width: 16, height: 16, cursor: 'pointer' }} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ ...T.bodySm, fontWeight: 600, color: C.ink }}>{hName}</div>
                          <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>{inv.number} · {inv.periodStart} {'→'} {inv.periodEnd}</div>
                        </div>
                        <div style={{ ...T.body, fontFamily: F.mono, fontWeight: 700, color: C.accent }}>{fmtMoney(total)}</div>
                      </label>
                    );
                  })}
                </div>
              )}
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end', gap: S[2], padding: `${S[3]}px ${S[4]}px`, borderTop: `1px solid ${C.rule}` }}>
              <Btn variant="ghost" size="sm" onClick={closeBatch}>Cancel</Btn>
              <Btn variant="primary" size="sm" onClick={confirmBatch} disabled={selectedDraftIds.length === 0}>
                Send {selectedDraftIds.length} invoice{selectedDraftIds.length === 1 ? '' : 's'}
              </Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// =====================================================================
// AdminInvoiceDetail — single-invoice view at /admin/payments/:id. Routed
// under the `payments` namespace; the component name keeps the "invoice"
// vocabulary because that's the entity being shown.
// =====================================================================
function AdminInvoiceDetail({ invoiceId, db, setDb, navigate }) {
  const inv = (db.invoices || []).find(i => i.id === invoiceId);
  if (!inv) {
    return (
      <div style={{ padding: S[6], maxWidth: 720, margin: '0 auto' }}>
        <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Payments', to: '/admin/payments' }, { label: 'Not found' }]} navigate={navigate} />
        <EmptyState
          title="Invoice not found"
          body="That invoice id doesn't exist (or it was reset)."
          action={<Btn onClick={() => navigate('/admin/payments')}>{'←'} Back to Payments</Btn>}
        />
      </div>
    );
  }

  const hauler = db.haulers.find(x => x.id === inv.haulerId);
  const project = db.projects.find(p => p.id === inv.projectId);
  const invoiceTotal = (inv.lineItems || []).reduce((s, li) => s + (li.amount || 0), 0);
  const invoiceHours = (inv.lineItems || []).reduce((s, li) => s + (li.hours || 0), 0);

  const sendDraft = () => {
    const sentAt = new Date().toISOString();
    const hName = hauler ? hauler.name : 'A hauler';
    setDb(prev => appendActivity(
      {
        ...prev,
        invoices: prev.invoices.map(i => i.id === inv.id ? { ...i, status: 'sent', sentAt } : i),
      },
      {
        type: 'invoice.sent',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin sent invoice ${inv.number} to ${inv.billTo} (${hName})`,
        refId: null,
      }
    ));
    alert('Invoice ' + inv.number + ' sent to ' + inv.billTo + '.');
  };

  const markPaid = () => {
    const ref = window.prompt('Payment reference (ACH / check / wire #) for ' + inv.number + '?');
    if (ref == null) return;
    const trimmed = ref.trim();
    if (!trimmed) { alert('Payment reference is required.'); return; }
    const paidAt = new Date().toISOString();
    const hName = hauler ? hauler.name : 'A hauler';
    setDb(prev => appendActivity(
      {
        ...prev,
        invoices: prev.invoices.map(i => i.id === inv.id ? { ...i, status: 'paid', paidAt, paymentRef: trimmed } : i),
      },
      {
        type: 'invoice.paid',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin marked invoice ${inv.number} paid (ref: ${trimmed}) for ${hName}`,
        refId: null,
      }
    ));
  };

  const ActionBtn = () => {
    if (inv.status === 'draft') return <Btn size="sm" onClick={sendDraft}>Generate</Btn>;
    if (inv.status === 'sent')  return <Btn size="sm" onClick={markPaid}>Mark paid</Btn>;
    if (inv.status === 'paid')  return <Btn variant="ghost" size="sm" onClick={() => window.print()}>View receipt</Btn>;
    return null;
  };

  // Status timeline node helpers
  const dot = (filled, label) => (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, flex: 1, minWidth: 80 }}>
      <div style={{
        width: 12, height: 12, borderRadius: R.pill,
        background: filled ? C.accent : 'transparent',
        border: `2px solid ${filled ? C.accent : C.ruleHi}`,
      }} />
      <div style={{ ...T.caption, color: filled ? C.ink : C.inkFaint, fontWeight: filled ? 600 : 500 }}>{label}</div>
    </div>
  );
  const bar = (filled) => (
    <div style={{ height: 2, flex: 1, background: filled ? C.accent : C.ruleHi, marginTop: 5 }} />
  );

  return (
    <div style={{ padding: S[6], maxWidth: 1100, margin: '0 auto' }}>
      <Crumbs items={[
        { label: 'Admin', to: '/admin' },
        { label: 'Payments', to: '/admin/payments' },
        { label: inv.number },
      ]} navigate={navigate} />

      {/* === Header === */}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: S[3], flexWrap: 'wrap', marginBottom: S[5] }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Invoice</Label>
          <h1 style={{ ...T.h2, fontWeight: 700, letterSpacing: -1, margin: 0, color: C.ink, fontFamily: F.display }}>{inv.number}</h1>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[2], marginTop: S[2] }}>
            <StatusPill status={inv.status} />
            <div style={{ ...T.bodySm, color: C.inkDim }}>
              {hauler ? hauler.name : '—'} · {project ? project.name : '—'}
            </div>
          </div>
        </div>
        <div><ActionBtn /></div>
      </div>

      {/* === Meta cards === */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: S[3], marginBottom: S[5] }}>
        <Card padding={S[4]}>
          <Label style={{ marginBottom: S[2] }}>From / Bill to</Label>
          <div style={{ ...T.bodySm, color: C.inkDim, marginBottom: 4 }}>From hauler</div>
          <div style={{ ...T.body, fontWeight: 600, color: C.ink, marginBottom: S[3] }}>{hauler ? hauler.name : '—'}</div>
          <div style={{ ...T.bodySm, color: C.inkDim, marginBottom: 4 }}>On haul</div>
          <div style={{ ...T.body, fontWeight: 600, color: C.ink, marginBottom: S[3] }}>{project ? project.name : '—'}</div>
          <div style={{ ...T.bodySm, color: C.inkDim, marginBottom: 4 }}>Bill to</div>
          <div style={{ ...T.body, fontWeight: 600, color: C.ink }}>{inv.billTo}</div>
        </Card>
        <Card padding={S[4]}>
          <Label style={{ marginBottom: S[2] }}>Dates &amp; payment</Label>
          <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr', gap: `${S[2]}px ${S[3]}px`, ...T.bodySm }}>
            <div style={{ color: C.inkDim }}>Period</div>
            <div style={{ color: C.ink, fontFamily: F.mono }}>{inv.periodStart} {'→'} {inv.periodEnd}</div>
            <div style={{ color: C.inkDim }}>Issued</div>
            <div style={{ color: C.ink, fontFamily: F.mono }}>{inv.issuedDate || '—'}</div>
            <div style={{ color: C.inkDim }}>Created</div>
            <div style={{ color: C.ink, fontFamily: F.mono }}>{inv.createdAt ? inv.createdAt.slice(0, 10) : '—'}</div>
            {inv.sentAt && (<>
              <div style={{ color: C.inkDim }}>Sent</div>
              <div style={{ color: C.ink, fontFamily: F.mono }}>{inv.sentAt.slice(0, 10)}</div>
            </>)}
            {inv.paidAt && (<>
              <div style={{ color: C.inkDim }}>Paid</div>
              <div style={{ color: C.ink, fontFamily: F.mono }}>{inv.paidAt.slice(0, 10)}</div>
            </>)}
            {inv.paymentRef && (<>
              <div style={{ color: C.inkDim }}>Ref</div>
              <div style={{ color: C.ink, fontFamily: F.mono }}>{inv.paymentRef}</div>
            </>)}
          </div>
        </Card>
      </div>

      {/* === Timeline === */}
      {inv.status === 'void' ? (
        <Card padding={S[4]} style={{ marginBottom: S[5], border: `1px solid ${C.warn}` }}>
          <Label color={C.warn} style={{ marginBottom: S[2] }}>Voided</Label>
          <div style={{ ...T.bodySm, color: C.inkDim }}>
            This invoice was voided{inv.notes ? '. ' + inv.notes : '.'}
          </div>
        </Card>
      ) : (
        <Card padding={S[4]} style={{ marginBottom: S[5] }}>
          <Label style={{ marginBottom: S[3] }}>Status timeline</Label>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: S[2] }}>
            {dot(true, 'Created')}
            {bar(inv.status === 'sent' || inv.status === 'paid')}
            {dot(inv.status === 'sent' || inv.status === 'paid', 'Sent')}
            {bar(inv.status === 'paid')}
            {dot(inv.status === 'paid', 'Paid')}
          </div>
        </Card>
      )}

      {/* === Line items === */}
      <div style={{ marginBottom: S[3] }}><Label>Line items</Label></div>
      <Card padding={0} style={{ marginBottom: S[5] }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><Th>Truck</Th><Th>Type</Th><Th>Driver</Th><Th align="right">Hours</Th><Th align="right">Rate</Th><Th align="right">Amount</Th></tr></thead>
          <tbody>
            {(inv.lineItems || []).map(li => (
              <Tr key={li.id}>
                <Td mono><span style={{ color: C.accent }}>#{li.truckPlate}</span></Td>
                <Td><Pill color={C.inkDim} soft="rgba(255,255,255,0.05)">{li.truckType}</Pill></Td>
                <Td dim>{li.driverName}</Td>
                <Td align="right" mono>{fmtHours(li.hours)}</Td>
                <Td align="right" mono>${li.rate}</Td>
                <Td align="right" mono style={{ fontWeight: 600 }}>{fmtMoney(li.amount)}</Td>
              </Tr>
            ))}
            <tr style={{ background: C.surfaceHi }}>
              <td colSpan={3} style={{ ...T.body, padding: '14px 14px', borderBottom: `1px solid ${C.rule}`, textAlign: 'right', fontFamily: F.display, fontWeight: 600, color: C.ink }}>Total</td>
              <Td align="right" mono style={{ fontWeight: 600 }}>{fmtHours(invoiceHours)}</Td>
              <Td></Td>
              <Td align="right" mono style={{ ...T.h4, fontWeight: 700, color: C.accent }}>{fmtMoney(invoiceTotal)}</Td>
            </tr>
          </tbody>
        </table>
      </Card>

      {/* === Notes === */}
      {inv.notes && (
        <Card padding={S[4]} style={{ marginBottom: S[5] }}>
          <Label style={{ marginBottom: S[2] }}>Notes</Label>
          <div style={{ ...T.bodySm, color: C.ink }}>{inv.notes}</div>
        </Card>
      )}

      {/* === Footer action === */}
      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: S[2] }}>
        <Btn variant="ghost" size="sm" onClick={() => navigate('/admin/payments')}>Back to payments</Btn>
        <ActionBtn />
      </div>
    </div>
  );
}

// =====================================================================
// v18: AdminInvoicePrint — printable JSE-issued invoice at
// /admin/invoices/:id/print. JSE_INVOICE_ISSUER letterhead, project-pulled
// Bill To, line items table, totals, dual payment options (check + Stripe
// placeholder with fee disclaimer). The window.print() button + scoped
// @media print stylesheet strip nav chrome so the printed sheet is
// invoice-only.
// =====================================================================
function AdminInvoicePrint({ invoiceId, db, navigate }) {
  const inv = (db.invoices || []).find(i => i.id === invoiceId);
  if (!inv) {
    return (
      <div style={{ padding: S[6], maxWidth: 720, margin: '0 auto' }}>
        <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Invoices' }, { label: 'Not found' }]} navigate={navigate} />
        <EmptyState
          icon={<PaymentsIcon size={32} />}
          title="Invoice not found"
          body={'No invoice matched id "' + (invoiceId || '') + '".'}
          action={<Btn onClick={() => navigate('/admin/payments')}>{'←'} Back to Payments</Btn>}
        />
      </div>
    );
  }
  const project = (db.projects || []).find(p => p.id === inv.projectId);
  const req     = (db.haulRequests || []).find(r => r.id === inv.haulRequestId);
  const kindLabel = inv.kind === 'final' ? 'Final invoice'
                  : inv.kind === 'interim' ? 'Interim invoice'
                  : (String(inv.number || '').startsWith('INV-FIN-') ? 'Final invoice' : 'Interim invoice');
  const lineItems = inv.lineItems || [];
  const subtotal = lineItems.reduce((s, li) => s + (li.amount || 0), 0);
  const fmtMoney = (n) => '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const stripeUrl = jseStripePayUrl(inv.id);

  return (
    <div style={{ padding: S[6], maxWidth: 880, margin: '0 auto' }} className="invoice-print-root">
      {/* Print-only stylesheet — hides admin chrome (sidebar + topbar + back
          buttons) when window.print() fires, so the printed sheet is just
          the invoice body. */}
      <style>{`
        @media print {
          body, html { background: #ffffff !important; color: #000000 !important; }
          .invoice-print-root { padding: 0 !important; max-width: none !important; }
          .invoice-print-root * { color: #000000 !important; background: transparent !important; box-shadow: none !important; border-color: #cccccc !important; }
          .invoice-print-hide { display: none !important; }
          .invoice-print-sheet { border: none !important; padding: 0 !important; }
          .invoice-print-sheet a { color: #000000 !important; text-decoration: none !important; }
          .invoice-print-line { border-bottom: 1px solid #cccccc !important; }
          .admin-sidebar, .admin-topbar, .admin-drawer, .admin-drawer-backdrop, nav, header { display: none !important; }
        }
      `}</style>

      <div className="invoice-print-hide" style={{ marginBottom: S[4] }}>
        <Crumbs items={[
          { label: 'Admin', to: '/admin' },
          { label: 'Haul Requests', to: '/admin/requests' },
          ...(req ? [{ label: haulRequestLabel(db, req), to: '/admin/requests/' + req.id }] : []),
          { label: inv.number || 'Invoice' },
        ]} navigate={navigate} />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: S[3], flexWrap: 'wrap', marginTop: S[3] }}>
          <div style={{ ...T.bodySm, color: C.inkDim }}>Preview of the invoice as it will print. Use the Print button to print or save as PDF.</div>
          <div style={{ display: 'flex', gap: S[2] }}>
            {req && (
              <Btn variant="ghost" onClick={() => navigate('/admin/requests/' + req.id)}>{'←'} Back to haul request</Btn>
            )}
            <Btn variant="primary" onClick={() => window.print()}>Print this invoice</Btn>
          </div>
        </div>
      </div>

      <Card style={{ padding: S[6] }} className="invoice-print-sheet">
        {/* Letterhead */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: S[5], marginBottom: S[5], paddingBottom: S[4], borderBottom: '1px solid ' + C.rule }} className="invoice-print-line">
          <div>
            <div style={{ ...T.h2, fontWeight: 800, letterSpacing: -0.6, color: C.ink, marginBottom: 4 }}>{JSE_INVOICE_ISSUER.name}</div>
            <div style={{ ...T.bodySm, color: C.inkDim, lineHeight: 1.6 }}>
              {JSE_INVOICE_ISSUER.contactName}<br />
              ☎ {JSE_INVOICE_ISSUER.phone}<br />
              ✉ {JSE_INVOICE_ISSUER.email}<br />
              {JSE_INVOICE_ISSUER.website}
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ ...T.caption, color: C.inkFaint, letterSpacing: 0.6, textTransform: 'uppercase', marginBottom: 4 }}>{kindLabel}</div>
            <div style={{ ...T.h3, fontWeight: 700, fontFamily: F.mono, color: C.ink }}>{inv.number}</div>
            <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>
              Issued <span style={{ fontFamily: F.mono, color: C.ink }}>{inv.issuedDate}</span>
            </div>
            <div style={{ marginTop: 6 }}>
              <StatusPill status={inv.status} />
            </div>
          </div>
        </div>

        {/* Bill To */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: S[5], marginBottom: S[5] }}>
          <div>
            <Label style={{ marginBottom: S[2] }}>Bill to</Label>
            <div style={{ ...T.body, color: C.ink, fontWeight: 600 }}>{project ? (project.gc || '—') : (inv.billTo || '—')}</div>
            <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 2, lineHeight: 1.6 }}>
              {project && project.contactName ? <>{project.contactName}<br /></> : null}
              {project && project.contactPhone ? <>☎ {project.contactPhone}<br /></> : null}
              {project && project.contactEmail ? <>✉ {project.contactEmail}<br /></> : null}
              {project && project.address ? project.address : null}
            </div>
          </div>
          <div>
            <Label style={{ marginBottom: S[2] }}>Haul request</Label>
            <div style={{ ...T.body, color: C.ink, fontWeight: 600 }}>{project ? project.name : '—'}</div>
            <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 2, lineHeight: 1.6 }}>
              {req ? <>{req.volumeCY} CY requested<br /></> : null}
              {req && req.pickupLocation && req.pickupLocation.address ? <>Pickup: {req.pickupLocation.address}<br /></> : null}
              {req && req.dropoffLocation && req.dropoffLocation.address ? <>Dropoff: {req.dropoffLocation.address}</> : null}
            </div>
          </div>
        </div>

        {/* Line items */}
        <Label style={{ marginBottom: S[2] }}>Line items</Label>
        <div style={{ marginBottom: S[5], border: '1px solid ' + C.rule, borderRadius: R.md, overflow: 'hidden' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: C.surfaceHi }}>
                <Th>Description</Th>
                <Th align="right">CY delivered</Th>
                <Th align="right">Rate / CY</Th>
                <Th align="right">Line total</Th>
              </tr>
            </thead>
            <tbody>
              {lineItems.length === 0 ? (
                <tr>
                  <td colSpan="4" style={{ ...T.bodySm, textAlign: 'center', padding: S[4], color: C.inkDim }}>
                    No deliveries logged yet for this haul.
                  </td>
                </tr>
              ) : lineItems.map(li => (
                <tr key={li.id} className="invoice-print-line" style={{ borderBottom: '1px solid ' + C.rule }}>
                  <Td>
                    <div style={{ ...T.bodySm, color: C.ink, fontWeight: 600 }}>Truck #{li.truckPlate} ({li.truckType})</div>
                    <div style={{ ...T.caption, color: C.inkDim }}>{li.driverName || '—'}</div>
                  </Td>
                  <Td align="right" mono>{li.deliveredCY || 0}</Td>
                  <Td align="right" mono>{fmtMoney(li.cyRate || li.rate || 0)}</Td>
                  <Td align="right" mono>{fmtMoney(li.amount || 0)}</Td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Totals */}
        <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: S[5] }}>
          <div style={{ minWidth: 280 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: S[2], ...T.bodySm, color: C.inkDim }}>
              <span>Subtotal</span><span style={{ fontFamily: F.mono, color: C.ink }}>{fmtMoney(subtotal)}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: S[3], borderTop: '1px solid ' + C.rule, ...T.h4, fontWeight: 700, color: C.ink }} className="invoice-print-line">
              <span>Total due</span><span style={{ fontFamily: F.mono }}>{fmtMoney(subtotal)}</span>
            </div>
          </div>
        </div>

        {/* Payment options */}
        <div style={{ padding: S[4], background: C.surfaceHi, borderRadius: R.md, marginBottom: S[4] }}>
          <Label style={{ marginBottom: S[2] }}>Payment options</Label>
          <div style={{ ...T.bodySm, color: C.ink, marginBottom: S[3], lineHeight: 1.6 }}>
            <strong>Pay by check</strong><br />
            Make checks payable to <strong>{JSE_INVOICE_ISSUER.name}</strong>.<br />
            Mail to {JSE_INVOICE_ISSUER.name}, c/o {JSE_INVOICE_ISSUER.contactName}.
          </div>
          <div style={{ ...T.bodySm, color: C.ink, marginBottom: S[2] }}>
            <strong>Pay online via Stripe</strong>
          </div>
          <a href={stripeUrl} target="_blank" rel="noopener noreferrer"
            style={{
              display: 'inline-block', padding: '10px 16px', background: '#635bff', color: '#ffffff',
              borderRadius: R.sm, textDecoration: 'none', fontWeight: 700, ...T.bodySm,
            }}>
            Pay {fmtMoney(subtotal)} with Stripe →
          </a>
          <div style={{ ...T.caption, color: C.inkDim, marginTop: S[2] }}>
            Note: {JSE_STRIPE_FEE_LABEL}
          </div>
        </div>

        {/* Footer */}
        <div style={{ ...T.caption, color: C.inkFaint, textAlign: 'center', marginTop: S[5], paddingTop: S[3], borderTop: '1px solid ' + C.rule }} className="invoice-print-line">
          Thank you for your business. Questions? Contact {JSE_INVOICE_ISSUER.contactName} at {JSE_INVOICE_ISSUER.phone} or {JSE_INVOICE_ISSUER.email}.
        </div>
      </Card>
    </div>
  );
}

// =====================================================================
// AdminActiveTrucks — live grid of driver widgets at /admin/trucks/active.
// Reuses DriverHome (and DriverMultiTruckHome) inside a smaller phone-frame
// wrapper so the admin sees exactly what the driver sees, and the same
// clock-in / clock-out / pause / log-load buttons mutate the same db state.
// Cross-tab sync ([[jse-realtime]]) means a real driver's actions reflect
// here instantly and vice versa.
// =====================================================================
function MiniPhone({ children, label, badge, badgeColor = C.accent, onClick }) {
  // 320x600 scaled phone widget for embedding in the admin grid.
  // When `onClick` is provided, the label/badge header row becomes a
  // clickable affordance that opens the truck's detail view.
  const headerInner = (
    <>
      {label && <Label>{label}</Label>}
      {badge && <Pill color={badgeColor} soft={badgeColor === C.accent ? C.accentSoft : (badgeColor === C.warn ? C.warnSoft : 'rgba(255,255,255,0.06)')}>{badge}</Pill>}
      {onClick && <span style={{ ...T.caption, color: C.accent, marginLeft: 2 }} aria-hidden="true">{'\u2197'}</span>}
    </>
  );
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: S[2] }}>
      {onClick ? (
        <button
          onClick={onClick}
          title="Open truck detail"
          style={{ display: 'flex', alignItems: 'center', gap: S[2], background: 'transparent', border: 'none', color: 'inherit', padding: '4px 8px', borderRadius: R.sm, cursor: 'pointer', font: 'inherit' }}
          onMouseEnter={e => e.currentTarget.style.background = 'rgba(179,230,53,0.10)'}
          onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
        >
          {headerInner}
        </button>
      ) : (
        <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>{headerInner}</div>
      )}
      <div style={{ width: 280, background: '#000', borderRadius: 32, padding: 8, boxShadow: '0 12px 32px rgba(0,0,0,0.45), 0 0 0 1.5px #1a1a1a' }}>
        <div style={{ width: '100%', background: C.bg, borderRadius: 26, overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column', minHeight: 540 }}>
          <div style={{ position: 'absolute', top: 6, left: '50%', transform: 'translateX(-50%)', width: 88, height: 20, background: '#000', borderRadius: R.md, zIndex: 100 }} />
          <div style={{ ...T.caption, display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 22px 4px', color: C.ink, fontWeight: 600, fontSize: 9 }}>
            <span>11:05</span><span style={{ opacity: 0.75 }}>5G</span>
          </div>
          {children}
        </div>
      </div>
    </div>
  );
}

function AdminActiveTrucks({ db, setDb, navigate }) {
  // Group: every truck that has a driver assigned. Sort by status:
  // currently clocked-in first, then idle drivers, then no-driver trucks.
  const all = db.trucks.slice();
  const openShifts = (db.hours || []).filter(h => h.status === 'open');
  const truckHrMap = new Map(openShifts.map(h => [h.truckId, h]));

  // Modal state: { driver, truck } when admin is logging a load on someone's
  // behalf. Embedded DriverHome / DriverTruckDetail open the modal via the
  // onOpenLogLoad prop instead of navigating to /driver/log.
  const [logFor, setLogFor] = useState(null);

  const withDriver = all.filter(t => t.driverId).map(t => {
    const driver = db.drivers.find(d => d.id === t.driverId);
    const hr = truckHrMap.get(t.id);
    const isPaused = !!(hr && hr.pausedAt);
    return { truck: t, driver, hr, status: hr ? (isPaused ? 'paused' : 'active') : 'idle' };
  }).filter(x => x.driver);

  // Sort: active > paused > idle, then plate
  const order = { active: 0, paused: 1, idle: 2 };
  withDriver.sort((a, b) => order[a.status] - order[b.status] || a.truck.plate.localeCompare(b.truck.plate));

  const benchedTrucks = all.filter(t => !t.driverId);

  // Embedded driver widgets always stay inside admin — never delegate to /driver/*.
  // No-op for navigation calls from inside the embed; the modal handles log-load
  // and the back-link / DriverIncomingRequests are hidden by the `embedded` prop.
  const noopNavigate = () => {};

  const activeCount = withDriver.filter(w => w.status === 'active').length;
  const pausedCount = withDriver.filter(w => w.status === 'paused').length;
  const idleCount   = withDriver.filter(w => w.status === 'idle').length;

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Active Trucks' }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: S[5], gap: S[3], flexWrap: 'wrap' }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Active Trucks</Label>
          <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>What every driver sees, right now.</h1>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>Click any widget action to clock in/out, log a load, or pause on behalf of the driver. Changes flow back to their phone via cross-tab sync.</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[6] }}>
        <Card padding={S[4]}><Stat label="Active right now" value={activeCount} sub="clocked in, not paused" /></Card>
        <Card padding={S[4]}><Stat label="Paused" value={pausedCount} sub="on break" /></Card>
        <Card padding={S[4]}><Stat label="Idle (driver assigned)" value={idleCount} sub="not clocked in" /></Card>
        <Card padding={S[4]}><Stat label="Benched trucks" value={benchedTrucks.length} sub="no driver assigned" /></Card>
      </div>

      {withDriver.length === 0 ? (
        <Card padding={S[5]} style={{ textAlign: 'center' }}>
          <div style={{ ...T.bodySm, color: C.inkDim }}>No drivers assigned to any trucks. Assign a driver from a hauler page to see their widget here.</div>
        </Card>
      ) : (
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(296px, 1fr))',
          gap: S[5],
          justifyItems: 'center',
        }}>
          {withDriver.map(({ truck, driver, hr, status }) => {
            const project = db.projects.find(p => p.id === truck.projectId);
            const driverTrucks = db.trucks.filter(t => t.driverId === driver.id);
            const badge = status === 'active' ? 'On the clock' : status === 'paused' ? 'Paused' : 'Idle';
            const badgeColor = status === 'active' ? C.accent : status === 'paused' ? C.warn : C.inkDim;
            return (
              <MiniPhone
                key={truck.id}
                label={`${driver.name} · #${truck.plate}`}
                badge={badge}
                badgeColor={badgeColor}
                onClick={() => {
                  if (truck.projectId && truck.haulerId) {
                    navigate(`/admin/p/${truck.projectId}/o/${truck.haulerId}/t/${truck.id}`);
                  } else if (truck.haulerId) {

                {driverTrucks.length === 1
                  ? <DriverHome driver={driver} truck={truck} db={db} setDb={setDb} navigate={noopNavigate} embedded onOpenLogLoad={(tk) => setLogFor({ driver, truck: tk })} />
                  : <DriverTruckDetail driver={driver} truck={truck} trucks={driverTrucks} db={db} setDb={setDb} navigate={noopNavigate} embedded onOpenLogLoad={(tk) => setLogFor({ driver, truck: tk })} />}
              </MiniPhone>

      {benchedTrucks.length > 0 && (
        <div style={{ marginTop: S[6] }}>

          <Card padding={0}>

              <tbody>
                {benchedTrucks.map(t => {

        >
          <div

            style={{
              background: C.bg, borderRadius: R.lg, width: 'min(480px, 100%)', maxHeight: '90vh',

          >

  );

// =====================================================================
// AdminActivity — reverse-chrono event feed at /admin/activity
// =====================================================================
// Reads db.activity (appended via appendActivity() on every mutation).
// On first render, advances db.activityLastReadAt to the latest event timestamp
// so the sidebar unread badge clears once the user has viewed the page.
function AdminActivity({ db, setDb, navigate }) {
  const activity = (db.activity || []).slice().sort((a, b) => b.timestamp - a.timestamp);
  const markedRef = useRef(false);
  useEffect(() => {
    if (markedRef.current) return;
    markedRef.current = true;
    const latest = activity.length ? activity[0].timestamp : 0;
    setDb(prev => {
      const lastRead = prev.activityLastReadAt || 0;
      if (latest <= lastRead) return prev;
      return { ...prev, activityLastReadAt: latest };
    });
    // Only run once on mount — mark-as-read fires on first view, not on every
    // re-render that follows new events arriving while the page is open.
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Pragmatic refId-prefix routing. Unknown / ambiguous refs are no-ops.
  const goRef = (evt) => {
    const id = evt.refId;
    if (!id) return;
    if (id.startsWith('hreq-')) { navigate('/admin/requests/' + id); return; }
    if (id.startsWith('op-'))   { navigate('/admin/haulers/' + id); return; }
    if (id.startsWith('tk-')) {
      const tr = db.trucks.find(t => t.id === id);
      if (tr && tr.haulerId) { navigate('/admin/haulers/' + tr.haulerId); return; }
      return;
    }
    if (id.startsWith('ld-')) {
      const ld = db.loads.find(l => l.id === id);
      if (ld && ld.projectId) { navigate('/admin/requests?projectId=' + ld.projectId); return; }
      return;
    }
    if (id.startsWith('dr-')) {
      // No flat drivers index — fall back to haulers list.
      navigate('/admin/haulers'); return;
    }
    // Project codes are uppercase letters/digits without a known prefix.
    if (/^[A-Z0-9]{2,6}$/.test(id) && db.projects.some(p => p.id === id)) {
      navigate('/admin/requests?projectId=' + id); return;
    }
  };

  // Group reverse-chrono by day. Buckets: 'Today · May 20' / 'Yesterday · May 19'
  // / 'Mon · May 18' etc. Uses REAL current date (not the frozen TODAY_ISO demo
  // anchor) because activity events are stamped with Date.now(); comparing against
  // the frozen demo date would mis-label real-today events with the literal date
  // and stick "Today" on real-yesterday events — the source of the previous
  // confusing double-header.
  const realNow = new Date();
  const realTodayIso = new Date(Date.UTC(realNow.getFullYear(), realNow.getMonth(), realNow.getDate()))
    .toISOString().slice(0, 10);
  const realYesterdayDt = new Date(Date.UTC(realNow.getFullYear(), realNow.getMonth(), realNow.getDate() - 1));
  const realYesterdayIso = realYesterdayDt.toISOString().slice(0, 10);
  const labelFor = (ts) => {
    const d = new Date(ts);
    const iso = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()))
      .toISOString().slice(0, 10);
    const dateLabel = isoToShortDate(iso);
    if (iso === realTodayIso)     return `Today · ${dateLabel}`;
    if (iso === realYesterdayIso) return `Yesterday · ${dateLabel}`;
    return `${isoToWeekdayShort(iso)} · ${dateLabel}`;
  };
  const groups = [];
  const byLabel = new Map();
  activity.forEach(e => {
    const lbl = labelFor(e.timestamp);
    if (!byLabel.has(lbl)) { byLabel.set(lbl, []); groups.push(lbl); }
    byLabel.get(lbl).push(e);
  });

  const fmtTime = (ts) => {
    const d = new Date(ts);
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  };

  // Color the actor avatar by role to give the feed scannable structure.
  const actorColorFor = (role) => {
    if (role === 'driver') return C.accent;
    if (role === 'hauler') return C.warn || C.accent;
    return C.inkDim;
  };
  // Build a "name" string for the Avatar component to derive initials from.
  // Avatar splits on whitespace and takes first letters — we feed it whatever
  // the actor's display name is so it produces sensible initials.
  const actorNameFor = (evt) => {
    if (evt.actorRole === 'admin') return 'Admin User';
    if (evt.actorRole === 'driver' && evt.actorId) {
      const d = db.drivers.find(x => x.id === evt.actorId);
      if (d) return d.name;
    }
    if (evt.actorRole === 'hauler' && evt.actorId) {
      const h = db.haulers.find(x => x.id === evt.actorId);
      if (h) return h.name;
    }
    return '?';
  };

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Activity' }]} navigate={navigate} />
      <div style={{ marginBottom: S[5] }}>
        <Label color={C.accent} style={{ marginBottom: 6 }}>Activity</Label>
        <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>What's been happening.</h1>
        <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>
          {activity.length} event{activity.length === 1 ? '' : 's'} across your network.
        </div>
      </div>

      {activity.length === 0 ? (
        <EmptyState
          icon={<ActivityIcon size={36} />}
          title="No activity yet"
          body="Events will appear here as drivers log loads, haulers approve, and admins assign requests."
        />
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: S[5] }}>
          {groups.map(label => (
            <div key={label}>
              <Label style={{ marginBottom: S[3] }}>{label}</Label>
              <Card padding={0}>
                {byLabel.get(label).map((evt, idx, arr) => {
                  const hasRef = !!evt.refId;
                  return (
                    <div
                      key={evt.id}
                      onClick={hasRef ? () => goRef(evt) : undefined}
                      style={{
                        display: 'flex', alignItems: 'flex-start', gap: S[3],
                        padding: `${S[3]}px ${S[4]}px`,
                        borderBottom: idx < arr.length - 1 ? `1px solid ${C.rule}` : 'none',
                        cursor: hasRef ? 'pointer' : 'default',
                        transition: 'background 0.12s',
                      }}
                      onMouseEnter={e => { if (hasRef) e.currentTarget.style.background = C.surfaceHi; }}
                      onMouseLeave={e => { if (hasRef) e.currentTarget.style.background = 'transparent'; }}
                    >
                      <div style={{ ...T.monoSm, color: C.inkFaint, width: 44, flexShrink: 0, paddingTop: 6 }}>{fmtTime(evt.timestamp)}</div>
                      <Avatar name={actorNameFor(evt)} color={actorColorFor(evt.actorRole)} size={32} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ ...T.body, color: C.ink, lineHeight: 1.45 }}>{evt.summary}</div>
                        <div style={{ ...T.caption, color: C.inkFaint, marginTop: 2 }}>{evt.type}</div>
                      </div>
                    </div>
                  );
                })}
              </Card>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Shared admin sidebar nav (desktop) + drawer (mobile).
// Renders the same nav items in both modes; parent controls visibility via CSS.
function AdminSidebar({ db, navigate, hash, onNavigate, variant = 'sidebar', haulersExpanded, setHaulersExpanded, reportsExpanded, setReportsExpanded }) {
  const requests = db.haulRequests || [];
  const pendingCount = requests.filter(r => r.status === 'pending').length;
  const activity = db.activity || [];
  const lastRead = db.activityLastReadAt || 0;
  const unreadCount = activity.filter(a => a.timestamp > lastRead).length;
  const parts = (hash || '').split('/').filter(Boolean);
  const onOverview = parts.length === 1 && parts[0] === 'admin';
  const onRequests = parts[1] === 'requests';
  const onActivity = parts[1] === 'activity';
  const onReporting = parts[1] === 'reporting';
  const onLiveStats = parts[1] === 'reports';
  const onPayments  = parts[1] === 'payments';
  const onActiveTrucks = parts[1] === 'trucks' && parts[2] === 'active';
  // Reports section covers both /admin/reporting AND /admin/reports (live stats sublink)
  const onReportsAny = onReporting || onLiveStats;
  // "Haulers" section is active for the new /admin/haulers/* routes AND for the
  // legacy /admin/p/:projId/o/:opId path which still drills into a hauler-on-project.
  const onHaulers  = parts[1] === 'haulers' || (parts[1] === 'p' && parts[3] === 'o');

  const go = (to) => { navigate(to); if (onNavigate) onNavigate(); };

  const Item = ({ icon, label, active, onClick, badge, expandable, expanded, onToggleExpand }) => {
    const rowBg = active ? C.accentSoft : 'transparent';
    const rowColor = active ? C.accent : C.inkDim;
    return (
      <div
        style={{
          display: 'flex', alignItems: 'stretch',
          background: rowBg, color: rowColor,
          borderLeft: `3px solid ${active ? C.accent : 'transparent'}`,
          borderRadius: R.md, overflow: 'hidden',
        }}
        onMouseEnter={e => { if (!active) { e.currentTarget.style.background = C.surfaceHi; e.currentTarget.style.color = C.ink; } }}
        onMouseLeave={e => { if (!active) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.inkDim; } }}
      >
        <button onClick={onClick} style={{
          ...T.body, flex: 1, display: 'flex', alignItems: 'center', gap: S[3],
          background: 'transparent', color: 'inherit',
          border: 'none', padding: '10px 12px', cursor: 'pointer', fontWeight: 600, textAlign: 'left',
        }}>
          <span style={{ display: 'inline-flex', flexShrink: 0 }} aria-hidden="true">{icon}</span>
          <span style={{ flex: 1 }}>{label}</span>
          {badge != null && badge > 0 && (
            <span style={{
              background: C.accent, color: C.bg, borderRadius: R.pill,
              padding: '2px 8px', fontFamily: F.mono, fontSize: 10, fontWeight: 700,
            }}>{badge}</span>
          )}
        </button>
        {expandable && (
          <button
            type="button"
            onClick={onToggleExpand}
            aria-expanded={!!expanded}
            aria-label={expanded ? `Collapse ${label}` : `Expand ${label}`}
            style={{
              ...T.monoSm, background: 'transparent', color: C.inkFaint, border: 'none',
              padding: '0 10px', cursor: 'pointer',
            }}
          ><span aria-hidden="true">{expanded ? '▾' : '▸'}</span></button>
        )}
      </div>
    );
  };

  const sortedHaulers = [...db.haulers].sort((a, b) => a.name.localeCompare(b.name));

  return (
    <nav style={{ display: 'flex', flexDirection: 'column', gap: S[1] }}>
      {variant === 'drawer' && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3], paddingBottom: S[3], borderBottom: `1px solid ${C.rule}` }}>
          <Brand size="sm" />
          <button onClick={onNavigate} aria-label="Close menu" style={{
            ...T.bodyLg, background: 'transparent', border: `1px solid ${C.ruleHi}`, color: C.inkDim,
            width: 30, height: 30, borderRadius: '50%', cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          }}>Ã—</button>
        </div>
      )}
      <Item
        icon={<ProjectIcon size={20} />}
        label="Hauling Overview"
        active={onOverview}
        onClick={() => go('/admin')}
      />
      <Item
        icon={<HaulRequestIcon size={20} />}
        label="Haul Requests"
        active={onRequests}
        badge={pendingCount}
        onClick={() => go('/admin/requests')}
      />
      <Item
        icon={<ActivityIcon size={20} />}
        label="Activity"
        active={onActivity}
        badge={unreadCount}
        onClick={() => go('/admin/activity')}
      />
      <Item
        icon={<HaulerIcon size={20} />}
        label="Haulers"
        active={onHaulers}
        expandable
        expanded={haulersExpanded}
        onToggleExpand={() => setHaulersExpanded(v => !v)}
        onClick={() => go('/admin/haulers')}

      {haulersExpanded && (
        <div style={{ marginLeft: S[5], display: 'flex', flexDirection: 'column', gap: 2, marginBottom: S[2] }}>
          {sortedHaulers.map(op => (
            <button key={op.id} onClick={() => go(`/admin/haulers/${op.id}`)} style={{
              ...T.bodySm, background: 'transparent', border: 'none', textAlign: 'left',
              padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer', color: C.inkDim,
            }}
              onMouseEnter={e => { e.currentTarget.style.background = C.surfaceHi; e.currentTarget.style.color = C.ink; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.inkDim; }}
            >{op.name}</button>
          ))}
          <button onClick={() => go('/admin/haulers/new')} style={{
            ...T.bodySm, background: 'transparent', border: 'none', textAlign: 'left',
            padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer', color: C.accent,
            fontFamily: F.display, fontWeight: 600,
          }}
            onMouseEnter={e => { e.currentTarget.style.background = C.surfaceHi; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}
          >+ Add hauler</button>
        </div>
      )}
      <Item
        icon={<ActiveTruckIcon size={20} />}
        label="Active Trucks"
        active={onActiveTrucks}
        onClick={() => go('/admin/trucks/active')}
      />
      <Item
        icon={<ReportingIcon size={20} />}
        label="Reports"
        active={onReportsAny}
        expandable
        expanded={reportsExpanded}
        onToggleExpand={() => setReportsExpanded(v => !v)}
        onClick={() => go('/admin/reporting')}
      />
      {reportsExpanded && (
        <div style={{ marginLeft: S[5], display: 'flex', flexDirection: 'column', gap: 2, marginBottom: S[2] }}>
          <button onClick={() => go('/admin/reporting')} style={{
            ...T.bodySm, background: 'transparent', border: 'none', textAlign: 'left',
            padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer',
            color: onReporting ? C.accent : C.inkDim, fontWeight: onReporting ? 600 : 500,
          }}
            onMouseEnter={e => { if (!onReporting) { e.currentTarget.style.background = C.surfaceHi; e.currentTarget.style.color = C.ink; } }}
            onMouseLeave={e => { if (!onReporting) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.inkDim; } }}
          >Financial reports</button>
          <button onClick={() => go('/admin/reports')} style={{
            ...T.bodySm, background: 'transparent', border: 'none', textAlign: 'left',
            padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer',
            color: onLiveStats ? C.accent : C.inkDim, fontWeight: onLiveStats ? 600 : 500,
          }}
            onMouseEnter={e => { if (!onLiveStats) { e.currentTarget.style.background = C.surfaceHi; e.currentTarget.style.color = C.ink; } }}
            onMouseLeave={e => { if (!onLiveStats) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.inkDim; } }}
          >Live stats</button>
        </div>
      )}
      <Item
        icon={<PaymentsIcon size={20} />}
        label="Payments"
        active={onPayments}
        onClick={() => go('/admin/payments')}
      />
    </nav>
  );
}

function AdminShell({ db, setDb, navigate, hash }) {
  // Strip query string so route matchers below ignore `?filter=...` etc.
  const pathOnly = hash.split('?')[0];
  const parts = pathOnly.split('/').filter(Boolean);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [haulersExpanded, setHaulersExpanded] = useState(false);
  const [reportsExpanded, setReportsExpanded] = useState(() => parts[1] === 'reports' || parts[1] === 'reporting');
  const sidebarProps = { db, navigate, hash, haulersExpanded, setHaulersExpanded, reportsExpanded, setReportsExpanded };
  // Phase 3: reset wipes Supabase too so the fresh seed lands across every
  // device. Default is YES wipe cloud per the brief; the confirm is there
