function DriverShell({ db, setDb, navigate, hash }) {
  // Hash forms supported:
  //   /driver                              -> picker default (dr-001)
  //   /driver/<driverId>                   -> deep-link to a driver
  //   /driver/<driverId>/truck/<truckId>   -> driver's truck detail
  //   /driver/<driverId>/log/<truckId>     -> log-load for that truck
  //   /driver/truck/<truckId>              -> legacy form (uses pickedId)
  //   /driver/log/<truckId>                -> legacy form
  const parts = hash.split('/').filter(Boolean); // ['driver', ...]
  // A driver id has the prefix 'dr-'; sub-routes ('home','truck','log') do not.
  const urlDriverId = parts[1] && parts[1].startsWith('dr-') ? parts[1] : null;
  const [pickedId, setPickedId] = useState('dr-001');
  const drId = urlDriverId || pickedId;
  // Keep pickedId in sync when the URL changes externally
  useEffect(() => { if (urlDriverId && urlDriverId !== pickedId) setPickedId(urlDriverId); }, [urlDriverId]);
  const driver = db.drivers.find(d => d.id === drId);
  const trucks = db.trucks.filter(t => t.driverId === drId);
  const subIdx = urlDriverId ? 2 : 1;
  const sub = parts[subIdx] || 'home';
  const subArg = parts[subIdx + 1];
  const basePrefix = urlDriverId ? `/driver/${urlDriverId}` : '/driver';
  return (
    <Phone>
      <div style={{ padding: '4px 16px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <select value={drId} onChange={e => { setPickedId(e.target.value); navigate(urlDriverId ? `/driver/${e.target.value}` : '/driver'); }} style={{ background: 'transparent', color: C.inkFaint, border: 'none', padding: 0, fontFamily: F.mono, fontSize: 10 }}>
          {db.drivers.map(d => {
            const tc = db.trucks.filter(t => t.driverId === d.id).length;
            return <option key={d.id} value={d.id} style={{ background: C.surface }}>Demo: {d.name}{tc > 1 ? ' (' + tc + ' trucks)' : ''}</option>;
          })}
        </select>
        <button onClick={() => navigate('/')} style={{ background: 'transparent', border: 'none', color: C.inkFaint, fontFamily: F.mono, fontSize: 10, cursor: 'pointer' }}>Switch role</button>
      </div>
      {!driver && <DriverNoTruck driver={{ name: 'Unknown driver' }} />}
      {driver && trucks.length === 0 && <DriverNoTruck driver={driver} />}
      {driver && trucks.length === 1 && sub === 'home' && <DriverHome driver={driver} truck={trucks[0]} db={db} setDb={setDb} navigate={navigate} />}
      {driver && trucks.length === 1 && sub === 'log' && !subArg && <DriverLogLoad driver={driver} truck={trucks[0]} db={db} setDb={setDb} navigate={navigate} />}
      {driver && trucks.length > 1 && sub === 'home' && <DriverMultiTruckHome driver={driver} trucks={trucks} db={db} setDb={setDb} navigate={navigate} />}
      {driver && trucks.length >= 1 && sub === 'truck' && (() => {
        const tId = subArg;
        const truck = trucks.find(t => t.id === tId);
        if (!truck) return <DriverTruckNotFound navigate={navigate} />;
        return <DriverTruckDetail driver={driver} truck={truck} trucks={trucks} db={db} setDb={setDb} navigate={navigate} />;
      })()}
      {driver && trucks.length >= 1 && sub === 'log' && subArg && (() => {
        const tId = subArg;
        const truck = trucks.find(t => t.id === tId);
        if (!truck) return <DriverTruckNotFound navigate={navigate} />;
        return <DriverLogLoad driver={driver} truck={truck} db={db} setDb={setDb} navigate={navigate} returnTo={`${basePrefix}/truck/${truck.id}`} />;
      })()}
    </Phone>
  );
}

function DriverHome({ driver, truck, db, setDb, navigate, embedded = false, onOpenLogLoad }) {
  const project = db.projects.find(p => p.id === truck.projectId);
  const truckType = TRUCK_TYPES.find(t => t.code === truck.type);
  const hr = db.hours.find(h => h.truckId === truck.id && h.driverId === driver.id && h.status === 'open');
  const todayLoads = db.loads.filter(l => l.driverId === driver.id && l.truckId === truck.id && isToday(l.date));
  const isPaused = !!(hr && hr.pausedAt);
  const isOpen = !!(hr && hr.status === 'open');

  // Live ticker — re-render every second while clocked in (and not paused)
  const [, force] = useState(0);
  useEffect(() => {
    if (!isOpen) return;
    const id = setInterval(() => force(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [isOpen, isPaused, hr ? hr.id : null]);

  // Compute elapsed milliseconds since clock-in, minus any paused time
  let elapsedMs = 0;
  if (hr) {
    if (hr.clockedInAt) {
      let pausedMs = hr.pausedMs || 0;
      if (hr.pausedAt) pausedMs += Date.now() - hr.pausedAt;
      const end = hr.clockedOutAt || Date.now();
      elapsedMs = Math.max(0, end - hr.clockedInAt - pausedMs);
    } else {
      // Fallback for seed data without timestamps
      elapsedMs = Math.floor(calcHours(hr.clockIn, hr.breakMin, hr.clockOut) * 3600 * 1000);
    }
  }
  const fmtElapsed = (ms) => {
    const t = Math.floor(ms / 1000);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = t % 60;
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  };
  const fmtClock = (d) => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

  const clockIn = () => {
    const now = Date.now();
    setDb(prev => appendActivity(
      {
        ...prev,
        hours: [
          ...prev.hours.map(h => (h.driverId === driver.id && h.status === 'open') ? { ...h, status: 'closed', clockOut: fmtClock(new Date(now)), clockedOutAt: now } : h),
          {
            id: 'hr-' + Math.random().toString(36).substring(2, 7),
            driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
            clockIn: fmtClock(new Date(now)), clockedInAt: now, clockOut: null, clockedOutAt: null,
            breakMin: 0, pausedMs: 0, pausedAt: null, status: 'open', date: TODAY_ISO,
          },
        ],
      },
      {
        type: 'shift.started',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} clocked in on #${truck.plate}`,
        refId: truck.id,
      }
    ));
  };

  const togglePause = () => {
    if (!hr) return;
    if (hr.pausedAt) {
      const addedMs = Date.now() - hr.pausedAt;
      setDb(prev => ({
        ...prev,
        hours: prev.hours.map(h => h.id === hr.id ? {
          ...h, pausedMs: (h.pausedMs || 0) + addedMs, pausedAt: null,
          breakMin: Math.round(((h.pausedMs || 0) + addedMs) / 60000),
        } : h),
      }));
    } else {
      setDb(prev => ({
        ...prev,
        hours: prev.hours.map(h => h.id === hr.id ? { ...h, pausedAt: Date.now() } : h),
      }));
    }
  };

  const clockOut = () => {
    if (!hr) return;
    if (!confirm('End your shift?')) return;
    const now = Date.now();
    setDb(prev => appendActivity(
      {
        ...prev,
        hours: prev.hours.map(h => {
          if (h.id !== hr.id) return h;
          let pausedMs = h.pausedMs || 0;
          if (h.pausedAt) pausedMs += now - h.pausedAt;
          return {
            ...h, clockOut: fmtClock(new Date(now)), clockedOutAt: now,
            pausedAt: null, pausedMs, breakMin: Math.round(pausedMs / 60000),
            status: 'pending',
          };
        }),
      },
      {
        type: 'shift.ended',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} ended shift on #${truck.plate}`,
        refId: truck.id,
      }
    ));
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px` }}>
      {!embedded && (
        <div style={{ marginBottom: S[3] }}>
          <Label color={C.accent}>Today {fmtClock(new Date())}</Label>
          <div style={{ ...T.statValue, fontWeight: 700, color: C.ink, marginTop: 4 }}>Hi, {driver.name.split(' ').pop()}</div>
        </div>
      )}

      {/* Truck card */}
      <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3] }}>
          <Label>Your truck</Label>
          {!hr && <Pill color={C.inkFaint} soft="rgba(255,255,255,0.04)">Off the clock</Pill>}
          {isOpen && !isPaused && <StatusPill status="open" />}
          {isOpen && isPaused && <Pill color={C.warn} soft={C.warnSoft}>Paused</Pill>}
          {hr && hr.status !== 'open' && <Pill color={C.inkDim} soft="rgba(255,255,255,0.06)">Shift ended</Pill>}
        </div>
        <div style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, color: C.accent }}>#{truck.plate}</div>
        <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 4 }}>{truckType.label} · {truckType.cap} · {truck.hauler}</div>
        <div style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
          <Label style={{ marginBottom: 4 }}>On haul</Label>
          <div style={{ ...T.bodyLg, fontFamily: F.display, fontWeight: 600, color: C.ink }}>{project.name}</div>
          <div style={{ ...T.micro, color: C.inkDim, marginTop: 2 }}>{project.address}</div>
        </div>
      </div>

      {/* Running clock or off-state */}
      {hr ? (
        <div style={{ background: isPaused ? C.warnSoft : C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3], border: isPaused ? `1px solid ${C.warn}` : 'none' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: S[2] }}>
            <Label color={isPaused ? C.warn : C.accent}>{isPaused ? 'Paused' : (isOpen ? 'On the clock' : 'Shift submitted')}</Label>
            <span style={{ ...T.monoSm, color: C.inkDim }}>started {hr.clockIn}{hr.clockOut ? ' · ended ' + hr.clockOut : ''}</span>
          </div>
          <div style={{ ...T.h1, fontFamily: F.mono, fontWeight: 700, color: isPaused ? C.warn : C.accent, lineHeight: 1, fontVariantNumeric: 'tabular-nums' }}>
            {fmtElapsed(elapsedMs)}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: S[3], alignItems: 'flex-end' }}>
            <div>
              <Label style={{ marginBottom: 4 }}>Loads</Label>
              <div style={{ ...T.h4, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.length}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <Label style={{ marginBottom: 4 }}>Total CY</Label>
              <div style={{ ...T.h4, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.reduce((s, l) => s + (l.cy || 0), 0)}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <Label style={{ marginBottom: 4 }}>Break</Label>
              <div style={{ ...T.h4, fontWeight: 700, color: C.inkDim, lineHeight: 1 }}>{Math.round(((hr.pausedMs || 0) + (hr.pausedAt ? Date.now() - hr.pausedAt : 0)) / 60000)}m</div>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ background: C.surfaceHi, borderRadius: R.lg, padding: S[4], marginBottom: S[3], display: 'flex', alignItems: 'center', gap: S[3] }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.inkFaint }} />
          <div><Label>Status</Label><div style={{ ...T.bodyLg, fontFamily: F.display, color: C.inkDim, fontWeight: 600, marginTop: 2 }}>Not clocked in</div></div>
        </div>
      )}

      <div style={{ flex: 1 }} />

      {!hr && (
        <button onClick={clockIn} style={{ ...T.statValue, width: '100%', height: 84, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.6 }}>Clock in</button>
      )}
      {isOpen && (
        <>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: S[2], marginBottom: S[2] }}>
            <button onClick={() => embedded ? (onOpenLogLoad && onOpenLogLoad(truck)) : navigate('/driver/log')} disabled={isPaused} style={{ ...T.h4, height: 84, border: 'none', cursor: isPaused ? 'not-allowed' : 'pointer', background: isPaused ? C.surfaceHi : C.accent, color: isPaused ? C.inkFaint : C.bg, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.4, opacity: isPaused ? 0.5 : 1 }}>+ Log load</button>
            <button onClick={togglePause} style={{ ...T.h4, height: 84, border: `1px solid ${isPaused ? C.accent : C.warn}`, cursor: 'pointer', background: isPaused ? C.accentSoft : 'transparent', color: isPaused ? C.accent : C.warn, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.4 }}>{isPaused ? 'Resume' : 'Pause'}</button>
          </div>
          <button onClick={clockOut} style={{ ...T.bodyLg, width: '100%', height: 56, border: `1px solid ${C.warn}`, cursor: 'pointer', background: 'transparent', color: C.warn, borderRadius: R.lg, fontFamily: F.display, fontWeight: 600 }}>End shift / Clock out</button>

function DriverLogLoad({ driver, truck, db, setDb, navigate, returnTo, onSubmitted, onCancel }) {
  const back = returnTo || '/driver';
  const goBack = () => { if (onCancel) onCancel(); else navigate(back); };
  const afterSubmit = () => { if (onSubmitted) onSubmitted(); else navigate(back); };
  const proj = db.projects.find(p => p.id === truck.projectId);
  const [material, setMaterial] = useState((proj && proj.material[0]) || 'CF');
  const [cy, setCy] = useState('');
  const [photo, setPhoto] = useState(null);
  const fileRef = useRef(null);

  const onPick = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => setPhoto(ev.target.result);
    reader.readAsDataURL(f);
  };

  const submit = () => {
    if (!canSubmit) return;
    const now = new Date();
    const hhmm = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    const newLoad = {
      id: 'ld-' + Math.random().toString(36).substring(2, 7),
      driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
      material, cy: parseFloat(cy), photo, time: hhmm, date: TODAY_ISO, status: 'pending',
    };
    setDb(prev => appendActivity(
      { ...prev, loads: [...prev.loads, newLoad] },
      {
        type: 'load.logged',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} logged ${newLoad.cy} CY of ${materialLabel(newLoad.material)} on #${truck.plate}`,
        refId: newLoad.id,
      }
    ));
    afterSubmit();
  };

  const canSubmit = cy && parseFloat(cy) > 0;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px`, overflowY: 'auto' }}>
      <button onClick={goBack} style={{ ...T.bodySm, background: 'transparent', border: 'none', color: C.inkDim, padding: 0, marginBottom: S[3], cursor: 'pointer', textAlign: 'left' }}>← Back</button>
      <Label color={C.accent} style={{ marginBottom: 6 }}>New load · #{truck.plate} · {proj ? proj.name : ''}</Label>
      <div style={{ fontFamily: F.display, fontSize: 24, fontWeight: 700, letterSpacing: -0.6, marginBottom: S[4] }}>Log a load</div>

      <Label style={{ marginBottom: 6 }}>Material</Label>
      <select value={material} onChange={e => setMaterial(e.target.value)} style={{ ...T.bodyLg, background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, borderRadius: R.md, padding: '16px 16px', fontFamily: F.display, fontWeight: 600, marginBottom: S[4], appearance: 'menulist', width: '100%', boxSizing: 'border-box' }}>
        {MATERIALS.map(m => (
          <option key={m.code} value={m.code}>{m.label}</option>
        ))}
      </select>

      <Label style={{ marginBottom: 6 }}>Cubic yards (CY)</Label>
      <input type="number" inputMode="decimal" value={cy} onChange={e => setCy(e.target.value)} placeholder="e.g. 16" min="0" step="0.5" autoFocus
        style={{ ...T.h2, background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, borderRadius: R.md, padding: '18px 16px', fontFamily: F.mono, fontWeight: 700, marginBottom: S[4], textAlign: 'center', letterSpacing: -0.6, boxSizing: 'border-box', width: '100%' }} />

      <Label style={{ marginBottom: 6 }}>Photo (required)</Label>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onPick} style={{ display: 'none' }} />
      {!photo ? (
        <button onClick={() => fileRef.current && fileRef.current.click()} style={{
          ...T.body, height: 140, border: `2px dashed ${C.ruleHi}`, cursor: 'pointer', background: C.surface,
          color: C.inkDim, borderRadius: R.md, fontFamily: F.display, fontWeight: 600,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, marginBottom: S[4],
        }}>
          <span style={{ fontSize: 32 }}>📷</span>
          <span>Take photo of load</span>
          <span style={{ ...T.micro, color: C.inkFaint, fontWeight: 500 }}>Required to submit</span>
        </button>
      ) : (
        <div style={{ position: 'relative', marginBottom: S[4] }}>
          <img src={photo} alt="Load" style={{ width: '100%', height: 180, objectFit: 'cover', borderRadius: R.md, border: `1px solid ${C.accent}`, display: 'block' }} />
          <button onClick={() => { setPhoto(null); if (fileRef.current) fileRef.current.value = ''; }} style={{
            ...T.micro, position: 'absolute', top: 8, right: 8, background: 'rgba(0,0,0,0.7)', color: C.ink, border: 'none',
            padding: '6px 12px', borderRadius: R.pill, cursor: 'pointer', fontWeight: 600,
          }}>Retake</button>
        </div>
      )}

      <div style={{ flex: 1, minHeight: S[3] }} />

      <button onClick={submit} disabled={!canSubmit} style={{
        ...T.h4, height: 64, border: 'none', cursor: canSubmit ? 'pointer' : 'not-allowed',
        background: C.accent, color: C.bg, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.4,
        opacity: canSubmit ? 1 : 0.4,
      }}>Submit load</button>
      <div style={{ ...T.micro, color: C.inkDim, textAlign: 'center', marginTop: S[2] }}>
        Hauler will review and approve.
      </div>
    </div>
  );
}

// Driver "incoming requests" card — surfaces pending haul requests on the
// driver's project(s) and lets them Accept or Pass. Shared by both the
// multi-truck home screen and the single-truck detail screen. Passing on a
// request keeps it pending in the admin pool but hides it from this driver.
function DriverIncomingRequests({ db, setDb, driver, projectIds }) {
  const requests = (db.haulRequests || []).filter(r =>
    r.status === 'pending'
    && projectIds.includes(r.projectId)
    && !(r.passedBy || []).includes(driver.id)
  );

  const acceptRequest = (reqId) => {
    const req = (db.haulRequests || []).find(r => r.id === reqId);
    if (!req) return;
    const matLabel = materialLabel(req.materialCode);
    setDb(prev => appendActivity(
      {
        ...prev,
        haulRequests: prev.haulRequests.map(r => r.id === reqId
          ? { ...r, status: 'accepted', acceptedByDriver: driver.id }
          : r),
      },
      {
        type: 'haulRequest.accepted',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} accepted ${req.volumeCY} CY of ${matLabel}`,
        refId: reqId,
      }
    ));
  };

  const passRequest = (reqId) => {
    const req = (db.haulRequests || []).find(r => r.id === reqId);
    if (!req) return;
    const matLabel = materialLabel(req.materialCode);
    setDb(prev => appendActivity(
      {
        ...prev,
        haulRequests: prev.haulRequests.map(r => r.id === reqId
          ? { ...r, passedBy: [...(r.passedBy || []), driver.id] }
          : r),
      },
      {
        type: 'haulRequest.passed',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} passed on ${req.volumeCY} CY of ${matLabel}`,
        refId: reqId,
      }
    ));
  };

  return (
    <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3] }}>
        <Label>Incoming requests</Label>
        <Pill color={requests.length > 0 ? C.warn : C.inkDim} soft={requests.length > 0 ? C.warnSoft : 'rgba(255,255,255,0.06)'}>{requests.length}</Pill>
      </div>
      {requests.length === 0 ? (
        <div style={{ ...T.bodySm, color: C.inkDim, padding: `${S[2]}px 0` }}>Nothing waiting right now.</div>
      ) : requests.map((r, i) => {
        const project = db.projects.find(p => p.id === r.projectId);
        const matLabel = materialLabel(r.materialCode);
        return (
          <div key={r.id} style={{
            padding: `${S[3]}px 0`,
            borderTop: i === 0 ? 'none' : `1px solid ${C.rule}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: S[2], marginBottom: 4 }}>
              <div style={{ fontFamily: F.display, fontSize: 15, fontWeight: 600, color: C.ink }}>{project ? project.name : '—'}</div>
              <Pill color={C.accent} soft={C.accentSoft}>{matLabel}</Pill>
            </div>
            <div style={{ ...T.monoSm, color: C.inkDim, marginBottom: S[3] }}>{r.volumeCY} CY · {r.requestedAt}</div>
            <div style={{ display: 'flex', gap: S[2] }}>
              <button onClick={() => acceptRequest(r.id)} style={{
                ...T.bodySm, flex: 1, height: 40, border: 'none', cursor: 'pointer',
                background: C.accent, color: C.bg, borderRadius: R.md, fontFamily: F.display, fontWeight: 700,
                letterSpacing: -0.2,
              }}>Accept</button>
              <button onClick={() => passRequest(r.id)} style={{
                ...T.bodySm, flex: 1, height: 40, border: `1px solid ${C.ruleHi}`, cursor: 'pointer',
                background: 'transparent', color: C.inkDim, borderRadius: R.md, fontFamily: F.display, fontWeight: 600,
              }}>Pass</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function DriverTruckDetail({ driver, truck, trucks, db, setDb, navigate, embedded = false, onOpenLogLoad }) {
  const truckType = TRUCK_TYPES.find(t => t.code === truck.type);
  const project = db.projects.find(p => p.id === truck.projectId);
  const hr = db.hours.find(h => h.truckId === truck.id && h.driverId === driver.id && h.status === 'open');
  const isOpen = !!hr;
  const isPaused = !!(hr && hr.pausedAt);
  const todayLoads = db.loads.filter(l => l.driverId === driver.id && l.truckId === truck.id && isToday(l.date));
  const totalCY = todayLoads.reduce((s, l) => s + (l.cy || 0), 0);
  const backHref = '/driver';

  // Live ticker for elapsed shift display
  const [, force] = useState(0);
  useEffect(() => {
    if (!isOpen) return;
    const id = setInterval(() => force(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [isOpen, isPaused, hr ? hr.id : null]);

  let elapsedMs = 0;
  if (hr && hr.clockedInAt) {
    let pausedMs = hr.pausedMs || 0;
    if (hr.pausedAt) pausedMs += Date.now() - hr.pausedAt;
    const end = hr.clockedOutAt || Date.now();
    elapsedMs = Math.max(0, end - hr.clockedInAt - pausedMs);
  }

  const fmtClock = (d) => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

  const clockIn = () => {
    const now = Date.now();
    setDb(prev => appendActivity(
      {
        ...prev,
        hours: [
          ...prev.hours.map(h => (h.driverId === driver.id && h.status === 'open') ? { ...h, status: 'closed', clockOut: fmtClock(new Date(now)), clockedOutAt: now } : h),
          {
            id: 'hr-' + Math.random().toString(36).substring(2, 7),
            driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
            clockIn: fmtClock(new Date(now)), clockedInAt: now, clockOut: null, clockedOutAt: null,
            breakMin: 0, pausedMs: 0, pausedAt: null, status: 'open', date: TODAY_ISO,
          },
        ],
      },
      {
        type: 'shift.started',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} clocked in on #${truck.plate}`,
        refId: truck.id,
      }
    ));
  };

  const clockOut = () => {
    if (!hr) return;
    if (!confirm('End your shift on this truck?')) return;
    const now = Date.now();
    setDb(prev => appendActivity(
      {
        ...prev,
        hours: prev.hours.map(h => {
          if (h.id !== hr.id) return h;
          let pausedMs = h.pausedMs || 0;
          if (h.pausedAt) pausedMs += now - h.pausedAt;
          return {
            ...h, clockOut: fmtClock(new Date(now)), clockedOutAt: now,
            pausedAt: null, pausedMs, breakMin: Math.round(pausedMs / 60000),
            status: 'pending',
          };
        }),
      },
      {
        type: 'shift.ended',
        actorRole: 'driver',
        actorId: driver.id,
        summary: `${driver.name} ended shift on #${truck.plate}`,
        refId: truck.id,
      }
    ));
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px`, overflowY: 'auto' }}>
      {!embedded && (
        <button onClick={() => navigate(backHref)} style={{ ...T.bodySm, background: 'transparent', border: 'none', color: C.inkDim, padding: 0, marginBottom: S[3], cursor: 'pointer', textAlign: 'left' }}>← All my trucks</button>
      )}

      {!embedded && <DriverIncomingRequests db={db} setDb={setDb} driver={driver} projectIds={truck.projectId ? [truck.projectId] : []} />}

      {/* Truck header */}
      <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[2] }}>
          <Label>Truck</Label>
          {isOpen && !isPaused && <StatusPill status="open" />}
          {isOpen && isPaused && <Pill color={C.warn} soft={C.warnSoft}>Paused</Pill>}
          {!isOpen && <StatusPill status="idle" />}
        </div>
        <div style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, color: C.accent }}>#{truck.plate}</div>
        <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 4 }}>{truckType ? truckType.label : truck.type} · {truckType ? truckType.cap : ''} · {truck.hauler}</div>
        <div style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
          <Label style={{ marginBottom: 4 }}>On haul</Label>
          <div style={{ ...T.bodyLg, fontFamily: F.display, fontWeight: 600, color: C.ink }}>{project ? project.name : '—'}</div>
          <div style={{ ...T.micro, color: C.inkDim, marginTop: 2 }}>{project ? project.gc : ''}</div>
          <div style={{ ...T.micro, color: C.inkDim, marginTop: 2 }}>{project ? project.address : ''}</div>
        </div>
      </div>

      {/* KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: S[2], marginBottom: S[3] }}>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Loads</Label>
          <div style={{ ...T.statValue, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.length}</div>
        </Card>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Total CY</Label>
          <div style={{ ...T.statValue, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{totalCY}</div>
        </Card>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Shift</Label>
          <div style={{ ...T.statValue, fontWeight: 700, color: isOpen ? C.accent : C.inkDim, lineHeight: 1 }}>{isOpen ? (elapsedMs / 3600000).toFixed(1) + 'h' : '—'}</div>
        </Card>
      </div>

      {/* Primary actions */}
      {!isOpen ? (
        <button onClick={clockIn} style={{ ...T.h4, width: '100%', height: 64, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.4, marginBottom: S[2] }}>Clock in (this truck)</button>
      ) : (
        <>
          <button onClick={() => embedded ? (onOpenLogLoad && onOpenLogLoad(truck)) : navigate(`/driver/log/${truck.id}`)} style={{ ...T.h4, width: '100%', height: 64, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontWeight: 700, letterSpacing: -0.4, marginBottom: S[2] }}>+ Log load (this truck)</button>
          <button onClick={clockOut} style={{ ...T.body, width: '100%', height: 48, border: `1px solid ${C.warn}`, cursor: 'pointer', background: 'transparent', color: C.warn, borderRadius: R.lg, fontFamily: F.display, fontWeight: 600, marginBottom: S[2] }}>End shift on this truck</button>
        </>
      )}

      {/* Today's loads list */}
      <div style={{ marginTop: S[3] }}>
        <Label style={{ marginBottom: S[2] }}>Today's loads on #{truck.plate}</Label>
        {todayLoads.length === 0 ? (
          <EmptyState
            icon={<TruckIcon size={32} />}
            title="No loads logged yet"
            body="Use the + Log load button above to log your first load on this truck."
          />
        ) : (
          todayLoads.slice().reverse().map(l => {
            const m = MATERIALS.find(m => m.code === l.material);
            return (
              <div key={l.id} style={{ ...T.bodySm, display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: `${S[2]}px 0`, borderBottom: `1px solid ${C.rule}`}}>
                <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
                  {l.photo ? <img src={l.photo} alt="" style={{ width: 32, height: 32, borderRadius: R.xs, objectFit: 'cover' }} /> : <div style={{ ...T.body, width: 32, height: 32, borderRadius: R.xs, background: C.surfaceMax, display: 'flex', alignItems: 'center', justifyContent: 'center'}}>📷</div>}
                  <div>
                    <div style={{ fontFamily: F.display, fontWeight: 600 }}>{l.cy != null ? l.cy + ' CY' : l.ticketNo} · {m ? m.label : l.material}</div>
                    <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkDim, marginTop: 2 }}>{l.time}</div>
                  </div>
                </div>
                <StatusPill status={l.status} />
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}
  </script>

  <script type="text/babel" data-presets="react">
// === BLOCK 7: APP + MOUNT ===
// Context broadcast a monotonic nonce whenever this tab's db was rehydrated
// from another tab's localStorage write. Components subscribe to flash a cue.
const RemoteUpdateContext = React.createContext(0);

function App() {
  const [hash, navigate] = useHash();
  const [db, setDb] = useState(() => {
    try {
      return hydrateDb(window.localStorage.getItem(DB_STORAGE_KEY));
    } catch (e) {
      return buildSeed();
    }
  });
  const [remoteUpdateNonce, setRemoteUpdateNonce] = useState(0);
  // Track the last serialized payload we wrote (or received) so we can skip
  // redundant writes — including the write that would otherwise echo back the
  // value we just received from another tab.
  const lastSerializedRef = useRef(null);
  useEffect(() => {
    try {
      const serialized = JSON.stringify(db);
      if (lastSerializedRef.current === serialized) return;
      lastSerializedRef.current = serialized;
      window.localStorage.setItem(DB_STORAGE_KEY, serialized);
    } catch (e) {
      // localStorage unavailable / quota exceeded — silently no-op
    }
  }, [db]);
  // Cross-tab sync: when another tab writes to jse_db_v1, hydrate the new value
  // here. `storage` events do not fire in the originating tab, so no loop.
  // newValue === null means a sibling tab cleared the key (Reset demo data) —
  // hydrateDb(null) returns a fresh seed, so peer tabs reseed too.
  useEffect(() => {
    const onStorage = (e) => {
      if (e.key !== DB_STORAGE_KEY) return;
      const next = hydrateDb(e.newValue);
      // Pre-arm the persist guard so it won't re-write the value we just got.
      lastSerializedRef.current = e.newValue == null ? null : JSON.stringify(next);
      setDb(next);
      setRemoteUpdateNonce(n => n + 1);
    };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);
  // Derive document.title from the current hash so the browser tab reflects context.
  useEffect(() => {
    const h = hash || '/';
    const parts = h.split('/').filter(Boolean);
    let title = 'Jobsite Exchange';
    if (h === '/' || h === '') title = 'Jobsite Exchange';
    else if (h.startsWith('/admin/reporting')) title = 'JSE — Reports';
    else if (h.startsWith('/admin/reports')) title = 'JSE — Live stats';
    else if (h.startsWith('/admin/payments')) title = 'JSE — Payments';
    else if (h.startsWith('/admin/trucks/active')) title = 'JSE — Active Trucks';
    else if (h.startsWith('/admin/trucks/new/for/') && parts[4] && db && db.haulers) {
      const op = db.haulers.find(o => o.id === parts[4]);
      title = op ? `JSE — New truck for ${op.name}` : 'JSE — New truck';
    }
    else if (h.startsWith('/admin/trucks/new')) title = 'JSE — New truck';
    else if (h.startsWith('/admin/new')) title = 'JSE — New Haul';
    else if (h.startsWith('/admin/activity')) title = 'JSE — Activity';
    else if (h.startsWith('/admin/requests')) {
      title = parts[2] ? `JSE — Haul Request ${parts[2]}` : 'JSE — Haul Requests';
    }
    else if (h.startsWith('/admin/haulers')) {
      if (parts[2] && db && db.haulers) {
        const op = db.haulers.find(o => o.id === parts[2]);
        title = op ? `JSE — Hauler — ${op.name}` : 'JSE — Haulers';
      } else {
        title = 'JSE — Haulers';
      }
    }
    else if (parts[0] === 'admin' && parts[1] === 'p' && parts[2]) {
      const proj = db && db.projects ? db.projects.find(p => p.id === parts[2]) : null;
      if (proj && parts[3] === 'o' && parts[4]) {
        const op = db.haulers.find(o => o.id === parts[4]);
        title = op ? `JSE — Admin — ${proj.name} / ${op.name}` : `JSE — Admin — ${proj.name}`;
      } else {
        title = proj ? `JSE — Admin — ${proj.name}` : 'JSE — Admin';
      }
    }
    else if (h.startsWith('/admin')) title = 'JSE — Admin';
    else if (parts[0] === 'hauler' && parts[1] === 'o' && parts[2]) {
      const op = db && db.haulers ? db.haulers.find(o => o.id === parts[2]) : null;
      if (op && parts[3] === 'p' && parts[4]) {
        const proj = db.projects.find(p => p.id === parts[4]);
        title = proj ? `JSE — Hauler — ${op.name} / ${proj.name}` : `JSE — Hauler — ${op.name}`;
      } else {
        title = op ? `JSE — Hauler — ${op.name}` : 'JSE — Hauler';
      }
    }
    else if (h.startsWith('/hauler')) title = 'JSE — Hauler';
    else if (parts[0] === 'driver' && parts[1] === 'log') {
      title = 'JSE — Driver — Log load';
    }
    else if (parts[0] === 'driver' && parts[1] === 'truck' && parts[2]) {
      const tr = db && db.trucks ? db.trucks.find(t => t.id === parts[2]) : null;
      title = tr ? `JSE — Driver — Truck #${tr.plate}` : 'JSE — Driver';
    }
    else if (h.startsWith('/driver')) title = 'JSE — Driver';
    document.title = title;
  }, [hash, db]);
  const route = (hash || '/').split('/')[1] || '';
  return (
    <RemoteUpdateContext.Provider value={remoteUpdateNonce}>
      <div>
        {route === '' && <Landing navigate={navigate} />}
        {route === 'admin' && <AdminShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
        {route === 'hauler' && <HaulerShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
        {route === 'driver' && <DriverShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
      </div>
    </RemoteUpdateContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>

</body>
