<!-- Jobsite Exchange — single-file React mockup. See README.md. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobsite Exchange — Role Dashboards</title>
  <meta name="description" content="Admin / Hauler / Driver dashboards for hourly hauling — Jobsite Exchange." />
  <meta property="og:title" content="Jobsite Exchange — Role Dashboards" />
  <meta property="og:description" content="Hierarchy: Admin → Hauls → Haulers → Trucks → Drivers." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z' fill='%23B3E635'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='sans-serif' font-size='34' font-weight='800' fill='%230A0A0A'%3EJ%3C/text%3E%3C/svg%3E" />
  <!-- Supabase JS v2 UMD — exposes window.supabase.createClient. Used by the
       cloud-sync layer in BLOCK 1b for read (Phase 2) + write/Realtime (Phase 3).
       If this CDN fails to load the app stays fully functional in offline mode
       backed by localStorage; the CloudStatus chip surfaces the offline state. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff; font-family: "Inter", -apple-system, system-ui, sans-serif; }
    #root { min-height: 100vh; }
    .boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; background: #000; color: #B3E635;
      font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 13px;
    }
    .boot svg { width: 56px; height: 56px; }
    .boot .spinner {
      width: 22px; height: 22px; border: 2px solid #1F1F1F; border-top-color: #B3E635;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Cross-tab sync flash: a subtle accent pulse on elements that just hydrated
       from another browser tab's localStorage write. */
    @keyframes jsePulse {
      0%   { box-shadow: 0 0 0 0 rgba(179, 230, 53, 0.55); }
      60%  { box-shadow: 0 0 0 12px rgba(179, 230, 53, 0); }
      100% { box-shadow: 0 0 0 0 rgba(179, 230, 53, 0); }
    }
    .jse-pulse {
      animation: jsePulse 1.2s ease-out;
      border-radius: 16px;
    }
    @media (prefers-reduced-motion: reduce) {
      .jse-pulse { animation: none; }
    }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 6px; }
    *::-webkit-scrollbar-thumb:hover { background: #2a2a2a; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* === Marketing landing: smooth in-page nav ===
       Honor reduced-motion preferences and the headless capture env. */
    @media (prefers-reduced-motion: no-preference) {
      html { scroll-behavior: smooth; }
    }
    /* Compensate for any sticky header so section anchors land below it */
    section[id] { scroll-margin-top: 24px; }
    /* Hero headline: force the second clause onto its own line only at desktop widths.
       At â‰¤900px the span flows inline so the headline wraps naturally with no double-wrap. */
    @media (min-width: 901px) {
      [data-hero-line="break"] { display: block; }
    }


    /* === Tier 2: tables → cards on mobile === */
    @media (max-width: 700px) {
      /* Tables become vertical card stacks */
      body table, body thead, body tbody, body tr, body td {
        display: block !important;
        width: auto !important;
      }
      body thead { display: none !important; }
      body table {
        border-collapse: separate !important;
        border-spacing: 0 8px !important;
        margin: 0 !important;
      }
      body tr {
        background: #141414 !important;
        border-radius: 12px !important;
        margin-bottom: 8px !important;
        padding: 12px 14px !important;
        border: 1px solid #1f1f1f !important;
        cursor: inherit;
      }
      body td {
        border: none !important;
        padding: 3px 0 !important;
        text-align: left !important;
        font-size: 13px !important;
        white-space: normal !important;
      }
      body td:first-child {
        font-size: 17px !important;
        font-weight: 700 !important;
        padding: 0 0 8px 0 !important;
        margin-bottom: 4px !important;
        border-bottom: 1px solid rgba(255,255,255,0.06) !important;
      }
      /* All cells after first display inline so they flow as metadata chips */
      body td:not(:first-child) {
        display: inline-block !important;
        margin-right: 14px !important;
        vertical-align: middle !important;
      }
      /* The trailing chevron/arrow cell — push to the right and dim */
      body td[align="right"]:last-child {
        float: right;
        margin-right: 0 !important;
        color: #5a5a5a;
      }
      /* The + Add row (uses colspan) → full-width accent button-style */
      body tr td[colspan] {
        display: block !important;
        text-align: center !important;
        color: #B3E635 !important;
        font-weight: 600 !important;
        padding: 14px !important;
        margin: 0 !important;
        font-size: 14px !important;
        border-bottom: none !important;
      }
      body tr:has(td[colspan]) {
        background: transparent !important;
        border: 1px dashed #2a2a2a !important;
      }
      /* Tighter card padding */
      [style*="border-radius: 16px"] { border-radius: 12px !important; }
      /* Cards inside cards (KPIs) take full width */
      [style*="background: rgb(20, 20, 20)"] { width: 100% !important; box-sizing: border-box !important; }
    }

    /* === Tier 1 mobile responsive === */
    @media (max-width: 900px) {
      [style*="padding: 32px"] { padding: 16px !important; }
      [style*="padding: 24px"] { padding: 14px !important; }
      h1 { font-size: 32px !important; line-height: 1.15 !important; }
      /* 4-col KPI grids → 2-col on tablet */
      [style*="repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      /* Tables horizontally scroll via parent :has() */
      :has(> table) {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        max-width: 100% !important;
      }
      /* Topbar reduces padding */
      .topbar { padding: 10px 14px !important; }
    }
    @media (max-width: 600px) {
      [style*="padding: 32px"] { padding: 12px !important; }
      [style*="padding: 24px"] { padding: 10px !important; }
      h1 { font-size: 26px !important; line-height: 1.15 !important; letter-spacing: -0.6px !important; }
      /* All multi-col grids → single column on phone */
      [style*="display: grid"] {
        grid-template-columns: 1fr !important;
      }
      /* Flex headers (h1 + button) wrap */
      [style*="justify-content: space-between"][style*="display: flex"] {
        flex-wrap: wrap !important;
        gap: 12px !important;
      }
      /* Inputs at 16px to prevent iOS zoom on focus */
      input, select, textarea {
        font-size: 16px !important;
      }
      /* Topbar wraps */
      .topbar {
        flex-wrap: wrap !important;
        gap: 8px !important;
        padding: 8px 12px !important;
      }
      .topbar > div { gap: 12px !important; }
      /* Driver phone frame fills the actual phone */
      .phone-frame-outer {
        padding: 0 !important;
        background: #0A0A0A !important;
      }
      .phone-frame-outer > .brand-frame-chrome,
      .phone-frame-outer > .phone-frame-caption {
        display: none !important;
      }
      .phone-frame-outer > .phone-bezel {
        width: 100% !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
      }
      .phone-frame-outer .phone-screen {
        border-radius: 0 !important;
        min-height: 100vh !important;
      }
      .phone-frame-outer .phone-notch { display: none !important; }
    }

    /* === Mobile responsiveness pass — 2026-05 === */
    /* Tap-target floor: inputs/selects/textareas inside the shells must be at least 44px tall under 700px. */
    @media (max-width: 700px) {
      input:not([type="file"]):not([type="checkbox"]):not([type="radio"]),
      select,
      textarea {
        min-height: 44px !important;
        padding: 12px 14px !important;
        box-sizing: border-box !important;
      }
      /* Btn size="sm" (height:32) and size="xs" (height:26) → bump to 44px on mobile.
         The Btn component renders inline height in the style attribute; match it. */
      button[style*="height: 32px"],
      button[style*="height: 26px"] {
        min-height: 44px !important;
        height: auto !important;
        padding-top: 8px !important;
        padding-bottom: 8px !important;
      }
    }

    /* DriverShell mini-KPI grids should stay 3-col on phone, not collapse via the global 1fr rule.
       More specific than [style*="display: grid"]. Matches the explicit 3-col templates used in
       DriverTruckDetail and DriverMultiTruckHome. */
    @media (max-width: 600px) {
      [style*="grid-template-columns: 1fr 1fr 1fr"],
      [style*="gridTemplateColumns: 1fr 1fr 1fr"] {
        grid-template-columns: 1fr 1fr 1fr !important;
        gap: 8px !important;
      }
    }

    /* HaulerLogLoadForm row: 90px / 1fr / 1fr / 100px / auto.
       Default grid override collapses it to 1-col on â‰¤600 (still acceptable — inputs stack).
       At 700px window we keep the grid but reflow it so it doesn't horizontally squeeze. */
    @media (max-width: 900px) and (min-width: 601px) {
      [style*="90px 1fr 1fr 100px auto"] {
        grid-template-columns: 1fr 1fr !important;
        gap: 12px !important;
      }
    }

    /* DriverLogLoad photo placeholder: on very narrow phones, switch from fixed 140px height
       to aspect-ratio so the icon+labels never feel cramped at 320–360px viewports. */
    @media (max-width: 600px) {
      button[style*="height: 140px"][style*="dashed"] {
        height: auto !important;
        aspect-ratio: 16 / 10 !important;
        min-height: 120px !important;
      }
    }

    /* Reports date range picker: show preset pill row on desktop, select dropdown on phone.
       Used by DateRangePicker in AdminReports. */
    .jse-rangepicker-pills { display: inline-flex; flex-wrap: wrap; gap: 6px; }
    .jse-rangepicker-select { display: none; }
    @media (max-width: 700px) {
      .jse-rangepicker-pills { display: none; }
      .jse-rangepicker-select { display: block; width: 100%; }
    }

    /* The 7-day bar chart needs to be tappable on mobile. Show the tooltip on the
       active bar (mouseover or focus) — implementation toggles a state class. */
    .jse-bar { cursor: pointer; transition: opacity 120ms ease; }
    .jse-bar:hover, .jse-bar:focus { opacity: 0.85; }

    /* Topbar at very narrow widths (â‰¤500px): hide the breadcrumb/current text,
       keep brand + role pill + Switch button visible. The role Pill is the first
       <span> child; the breadcrumb is the second <span> sibling. Hide only the
       second one. */
    @media (max-width: 500px) {
      .topbar > div:first-child > div > span:nth-child(2) {
        display: none !important;
      }
    }

    /* Horizontal-scroll safety net for unbroken IDs / emails / long plate strings.
       Use `overflow-x: clip` (not `hidden`) so we don't create a scroll containing block,
       which would break the sticky Topbar in iOS Safari and older Chromium. */
    @media (max-width: 600px) {
      html, body { overflow-x: clip; }
    }
    /* === Admin sidebar + mobile drawer ===
       Desktop (>900px): permanent 240px sidebar to the left of the main content.
       Mobile (â‰¤900px): sidebar hides; a hamburger button in the Topbar opens
       a slide-in drawer with the same nav items. Backdrop dims the page. */
    .admin-mobile-nav-trigger { display: none; }
    @media (max-width: 900px) {
      .admin-sidebar { display: none !important; }
      .admin-mobile-nav-trigger {
        display: inline-flex !important;
        align-items: center; justify-content: center;
        background: transparent; border: 1px solid #2A2A2A; color: #9A9A9A;
        width: 36px; height: 36px; border-radius: 999px; cursor: pointer;
      }
      .admin-mobile-nav-trigger:hover { color: #fff; border-color: #B3E635; }
    }
    @keyframes adminDrawerSlideIn {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes adminDrawerFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .admin-drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 80; animation: adminDrawerFade 180ms ease-out;
    }
    .admin-drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 280px; background: #141414; border-right: 1px solid #1F1F1F;
      z-index: 90; padding: 16px; box-sizing: border-box;
      animation: adminDrawerSlideIn 200ms ease-out;
      overflow-y: auto;
    }
    @media (prefers-reduced-motion: reduce) {
      .admin-drawer, .admin-drawer-backdrop { animation: none !important; }
    }

    @media print {
      html, body { background: #fff !important; color: #000 !important; }
      body * { visibility: hidden; }
      .invoice-print, .invoice-print * { visibility: visible; }
      .invoice-print { position: absolute; left: 0; top: 0; width: 100%; padding: 24px !important; background: #fff !important; color: #000 !important; border: 0 !important; }
      .invoice-print *, .invoice-print *:before, .invoice-print *:after { color: #000 !important; background: transparent !important; border-color: #ccc !important; box-shadow: none !important; }
      .invoice-print th, .invoice-print td { border-bottom: 1px solid #ccc !important; padding: 8px !important; }
      .no-print { display: none !important; }
    }
    /* === Hauling Control Center (AdminProjects) — responsive shifts ===
       Desktop default: 6 KPI cards across, NeedsAttention + Map side-by-side,
       dense haul card grid. Tablet: KPIs wrap to 3-up, panels stack. Phone:
       KPIs 2-up, haul cards switch to single-column. */
    @media (max-width: 1100px) {
      .hcc-kpi-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .hcc-attn-row { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 700px) {
      .hcc-kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .haul-op-card-grid { grid-template-columns: 1fr !important; }
    }
    /* Site Conditions 7-day strip — lock to 7 columns at every viewport so the
       strip never collapses to one day per row on mobile. Inline style sets
       this too; class is a belt-and-suspenders defense against any cell whose
       intrinsic min-width might otherwise force a row break in Safari. */
    .site-cond-strip {
      display: grid !important;
      grid-template-columns: repeat(7, minmax(0, 1fr)) !important;
      gap: 4px;
    }
    .site-cond-strip > * { min-width: 0; }
    /* Live Operations Map — header filter row wraps on narrow viewports */
    @media (max-width: 700px) {
      .lom-filters { width: 100%; }
    }
    /* === Haulers tab — fleet ops dashboard responsive shifts === */
    @media (max-width: 1180px) {
      .haulers-kpi-grid { grid-template-columns: repeat(4, 1fr) !important; }
      .haulers-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 700px) {
      .haulers-kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .haulers-drawer-grid { grid-template-columns: 1fr !important; }
      /* Hauler card stat grid — 7 stats in repeat(4,1fr) overflows on phones.
         Drop to 3-up so cards read like phone-shaped panels. */
      .hauler-card-stats { grid-template-columns: repeat(3, 1fr) !important; }
      /* Action row: stack vertically and shrink the collapse hint. */
      .hauler-card-actions { flex-direction: column !important; align-items: stretch !important; }
      .hauler-card-collapse-hint { text-align: center; }
      .hauler-card-action-btns { justify-content: stretch !important; }
      .hauler-card-action-btns > * { flex: 1; }
      /* Top-right dashboard hotspot: drop the label, keep the arrow + hit target. */
      .hauler-card-open-btn-label { display: none; }
      .hauler-card-open-btn { padding: 6px 10px !important; }
    }
    @media (max-width: 480px) {
      .hauler-card-stats { grid-template-columns: repeat(2, 1fr) !important; }
    }
    /* Hover lift + glow on hauler cards */
    .hauler-ops-card:hover {
      border-color: rgba(179,230,53,0.55) !important;
      box-shadow: 0 0 22px -10px rgba(179,230,53,0.55) !important;
      transform: translateY(-1px);
    }

    /* === LiveOperationsTileMap — MapLibre container sizing.
       480px desktop, 320px mobile. MapLibre needs an explicit pixel height. */
    .lom-tile-map { height: 480px; }
    @media (max-width: 700px) {
      .lom-tile-map { height: 320px !important; }
    }
    /* MapLibre default attribution can crowd the dispatch chrome — soften it. */
    .lom-tile-map .maplibregl-ctrl-attrib { font-size: 10px; opacity: 0.7; }
    .lom-tile-map .maplibregl-ctrl-attrib a { color: #B3E635; }
    /* Halo+dot pin — `jx-haul-pin` parity with jobsiteexchange.com (verbatim
       from map-recon-haul-calc.md). Static (no animation) — the real site
       does not animate the halo, and prior pulse keyframes caused visible
       drift on zoom because scale() compounded with the -50% translate's
       reference box. Container is 28x28; halo fills inset:0; dot is 16x16
       centered with margin offset. Marker constructor uses anchor:'center'
       so the dot's geographic center sits at the lng/lat point. */
    .jx-haul-pin { position: relative; width: 28px; height: 28px; }
    .jx-haul-pin .jx-haul-pin-halo {
      position: absolute; inset: 0; border-radius: 50%;
      opacity: 0.45; pointer-events: none;
    }
    .jx-haul-pin .jx-haul-pin-dot {
      position: absolute; top: 50%; left: 50%;
      width: 16px; height: 16px; margin: -8px 0 0 -8px;
      border-radius: 50%; border: 3px solid #0A0A0A;
      box-shadow: 0 1px 4px #0000008c;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot" id="boot">
      <svg viewBox="0 0 64 64" fill="none">
        <path d="M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z" fill="#B3E635"/>
        <text x="32" y="44" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="800" fill="#0A0A0A">J</text>
      </svg>
      <div class="spinner"></div>
      <div>Loading prototype…</div>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- MapLibre GL JS — vector/raster tile renderer for Live Operations Map.
       Sourced to match jobsiteexchange.com's CartoCDN dark_all raster tiles
       (recon found this URL template literally embedded in their bundle).
       If the CDN fails, LiveOperationsTileMap falls back to the SVG mock. -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <script type="text/babel" data-presets="react">
// === BLOCK 1: TOKENS + SHARED COMPONENTS ===
const { useState, useEffect, useMemo, useRef, useContext } = React;

// =====================================================================
// Design tokens — preserved from Phase 1 mockup
// =====================================================================
const C = {
  bg: '#0A0A0A', bgDeep: '#000000',
  surface: '#141414', surfaceHi: '#1C1C1C', surfaceMax: '#222222',
  ink: '#FFFFFF', inkDim: '#9A9A9A', inkFaint: '#5A5A5A',
  rule: '#1F1F1F', ruleHi: '#2A2A2A',
  accent: '#B3E635',
  accentSoft: 'rgba(179, 230, 53, 0.10)',
  accentMuted: 'rgba(179, 230, 53, 0.04)',
  warn: '#FF6B47', warnSoft: 'rgba(255, 107, 71, 0.08)',
  ok: '#5BC97C', okSoft: 'rgba(91, 201, 124, 0.08)',
  info: '#5AAEFF', infoSoft: 'rgba(90, 174, 255, 0.08)',
};
const F = {
  display: '"Inter Tight", "Inter", -apple-system, system-ui, sans-serif',
  body: '"Inter", -apple-system, system-ui, sans-serif',
  mono: '"JetBrains Mono", "SF Mono", Menlo, monospace',
};
const R = { xs: 4, sm: 8, md: 12, lg: 16, pill: 999 };
const S = { 1: 4, 2: 8, 3: 12, 4: 16, 5: 24, 6: 32, 7: 48, 8: 64 };

// Typography tokens — single source of truth for type. Inline `fontSize:` values
// throughout the app should spread from these tokens instead of using raw numbers.
const T = {
  h1:        { fontFamily: F.display, fontSize: 44, fontWeight: 700, lineHeight: 1.1, letterSpacing: -1 },
  h2Lg:      { fontFamily: F.display, fontSize: 36, fontWeight: 700, lineHeight: 1.15, letterSpacing: -1 },
  h2:        { fontFamily: F.display, fontSize: 28, fontWeight: 700, lineHeight: 1.2, letterSpacing: -0.5 },
  statValue: { fontFamily: F.display, fontSize: 22, fontWeight: 700, lineHeight: 1.1 },
  h3:        { fontFamily: F.display, fontSize: 20, fontWeight: 600, lineHeight: 1.3 },
  h4:        { fontFamily: F.display, fontSize: 18, fontWeight: 600, lineHeight: 1.3 },
  bodyLg:    { fontFamily: F.body, fontSize: 16, lineHeight: 1.5 },
  body:      { fontFamily: F.body, fontSize: 14, lineHeight: 1.5 },
  bodySm:    { fontFamily: F.body, fontSize: 13, lineHeight: 1.5 },
  caption:   { fontFamily: F.body, fontSize: 12, lineHeight: 1.4, color: C.inkDim },
  micro:     { fontFamily: F.body, fontSize: 11, lineHeight: 1.35 },
  mono:      { fontFamily: F.mono, fontSize: 12, lineHeight: 1.4 },
  monoSm:    { fontFamily: F.mono, fontSize: 11, lineHeight: 1.4 },
};

// =====================================================================
// Date anchors (declared before seeds so LOADS_SEED / HOURS_SEED can reference them)
// =====================================================================
// Frozen reference dates for deterministic mockup behavior. All loads/hours dates
// are real ISO strings (YYYY-MM-DD), generated relative to TODAY_ISO so the demo
// produces stable charts regardless of when the page is opened.
const TODAY_ISO = '2026-05-19';

// Helper: returns ISO date N days before TODAY_ISO. dayOffset 0 = today, 1 = yesterday, etc.
function isoDaysAgo(dayOffset) {
  const [y, m, d] = TODAY_ISO.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() - dayOffset);
  return dt.toISOString().slice(0, 10);
}

const YESTERDAY_ISO = isoDaysAgo(1);

// Tiny helpers so consumers don't compare raw strings.
function isToday(iso)     { return iso === TODAY_ISO; }
function isYesterday(iso) { return iso === YESTERDAY_ISO; }
function isInRange(iso, startIso, endIso) {
  return iso >= startIso && iso <= endIso;
}

// Pretty short weekday label for chart axes: 'Mon', 'Tue', ...
function isoToWeekdayShort(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getUTCDay()];
}

// Pretty short date label: 'May 19'
function isoToShortDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));

}

const NOW_MIN = 11 * 60 + 5; // 11:05

function calcHours(clockIn, breakMin, clockOut) {
  const [h, m] = clockIn.split(':').map(Number);
  const start = h * 60 + m;
  const end = clockOut
    ? (() => { const [eh, em] = clockOut.split(':').map(Number); return eh * 60 + em; })()
    : NOW_MIN;
  return Math.max(0, (end - start - breakMin) / 60);
}

function useHash() {
  // Read + normalize. Canonical route is `#/hauler/...`; the legacy `#/operator/...`
  // alias is rewritten so old shared links keep working after the v4 rename.
  const read = () => {
    let h = window.location.hash.replace(/^#/, '') || '/';
    if (h === '/operator' || h.startsWith('/operator/')) {
      h = '/hauler' + h.slice('/operator'.length);
    }
    return h;
  };
  const [hash, setHash] = useState(read);
  useEffect(() => {
    const onChange = () => setHash(read());
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  const navigate = (to) => { window.location.hash = to; };
  return [hash, navigate];
}

// Address-flavoured EditableText. Same click-to-edit UX, plus:
//   • Photon-backed autocomplete dropdown (debounced 300ms, min 3 chars).
//   • Keyboard nav: ↑/↓ to highlight, Enter to pick, Esc to cancel.
//   • Selecting a suggestion populates the field with the canonical address
//     and writes lat/lng into db.geocode immediately (no follow-up fetch).
//   • If the user commits raw text (no pick), runs the cascade geocoder in
//     the background and caches the result so the mini-map paints the right
//     pin even when the typed string didn't match any suggestion.
//   • Shows "✓ verified" once a coords cache hit exists for the current value.
// Used by AdminHaulRequestDetail for pickup/dropoff address inputs. Plain
// EditableText still owns the location *name* fields (e.g. "Highline Pit").
function AddressAutocomplete({ value, onSave, placeholder, db, setDb, style = {}, alwaysEditing = false, inputStyle = null }) {
  const [editing, setEditing] = useState(alwaysEditing);
  const [text, setText] = useState(value || '');
  const [suggestions, setSuggestions] = useState([]);
  const [highlightIdx, setHighlightIdx] = useState(-1);
  const [loading, setLoading] = useState(false);
  const [searched, setSearched] = useState(false); // true once a fetch for the
  // current text has come back — gates the "no matches" empty-state row so it
  // doesn't flash while the debounced fetch is still in flight.
  const [warning, setWarning] = useState('');
  const debounceRef = useRef(null);
  const inputRef = useRef(null);
  const wrapperRef = useRef(null);

  useEffect(() => setText(value || ''), [value]);
  useEffect(() => () => { if (debounceRef.current) clearTimeout(debounceRef.current); }, []);

  const cached = (db && db.geocode && db.geocode[value]) || null;
  const verified = !!(cached && isFinite(cached.lat) && isFinite(cached.lng));

  const writeGeocode = (addrText, coords) => {
    setDb(prev => ({ ...prev, geocode: { ...(prev.geocode || {}), [addrText]: coords } }));
  };

  const resolveAndCommit = async (finalText) => {
    if (!alwaysEditing) setEditing(false);
    setSuggestions([]);
    setHighlightIdx(-1);
    setSearched(false);
    const next = finalText || '';
    if (next !== (value || '')) onSave(next);
    if (!next) { setWarning(''); return; }
    const existing = (db && db.geocode && db.geocode[next]) || null;
    if (existing && isFinite(existing.lat) && isFinite(existing.lng)) { setWarning(''); return; }
    const res = await geocodeAddress(next);
    if (res && isFinite(res.lat) && isFinite(res.lng)) {
      writeGeocode(next, res);
      setWarning('');
    } else {
      setWarning("Couldn't geocode this address — pin location won't be available.");
    }
  };

  const pickSuggestion = (s) => {
    if (!alwaysEditing) setEditing(false);
    setSuggestions([]);
    setHighlightIdx(-1);
    setSearched(false);
    setWarning('');
    const canonical = s.displayName;
    // After picking, push the canonical text into the local input state too
    // so always-editing forms reflect the choice without remounting.
    setText(canonical);
    // Order matters: write geocode FIRST so the cache is populated before the
    // address-text commit triggers HaulRouteMiniMap's [pickAddr, dropAddr]
    // useEffect. React 18 batches both setDb calls into one render anyway,
    // but this ordering keeps the dependency obvious for future readers and
    // safe even if batching semantics ever change. The mini-map then reads
    // the new entry on the very first re-run of its effect — no second pass,
    // no Nominatim cascade re-fetch, instant pin placement → OSRM route fetch
    // → drive time + tandem CY/day recalculate downstream.
    writeGeocode(canonical, { lat: s.lat, lng: s.lng, displayName: canonical, source: s.source });
    if (canonical !== (value || '')) onSave(canonical);
  };

  // Eligibility gate. Avoids hammering the geocoder with garbage and prevents
  // the "15185" symptom where Photon happily returned random Arvada streets
  // because it parsed the digits as a ZIP prefix. The query must be at least
  // 6 chars AND contain a space (so partial street names like "1105 r" don't
  // fire) AND not be purely digits/whitespace.
  const isQueryEligible = (v) => {
    const s = String(v || '').trim();
    if (s.length < 6) return false;
    if (!/\s/.test(s)) return false;
    if (/^[\d\s]+$/.test(s)) return false;
    return true;
  };

  const onInputChange = (e) => {
    const v = e.target.value;
    setText(v);
    setHighlightIdx(-1);
    setWarning('');
    setSearched(false);
    if (debounceRef.current) clearTimeout(debounceRef.current);
    if (!isQueryEligible(v)) {
      setSuggestions([]);
      setLoading(false);
      return;
    }
    // Show the spinner the moment the query becomes eligible — not 200ms
    // later when the debounced fetch actually starts. Feels snappier and
    // tells the user "we heard you" while the network round trip is in
    // flight.
    setLoading(true);
    debounceRef.current = setTimeout(async () => {
      const s = await suggestAddresses(v);
      setSuggestions(s);
      setLoading(false);
      setSearched(true);
    }, 200);
  };

  const onKeyDown = (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setHighlightIdx(i => Math.min(suggestions.length - 1, i + 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setHighlightIdx(i => Math.max(-1, i - 1));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (highlightIdx >= 0 && suggestions[highlightIdx]) pickSuggestion(suggestions[highlightIdx]);
      else resolveAndCommit(text);
    } else if (e.key === 'Escape') {
      e.preventDefault();
      setText(value || '');
      if (!alwaysEditing) setEditing(false);
      setSuggestions([]);
      setHighlightIdx(-1);
    }
  };

  const onBlur = () => {
    // Defer so a suggestion mousedown can fire before we collapse.
    setTimeout(() => {
      if (wrapperRef.current && wrapperRef.current.contains(document.activeElement)) return;
      resolveAndCommit(text);
    }, 160);
  };

  if (!alwaysEditing && !editing) {
    return (
      <span
        onClick={(e) => { e.stopPropagation(); e.preventDefault(); setEditing(true); setTimeout(() => inputRef.current && inputRef.current.focus(), 0); }}
        onMouseDown={e => e.stopPropagation()}
        style={{ cursor: 'text', padding: '3px 6px', margin: '-3px -6px', borderRadius: R.xs, transition: 'background 80ms', display: 'inline-block', minWidth: 18, ...style }}
        onMouseEnter={e => e.currentTarget.style.background = 'rgba(179,230,53,0.12)'}
        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
        title="Click to edit"
      >
        {value || <span style={{ color: C.inkFaint }}>{placeholder || '—'}</span>}
        {value && verified && (
          <span style={{ color: C.ok, marginLeft: 8, fontSize: 11, fontWeight: 500, letterSpacing: 0.3 }}>
            ✓ verified
          </span>
        )}
      </span>
    );
  }

  return (
    <div ref={wrapperRef} style={{ position: 'relative', display: 'inline-block', width: '100%' }}>
      <input
        ref={inputRef}
        value={text}
        onChange={onInputChange}
        onKeyDown={onKeyDown}
        onBlur={onBlur}
        onClick={e => e.stopPropagation()}
        onMouseDown={e => e.stopPropagation()}
        placeholder={placeholder || ''}
        autoFocus={!alwaysEditing}
        style={inputStyle || { background: C.bg, color: C.ink, border: `1px solid ${C.accent}`, padding: '4px 8px', borderRadius: R.sm, fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 'inherit', letterSpacing: 'inherit', width: '100%', boxSizing: 'border-box', ...style }}
      />
      {loading && (
        <span
          aria-label="Searching"
          style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', width: 12, height: 12, borderRadius: '50%', border: `2px solid ${C.ruleHi}`, borderTopColor: C.accent, animation: 'spin 700ms linear infinite', pointerEvents: 'none' }}
        />
      )}
      {suggestions.length > 0 && (
        <div
          onMouseDown={e => e.stopPropagation()}
          style={{ position: 'absolute', top: 'calc(100% + 2px)', left: 0, right: 0, zIndex: 1000, background: C.surfaceHi, border: `1px solid ${C.ruleHi}`, borderRadius: R.sm, boxShadow: '0 8px 20px rgba(0,0,0,0.45)', maxHeight: 240, overflowY: 'auto' }}
        >
          {suggestions.map((s, i) => (
            <div
              key={i}
              onMouseDown={(e) => { e.preventDefault(); pickSuggestion(s); }}
              onMouseEnter={() => setHighlightIdx(i)}
              style={{ padding: '8px 10px', cursor: 'pointer', background: highlightIdx === i ? 'rgba(179,230,53,0.14)' : 'transparent', borderTop: i > 0 ? `1px solid ${C.rule}` : 'none', ...T.bodySm, color: C.ink, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}
            >
              <span style={{ flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.displayName}</span>
              <span style={{ ...T.caption, color: (s.source === 'mapbox' || s.source === 'census') ? C.ok : C.inkFaint, fontSize: 10, letterSpacing: 0.4, textTransform: 'uppercase', flexShrink: 0 }}>
                {s.source === 'mapbox' ? 'MAPBOX' : s.source === 'census' ? 'USPS' : 'PHOTON'}
              </span>
            </div>
          ))}
        </div>
      )}
      {loading && suggestions.length === 0 && (
        <div
          onMouseDown={e => e.stopPropagation()}
          style={{ position: 'absolute', top: 'calc(100% + 2px)', left: 0, right: 0, zIndex: 1000, background: C.surfaceHi, border: `1px solid ${C.ruleHi}`, borderRadius: R.sm, boxShadow: '0 8px 20px rgba(0,0,0,0.45)', padding: '8px 10px', ...T.caption, color: C.inkFaint, display: 'flex', alignItems: 'center', gap: 8 }}
        >
          <span style={{ width: 10, height: 10, borderRadius: '50%', border: `2px solid ${C.ruleHi}`, borderTopColor: C.accent, animation: 'spin 700ms linear infinite' }} />
          <span>Searching addresses…</span>

function EditableSelect({ value, options, onSave, style = {} }) {

  const opt = options.find(o => o.value === value) || { label: value || '—' };
  if (editing) {
    return (
      <select value={value || ''} onChange={e => { onSave(e.target.value); setEditing(false); }} onBlur={() => setEditing(false)} autoFocus
        onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}
        style={{ background: C.bg, color: C.ink, border: `1px solid ${C.accent}`, padding: '4px 8px', borderRadius: R.sm, fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 'inherit', ...style }}>

// Click-to-edit material picker — wraps EditableSelect's pattern but adds
// an "Other…" sentinel option that switches the control to a free-text
// input. Lets users either pick from MATERIALS or type a custom material
// name that survives end-to-end as the raw materialCode string. Display
// resolves through materialLabel() so a custom name renders verbatim.
function EditableMaterial({ value, onSave, style = {} }) {
  const knownMat = MATERIALS.find(m => m.code === value);
  // 'view' | 'select' | 'other'
  const [mode, setMode] = useState('view');
  const [otherText, setOtherText] = useState(knownMat ? '' : (value || ''));
  useEffect(() => { if (mode === 'view') setOtherText(knownMat ? '' : (value || '')); }, [value, mode, knownMat]);

  if (mode === 'select') {
    return (
      <select autoFocus value={knownMat ? value : '__other__'}
        onChange={e => {
          const v = e.target.value;
          if (v === '__other__') { setMode('other'); return; }
          if (v !== value) onSave(v);
          setMode('view');
        }}
        onBlur={() => setMode('view')}
        onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}
        style={{ background: C.bg, color: C.ink, border: `1px solid ${C.accent}`, padding: '4px 8px', borderRadius: R.sm, fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 'inherit', letterSpacing: 'inherit', ...style }}>
        {MATERIALS.map(m => <option key={m.code} value={m.code}>{m.label}</option>)}
        <option value="__other__">Other…</option>
      </select>
    );
  }

  if (mode === 'other') {
    const commit = () => {
      const next = (otherText || '').trim();
      if (next && next !== value) onSave(next);
      setMode('view');
    };
    const cancel = () => { setOtherText(knownMat ? '' : (value || '')); setMode('view'); };
    return (
      <input autoFocus value={otherText}
        onChange={e => setOtherText(e.target.value)}
        onBlur={commit}
        onKeyDown={e => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
          if (e.key === 'Escape') cancel();
        }}
        onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}
        placeholder="Custom material name…"
        style={{ background: C.bg, color: 'inherit', border: `1px solid ${C.accent}`, padding: '4px 8px', borderRadius: R.sm, fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 'inherit', letterSpacing: 'inherit', minWidth: 220, ...style }} />
    );
  }

  const displayLabel = knownMat ? knownMat.label : (value || '—');
  return (
    <span
      onClick={(e) => { e.stopPropagation(); e.preventDefault(); setMode('select'); }}
      onMouseDown={e => e.stopPropagation()}
      style={{ cursor: 'pointer', padding: '3px 6px', margin: '-3px -6px', borderRadius: R.xs, transition: 'background 80ms', display: 'inline-block', minWidth: 18, ...style }}
      onMouseEnter={e => e.currentTarget.style.background = 'rgba(179,230,53,0.12)'}
      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
      title="Click to change material">{displayLabel}</span>
  );
}

function titleCaseToken(t) {
  return t ? t[0].toUpperCase() + t.slice(1).toLowerCase() : t;
}
function normalizeForCensus(input) {

  for (const [name, abbr] of Object.entries(US_STATE_NAMES)) {
    if (!name.includes(' ')) continue;
    s = s.replace(new RegExp('(^|[ ,])' + name + '(?=$|[ ,])', 'g'), '$1' + abbr);
  }
  const tokens = s.split(/\s+/).map(raw => {
    const trailing = (raw.match(/[,.]+$/) || [''])[0];
    const clean = trailing ? raw.slice(0, -trailing.length) : raw;
    const lc = clean.toLowerCase();
    if (USPS_SUFFIXES[lc])  return USPS_SUFFIXES[lc] + trailing;
    if (US_STATE_NAMES[lc]) return US_STATE_NAMES[lc] + trailing;
    if (clean.length === 2 && US_STATE_ABBRS.has(clean.toUpperCase())) return clean.toUpperCase() + trailing;
    return (clean ? titleCaseToken(clean) : '') + trailing;
  });

  out = out.replace(/([a-z]) ([A-Z]{2})(?=\b|$|\s|,)/g, (m, a, st) =>

  const s = String(input || '').toLowerCase();

  for (const name of Object.keys(US_STATE_NAMES)) {
    if (new RegExp('(?:^|[ ,])' + name + '(?:$|[ ,])', 'i').test(s)) return true;
  }
  const hits = s.match(/(?:^|[ ,])([a-z]{2})(?=[ ,]|$| \d)/g) || [];

  let i = /^\d/.test(toks[0]) ? 1 : 0;

    if (USPS_SUFFIXES[t]) break;
    if (US_STATE_NAMES[t]) break;

    norm && norm !== raw ? fetchCensusJson(norm) : Promise.resolve(null),

// Autocomplete suggestions. Photon alone misses many US residential addresses

// Census and Photon in parallel and merge Census-first. Photon stays in the
// list because it's the only source that handles POI/business names ("Home
// Depot Lakewood CO") and partial input as the user types. Returns up to 6.
async function suggestViaMapbox(query) {
  const q = String(query || '').trim();
  if (q.length < 3) return [];
  const data = await fetchMapboxJson(q);
  if (!data || !Array.isArray(data.features)) return [];
  const out = [];
  for (const f of data.features) {
    const coords = (f.geometry && f.geometry.coordinates) || f.center;
    if (!Array.isArray(coords) || coords.length < 2) continue;
    const lng = parseFloat(coords[0]);
    const lat = parseFloat(coords[1]);
    if (!isFinite(lat) || !isFinite(lng)) continue;
    const displayName = f.place_name || '';
    if (!displayName) continue;
    out.push({ displayName, lat, lng, source: 'mapbox' });
  }
  return out;

async function suggestViaCensus(query) {
  const raw = String(query || '').trim();

  // no digits (no house number = no match anyway, just wasted fetch).
  if (raw.length < 6 || !/\d/.test(raw)) return [];
  const norm = normalizeForCensus(raw);
  const [a, b] = await Promise.all([
    fetchCensusJson(raw),
    norm && norm !== raw ? fetchCensusJson(norm) : Promise.resolve(null),
  ]);
  const seen = new Set();
  const out  = [];
  for (const j of [a, b]) {
    const matches = (j && j.result && j.result.addressMatches) || [];
    for (const m of matches) {
      if (!m || !m.coordinates) continue;
      const lat = parseFloat(m.coordinates.y);
      const lng = parseFloat(m.coordinates.x);
      if (!isFinite(lat) || !isFinite(lng)) continue;
      const displayName = m.matchedAddress || raw;
      const key = displayName.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      out.push({ displayName, lat, lng, source: 'census' });
    }

    const out = [];
    for (const f of data.features) {
      if (!f || !f.geometry || !Array.isArray(f.geometry.coordinates)) continue;
      const lng = parseFloat(f.geometry.coordinates[0]);
      const lat = parseFloat(f.geometry.coordinates[1]);

      const props = f.properties || {};

        _photonName: String(props.name || ''),

  if (census.length > 0) return dedupe(census);
  // Photon fallback — apply the strict housenumber guard for queries that
  // start with a digit. The guard accepts the result iff:
  //   - Photon attached a `housenumber` property (real street-level match), OR
  //   - the result's name or displayName starts with the typed digit string.
  // Anything else (e.g. "Tulsa, Oklahoma 74132" for query "15185 …") is a
  // city/zip-level fallback dressed up as an address and gets rejected. We
  // also keep the existing US-shape street-token overlap check so Photon
  // can't slip "1105 12th Street" past us when the user typed "1105 Rogers".
  const usShape   = isUsShapedQuery(q);
  const hasNumber = /\d/.test(q);
  const streetTokens = (usShape && hasNumber) ? extractQueryStreetTokens(q) : [];
  const leadNumMatch = q.match(/^\s*(\d+)\b/);
  const leadNumber   = leadNumMatch ? leadNumMatch[1] : null;
  const photonKept = photon.filter(p => {
    if (streetTokens.length && !photonStreetMatchesQuery(p.displayName, streetTokens)) return false;
    if (leadNumber) {
      if (p._photonHasHousenumber) return true;
      const name = String(p._photonName || '').trim();
      const dn   = String(p.displayName || '').trim();
      if (!name.startsWith(leadNumber) && !dn.startsWith(leadNumber)) return false;
    }
    return true;
  });
  return dedupe(photonKept);
}
// Backwards-compat alias — kept so any forgotten call sites still resolve.
const geocodeAddressViaNominatim = geocodeAddress;
async function fetchOSRMDrivingRoute(p1, p2) {
  if (!p1 || !p2) return null;
  try {
    const url = 'https://router.project-osrm.org/route/v1/driving/' + p1.lng + ',' + p1.lat + ';' + p2.lng + ',' + p2.lat + '?geometries=geojson&overview=full';
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const data = await resp.json();
    if (!data || !Array.isArray(data.routes) || !data.routes[0]) return null;
    const r = data.routes[0];
    if (!r.geometry || !Array.isArray(r.geometry.coordinates)) return null;
    return { coords: r.geometry.coordinates, distanceMeters: r.distance, durationSeconds: r.duration };
  } catch (e) { return null; }
}

// Append an activity event onto a db-like object. Use inside setDb composers:
//   setDb(prev => appendActivity({ ...prev, loads: [...] }, { type, actorRole, actorId, summary, refId }))
function appendActivity(state, evt) {
  const event = {
    id: 'act-' + Math.random().toString(36).substring(2, 7),
    type: evt.type,
    actorRole: evt.actorRole,
    actorId: evt.actorId || null,
    summary: evt.summary,
    refId: evt.refId || null,
    timestamp: Date.now(),
  };
  return { ...state, activity: [...(state.activity || []), event] };
}

function haulerName(state, id) {
  const h = state && state.haulers ? state.haulers.find(x => x.id === id) : null;
  return h ? h.name : 'A hauler';
}
function projectName(state, id) {

function truckPlate(state, id) {

  const m = MATERIALS.find(x => x.code === code);

// Human-friendly label for a haul request used wherever the raw `hreq-NNN` id
// previously surfaced in the UI (breadcrumbs, page titles, list rows, headers,
// activity summaries). Falls back to a volume+material string if the project
// can't be resolved. The underlying id (e.g. `hreq-002`) is still kept on the
// record and used for refIds, URLs, and refId-prefix routing — only the
// user-visible chrome switches to this name.
function haulRequestLabel(state, req) {
  if (!req) return 'Haul Request';
  const proj = state && state.projects ? state.projects.find(p => p.id === req.projectId) : null;
  const matName = materialLabel(req.materialCode);
  if (proj) return `${proj.name} · ${req.volumeCY} CY ${matName}`;
  return `${req.volumeCY} CY ${matName}`;
}

function buildSeed() {
  return {
    projects: PROJECTS_SEED,
    haulers: HAULERS_SEED,
    trucks: TRUCKS_SEED,
    drivers: DRIVERS_SEED,
    hours: HOURS_SEED,
    loads: LOADS_SEED,
    invoices: INVOICES_SEED,
    rates: RATES_INIT,
    haulRequests: HAUL_REQUESTS_SEED,
    activity: ACTIVITY_SEED,
    activityLastReadAt: 0,
    geocode: GEOCODE_SEED,
    routes: ROUTES_SEED,
    schemaVersion: DB_SCHEMA_VERSION,
  };
}

// Parse a stored localStorage payload (or null) into a valid db.
// Used both at initial mount and when a sibling tab writes to `jse_db_v1`.
function hydrateDb(raw) {
  const seed = buildSeed();
  if (raw == null) return seed;
  try {
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') return seed;
    // The required-keys list includes newer collections that older payloads
    // won't have. Check only the keys present in every schema version so we
    // can migrate forward instead of dropping a populated db on the floor.
    // `haulers` (v4) was named `operators` in v1–v3, so we accept either.
    const baselineKeys = ['projects', 'trucks', 'drivers', 'hours', 'loads', 'invoices', 'rates'];
    const valid = baselineKeys.every(k => k in parsed) && ('haulers' in parsed || 'operators' in parsed);
    if (!valid) return seed;
    if (parsed.schemaVersion === DB_SCHEMA_VERSION) return parsed;
    if (parsed.schemaVersion > DB_SCHEMA_VERSION) return seed;
    // Schema migration. Apply each forward-step in order:
    //   v1 → v2: backfill missing date fields on loads/hours.
    //   v2 → v3: seed `haulRequests` if missing.
    //   v3 → v4: rename `operators` collection → `haulers`,
    //            rename `operatorId` field → `haulerId` on trucks + invoices.
    //   v4 → v5: load/hours `date` fields migrate from 'today'/'yesterday' label
    //            strings to ISO date strings (YYYY-MM-DD).
    //   v5 → v6: add `activity` collection + `activityLastReadAt` mark-as-read pointer.
    //   v6 → v7: backfill `acceptedByDriver` (null) + `passedBy` ([]) on haulRequests;
    //            new `accepted` status enum value for driver-opt-in flow.
    //   v7 → v8: add `assignments[]` to every haulRequest. Multi-truck, multi-day,
    //            per-truck load tracking. Legacy `matchedHaulerId`/`matchedTruckId`
    //            preserved for compat; `assignments[]` is the new source of truth.
    //   v8 → v9: backfill `attachments: []` on every hauler (W-9/Insurance/MSA/Other
    //            docs). Backfill any missing `rates` key from TRUCK_TYPES defaults so
    //            new truck types (e.g. HS at $140) light up after a stale-cache load.
    //   v9 → v10: restore seeded attachments by hauler id for haulers whose
    //            attachments array is empty (fixes v8→v9 which over-blanked them).
    //            Promote any rate that still matches a `RATES_PREV_DEFAULTS` entry
    //            but not the current TRUCK_TYPES default (e.g. HS $125 → $140).
    //  v10 → v11: backfill invoice payment fields (`status`, `createdAt`,
    //            `sentAt`, `paidAt`, `paymentRef`). Defaults-first / real-second
    //            spread so existing values win. Old payloads (which only carried
    //            `status: 'paid' | 'sent'`) get a stamped `createdAt` derived
    //            from `issuedDate`, and a synthesized `sentAt` when status is
    //            already 'sent' or 'paid'. We do NOT reseed INVOICES_SEED on
    //            top of user data — only backfill the new fields.
    //  v12 → v13: backfill `haulRequestId: null` on every legacy invoice. The
    //            new per-hauler-per-haul invoicing in AdminReporting (Reports
    //            tab) attaches generated invoices to a specific haul request
    //            via `haulRequestId`. Pre-v12 invoices stay project-scoped
    //            (null) and surface in legacy views only.
    const { operators: legacyOperators, ...rest } = parsed;
    const haulersBeforeRestore = (Array.isArray(rest.haulers)
      ? rest.haulers
      : (Array.isArray(legacyOperators) ? legacyOperators : HAULERS_SEED)
    ).map(h => h && !Array.isArray(h.attachments) ? { ...h, attachments: [] } : h);
    // v9 → v10: re-seed attachments for haulers whose array is empty AND the
    // seed has docs for that id. User-edited (non-empty) attachments preserved.
    const migratedHaulers = haulersBeforeRestore.map(h => {
      if (!h || !Array.isArray(h.attachments) || h.attachments.length > 0) return h;
      const seedHauler = HAULERS_SEED.find(s => s.id === h.id);
      if (seedHauler && Array.isArray(seedHauler.attachments) && seedHauler.attachments.length > 0) {
        return { ...h, attachments: seedHauler.attachments };
      }
      return h;
    });
    const migratedRates = (() => {
      const out = { ...RATES_INIT, ...(rest.rates && typeof rest.rates === 'object' ? rest.rates : {}) };
      // Preserve user-edited values; only fill in keys missing from the cached payload.
      TRUCK_TYPES.forEach(t => { if (out[t.code] == null) out[t.code] = t.rate; });
      // v9 → v10: if a rate still matches the prior default (user never edited)
      // but the canonical TRUCK_TYPES default has moved on, bump to the new default.
      TRUCK_TYPES.forEach(t => {
        const prev = RATES_PREV_DEFAULTS[t.code];
        if (prev != null && out[t.code] === prev && prev !== t.rate) {
          out[t.code] = t.rate;
        }
      });
      return out;
    })();
    const renameOpField = (rows) => Array.isArray(rows)
      ? rows.map(r => {
          if (!r || typeof r !== 'object' || !('operatorId' in r)) return r;
          const { operatorId, ...restRow } = r;
          return { ...restRow, haulerId: operatorId };
        })
      : rows;
    // v10 → v11: backfill invoice payment fields. Defaults-first spread so any
    // existing field wins; synthesize `sentAt` from `issuedDate` only when the
    // status is sent/paid AND `sentAt` isn't already set. Never overwrite
    // `paidAt` or `paymentRef`.
    const migrateInvoice = (inv) => {
      if (!inv || typeof inv !== 'object') return inv;
      const baseCreatedAt = inv.issuedDate ? inv.issuedDate + 'T09:00:00Z' : new Date(0).toISOString();
      // v12 → v13: default haulRequestId to null (project-scoped legacy invoice).
      const withDefaults = { status: 'sent', haulRequestId: null, createdAt: baseCreatedAt, ...inv };
      // If migrated to sent/paid but no sentAt, synthesize one from issuedDate.
      if ((withDefaults.status === 'sent' || withDefaults.status === 'paid') && !withDefaults.sentAt && inv.issuedDate) {
        withDefaults.sentAt = inv.issuedDate + 'T15:00:00Z';
      }
      return withDefaults;
    };
    // v11 → v12: backfill logistics fields (pickup/dropoff/timing/siteAccess) on
    // haul requests. Defaults-first spread so any existing field wins. Also
    // backfills nested shapes when only the parent key exists.
    const migrateHaulRequestLogistics = (r) => {
      if (!r || typeof r !== 'object') return r;
      const pickupLocation  = { name: '', address: '', ...(r.pickupLocation  && typeof r.pickupLocation  === 'object' ? r.pickupLocation  : {}) };
      const dropoffLocation = { name: '', address: '', ...(r.dropoffLocation && typeof r.dropoffLocation === 'object' ? r.dropoffLocation : {}) };
      const timing          = { startDate: '', endDate: '', ...(r.timing     && typeof r.timing          === 'object' ? r.timing          : {}) };
      const sa = r.siteAccess && typeof r.siteAccess === 'object' ? r.siteAccess : {};
      const siteAccess = {
        loading: { notes: '', equipment: '', ...(sa.loading && typeof sa.loading === 'object' ? sa.loading : {}) },
        dumping: { notes: '', equipment: '', ...(sa.dumping && typeof sa.dumping === 'object' ? sa.dumping : {}) },
      };
      return { ...r, pickupLocation, dropoffLocation, timing, siteAccess };
    };
    // v4 → v5: 'today' / 'yesterday' string labels → ISO date strings.
    const migrateDate = (val) => {
      if (val === 'today') return TODAY_ISO;
      if (val === 'yesterday') return YESTERDAY_ISO;
      return val; // already ISO, or null/undefined (handled by v1→v2 backfill below)
    };
    const isoBackfill = (val) => val == null ? YESTERDAY_ISO : migrateDate(val);
    const out = {
      ...rest,
      haulers: migratedHaulers,
      rates: migratedRates,
      trucks: renameOpField(rest.trucks),
      invoices: (() => {
        const renamed = renameOpField(rest.invoices);
        return Array.isArray(renamed) ? renamed.map(migrateInvoice) : renamed;
      })(),
      loads: Array.isArray(rest.loads)
        ? rest.loads.map(l => l ? { ...l, date: isoBackfill(l.date) } : l)
        : rest.loads,
      hours: Array.isArray(rest.hours)
        ? rest.hours.map(h => h ? { ...h, date: isoBackfill(h.date) } : h)
        : rest.hours,
      // v6 → v7: backfill `acceptedByDriver` / `passedBy` defaults on existing
      // haul requests. v7 → v8: synthesize `assignments[]` from legacy
      // `matchedTruckId` so old-shape rows behave like the new multi-truck model.
      // Spread `r` last so a v8+ payload preserves real values (including a
      // populated `assignments`); only the legacy path builds a synthesized one.
      haulRequests: (Array.isArray(rest.haulRequests) ? rest.haulRequests : HAUL_REQUESTS_SEED).map(r => {
        if (!r) return r;
        let row;
        // Already on v8 shape? leave it (defaults still applied for safety).
        if (Array.isArray(r.assignments)) {
          row = { acceptedByDriver: null, passedBy: [], ...r };
        } else if (r.matchedTruckId) {
          // Legacy single-truck row → synthesize a one-truck, one-day, zero-loads assignment.
          const truck = (Array.isArray(rest.trucks) ? rest.trucks : []).find(t => t.id === r.matchedTruckId);
          row = {
            acceptedByDriver: null, passedBy: [], ...r,
            assignments: [{
              truckId: r.matchedTruckId,
              haulerId: r.matchedHaulerId || (truck ? truck.haulerId : null),
              addedAt: Date.now(),
              days: [{ date: TODAY_ISO, startTime: r.requestedAt || '08:00', loads: [] }],
            }],
          };
        } else {
          // Pending row, no truck matched yet → empty assignments.
          row = { acceptedByDriver: null, passedBy: [], assignments: [], ...r };
        }
        return migrateHaulRequestLogistics(row);
      }),
      // v5 → v6: add activity collection + activityLastReadAt mark-as-read pointer.
      activity: Array.isArray(rest.activity) ? rest.activity : ACTIVITY_SEED,
      activityLastReadAt: typeof rest.activityLastReadAt === 'number' ? rest.activityLastReadAt : 0,
      // v13 → v14: geocode cache for the MapLibre Live Operations tile map.
      // Merge stale-payload geocode (if any) over GEOCODE_SEED so user-added
      // resolutions win, but new seeded addresses (e.g. from a buildSeed bump)
      // fill in. Plain object — keys are raw address strings.
      geocode: (() => {
        const stored = (rest.geocode && typeof rest.geocode === 'object' && !Array.isArray(rest.geocode)) ? rest.geocode : {};
        return { ...GEOCODE_SEED, ...stored };
      })(),
      schemaVersion: DB_SCHEMA_VERSION,
    };
    // v14 → v15: replace haulers entirely with the new 6-record real seed
    // (Robert's request — "erase existing, don't merge"). Reassign downstream
    // FKs: any stored op-007..op-010 references → mapped to op-001..op-004 so
    // no orphan refs remain. Stored trucks/invoices/haulRequests written
    // against an old hauler id are still attached to a real hauler after
    // migration. New rows referencing the kept ids (op-001..op-006) pass
    // through untouched.
    try {
      const HAULER_ID_REMAP = { 'op-007': 'op-001', 'op-008': 'op-002', 'op-009': 'op-003', 'op-010': 'op-004' };
      const remap = (id) => (id && HAULER_ID_REMAP[id]) || id;
      const haulerNameById = (id) => { const h = HAULERS_SEED.find(x => x.id === id); return h ? h.name : null; };
      out.haulers = HAULERS_SEED;
      if (Array.isArray(out.trucks)) {
        out.trucks = out.trucks.map(t => {
          if (!t || typeof t !== 'object') return t;
          const newId = remap(t.haulerId);
          if (newId === t.haulerId) return t;
          const newName = haulerNameById(newId) || t.hauler;
          return { ...t, haulerId: newId, hauler: newName };
        });
      }
      if (Array.isArray(out.invoices)) {
        out.invoices = out.invoices.map(i => (i && typeof i === 'object' && i.haulerId && remap(i.haulerId) !== i.haulerId) ? { ...i, haulerId: remap(i.haulerId) } : i);
      }
      if (Array.isArray(out.haulRequests)) {
        out.haulRequests = out.haulRequests.map(r => {
          if (!r || typeof r !== 'object') return r;
          let next = r;
          if (r.matchedHaulerId && remap(r.matchedHaulerId) !== r.matchedHaulerId) {
            next = { ...next, matchedHaulerId: remap(r.matchedHaulerId) };
          }
          if (Array.isArray(r.assignments) && r.assignments.some(a => a && a.haulerId && remap(a.haulerId) !== a.haulerId)) {
            next = { ...next, assignments: r.assignments.map(a => (a && a.haulerId && remap(a.haulerId) !== a.haulerId) ? { ...a, haulerId: remap(a.haulerId) } : a) };
          }
          return next;
        });
      }
    } catch (e) { /* if anything throws during v15 remap, fall through with the v14 shape */ }
    // v15 → v16: replace projects entirely with the new 3-project real seed.
    // Reassign downstream FKs: any stored 'WP'/'GW' → 'RG', 'CH'/'AS' → 'GE'.
    // RR refs stay. Hauler `projectIds` arrays are remapped + deduplicated
    // (same hauler may have had ['WP','GW'] which both → 'RG'). Wrapped in
    // try/catch so any v16 throw falls through to the v15 shape rather than
    // blanking state.
    try {
      const PROJECT_ID_REMAP = { 'WP': 'RG', 'GW': 'RG', 'CH': 'GE', 'AS': 'GE' };
      const pmap = (id) => (id && PROJECT_ID_REMAP[id]) || id;
      const remapArr = (arr) => Array.isArray(arr) ? [...new Set(arr.map(pmap))] : arr;
      out.projects = PROJECTS_SEED;
      if (Array.isArray(out.haulers)) {
        out.haulers = out.haulers.map(h => (h && Array.isArray(h.projectIds)) ? { ...h, projectIds: remapArr(h.projectIds) } : h);
      }
      const remapProjectId = (row) => (row && row.projectId && pmap(row.projectId) !== row.projectId) ? { ...row, projectId: pmap(row.projectId) } : row;
      if (Array.isArray(out.trucks))       out.trucks       = out.trucks.map(remapProjectId);
      if (Array.isArray(out.hours))        out.hours        = out.hours.map(remapProjectId);
      if (Array.isArray(out.loads))        out.loads        = out.loads.map(remapProjectId);
      if (Array.isArray(out.haulRequests)) out.haulRequests = out.haulRequests.map(remapProjectId);
      if (Array.isArray(out.invoices))     out.invoices     = out.invoices.map(remapProjectId);
    } catch (e) { /* fall through with v15 shape */ }
    // v16 → v17: routes cache for OSRM driving polylines + project pickup/dump
    // counterpart addresses. Backfill empty cache if missing; replace projects
    // with current PROJECTS_SEED so stored payloads pick up the new pickup/dump
    // fields (the v16 block already overrode projects above, so this just keeps
    // the shape current). Also merge GEOCODE_SEED so counterpart addresses get
    // their pre-seeded approximate coords until Nominatim refines them.
    try {
      out.routes = (out.routes && typeof out.routes === 'object' && !Array.isArray(out.routes)) ? out.routes : {};
      out.geocode = { ...GEOCODE_SEED, ...(out.geocode || {}) };
      // Always ensure projects carry the v17 pickup/dump fields (defaults-first
      // spread so any user-edited values on stored projects win).
      if (Array.isArray(out.projects)) {
        out.projects = out.projects.map(p => {
          const seedP = PROJECTS_SEED.find(x => x.id === (p && p.id));
          if (!seedP) return p;
          return { pickupLocation: seedP.pickupLocation, dumpLocation: seedP.dumpLocation, ...p };
        });
      }
    } catch (e) { /* fall through with v16 shape */ }
    return out;
  } catch (e) {
    return seed;
  }
}

// =====================================================================
// === BLOCK 1b: Supabase cloud-sync layer (Phase 2 read + Phase 3 write)
// =====================================================================
// Goal: edits made anywhere in the app persist to Supabase so they show up
// on other browsers / other devices within a couple seconds. localStorage
// stays as an offline-first cache so the app still works without network.
//

// `CY` is the only multi-uppercase token in the JS shape (totalCY, volumeCY,

const SB_UPPER_TOKENS = ['cy'];

function camelToSnake(s) {
  return s
    .replace(/([a-z0-9])([A-Z])/g, '$1_$2')          // foo→f_o for normal camelCase

    if (SB_UPPER_TOKENS.indexOf(w) !== -1) return w.toUpperCase();
    return w[0].toUpperCase() + w.slice(1);

function sbRowToJs(jsKey, row) {
  if (!row || typeof row !== 'object') return row;
  const cfg = SB_TABLES[jsKey];
  const whitelist = SB_FIELDS_JS[jsKey];
  const rev = {};
  Object.entries(cfg.overrides).forEach(([js, sb]) => { rev[sb] = js; });
  const out = {};
  for (const [sbCol, val] of Object.entries(row)) {
    const jsField = rev[sbCol] || snakeToCamel(sbCol);
    if (whitelist.indexOf(jsField) === -1) continue;
    out[jsField] = val;
  }
  return out;
}
function jsRowToSb(jsKey, row) {
  if (!row || typeof row !== 'object') return row;
  const cfg = SB_TABLES[jsKey];
  const whitelist = SB_FIELDS_JS[jsKey];
  const out = {};
  for (const [jsField, val] of Object.entries(row)) {
    if (whitelist.indexOf(jsField) === -1) continue;
    const sbCol = cfg.overrides[jsField] || camelToSnake(jsField);
    out[sbCol] = val;
  }
  return out;
}

// ---- Client singleton ---------------------------------------------------
const _sb = {
  client: null,
  ready: false,
  init() {
    try {
      if (!(window.supabase && typeof window.supabase.createClient === 'function')) return false;
      this.client = window.supabase.createClient(SB_URL, SB_KEY, {
        auth: { persistSession: false },
        realtime: { params: { eventsPerSecond: 10 } },
      });
      this.ready = true;
      return true;
    } catch (e) {
      console.warn('[jse] Supabase init failed:', e);
      return false;
    }
  },
  async fetchAll(jsKey) {
    const cfg = SB_TABLES[jsKey];
    const { data, error } = await this.client.from(cfg.sb).select('*').limit(5000);
    if (error) throw error;
    return (data || []).map(r => sbRowToJs(jsKey, r));
  },
  async fetchRates() {
    const { data, error } = await this.client.from('rates').select('truck_type, rate_per_hour').limit(1000);
    if (error) throw error;
    const out = {};
    (data || []).forEach(r => { out[r.truck_type] = r.rate_per_hour; });
    return out;
  },
  async fetchMeta() {
    const { data, error } = await this.client.from('meta').select('*').limit(1000);
    if (error) throw error;
    const out = {};
    (data || []).forEach(r => { out[r.key] = r.value; });
    return out;
  },
  async fetchMaterials() {
    const { data, error } = await this.client.from('materials').select('code, label').limit(1000);
    if (error) throw error;
    return data || [];
  },
  async upsertRows(jsKey, rows) {
    if (!rows || rows.length === 0) return { count: 0 };
    const cfg = SB_TABLES[jsKey];
    const sbRows = rows.map(r => jsRowToSb(jsKey, r));
    const { error } = await this.client.from(cfg.sb).upsert(sbRows, { onConflict: cfg.pk });
    if (error) throw error;
    return { count: sbRows.length };
  },
  async upsertRates(rates) {
    if (!rates || typeof rates !== 'object') return { count: 0 };
    const sbRows = Object.entries(rates).map(([truck_type, rate_per_hour]) => ({ truck_type, rate_per_hour }));
    const { error } = await this.client.from('rates').upsert(sbRows, { onConflict: 'truck_type' });
    if (error) throw error;
    return { count: sbRows.length };
  },
  async upsertMeta(key, value) {
    const { error } = await this.client.from('meta')
      .upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
    if (error) throw error;
  },
  async upsertMaterials(list) {
    if (!list || list.length === 0) return { count: 0 };
    const { error } = await this.client.from('materials').upsert(list, { onConflict: 'code' });
    if (error) throw error;
    return { count: list.length };
  },
  async deleteRows(jsKey, ids) {
    if (!ids || ids.length === 0) return { count: 0 };
    const cfg = SB_TABLES[jsKey];
    const { error } = await this.client.from(cfg.sb).delete().in(cfg.pk, ids);
    if (error) throw error;
    return { count: ids.length };
  },
  async truncateAll() {
    // PostgREST requires a filter on DELETE; `gte('', '')` matches everything.
    const tables = [
      ...SB_TABLE_LIST.map(k => ({ sb: SB_TABLES[k].sb, pk: SB_TABLES[k].pk })),
      { sb: 'rates',     pk: 'truck_type' },
      { sb: 'materials', pk: 'code' },

    for (const t of tables) {
      const { error } = await this.client.from(t.sb).delete().gte(t.pk, '');
      if (error) throw error;

// ---- Cloud bootstrap (Phase 2 read path) --------------------------------
async function bootstrapCloud(localDb) {
  if (!_sb.ready && !_sb.init()) {
    return { status: 'offline', db: localDb, reason: 'sdk-missing' };
  }
  try {
    let [tableArrays, cloudRates, cloudMeta, cloudMats] = await fetchAllCloud();
    // Per-table empty-check seed. Robust against the case where a previous
    // browser tab partial-seeded (closed mid-flight) and 4 of the 13 tables
    // never landed. We backfill ONLY the empty ones; tables with user data
    // are never overwritten.
    const didSeed = await seedMissingTables(tableArrays, cloudRates, cloudMats, cloudMeta);
    if (didSeed) {
      [tableArrays, cloudRates, cloudMeta, cloudMats] = await fetchAllCloud();
    }
    const assembled = assembleDbFromCloud(tableArrays, cloudRates, cloudMeta, localDb);
    return { status: 'online', db: assembled, reason: didSeed ? 'seeded' : 'fetched' };
  } catch (e) {
    console.warn('[jse] cloud bootstrap failed; offline mode:', e);
    return { status: 'offline', db: localDb, reason: 'fetch-failed' };
  }
}

async function fetchAllCloud() {
  const results = await Promise.all([
    ...SB_TABLE_LIST.map(k => _sb.fetchAll(k)),
    _sb.fetchRates(),
    _sb.fetchMeta(),
    _sb.fetchMaterials(),
  ]);
  const tableArrays = results.slice(0, SB_TABLE_LIST.length);
  const cloudRates  = results[SB_TABLE_LIST.length];
  const cloudMeta   = results[SB_TABLE_LIST.length + 1];
  const cloudMats   = results[SB_TABLE_LIST.length + 2];
  return [tableArrays, cloudRates, cloudMeta, cloudMats];
}

async function seedMissingTables(tableArrays, cloudRates, cloudMats, cloudMeta) {
  const seed = buildSeed();
  const byKey = {};
  SB_TABLE_LIST.forEach((k, i) => { byKey[k] = tableArrays[i]; });
  const ops = [];
  for (const k of SB_TABLE_LIST) {
    if (byKey[k].length === 0 && Array.isArray(seed[k]) && seed[k].length > 0) {
      ops.push(_sb.upsertRows(k, seed[k]));
    }
  }
  if (Object.keys(cloudRates).length === 0)      ops.push(_sb.upsertRates(seed.rates));
  if (cloudMats.length === 0)                    ops.push(_sb.upsertMaterials(MATERIALS));
  if (typeof cloudMeta.schema_version !== 'number') ops.push(_sb.upsertMeta('schema_version', DB_SCHEMA_VERSION));
  if (ops.length === 0) return false;
  await Promise.all(ops);
  return true;
}

function assembleDbFromCloud(tableArrays, cloudRates, cloudMeta, localDb) {
  const byKey = {};
  SB_TABLE_LIST.forEach((k, i) => { byKey[k] = tableArrays[i]; });
  // Merge cloud rates over RATES_INIT so any TRUCK_TYPES added since the
  // last cloud seed still light up with their default.
  const rates = { ...RATES_INIT, ...cloudRates };
  const schemaVersion = typeof cloudMeta.schema_version === 'number'
    ? cloudMeta.schema_version : DB_SCHEMA_VERSION;
  const activityLastReadAt = typeof cloudMeta.activity_last_read_at === 'number'
    ? cloudMeta.activity_last_read_at : 0;
  // db.geocode and db.routes are JS-only caches. Keep whatever the local
  // payload had so we don't re-pay Nominatim / OSRM on every cold boot.
  const raw = {
    projects: byKey.projects, haulers: byKey.haulers, drivers: byKey.drivers,
    trucks: byKey.trucks, loads: byKey.loads, hours: byKey.hours,
    invoices: byKey.invoices, haulRequests: byKey.haulRequests,
    activity: byKey.activity,
    rates,
    activityLastReadAt,
    geocode: (localDb && localDb.geocode) || GEOCODE_SEED,
    routes:  (localDb && localDb.routes)  || ROUTES_SEED,
    schemaVersion,
  };
  // Route through hydrateDb so older cloud rows (e.g. meta.schema_version <
  // DB_SCHEMA_VERSION) still get the v1→vN migration cascade.
  try {
    return hydrateDb(JSON.stringify(raw));
  } catch (e) {
    return raw;
  }
}

// ---- Phase 3: write path -----------------------------------------------
// Per-tab map of recent local writes — used to skip Realtime echoes of
// changes this tab just made. Key: `${jsKey}:${rowKey}`. Value: { value,
// expiresAt }. Entries expire after 10s; any postgres_changes payload
// arriving during that window whose value deep-equals our snapshot is
// treated as our own echo and dropped.
const recentLocalWrites = new Map();
const RECENT_WRITE_TTL_MS = 10000;

function markLocalWrite(jsKey, rowKey, value) {
  recentLocalWrites.set(jsKey + ':' + rowKey, {
    value, expiresAt: Date.now() + RECENT_WRITE_TTL_MS,
  });
}
function isLocalEcho(jsKey, rowKey, incomingValue) {
  const k = jsKey + ':' + rowKey;
  const entry = recentLocalWrites.get(k);
  if (!entry) return false;
  if (Date.now() > entry.expiresAt) { recentLocalWrites.delete(k); return false; }
  // Deep-equal compare; null on both sides means "we just deleted this row,
  // and Realtime is echoing the same delete."
  return jsonEq(entry.value, incomingValue);
}
function jsonEq(a, b) {
  if (a === b) return true;
  try { return JSON.stringify(a) === JSON.stringify(b); } catch (e) { return false; }
}
function diffArrayById(oldArr, newArr) {
  const oldById = new Map((oldArr || []).map(r => r && [r.id, r]).filter(Boolean));
  const newById = new Map((newArr || []).map(r => r && [r.id, r]).filter(Boolean));
  const toUpsert = [];
  const toDelete = [];
  for (const [id, row] of newById) {
    const old = oldById.get(id);
    if (!old || !jsonEq(old, row)) toUpsert.push(row);
  }
  for (const id of oldById.keys()) {
    if (!newById.has(id)) toDelete.push(id);
  }
  return { toUpsert, toDelete };
}

// Diff prev/next db and push changed rows to Supabase. Fire-and-forget per
// the brief — optimistic UI already updated by the time this runs. Errors
// log to console (network flapping shouldn't spam toasts).
async function syncDbToCloud(prev, next) {
  if (!_sb.ready) return;
  const tasks = [];

  for (const jsKey of SB_TABLE_LIST) {
    const oldArr = prev[jsKey];
    const newArr = next[jsKey];
    if (oldArr === newArr) continue;
    const { toUpsert, toDelete } = diffArrayById(oldArr, newArr);
    if (toUpsert.length > 0) {
      toUpsert.forEach(r => markLocalWrite(jsKey, r.id, r));
      tasks.push(_sb.upsertRows(jsKey, toUpsert).catch(e => {
        console.warn('[jse] upsert failed on ' + jsKey + ':', e);
      }));
    }
    if (toDelete.length > 0) {
      toDelete.forEach(id => markLocalWrite(jsKey, id, null));
      tasks.push(_sb.deleteRows(jsKey, toDelete).catch(e => {
        console.warn('[jse] delete failed on ' + jsKey + ':', e);
      }));
    }
  }

  // Rates: flat object → row-per-truck-type upsert for changed keys only.
  if (prev.rates !== next.rates && next.rates) {
    const changed = {};
    for (const k of Object.keys(next.rates)) {
      if (!prev.rates || prev.rates[k] !== next.rates[k]) changed[k] = next.rates[k];
    }
    if (Object.keys(changed).length > 0) {
      Object.entries(changed).forEach(([k, v]) => markLocalWrite('rates', k, { truck_type: k, rate_per_hour: v }));
      tasks.push(_sb.upsertRates(changed).catch(e => console.warn('[jse] rates upsert failed:', e)));
    }
  }

  // Scalar meta field.
  if (prev.activityLastReadAt !== next.activityLastReadAt) {
    markLocalWrite('meta', 'activity_last_read_at', next.activityLastReadAt);
    tasks.push(_sb.upsertMeta('activity_last_read_at', next.activityLastReadAt || 0)
      .catch(e => console.warn('[jse] meta upsert failed:', e)));
  }

  // Don't await — let React continue. Errors already swallowed per-task.
  Promise.all(tasks).catch(() => {});
}

// ---- Phase 3: Realtime subscription ------------------------------------
function applyRealtimeChange(jsKey, payload, setDbRaw, bumpRemote) {
  const event = payload.eventType;
  let rowKey, jsRowForCompare;
  if (event === 'DELETE') {
    rowKey = payload.old && payload.old.id;
    jsRowForCompare = null;
  } else {
    const jsRow = sbRowToJs(jsKey, payload.new);
    rowKey = jsRow.id;
    jsRowForCompare = jsRow;
  }
  if (!rowKey) return;
  if (isLocalEcho(jsKey, rowKey, jsRowForCompare)) return;
  setDbRaw(prev => {
    const arr = Array.isArray(prev[jsKey]) ? prev[jsKey] : [];
    if (event === 'DELETE') {
      const next = arr.filter(r => r.id !== rowKey);
      if (next.length === arr.length) return prev;
      return { ...prev, [jsKey]: next };
    }
    const idx = arr.findIndex(r => r.id === rowKey);
    if (idx === -1) return { ...prev, [jsKey]: [...arr, jsRowForCompare] };
    if (jsonEq(arr[idx], jsRowForCompare)) return prev;
    const next = arr.slice();
    next[idx] = jsRowForCompare;
    return { ...prev, [jsKey]: next };
  });
  bumpRemote();
}

function applyRealtimeRates(payload, setDbRaw, bumpRemote) {
  const event = payload.eventType;
  if (event === 'DELETE') return; // we don't model rate deletes in the JS shape
  const row = payload.new;
  if (!row || !row.truck_type) return;
  const incoming = { truck_type: row.truck_type, rate_per_hour: row.rate_per_hour };
  if (isLocalEcho('rates', row.truck_type, incoming)) return;
  setDbRaw(prev => {
    const rates = prev.rates || {};
    if (rates[row.truck_type] === row.rate_per_hour) return prev;
    return { ...prev, rates: { ...rates, [row.truck_type]: row.rate_per_hour } };
  });
  bumpRemote();
}

function applyRealtimeMeta(payload, setDbRaw, bumpRemote) {
  if (payload.eventType === 'DELETE') return;
  const row = payload.new;
  if (!row || !row.key) return;
  if (row.key === 'activity_last_read_at') {
    if (isLocalEcho('meta', 'activity_last_read_at', row.value)) return;
    setDbRaw(prev => {
      if (prev.activityLastReadAt === row.value) return prev;
      return { ...prev, activityLastReadAt: typeof row.value === 'number' ? row.value : 0 };
    });
    bumpRemote();
  }
  // schema_version intentionally not piped to db at runtime — hydrateDb
  // owns that value; cross-tab schema bumps require a page reload.
}

// Subscribe to postgres_changes across every JSE table + rates + meta. The
// returned `cleanup` removes the channel — Realtime channels are connection-
// scoped, so leaving one open after the component unmounts would leak.
function subscribeRealtime(setDbRaw, bumpRemote) {
  if (!_sb.ready || !_sb.client) return () => {};
  const channel = _sb.client.channel('jse-db-realtime');
  for (const jsKey of SB_TABLE_LIST) {
    const sbTable = SB_TABLES[jsKey].sb;
    channel.on('postgres_changes',
      { event: '*', schema: 'public', table: sbTable },
      (payload) => applyRealtimeChange(jsKey, payload, setDbRaw, bumpRemote));
  }
  channel.on('postgres_changes',
    { event: '*', schema: 'public', table: 'rates' },
    (payload) => applyRealtimeRates(payload, setDbRaw, bumpRemote));
  channel.on('postgres_changes',
    { event: '*', schema: 'public', table: 'meta' },
    (payload) => applyRealtimeMeta(payload, setDbRaw, bumpRemote));
  channel.subscribe();
  return () => {
    try { _sb.client.removeChannel(channel); } catch (e) {}
  };
}

// ---- Phase 3: Reset Demo (cloud wipe + re-seed) ------------------------
// Called from AdminShell's Reset button. Default to confirming — Robert's
// safest-non-destructive-default rule (the brief explicitly defaults reset
// to "YES wipe cloud", but we still want a confirm because every other
// device sees the reset too).
async function resetDemoCloud() {
  if (!_sb.ready) return false;
  await _sb.truncateAll();
  // Re-seed every table from the JS constants (idempotent upsert).
  const seed = buildSeed();
  await Promise.all([
    ...SB_TABLE_LIST.map(k => _sb.upsertRows(k, seed[k] || [])),
    _sb.upsertRates(seed.rates),
    _sb.upsertMaterials(MATERIALS),
    _sb.upsertMeta('schema_version', DB_SCHEMA_VERSION),
    _sb.upsertMeta('activity_last_read_at', 0),
  ]);
  return true;
}

// === BLOCK 4: ADMIN + WIZARDS ===
// =====================================================================
// WizardShell — shared chrome for multi-step creation flows (projects,
// haulers, drivers, trucks). Renders breadcrumb + eyebrow/title + step
// indicator + child card + Cancel/Back/Next/Submit footer.
// Scrolls to top whenever currentStep changes.
