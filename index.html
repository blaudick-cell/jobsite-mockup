            {recommendations.length === 0 ? (
              <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim }}>No haulers with available trucks right now.</div>
            ) : (
              <div>
                {recommendations.map((rec, i) => (
                  <div key={rec.hauler.id} style={{ padding: S[3], borderBottom: i < recommendations.length - 1 ? `1px solid ${C.rule}` : 'none' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: S[2], marginBottom: 4 }}>
                      <div style={{ ...T.bodySm, fontWeight: 700, color: C.ink }}>{rec.hauler.name}</div>
                      <Pill color={C.ok} soft={C.okSoft}>{rec.fulfillment}% fulfill</Pill>
                    </div>
                    <div style={{ ...T.caption, color: C.inkDim, fontFamily: F.mono, marginBottom: 6 }}>
                      <span style={{ color: C.ink, fontWeight: 600 }}>{rec.available}</span> of {rec.totalTrucks} trucks free
                      <span style={{ color: C.inkFaint }}> · </span>
                      ~{rec.minsAway} min away
                      <span style={{ color: C.inkFaint }}> · </span>
                      est. ${rec.rateEst}/hr
                    </div>
                    <div style={{ display: 'flex', gap: S[2] }}>
                      <Btn variant="primary" size="xs" onClick={() => navigate('/admin/haulers/' + rec.hauler.id)}>Assign</Btn>
                      <Btn variant="secondary" size="xs" onClick={() => navigate('/admin/haulers/' + rec.hauler.id)}>View hauler</Btn>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          {/* Dispatch Activity feed */}
          <Card padding={0}>
            <div style={{ padding: `${S[3]}px ${S[4]}px`, borderBottom: `1px solid ${C.rule}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <Label color={C.accent}>Dispatch activity</Label>
                <div style={{ ...T.bodySm, color: C.ink, fontWeight: 600 }}>Recent assignments + log</div>
              </div>
              <Pill color={C.ok} soft={C.okSoft}>Live</Pill>
            </div>
            {activityFeed.length === 0 ? (
              <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim }}>No recent activity.</div>
            ) : (
              <div style={{ maxHeight: 360, overflowY: 'auto' }}>
                {activityFeed.map((a, i) => (
                  <div key={a.id || i} style={{ padding: S[3], borderBottom: i < activityFeed.length - 1 ? `1px solid ${C.rule}` : 'none', display: 'flex', alignItems: 'flex-start', gap: S[2] }}>
                    <span aria-hidden="true" style={{ width: 6, height: 6, borderRadius: '50%', background: C.accent, marginTop: 6, flexShrink: 0 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ ...T.caption, color: C.ink, lineHeight: 1.4 }}>{a.summary}</div>
                      <div style={{ ...T.caption, color: C.inkFaint, fontFamily: F.mono, marginTop: 2 }}>{fmtAgo(a.timestamp)}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      </div>
    </div>
  );
}

// v18: New haul request creation form. Single-step WizardShell with all the
// fields needed to spin up a haul request and land the user on its detail
// page. Both addresses use AddressAutocomplete (always-editing mode so the
// inputs match the rest of the form chrome). Validation requires project,
// material, volume > 0, both addresses, and a start date — and at submit
// time both addresses must geocode (resolved via cache if AddressAutocomplete
// already wrote a hit, otherwise via a one-shot cascade call). The submit
// is atomic: haulRequests append + activity event + locked-in geocode entries
// all flow through the same setDb so Phase 3 upserts and Realtime broadcast
// land in lockstep.
function AdminHaulRequestCreate({ db, setDb, navigate }) {
  const projects = db.projects || [];
  const [projectId, setProjectId] = useState(projects[0] ? projects[0].id : '');
  const [materialCode, setMaterialCode] = useState('CF');
  const [volumeCY, setVolumeCY] = useState('');
  const [requestedAt, setRequestedAt] = useState(() => {
    const now = new Date();
    return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  });
  const [pickup, setPickup] = useState({ name: '', address: '' });
  const [dropoff, setDropoff] = useState({ name: '', address: '' });
  const [pickupTouched, setPickupTouched] = useState(false);
  const [dropoffTouched, setDropoffTouched] = useState(false);
  const [timing, setTiming] = useState({ startDate: TODAY_ISO, endDate: '' });
  const [loadingSite, setLoadingSite] = useState({ notes: '', equipment: '' });
  const [dumpingSite, setDumpingSite] = useState({ notes: '', equipment: '' });
  const [notes, setNotes] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState('');

  // Pre-fill pickup/dropoff from the chosen project's locations as a hint.
  // Skip if the user has already touched the field (avoid clobbering input
  // when they change project mid-fill).
  useEffect(() => {
    const p = projects.find(pr => pr.id === projectId);
    if (!p) return;
    if (!pickupTouched)  setPickup(s => ({ name: s.name, address: p.pickupLocation || s.address || '' }));
    if (!dropoffTouched) setDropoff(s => ({ name: s.name, address: p.dumpLocation || s.address || '' }));
  }, [projectId]); // eslint-disable-line react-hooks/exhaustive-deps

  const volumeNum = parseFloat(volumeCY);
  const valid =
    !!projectId &&
    !!materialCode &&
    Number.isFinite(volumeNum) && volumeNum > 0 &&
    !!(pickup.address || '').trim() &&
    !!(dropoff.address || '').trim() &&
    !!timing.startDate;

  const submit = async () => {
    if (!valid || submitting) return;
    setSubmitting(true);
    setSubmitError('');
    // Resolve both addresses (cache first, then cascade). Refuse to create
    // the request if either won't resolve — the mini-map would render
    // blank and OSRM couldn't route.
    const cache = db.geocode || {};
    const ensureGeocode = async (addr) => {
      const c = cache[addr];
      if (c && isFinite(c.lat) && isFinite(c.lng)) return c;
      return await geocodeAddress(addr);
    };
    const [pGeo, dGeo] = await Promise.all([ensureGeocode(pickup.address), ensureGeocode(dropoff.address)]);
    if (!pGeo || !dGeo) {
      setSubmitting(false);
      setSubmitError(
        !pGeo && !dGeo ? "Couldn't resolve either address. Pick suggestions from the dropdowns or check spelling."
        : !pGeo ? "Couldn't resolve the pickup address. Pick a suggestion from the dropdown."
        : "Couldn't resolve the dropoff address. Pick a suggestion from the dropdown."
      );
      return;
    }

    const newId = 'hreq-' + Math.random().toString(36).substring(2, 7);
    const matLabel = (MATERIALS.find(m => m.code === materialCode) || {}).label || materialCode;
    const newReq = {
      id: newId,
      projectId,
      materialCode,
      volumeCY: volumeNum,
      requestedAt,
      status: 'pending',
      matchedHaulerId: null,
      matchedTruckId: null,
      acceptedByDriver: null,
      passedBy: [],
      notes: notes || '',
      assignments: [],
      pickupLocation:  { name: pickup.name || '',  address: pickup.address || '' },
      dropoffLocation: { name: dropoff.name || '', address: dropoff.address || '' },
      timing:          { startDate: timing.startDate, endDate: timing.endDate || '' },
      siteAccess: {
        loading: { notes: loadingSite.notes || '', equipment: loadingSite.equipment || '' },
        dumping: { notes: dumpingSite.notes || '', equipment: dumpingSite.equipment || '' },
      },
    };

    try {
      setDb(prev => appendActivity(
        {
          ...prev,
          haulRequests: [...(prev.haulRequests || []), newReq],
          geocode: { ...(prev.geocode || {}), [pickup.address]: pGeo, [dropoff.address]: dGeo },
        },
        {
          type: 'haul_request.created',
          actorRole: 'admin',
          actorId: null,
          summary: 'Admin created new haul request ' + newId.slice(5) + ' (' + volumeNum + ' CY ' + matLabel + ')',
          refId: newId,
        }
      ));
      navigate('/admin/requests/' + newId);
    } catch (e) {
      setSubmitting(false);
      setSubmitError('Failed to create haul request: ' + (e && e.message ? e.message : 'unknown error'));
    }
  };

  const fInputStyle = WIZARD_INPUT_STYLE;
  const aaInputStyle = { ...WIZARD_INPUT_STYLE, background: C.surfaceHi, border: '1px solid ' + C.ruleHi };

  return (
    <WizardShell
      navigate={navigate}
      steps={['Details']}
      currentStep={1}
      onCancel={() => navigate('/admin/requests')}
      onSubmit={submit}
      submitDisabled={!valid || submitting}
      submitLabel={submitting ? 'Creating…' : 'Create haul request'}
      crumbs={[{ label: 'Admin', to: '/admin' }, { label: 'Haul Requests', to: '/admin/requests' }, { label: 'New request' }]}
      eyebrow="New request"
      title="Create a new haul request"
    >
      <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3] }}>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Project</div>
            <select value={projectId} onChange={e => setProjectId(e.target.value)} style={fInputStyle}>
              {projects.length === 0 && <option value="">— no projects —</option>}
              {projects.map(p => (
                <option key={p.id} value={p.id}>{p.name} — {p.gc || '—'}</option>
              ))}
            </select>
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Material</div>
            <select value={materialCode} onChange={e => setMaterialCode(e.target.value)} style={fInputStyle}>
              {MATERIALS.map(m => <option key={m.code} value={m.code}>{m.label}</option>)}
            </select>
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Volume (CY)</div>
            <input type="number" min="1" step="1" value={volumeCY} onChange={e => setVolumeCY(e.target.value)} placeholder="e.g., 24" style={fInputStyle} />
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Requested at</div>
            <input type="time" value={requestedAt} onChange={e => setRequestedAt(e.target.value)} style={fInputStyle} />
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: S[4] }}>
          <div>
            <Label style={{ marginBottom: S[2] }}>Pickup location</Label>
            <input value={pickup.name}
              onChange={e => setPickup(p => ({ ...p, name: e.target.value }))}
              placeholder="Site or yard name"
              style={{ ...fInputStyle, marginBottom: S[2] }} />
            <AddressAutocomplete
              value={pickup.address}
              db={db} setDb={setDb}
              placeholder="Start typing a street address…"
              alwaysEditing={true}
              inputStyle={aaInputStyle}
              onSave={(v) => { setPickupTouched(true); setPickup(p => ({ ...p, address: v })); }}
            />
          </div>
          <div>
            <Label style={{ marginBottom: S[2] }}>Dropoff location</Label>
            <input value={dropoff.name}
              onChange={e => setDropoff(d => ({ ...d, name: e.target.value }))}
              placeholder="Site or yard name"
              style={{ ...fInputStyle, marginBottom: S[2] }} />
            <AddressAutocomplete
              value={dropoff.address}
              db={db} setDb={setDb}
              placeholder="Start typing a street address…"
              alwaysEditing={true}
              inputStyle={aaInputStyle}
              onSave={(v) => { setDropoffTouched(true); setDropoff(d => ({ ...d, address: v })); }}
            />
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3] }}>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Start date</div>
            <input type="date" value={timing.startDate} onChange={e => setTiming(t => ({ ...t, startDate: e.target.value }))} style={fInputStyle} />
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>End date (optional)</div>
            <input type="date" value={timing.endDate} onChange={e => setTiming(t => ({ ...t, endDate: e.target.value }))} min={timing.startDate || undefined} style={fInputStyle} />
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: S[4] }}>
          <div>
            <Label style={{ marginBottom: S[2] }}>Site access — loading</Label>
            <textarea value={loadingSite.notes}
              onChange={e => setLoadingSite(s => ({ ...s, notes: e.target.value }))}
              placeholder="Loading site notes…" rows={2}
              style={{ ...fInputStyle, marginBottom: S[2], resize: 'vertical' }} />
            <input value={loadingSite.equipment}
              onChange={e => setLoadingSite(s => ({ ...s, equipment: e.target.value }))}
              placeholder="Equipment / loader…" style={fInputStyle} />
          </div>
          <div>
            <Label style={{ marginBottom: S[2] }}>Site access — dumping</Label>
            <textarea value={dumpingSite.notes}
              onChange={e => setDumpingSite(s => ({ ...s, notes: e.target.value }))}
              placeholder="Dump site notes…" rows={2}
              style={{ ...fInputStyle, marginBottom: S[2], resize: 'vertical' }} />
            <input value={dumpingSite.equipment}
              onChange={e => setDumpingSite(s => ({ ...s, equipment: e.target.value }))}
              placeholder="Equipment / spotter…" style={fInputStyle} />
          </div>
        </div>

        <div>
          <div style={{ ...T.caption, marginBottom: 4 }}>Notes (optional)</div>
          <textarea value={notes} onChange={e => setNotes(e.target.value)}
            placeholder="Anything dispatch should know…" rows={2}
            style={{ ...fInputStyle, resize: 'vertical' }} />
        </div>

        {submitError && (
          <div style={{ ...T.bodySm, color: C.warn, padding: S[3], background: C.warnSoft, border: '1px solid ' + C.warn, borderRadius: R.sm }}>
            {submitError}
          </div>
        )}
      </div>
    </WizardShell>
  );
}

// Mini-map for a single haul request: pickup + dropoff pins, OSRM driving
// polyline, drive time, and an 18-CY tandem throughput estimate. Pattern
// mirrors LiveOperationsTileMap — same CartoCDN raster tiles, same halo+dot
// pin recipe, same `db.geocode` / `db.routes` cache pattern with Nominatim
// + OSRM fallback fetch when an address pair is uncached.
// Always mounted from AdminHaulRequestDetail — the Card renders for every
// haul request and self-adjusts when addresses are missing, mid-fetch, or
// the external geocode/route calls fail.
function HaulRouteMiniMap({ db, setDb, pickupAddress, dropoffAddress }) {
  const mlAvailable = typeof window !== 'undefined' && typeof window.maplibregl !== 'undefined';
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  // Lifecycle of the two external calls. Lets us distinguish "still loading"
  // from "geocode failed" / "route failed" so the placeholder copy stays honest.
  const [status, setStatus] = useState({ geocode: 'idle', route: 'idle' });

  const pickAddr = (pickupAddress || '').trim();
  const dropAddr = (dropoffAddress || '').trim();
  const hasAddresses = !!(pickAddr && dropAddr);

  const geocode = (db && db.geocode) || {};
  const routesCache = (db && db.routes) || {};
  const pick = pickAddr ? geocode[pickAddr] : null;
  const dump = dropAddr ? geocode[dropAddr] : null;
  const routeKey = hasAddresses ? (pickAddr + '|' + dropAddr) : null;
  const route = routeKey ? routesCache[routeKey] : null;

  // Async fetch: geocode endpoints + OSRM-route them if not already cached.
  // Re-runs whenever the address pair changes (the EditableText fields commit
  // on blur/Enter, so each commit propagates new props here). Writes through
  // setDb so the cache populates for future renders.
  useEffect(() => {
    setStatus({ geocode: 'idle', route: 'idle' });
    if (!hasAddresses) return undefined;
    let cancelled = false;
    setStatus(s => ({ ...s, geocode: 'loading' }));
    (async () => {
      let p = (db.geocode || {})[pickAddr];
      let d = (db.geocode || {})[dropAddr];
      if (!p) {
        const g = await geocodeAddress(pickAddr);
        if (cancelled) return;
        if (g) { p = g; setDb(prev => ({ ...prev, geocode: { ...(prev.geocode || {}), [pickAddr]: g } })); }
      }
      if (!d) {
        const g = await geocodeAddress(dropAddr);
        if (cancelled) return;
        if (g) { d = g; setDb(prev => ({ ...prev, geocode: { ...(prev.geocode || {}), [dropAddr]: g } })); }
      }
      if (!p || !d) {
        if (!cancelled) setStatus(s => ({ ...s, geocode: 'failed' }));
        return;
      }
      if (!cancelled) setStatus(s => ({ ...s, geocode: 'ready', route: 'loading' }));
      const cachedR = (db.routes || {})[pickAddr + '|' + dropAddr];
      if (cachedR) {
        if (!cancelled) setStatus(s => ({ ...s, route: 'ready' }));
        return;
      }
      const r = await fetchOSRMDrivingRoute(p, d);
      if (cancelled) return;
      if (r) {
        setDb(prev => ({ ...prev, routes: { ...(prev.routes || {}), [pickAddr + '|' + dropAddr]: r } }));
        setStatus(s => ({ ...s, route: 'ready' }));
      } else {
        setStatus(s => ({ ...s, route: 'failed' }));
      }
    })();
    return () => { cancelled = true; };
  }, [pickAddr, dropAddr]); // eslint-disable-line react-hooks/exhaustive-deps

  // Map init — only when we actually have an address pair to plot. Avoids
  // mounting a MapLibre instance for haul requests that have no addresses yet.
  useEffect(() => {
    if (!mlAvailable || !hasAddresses || !containerRef.current) return undefined;
    if (mapRef.current) return undefined;
    const dpr = (typeof window !== 'undefined' && window.devicePixelRatio) || 1;
    const retina = dpr > 1 ? '@2x' : '';
    const tileTemplate = `https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}${retina}.png`;
    const tileUrls = ['a', 'b', 'c', 'd'].map(s => tileTemplate.replace('{s}', s));
    let map;
    try {
      map = new window.maplibregl.Map({
        container: containerRef.current,
        style: {
          version: 8,
          sources: { carto: { type: 'raster', tiles: tileUrls, tileSize: 256, attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>' } },
          layers: [{ id: 'carto-layer', type: 'raster', source: 'carto' }],
        },
        center: [-105.0, 39.95],
        zoom: 8.4,
        attributionControl: { compact: true },
      });
      map.scrollZoom.disable();
    } catch (e) { return undefined; }
    mapRef.current = map;
    map.on('load', () => {
      try { map.addSource('mini-route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } }); } catch (e) { /* ignore */ }
      try { map.addLayer({ id: 'mini-route-casing', type: 'line', source: 'mini-route', paint: { 'line-color': '#0A0A0A', 'line-width': 5, 'line-opacity': 0.55 }, layout: { 'line-cap': 'round', 'line-join': 'round' } }); } catch (e) { /* ignore */ }
      try { map.addLayer({ id: 'mini-route-glow', type: 'line', source: 'mini-route', paint: { 'line-color': '#B3E635', 'line-width': 8, 'line-opacity': 0.22, 'line-blur': 5 }, layout: { 'line-cap': 'round', 'line-join': 'round' } }); } catch (e) { /* ignore */ }
      try { map.addLayer({ id: 'mini-route-line', type: 'line', source: 'mini-route', filter: ['==', ['get', 'isStraight'], false], paint: { 'line-color': '#B3E635', 'line-width': 3, 'line-opacity': 0.9 }, layout: { 'line-cap': 'round', 'line-join': 'round' } }); } catch (e) { /* ignore */ }
      try { map.addLayer({ id: 'mini-route-fallback', type: 'line', source: 'mini-route', filter: ['==', ['get', 'isStraight'], true], paint: { 'line-color': '#B3E635', 'line-width': 3, 'line-opacity': 0.45, 'line-dasharray': [2, 2] }, layout: { 'line-cap': 'round', 'line-join': 'round' } }); } catch (e) { /* ignore */ }
    });
    let ro = null;
    try { ro = new ResizeObserver(() => { if (mapRef.current) mapRef.current.resize(); }); ro.observe(containerRef.current); } catch (e) { /* ignore */ }
    return () => {
      if (ro) ro.disconnect();
      try { map.remove(); } catch (e) { /* ignore */ }
      mapRef.current = null;
    };
  }, [mlAvailable, hasAddresses]); // eslint-disable-line react-hooks/exhaustive-deps

  // Reconcile route geometry, pins, and bounds whenever the resolved coords change.
  // Show a dashed straight line while OSRM is still loading; suppress it entirely
  // once OSRM has failed so the user sees just the two pins.
  const haveRealRoute = !!route;
  const showFallbackLine = !haveRealRoute && status.route !== 'failed' && pick && dump;
  const routeCoords = haveRealRoute && Array.isArray(route.coords)
    ? route.coords
    : (showFallbackLine ? [[pick.lng, pick.lat], [dump.lng, dump.lat]] : null);
  const isStraight = !haveRealRoute;
  const coordsSig = (pick ? pick.lng.toFixed(4) + ',' + pick.lat.toFixed(4) : '-')
    + '|' + (dump ? dump.lng.toFixed(4) + ',' + dump.lat.toFixed(4) : '-')
    + '|' + (haveRealRoute ? 'r' : (status.route === 'failed' ? 'f' : 'n'));
  useEffect(() => {
    let cancelled = false;
    const t = setTimeout(() => {
      if (cancelled) return;
      const map = mapRef.current;
      if (!map) return;
      const apply = () => {
        if (cancelled) return;
        markersRef.current.forEach(m => { try { m.remove(); } catch (e) { /* ignore */ } });
        markersRef.current = [];
        const src = map.getSource && map.getSource('mini-route');
        if (src) {
          try {
            const features = routeCoords
              ? [{ type: 'Feature', properties: { isStraight }, geometry: { type: 'LineString', coordinates: routeCoords } }]
              : [];
            src.setData({ type: 'FeatureCollection', features });
          } catch (e) { /* ignore */ }
        }
        const PICKUP_HALO = 'radial-gradient(circle, #f35f5f8c, #f35f5f2e 55%, #f35f5f00 75%)';
        const DUMP_HALO   = 'radial-gradient(circle, #b3e6358c, #b3e6352e 55%, #b3e63500 75%)';
        const mkPin = (haloBg, dotColor) => {
          const el = document.createElement('div');
          el.className = 'jx-haul-pin';
          el.style.cursor = 'default';
          const halo = document.createElement('span');
          halo.className = 'jx-haul-pin-halo';
          halo.style.background = haloBg;
          const dot = document.createElement('span');
          dot.className = 'jx-haul-pin-dot';
          dot.style.background = dotColor;
          el.appendChild(halo);
          el.appendChild(dot);
          return el;
        };
        try {
          if (pick) markersRef.current.push(new window.maplibregl.Marker({ element: mkPin(PICKUP_HALO, '#ef5b5b'), anchor: 'center' }).setLngLat([pick.lng, pick.lat]).addTo(map));
          if (dump) markersRef.current.push(new window.maplibregl.Marker({ element: mkPin(DUMP_HALO, '#B3E635'), anchor: 'center' }).setLngLat([dump.lng, dump.lat]).addTo(map));
        } catch (e) { /* ignore */ }
        const fitPoints = routeCoords && routeCoords.length >= 2
          ? routeCoords
          : (pick && dump ? [[pick.lng, pick.lat], [dump.lng, dump.lat]] : null);
        if (fitPoints) {
          try {
            const bounds = new window.maplibregl.LngLatBounds();
            fitPoints.forEach(c => bounds.extend(c));
            map.fitBounds(bounds, { padding: 40, maxZoom: 13, duration: 0 });
          } catch (e) { /* ignore */ }
        }
      };
      if (map.loaded && map.loaded()) apply();
      else if (map.once) map.once('load', apply);
    }, 0);
    return () => {
      cancelled = true;
      clearTimeout(t);
      markersRef.current.forEach(m => { try { m.remove(); } catch (e) { /* ignore */ } });
      markersRef.current = [];
    };
  }, [coordsSig]); // eslint-disable-line react-hooks/exhaustive-deps

  // Throughput math: cycle = 10 min load + drive + 5 min dump + drive (one-way
  // drive used both directions). 8-hr productive shift. CY/load = INVOICE_CY_RATE.TAN.
  const durSec = route && Number.isFinite(route.durationSeconds) ? route.durationSeconds : null;
  const driveMin = durSec != null ? Math.max(1, Math.round(durSec / 60)) : null;
  const cycleMin = driveMin != null ? 15 + 2 * driveMin : null;
  const loadsPerShift = cycleMin != null ? Math.floor(480 / cycleMin) : null;
  const cyPerDay = loadsPerShift != null ? loadsPerShift * (INVOICE_CY_RATE.TAN || 18) : null;

  // Subtitle copy reflects whichever state the widget is currently in.
  const subtitle = !hasAddresses
    ? 'Add pickup + dropoff addresses to see the route.'
    : status.geocode === 'failed'
      ? 'Could not locate one of the addresses.'
      : status.route === 'failed'
        ? 'Driving route unavailable — showing pins only.'
        : 'Driving route + estimated tandem throughput.';

  return (
    <Card style={{ marginBottom: S[5] }}>
      <div style={{ marginBottom: S[4] }}>
        <Label color={C.accent}>Route preview</Label>
        <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 4 }}>{subtitle}</div>
      </div>
      {hasAddresses ? (
        <>
          <div ref={containerRef} style={{ width: '100%', height: 300, borderRadius: R.md, overflow: 'hidden', background: C.surfaceHi, marginBottom: S[4] }} />
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3] }}>
            <div style={{ padding: S[3], borderRadius: R.sm, background: C.surfaceHi, border: `1px solid ${C.rule}` }}>
              <div style={{ ...T.caption, color: C.inkDim, marginBottom: 4, letterSpacing: 0.5, textTransform: 'uppercase' }}>Drive time</div>
              <div style={{ ...T.statValue, color: C.ink }}>
                {driveMin != null ? driveMin : '—'} <span style={{ ...T.bodySm, color: C.inkDim, fontWeight: 400 }}>{driveMin != null ? 'min one-way' : ''}</span>
              </div>
            </div>
            <div style={{ padding: S[3], borderRadius: R.sm, background: C.surfaceHi, border: `1px solid ${C.rule}` }}>
              <div style={{ ...T.caption, color: C.inkDim, marginBottom: 4, letterSpacing: 0.5, textTransform: 'uppercase', display: 'flex', alignItems: 'center', gap: 6 }}>
                <span>Est. CY/day · 1 TAN</span>
                <span title="Assumes 10 min load + drive + 5 min dump + return drive, 8-hr productive shift, 18 CY per tandem load." style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 14, height: 14, borderRadius: '50%', border: `1px solid ${C.ruleHi}`, color: C.inkDim, fontSize: 9, cursor: 'help' }}>?</span>
              </div>
              <div style={{ ...T.statValue, color: C.ink }}>
                {cyPerDay != null ? `~${cyPerDay} CY` : '—'} {loadsPerShift != null && <span style={{ ...T.bodySm, color: C.inkDim, fontWeight: 400 }}>· {loadsPerShift} loads</span>}
              </div>
            </div>
          </div>
        </>
      ) : (
        <div style={{ padding: S[5], borderRadius: R.md, background: C.surfaceHi, border: `1px dashed ${C.rule}`, textAlign: 'center', ...T.bodySm, color: C.inkFaint }}>
          Edit pickup + dropoff in the Logistics card above to plot the route.
        </div>
      )}
    </Card>
  );
}

function AdminHaulRequestDetail({ db, setDb, navigate, requestId }) {
  const requests = db.haulRequests || [];
  const req = requests.find(r => r.id === requestId);
  const [pickerHaulerId, setPickerHaulerId] = useState(null);
  const [assigningTruck, setAssigningTruck] = useState(false);
  const [addingDayFor, setAddingDayFor] = useState(null);
  const [newDayDate, setNewDayDate] = useState(TODAY_ISO);
  const [newDayStart, setNewDayStart] = useState('08:00');
  const [addLoadForm, setAddLoadForm] = useState({ truckId: null, date: null, time: '', cy: '' });
  if (!req) return <NotFound navigate={navigate} />;
  const project = db.projects.find(p => p.id === req.projectId);
  const material = MATERIALS.find(m => m.code === req.materialCode);
  const matMaterial = material ? material.label : req.materialCode;
  const assignments = req.assignments || [];
  const alreadyAssignedIds = new Set(assignments.map(a => a.truckId));
  const totalDeliveredCY = assignments.reduce((s, a) =>
    s + a.days.reduce((s2, d) => s2 + d.loads.reduce((s3, l) => s3 + (l.cy || 0), 0), 0), 0);
  const overallPct = req.volumeCY > 0 ? (totalDeliveredCY / req.volumeCY) * 100 : 0;

  // Suggested haulers (legacy picker, kept for grouped browse) — exclude haulers whose trucks are all assigned
  const suggestedHaulers = db.haulers.filter(op => {
    const pickable = db.trucks.filter(t => t.haulerId === op.id && !alreadyAssignedIds.has(t.id));
    return pickable.length > 0;
  });

  const updateReq = (mutator) => setDb(prev => ({
    ...prev,
    haulRequests: prev.haulRequests.map(r => r.id === req.id ? mutator(r) : r),
  }));

  // Logistics field updates (v12): emit a haul_request.updated activity event
  // so the feed shows admin edits. `label` is the human-readable field name.
  const updateLogistics = (mutator, label) => {
    setDb(prev => appendActivity(
      { ...prev, haulRequests: prev.haulRequests.map(r => r.id === req.id ? mutator(r) : r) },
      { type: 'haul_request.updated', actorRole: 'admin', actorId: null,
        summary: `Admin updated ${label} on ${haulRequestLabel(db, req)}`, refId: req.id }
    ));
  };
  const pickup  = req.pickupLocation  || { name: '', address: '' };
  const dropoff = req.dropoffLocation || { name: '', address: '' };
  const timing  = req.timing          || { startDate: '', endDate: '' };
  const loading = (req.siteAccess && req.siteAccess.loading) || { notes: '', equipment: '' };
  const dumping = (req.siteAccess && req.siteAccess.dumping) || { notes: '', equipment: '' };
  const fmtTimingISO = (iso) => {
    if (!iso) return '';
    try {
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } catch (e) { return iso; }
  };
  const timingDisplay = timing.startDate
    ? (timing.endDate ? `${fmtTimingISO(timing.startDate)} – ${fmtTimingISO(timing.endDate)}` : fmtTimingISO(timing.startDate))
    : 'Not set';
  const dateInputStyle = { ...T.bodySm, padding: '6px 8px', borderRadius: R.sm, border: `1px solid ${C.ruleHi}`, background: C.surface, color: C.ink, fontFamily: F.mono };

  const assignTruck = (haulerId, truckId) => {
    const assignedHauler = db.haulers.find(h => h.id === haulerId);
    const assignedTruck = db.trucks.find(t => t.id === truckId);
    const newAssignment = {
      truckId,
      haulerId,
      addedAt: Date.now(),
      days: [{ date: TODAY_ISO, startTime: req.requestedAt || '08:00', loads: [] }],
    };
    setDb(prev => appendActivity(
      {
        ...prev,
        haulRequests: prev.haulRequests.map(r => r.id === req.id ? {
          ...r,
          status: r.status === 'pending' ? 'matched' : r.status,
          matchedHaulerId: r.matchedHaulerId || haulerId,
          matchedTruckId: r.matchedTruckId || truckId,
          assignments: [...(r.assignments || []), newAssignment],
        } : r),
      },
      {
        type: 'haulRequest.truckAdded',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin added truck #${assignedTruck ? assignedTruck.plate : '?'} (${assignedHauler ? assignedHauler.name : 'unknown hauler'}) to ${haulRequestLabel(db, req)}`,
        refId: req.id,
      }
    ));
    setPickerHaulerId(null);
    setAssigningTruck(false);
  };

  const addDay = (truckId) => {
    updateReq(r => ({
      ...r,
      assignments: r.assignments.map(a => a.truckId === truckId
        ? { ...a, days: [...a.days, { date: newDayDate, startTime: newDayStart, loads: [] }] }
        : a),
    }));
    setAddingDayFor(null);
    setNewDayDate(TODAY_ISO);
    setNewDayStart('08:00');
  };

  const addLoad = (truckId, date, time, cy) => {
    const n = parseFloat(cy);
    if (!time || !Number.isFinite(n) || n <= 0) return;
    const newLoad = { id: 'hreq-load-' + Math.random().toString(36).substring(2, 7), time, cy: n };
    updateReq(r => ({
      ...r,
      assignments: r.assignments.map(a => a.truckId === truckId
        ? { ...a, days: a.days.map(d => d.date === date ? { ...d, loads: [...d.loads, newLoad] } : d) }
        : a),
    }));
    setAddLoadForm({ truckId: null, date: null, time: '', cy: '' });
  };

  const removeLoad = (truckId, date, loadId) => {
    updateReq(r => ({
      ...r,
      assignments: r.assignments.map(a => a.truckId === truckId
        ? { ...a, days: a.days.map(d => d.date === date ? { ...d, loads: d.loads.filter(l => l.id !== loadId) } : d) }
        : a),
    }));
  };

  const removeAssignment = (truckId) => {
    const assignedTruck = db.trucks.find(t => t.id === truckId);
    const target = assignments.find(a => a.truckId === truckId);
    const loadsOnTruck = target ? target.days.reduce((s, d) => s + d.loads.length, 0) : 0;
    const msg = loadsOnTruck > 0
      ? `Remove truck #${assignedTruck ? assignedTruck.plate : '?'} from this haul? ${loadsOnTruck} logged load${loadsOnTruck === 1 ? '' : 's'} will be discarded.`
      : `Remove truck #${assignedTruck ? assignedTruck.plate : '?'} from this haul?`;
    if (!confirm(msg)) return;
    updateReq(r => ({
      ...r,
      assignments: r.assignments.filter(a => a.truckId !== truckId),
      // Clear legacy matched fields if removing the very truck they pointed at,
      // so the UI's "Matched" pill doesn't keep lying.
      matchedHaulerId: r.matchedHaulerId && r.matchedTruckId === truckId ? null : r.matchedHaulerId,
      matchedTruckId:  r.matchedTruckId === truckId ? null : r.matchedTruckId,
    }));
  };

  const removeDay = (truckId, date) => {
    const target = assignments.find(a => a.truckId === truckId);
    if (!target) return;
    const day = target.days.find(d => d.date === date);
    const loadCount = day ? day.loads.length : 0;
    if (target.days.length <= 1) {
      alert("Can't remove the only day on this truck — remove the truck assignment instead.");
      return;
    }
    if (loadCount > 0 && !confirm(`Remove this day? ${loadCount} logged load${loadCount === 1 ? '' : 's'} will be discarded.`)) return;
    updateReq(r => ({
      ...r,
      assignments: r.assignments.map(a => a.truckId === truckId
        ? { ...a, days: a.days.filter(d => d.date !== date) }
        : a),
    }));
  };

  // Legacy assign (suggested-haulers list) — now routes through assignTruck for parity
  const assign = (haulerId, truckId) => assignTruck(haulerId, truckId);

  // v18: invoices section. JSE-issued (Jobsite Exchange → GC) interim/final
  // invoices keyed off this haul request. Line items derive from delivered CY
  // per truck-assignment × INVOICE_CY_RATE[truckType]. `kind` distinguishes
  // interim from final; encoded redundantly in number prefix so cross-tab
  // Realtime broadcasts survive even before the optional `kind` column
  // migration is applied (see outputs/supabase-migrations-needed.md v18 section).
  const invoicesForHaul = (db.invoices || []).filter(inv => inv.haulRequestId === req.id);
  const generateHaulInvoice = (kind) => {
    const today = new Date().toISOString().slice(0, 10);
    const lineItems = (req.assignments || []).map(a => {
      const truck = db.trucks.find(t => t.id === a.truckId);
      const cy = a.days.reduce((s, d) => s + d.loads.reduce((s2, l) => s2 + (l.cy || 0), 0), 0);
      const cyRate = (truck && INVOICE_CY_RATE[truck.type]) || 20;
      const driver = truck ? db.drivers.find(d => d.id === truck.driverId) : null;
      return {
        id: 'li-' + Math.random().toString(36).substring(2, 7),
        truckPlate: truck ? truck.plate : '?',
        truckType: truck ? truck.type : '',
        driverName: driver ? driver.name : '—',
        deliveredCY: cy,
        cyRate,
        hours: 0, rate: cyRate,
        amount: parseFloat((cy * cyRate).toFixed(2)),
      };
    });
    const totalCYForInv = lineItems.reduce((s, li) => s + li.deliveredCY, 0);
    const prefix = kind === 'final' ? 'INV-FIN-' : 'INV-INT-';
    const invoiceId = 'inv-' + Date.now();
    const newInvoice = {
      id: invoiceId,
      haulerId: null,
      projectId: req.projectId,
      haulRequestId: req.id,
      number: prefix + String(Math.floor(Math.random() * 9000) + 1000),
      periodStart: today, periodEnd: today, issuedDate: today,
      createdAt: new Date().toISOString(),
      billTo: project ? project.gc : '—',
      lineItems,
      loadCount: (req.assignments || []).reduce((s, a) => s + a.days.reduce((s2, d) => s2 + d.loads.length, 0), 0),
      totalCY: totalCYForInv,
      notes: '',
      status: 'draft',
      kind,
    };
    setDb(prev => appendActivity(
      { ...prev, invoices: [...(prev.invoices || []), newInvoice] },
      {
        type: 'invoice.drafted',
        actorRole: 'admin',
        actorId: null,
        summary: 'Admin drafted ' + newInvoice.number + ' (' + kind + ') for ' + (project ? project.gc : 'a haul'),
        refId: req.id,
      }
    ));
    navigate('/admin/invoices/' + invoiceId + '/print');
  };
  const advanceInvoiceStatus = (invId, nextStatus) => {
    const stampField = nextStatus === 'sent' ? 'sentAt' : nextStatus === 'paid' ? 'paidAt' : null;
    setDb(prev => appendActivity(
      { ...prev, invoices: (prev.invoices || []).map(i => i.id === invId ? { ...i, status: nextStatus, ...(stampField ? { [stampField]: new Date().toISOString() } : {}) } : i) },
      {
        type: 'invoice.' + nextStatus,
        actorRole: 'admin', actorId: null,
        summary: 'Invoice ' + ((prev.invoices || []).find(i => i.id === invId) || {}).number + ' marked ' + nextStatus,
        refId: req.id,
      }
    ));
  };
  const fmtMoneyInv = (n) => '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[
        { label: 'Admin', to: '/admin' },
        { label: 'Haul Requests', to: '/admin/requests' },
        { label: haulRequestLabel(db, req) },
      ]} navigate={navigate} />

      {/* v18: Project & contractor — surfaces the data shown on the list-row
          (project name + GC + contact) that was missing from the detail view.
          Contractor = requester (project.gc + project.contactName/Phone/Email).
          Hauler block surfaces only when at least one truck is assigned (it
          de-dupes haulers across assignments since trucks may come from
          different haulers on the same haul). */}
      <Card style={{ marginBottom: S[5] }}>
        <div style={{ marginBottom: S[4] }}>
          <Label color={C.accent}>Project & contractor</Label>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: S[5] }}>
          <div>
            <Label style={{ marginBottom: S[2] }}>Project</Label>
            <div style={{ ...T.body, color: C.ink, fontWeight: 600 }}>
              {project ? project.name : '—'}
            </div>
            <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 2 }}>
              {project ? (project.address || '—') : '—'}
            </div>
          </div>
          <div>
            <Label style={{ marginBottom: S[2] }}>Contractor (requester)</Label>
            <div style={{ ...T.body, color: C.ink, fontWeight: 600 }}>
              {project && project.gc ? project.gc : '—'}
            </div>
            <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 2, display: 'flex', gap: S[3], flexWrap: 'wrap', alignItems: 'center' }}>
              <span>{project && project.contactName ? project.contactName : '—'}</span>
              {project && project.contactPhone ? (
                <a href={'tel:' + project.contactPhone}
                  style={{ color: C.inkDim, textDecoration: 'none' }}
                  onMouseEnter={e => e.currentTarget.style.color = C.accent}
                  onMouseLeave={e => e.currentTarget.style.color = C.inkDim}>
                  ☎ {project.contactPhone}
                </a>
              ) : null}
              {project && project.contactEmail ? (
                <a href={'mailto:' + project.contactEmail}
                  style={{ color: C.inkDim, textDecoration: 'none' }}
                  onMouseEnter={e => e.currentTarget.style.color = C.accent}
                  onMouseLeave={e => e.currentTarget.style.color = C.inkDim}>
                  ✉ {project.contactEmail}
                </a>
              ) : null}
            </div>
          </div>
          {(() => {
            const haulerIds = new Set();
            if (req.matchedHaulerId) haulerIds.add(req.matchedHaulerId);
            for (const a of assignments) if (a.haulerId) haulerIds.add(a.haulerId);
            if (haulerIds.size === 0) return null;
            const haulers = Array.from(haulerIds).map(id => db.haulers.find(h => h.id === id)).filter(Boolean);
            if (haulers.length === 0) return null;
            return (
              <div>
                <Label style={{ marginBottom: S[2] }}>Hauler{haulers.length > 1 ? 's' : ''} (fulfilling)</Label>
                {haulers.map(h => (
                  <div key={h.id} style={{ marginBottom: S[3] }}>
                    <div style={{ ...T.body, color: C.ink, fontWeight: 600 }}>{h.name}</div>
                    <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 2, display: 'flex', gap: S[3], flexWrap: 'wrap', alignItems: 'center' }}>
                      <span>{h.contact || '—'}</span>
                      {h.phone ? (
                        <a href={'tel:' + h.phone}
                          style={{ color: C.inkDim, textDecoration: 'none' }}
                          onMouseEnter={e => e.currentTarget.style.color = C.accent}
                          onMouseLeave={e => e.currentTarget.style.color = C.inkDim}>
                          ☎ {h.phone}
                        </a>
                      ) : null}
                      {h.email ? (
                        <a href={'mailto:' + h.email}
                          style={{ color: C.inkDim, textDecoration: 'none' }}
                          onMouseEnter={e => e.currentTarget.style.color = C.accent}
                          onMouseLeave={e => e.currentTarget.style.color = C.inkDim}>
                          ✉ {h.email}
                        </a>
                      ) : null}
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      </Card>

      {/* Request summary. v18: overall completion gauge moved here from the
          per-truck assignment cards — each truck contributes to the haul's
          total, so the percentage belongs at the haul level.
          v19: moved up to sit directly below Project & contractor so the
          status pill + total-delivered gauge are visible above the fold. */}
      <Card style={{ marginBottom: S[5] }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: S[4], flexWrap: 'wrap' }}>
          <div style={{ flex: 1, minWidth: 240 }}>
            <Label color={C.accent} style={{ marginBottom: 6 }}>Haul Request</Label>
            <h1 style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink }}>
              <EditableText value={String(req.volumeCY == null ? '' : req.volumeCY)}
                onSave={(v) => {
                  const n = parseFloat((v || '').trim());
                  if (Number.isFinite(n) && n > 0 && n !== req.volumeCY) {
                    updateLogistics(r => ({ ...r, volumeCY: n }), 'volume');
                  }
                }}
                placeholder="0" mono />
              {' CY of '}
              <EditableMaterial value={req.materialCode}
                onSave={(v) => { if (v !== req.materialCode) updateLogistics(r => ({ ...r, materialCode: v }), 'material'); }} />
            </h1>
            <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>
              {project ? project.name : '—'} · requested at {req.requestedAt}
              <span style={{ color: C.inkFaint }}> · click amount or material to edit</span>
            </div>
            {req.notes && (
              <div style={{ ...T.bodySm, marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md, color: C.ink }}>
                {req.notes}
              </div>
            )}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: S[3] }}>
            <StatusPill status={req.status} />
            <div style={{ display: 'flex', alignItems: 'center', gap: S[3] }}>
              <div style={{ textAlign: 'right' }}>
                <div style={{ ...T.caption, color: C.inkFaint, letterSpacing: 0.5, textTransform: 'uppercase' }}>Total delivered</div>
                <div style={{ ...T.bodySm, color: C.ink, fontFamily: F.mono, fontWeight: 700 }}>
                  {totalDeliveredCY} / {req.volumeCY} CY
                </div>
                <div style={{ ...T.caption, color: C.inkDim, fontFamily: F.mono, marginTop: 2 }}>
                  {assignments.length === 0 ? 'No trucks assigned' : assignments.length + ' truck' + (assignments.length === 1 ? '' : 's') + ' contributing'}
                </div>
              </div>
              <Donut pct={overallPct} size={88} stroke={9} />
            </div>
          </div>
        </div>
      </Card>

      {/* Logistics details (v12) — pickup, dropoff, timing, and loading/dumping site access. */}
      <Card style={{ marginBottom: S[5] }}>
        <div style={{ marginBottom: S[4] }}>
          <Label color={C.accent}>Logistics</Label>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 4 }}>Click any value to edit.</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: S[5], marginBottom: S[5] }}>
          <div>
            <Label style={{ marginBottom: S[2] }}>Pickup location</Label>
            <div style={{ ...T.body, color: C.ink, marginBottom: 4, fontWeight: 600 }}>
              <EditableText value={pickup.name}
                placeholder="Site or yard name…"
                onSave={(v) => updateLogistics(r => ({ ...r, pickupLocation: { ...pickup, name: v } }), 'pickup location')} />
            </div>
            <div style={{ ...T.bodySm, color: C.inkDim }}>
              <AddressAutocomplete value={pickup.address}
                placeholder="Start typing a street address…"
                db={db} setDb={setDb}
                onSave={(v) => updateLogistics(r => ({ ...r, pickupLocation: { ...pickup, address: v } }), 'pickup location')} />
            </div>
          </div>
          <div>
            <Label style={{ marginBottom: S[2] }}>Dropoff location</Label>
            <div style={{ ...T.body, color: C.ink, marginBottom: 4, fontWeight: 600 }}>
              <EditableText value={dropoff.name}
                placeholder="Site or yard name…"
                onSave={(v) => updateLogistics(r => ({ ...r, dropoffLocation: { ...dropoff, name: v } }), 'dropoff location')} />
            </div>
            <div style={{ ...T.bodySm, color: C.inkDim }}>
              <AddressAutocomplete value={dropoff.address}
                placeholder="Start typing a street address…"
                db={db} setDb={setDb}
                onSave={(v) => updateLogistics(r => ({ ...r, dropoffLocation: { ...dropoff, address: v } }), 'dropoff location')} />
            </div>
          </div>
        </div>

        <div style={{ marginBottom: S[5] }}>
          <Label style={{ marginBottom: S[2] }}>Timing</Label>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[3], flexWrap: 'wrap' }}>
            <input type="date" value={timing.startDate}
              onChange={e => updateLogistics(r => ({ ...r, timing: { ...timing, startDate: e.target.value } }), 'timing')}
              style={dateInputStyle} />
            <span style={{ ...T.bodySm, color: C.inkFaint }}>→</span>
            <input type="date" value={timing.endDate}
              onChange={e => updateLogistics(r => ({ ...r, timing: { ...timing, endDate: e.target.value } }), 'timing')}

              const kindLabel = inv.kind === 'final' ? 'Final' : inv.kind === 'interim' ? 'Interim' : (String(inv.number || '').startsWith('INV-FIN-') ? 'Final' : 'Interim');
              return (

                  )}

                    <span style={{ ...T.caption, color: C.ok }}>Paid {inv.paidAt ? new Date(inv.paidAt).toLocaleDateString() : ''}</span>
