function DriverHome({ driver, truck, db, setDb, navigate }) {
  const project = db.projects.find(p => p.id === truck.projectId);
  const truckType = TRUCK_TYPES.find(t => t.code === truck.type);
  const hr = db.hours.find(h => h.truckId === truck.id && h.driverId === driver.id && h.status === 'open');
  const todayLoads = db.loads.filter(l => l.driverId === driver.id && l.truckId === truck.id && l.date === 'today');
  const isPaused = !!(hr && hr.pausedAt);
  const isOpen = !!(hr && hr.status === 'open');

  // Live ticker — re-render every second while clocked in (and not paused)
  const [, force] = useState(0);
  useEffect(() => {
    if (!isOpen) return;
    const id = setInterval(() => force(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [isOpen, isPaused, hr ? hr.id : null]);

  // Compute elapsed milliseconds since clock-in, minus any paused time
  let elapsedMs = 0;
  if (hr) {
    if (hr.clockedInAt) {
      let pausedMs = hr.pausedMs || 0;
      if (hr.pausedAt) pausedMs += Date.now() - hr.pausedAt;
      const end = hr.clockedOutAt || Date.now();
      elapsedMs = Math.max(0, end - hr.clockedInAt - pausedMs);
    } else {
      // Fallback for seed data without timestamps
      elapsedMs = Math.floor(calcHours(hr.clockIn, hr.breakMin, hr.clockOut) * 3600 * 1000);
    }
  }
  const fmtElapsed = (ms) => {
    const t = Math.floor(ms / 1000);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = t % 60;
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  };
  const fmtClock = (d) => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

  const clockIn = () => {
    const now = Date.now();
    setDb(prev => ({
      ...prev,
      hours: [
        ...prev.hours.map(h => (h.driverId === driver.id && h.status === 'open') ? { ...h, status: 'closed', clockOut: fmtClock(new Date(now)), clockedOutAt: now } : h),
        {
          id: 'hr-' + Math.random().toString(36).substring(2, 7),
          driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
          clockIn: fmtClock(new Date(now)), clockedInAt: now, clockOut: null, clockedOutAt: null,
          breakMin: 0, pausedMs: 0, pausedAt: null, status: 'open', date: 'today',
        },
      ],
    }));
  };

  const togglePause = () => {
    if (!hr) return;
    if (hr.pausedAt) {
      const addedMs = Date.now() - hr.pausedAt;
      setDb(prev => ({
        ...prev,
        hours: prev.hours.map(h => h.id === hr.id ? {
          ...h, pausedMs: (h.pausedMs || 0) + addedMs, pausedAt: null,
          breakMin: Math.round(((h.pausedMs || 0) + addedMs) / 60000),
        } : h),
      }));
    } else {
      setDb(prev => ({
        ...prev,
        hours: prev.hours.map(h => h.id === hr.id ? { ...h, pausedAt: Date.now() } : h),
      }));
    }
  };

  const clockOut = () => {
    if (!hr) return;
    if (!confirm('End your shift?')) return;
    const now = Date.now();
    setDb(prev => ({
      ...prev,
      hours: prev.hours.map(h => {
        if (h.id !== hr.id) return h;
        let pausedMs = h.pausedMs || 0;
        if (h.pausedAt) pausedMs += now - h.pausedAt;
        return {
          ...h, clockOut: fmtClock(new Date(now)), clockedOutAt: now,
          pausedAt: null, pausedMs, breakMin: Math.round(pausedMs / 60000),
          status: 'pending',
        };
      }),
    }));
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px` }}>
      <div style={{ marginBottom: S[3] }}>
        <Label color={C.accent}>Today {fmtClock(new Date())}</Label>
        <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: C.ink, marginTop: 4 }}>Hi, {driver.name.split(' ').pop()}</div>
      </div>

      {/* Truck card */}
      <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3] }}>
          <Label>Your truck</Label>
          {!hr && <Pill color={C.inkFaint} soft="rgba(255,255,255,0.04)">Off the clock</Pill>}
          {isOpen && !isPaused && <StatusPill status="open" />}
          {isOpen && isPaused && <Pill color={C.warn} soft={C.warnSoft}>Paused</Pill>}
          {hr && hr.status !== 'open' && <Pill color={C.inkDim} soft="rgba(255,255,255,0.06)">Shift ended</Pill>}
        </div>
        <div style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, color: C.accent }}>#{truck.plate}</div>
        <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>{truckType.label} · {truckType.cap} · {truck.hauler}</div>
        <div style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
          <Label style={{ marginBottom: 4 }}>On project</Label>
          <div style={{ fontFamily: F.display, fontSize: 16, fontWeight: 600, color: C.ink }}>{project.name}</div>
          <div style={{ fontFamily: F.body, fontSize: 11, color: C.inkDim, marginTop: 2 }}>{project.address}</div>
        </div>
      </div>

      {/* Running clock or off-state */}
      {hr ? (
        <div style={{ background: isPaused ? C.warnSoft : C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3], border: isPaused ? `1px solid ${C.warn}` : 'none' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: S[2] }}>
            <Label color={isPaused ? C.warn : C.accent}>{isPaused ? 'Paused' : (isOpen ? 'On the clock' : 'Shift submitted')}</Label>
            <span style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>started {hr.clockIn}{hr.clockOut ? ' · ended ' + hr.clockOut : ''}</span>
          </div>
          <div style={{ fontFamily: F.mono, fontSize: 44, fontWeight: 700, color: isPaused ? C.warn : C.accent, lineHeight: 1, letterSpacing: -1, fontVariantNumeric: 'tabular-nums' }}>
            {fmtElapsed(elapsedMs)}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: S[3], alignItems: 'flex-end' }}>
            <div>
              <Label style={{ marginBottom: 4 }}>Loads</Label>
              <div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.length}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <Label style={{ marginBottom: 4 }}>Total CY</Label>
              <div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.reduce((s, l) => s + (l.cy || 0), 0)}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <Label style={{ marginBottom: 4 }}>Break</Label>
              <div style={{ fontFamily: F.display, fontSize: 18, fontWeight: 700, color: C.inkDim, lineHeight: 1 }}>{Math.round(((hr.pausedMs || 0) + (hr.pausedAt ? Date.now() - hr.pausedAt : 0)) / 60000)}m</div>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ background: C.surfaceHi, borderRadius: R.lg, padding: S[4], marginBottom: S[3], display: 'flex', alignItems: 'center', gap: S[3] }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.inkFaint }} />
          <div><Label>Status</Label><div style={{ fontFamily: F.display, fontSize: 16, color: C.inkDim, fontWeight: 600, marginTop: 2 }}>Not clocked in</div></div>
        </div>
      )}

      <div style={{ flex: 1 }} />

      {!hr && (
        <button onClick={clockIn} style={{ width: '100%', height: 84, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontFamily: F.display, fontSize: 22, fontWeight: 700, letterSpacing: -0.6 }}>Clock in</button>
      )}
      {isOpen && (
        <>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: S[2], marginBottom: S[2] }}>
            <button onClick={() => navigate('/driver/log')} disabled={isPaused} style={{ height: 84, border: 'none', cursor: isPaused ? 'not-allowed' : 'pointer', background: isPaused ? C.surfaceHi : C.accent, color: isPaused ? C.inkFaint : C.bg, borderRadius: R.lg, fontFamily: F.display, fontSize: 18, fontWeight: 700, letterSpacing: -0.4, opacity: isPaused ? 0.5 : 1 }}>+ Log load</button>
            <button onClick={togglePause} style={{ height: 84, border: `1px solid ${isPaused ? C.accent : C.warn}`, cursor: 'pointer', background: isPaused ? C.accentSoft : 'transparent', color: isPaused ? C.accent : C.warn, borderRadius: R.lg, fontFamily: F.display, fontSize: 18, fontWeight: 700, letterSpacing: -0.4 }}>{isPaused ? 'Resume' : 'Pause'}</button>
          </div>
          <button onClick={clockOut} style={{ width: '100%', height: 56, border: `1px solid ${C.warn}`, cursor: 'pointer', background: 'transparent', color: C.warn, borderRadius: R.lg, fontFamily: F.display, fontSize: 16, fontWeight: 600 }}>End shift / Clock out</button>
        </>
      )}

      {todayLoads.length > 0 && (
        <div style={{ marginTop: S[4] }}>
          <Label style={{ marginBottom: S[2] }}>Today's loads</Label>
          {todayLoads.slice().reverse().slice(0, 6).map(l => {
            const m = MATERIALS.find(m => m.code === l.material);
            return (
              <div key={l.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: `${S[2]}px 0`, borderBottom: `1px solid ${C.rule}`, fontFamily: F.body, fontSize: 13 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
                  {l.photo ? <img src={l.photo} alt="" style={{ width: 32, height: 32, borderRadius: 4, objectFit: 'cover' }} /> : <div style={{ width: 32, height: 32, borderRadius: 4, background: C.surfaceMax, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>📷</div>}
                  <div>
                    <div style={{ fontFamily: F.display, fontWeight: 600 }}>{l.cy != null ? l.cy + ' CY' : l.ticketNo} · {m.label}</div>
                    <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkDim, marginTop: 2 }}>{l.time}</div>
                  </div>
                </div>
                <StatusPill status={l.status} />
              </div>
            );
          })}
        </div>
      )}

      {/* End-of-day summary card */}
      <div style={{ marginTop: S[4], background: C.surface, borderRadius: R.lg, padding: S[4] }}>
        <Label style={{ marginBottom: S[3] }}>End-of-day summary</Label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: S[3] }}>
          <div>
            <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 4 }}>Loads</div>
            <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.length}</div>
          </div>
          <div>
            <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 4 }}>Hours</div>
            <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: hr ? C.accent : C.inkDim, lineHeight: 1 }}>{hr ? (elapsedMs / 3600000).toFixed(1) : '—'}</div>
            {!hr && <div style={{ fontFamily: F.body, fontSize: 10, color: C.inkFaint, marginTop: 4 }}>Not clocked in</div>}
          </div>
          <div>
            <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 4 }}>Last load</div>
            <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.length > 0 ? todayLoads[todayLoads.length - 1].time : '—'}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function DriverLogLoad({ driver, truck, db, setDb, navigate, returnTo }) {
  const back = returnTo || '/driver';
  const proj = db.projects.find(p => p.id === truck.projectId);
  const [material, setMaterial] = useState((proj && proj.material[0]) || 'CF');
  const [cy, setCy] = useState('');
  const [photo, setPhoto] = useState(null);
  const fileRef = useRef(null);

  const onPick = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => setPhoto(ev.target.result);
    reader.readAsDataURL(f);
  };

  const submit = () => {
    if (!canSubmit) return;
    const now = new Date();
    const hhmm = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    setDb(prev => ({
      ...prev,
      loads: [...prev.loads, {
        id: 'ld-' + Math.random().toString(36).substring(2, 7),
        driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
        material, cy: parseFloat(cy), photo, time: hhmm, date: 'today', status: 'pending',
      }],
    }));
    navigate(back);
  };

  const canSubmit = cy && parseFloat(cy) > 0;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px`, overflowY: 'auto' }}>
      <button onClick={() => navigate(back)} style={{ background: 'transparent', border: 'none', color: C.inkDim, fontFamily: F.body, fontSize: 13, padding: 0, marginBottom: S[3], cursor: 'pointer', textAlign: 'left' }}>← Back</button>
      <Label color={C.accent} style={{ marginBottom: 6 }}>New load · #{truck.plate} · {proj ? proj.name : ''}</Label>
      <div style={{ fontFamily: F.display, fontSize: 24, fontWeight: 700, letterSpacing: -0.6, marginBottom: S[4] }}>Log a load</div>

      <Label style={{ marginBottom: 6 }}>Material</Label>
      <select value={material} onChange={e => setMaterial(e.target.value)} style={{ background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, borderRadius: R.md, padding: '16px 16px', fontFamily: F.display, fontSize: 16, fontWeight: 600, marginBottom: S[4], appearance: 'menulist', width: '100%', boxSizing: 'border-box' }}>
        {MATERIALS.map(m => (
          <option key={m.code} value={m.code}>{m.label}</option>
        ))}
      </select>

      <Label style={{ marginBottom: 6 }}>Cubic yards (CY)</Label>
      <input type="number" inputMode="decimal" value={cy} onChange={e => setCy(e.target.value)} placeholder="e.g. 16" min="0" step="0.5" autoFocus
        style={{ background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`, borderRadius: R.md, padding: '18px 16px', fontFamily: F.mono, fontSize: 28, fontWeight: 700, marginBottom: S[4], textAlign: 'center', letterSpacing: -0.6, boxSizing: 'border-box', width: '100%' }} />

      <Label style={{ marginBottom: 6 }}>Photo (required)</Label>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onPick} style={{ display: 'none' }} />
      {!photo ? (
        <button onClick={() => fileRef.current && fileRef.current.click()} style={{
          height: 140, border: `2px dashed ${C.ruleHi}`, cursor: 'pointer', background: C.surface,
          color: C.inkDim, borderRadius: R.md, fontFamily: F.display, fontSize: 14, fontWeight: 600,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, marginBottom: S[4],
        }}>
          <span style={{ fontSize: 32 }}>📷</span>
          <span>Take photo of load</span>
          <span style={{ fontSize: 11, color: C.inkFaint, fontWeight: 500 }}>Required to submit</span>
        </button>
      ) : (
        <div style={{ position: 'relative', marginBottom: S[4] }}>
          <img src={photo} alt="Load" style={{ width: '100%', height: 180, objectFit: 'cover', borderRadius: R.md, border: `1px solid ${C.accent}`, display: 'block' }} />
          <button onClick={() => { setPhoto(null); if (fileRef.current) fileRef.current.value = ''; }} style={{
            position: 'absolute', top: 8, right: 8, background: 'rgba(0,0,0,0.7)', color: C.ink, border: 'none',
            padding: '6px 12px', borderRadius: R.pill, fontFamily: F.body, fontSize: 11, cursor: 'pointer', fontWeight: 600,
          }}>Retake</button>
        </div>
      )}

      <div style={{ flex: 1, minHeight: S[3] }} />

      <button onClick={submit} disabled={!canSubmit} style={{
        height: 64, border: 'none', cursor: canSubmit ? 'pointer' : 'not-allowed',
        background: C.accent, color: C.bg, borderRadius: R.lg,
        fontFamily: F.display, fontSize: 18, fontWeight: 700, letterSpacing: -0.4,

function DriverTruckDetail({ driver, truck, trucks, db, setDb, navigate }) {
  const truckType = TRUCK_TYPES.find(t => t.code === truck.type);
  const project = db.projects.find(p => p.id === truck.projectId);
  const hr = db.hours.find(h => h.truckId === truck.id && h.driverId === driver.id && h.status === 'open');
  const isOpen = !!hr;
  const isPaused = !!(hr && hr.pausedAt);
  const todayLoads = db.loads.filter(l => l.driverId === driver.id && l.truckId === truck.id && l.date === 'today');
  const totalCY = todayLoads.reduce((s, l) => s + (l.cy || 0), 0);
  const backHref = '/driver';

  // Live ticker for elapsed shift display
  const [, force] = useState(0);
  useEffect(() => {
    if (!isOpen) return;
    const id = setInterval(() => force(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [isOpen, isPaused, hr ? hr.id : null]);

  let elapsedMs = 0;
  if (hr && hr.clockedInAt) {
    let pausedMs = hr.pausedMs || 0;
    if (hr.pausedAt) pausedMs += Date.now() - hr.pausedAt;
    const end = hr.clockedOutAt || Date.now();
    elapsedMs = Math.max(0, end - hr.clockedInAt - pausedMs);
  }

  const fmtClock = (d) => String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

  const clockIn = () => {
    const now = Date.now();
    setDb(prev => ({
      ...prev,
      hours: [
        ...prev.hours.map(h => (h.driverId === driver.id && h.status === 'open') ? { ...h, status: 'closed', clockOut: fmtClock(new Date(now)), clockedOutAt: now } : h),
        {
          id: 'hr-' + Math.random().toString(36).substring(2, 7),
          driverId: driver.id, truckId: truck.id, projectId: truck.projectId,
          clockIn: fmtClock(new Date(now)), clockedInAt: now, clockOut: null, clockedOutAt: null,
          breakMin: 0, pausedMs: 0, pausedAt: null, status: 'open', date: 'today',
        },
      ],
    }));
  };

  const clockOut = () => {
    if (!hr) return;
    if (!confirm('End your shift on this truck?')) return;
    const now = Date.now();
    setDb(prev => ({
      ...prev,
      hours: prev.hours.map(h => {
        if (h.id !== hr.id) return h;
        let pausedMs = h.pausedMs || 0;
        if (h.pausedAt) pausedMs += now - h.pausedAt;
        return {
          ...h, clockOut: fmtClock(new Date(now)), clockedOutAt: now,
          pausedAt: null, pausedMs, breakMin: Math.round(pausedMs / 60000),
          status: 'pending',
        };
      }),
    }));
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: `${S[3]}px ${S[5]}px ${S[5]}px`, overflowY: 'auto' }}>
      <button onClick={() => navigate(backHref)} style={{ background: 'transparent', border: 'none', color: C.inkDim, fontFamily: F.body, fontSize: 13, padding: 0, marginBottom: S[3], cursor: 'pointer', textAlign: 'left' }}>← All my trucks</button>

      {/* Truck header */}
      <div style={{ background: C.surface, borderRadius: R.lg, padding: S[4], marginBottom: S[3] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[2] }}>
          <Label>Truck</Label>
          {isOpen && !isPaused && <StatusPill status="open" />}
          {isOpen && isPaused && <Pill color={C.warn} soft={C.warnSoft}>Paused</Pill>}
          {!isOpen && <StatusPill status="idle" />}
        </div>
        <div style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700, letterSpacing: -0.8, color: C.accent }}>#{truck.plate}</div>
        <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 4 }}>{truckType ? truckType.label : truck.type} · {truckType ? truckType.cap : ''} · {truck.hauler}</div>
        <div style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
          <Label style={{ marginBottom: 4 }}>On project</Label>
          <div style={{ fontFamily: F.display, fontSize: 16, fontWeight: 600, color: C.ink }}>{project ? project.name : '—'}</div>
          <div style={{ fontFamily: F.body, fontSize: 11, color: C.inkDim, marginTop: 2 }}>{project ? project.gc : ''}</div>
          <div style={{ fontFamily: F.body, fontSize: 11, color: C.inkDim, marginTop: 2 }}>{project ? project.address : ''}</div>
        </div>
      </div>

      {/* KPIs */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: S[2], marginBottom: S[3] }}>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Loads</Label>
          <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{todayLoads.length}</div>
        </Card>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Total CY</Label>
          <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: C.ink, lineHeight: 1 }}>{totalCY}</div>
        </Card>
        <Card padding={S[3]}>
          <Label style={{ marginBottom: 4 }}>Shift</Label>
          <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 700, color: isOpen ? C.accent : C.inkDim, lineHeight: 1 }}>{isOpen ? (elapsedMs / 3600000).toFixed(1) + 'h' : '—'}</div>
        </Card>
      </div>

      {/* Primary actions */}
      {!isOpen ? (
        <button onClick={clockIn} style={{ width: '100%', height: 64, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontFamily: F.display, fontSize: 18, fontWeight: 700, letterSpacing: -0.4, marginBottom: S[2] }}>Clock in (this truck)</button>
      ) : (
        <>
          <button onClick={() => navigate(`/driver/log/${truck.id}`)} style={{ width: '100%', height: 64, border: 'none', cursor: 'pointer', background: C.accent, color: C.bg, borderRadius: R.lg, fontFamily: F.display, fontSize: 18, fontWeight: 700, letterSpacing: -0.4, marginBottom: S[2] }}>+ Log load (this truck)</button>
          <button onClick={clockOut} style={{ width: '100%', height: 48, border: `1px solid ${C.warn}`, cursor: 'pointer', background: 'transparent', color: C.warn, borderRadius: R.lg, fontFamily: F.display, fontSize: 14, fontWeight: 600, marginBottom: S[2] }}>End shift on this truck</button>
        </>
      )}

      {/* Today's loads list */}
      <div style={{ marginTop: S[3] }}>
        <Label style={{ marginBottom: S[2] }}>Today's loads on #{truck.plate}</Label>
        {todayLoads.length === 0 ? (
          <EmptyState
            icon={<TruckIcon size={32} />}
            title="No loads logged yet"
            body="Use the + Log load button above to log your first load on this truck."
          />
        ) : (
          todayLoads.slice().reverse().map(l => {
            const m = MATERIALS.find(m => m.code === l.material);
            return (
              <div key={l.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: `${S[2]}px 0`, borderBottom: `1px solid ${C.rule}`, fontFamily: F.body, fontSize: 13 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
                  {l.photo ? <img src={l.photo} alt="" style={{ width: 32, height: 32, borderRadius: 4, objectFit: 'cover' }} /> : <div style={{ width: 32, height: 32, borderRadius: 4, background: C.surfaceMax, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>📷</div>}
                  <div>
                    <div style={{ fontFamily: F.display, fontWeight: 600 }}>{l.cy != null ? l.cy + ' CY' : l.ticketNo} · {m ? m.label : l.material}</div>
                    <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkDim, marginTop: 2 }}>{l.time}</div>
                  </div>
                </div>
                <StatusPill status={l.status} />
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function AdminNewProject({ db, setDb, navigate }) {
  const [step, setStep] = useState(1);
  const [basics, setBasics] = useState({ name: '', code: '', gc: '', address: '', startDate: '', status: 'active', materials: [] });
  const [operatorIds, setOperatorIds] = useState([]);
  const [trucks, setTrucks] = useState([]);
  const [onlyUnassigned, setOnlyUnassigned] = useState(false);
  const [codeTouched, setCodeTouched] = useState(false);

  useEffect(() => { window.scrollTo(0, 0); }, [step]);

  const inputStyle = { background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '12px 14px', borderRadius: R.sm, fontFamily: F.body, fontSize: 15, width: '100%', boxSizing: 'border-box' };

  const deriveCode = (name) => {
    const words = (name || '').trim().split(/\s+/).filter(Boolean);
    if (words.length === 0) return '';
    if (words.length === 1) return words[0].replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase();
    return words.map(w => w[0]).join('').replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase();
  };
  const effectiveCode = codeTouched ? basics.code.toUpperCase() : deriveCode(basics.name);

  const existingIds = new Set(db.projects.map(p => p.id));
  const codeDuplicate = effectiveCode && existingIds.has(effectiveCode);
  const duplicateOwner = codeDuplicate ? db.projects.find(p => p.id === effectiveCode) : null;
  const codeValid = effectiveCode.length >= 2 && effectiveCode.length <= 4 && !codeDuplicate;

  const basicsValid = !!basics.name.trim() && codeValid && !!basics.gc.trim() && !!basics.address.trim() && !!basics.startDate && basics.materials.length > 0;
  const operatorsValid = operatorIds.length > 0;
  const trucksValid = trucks.every(t => t.operatorId && operatorIds.includes(t.operatorId));

  const toggleMaterial = (mcode) => setBasics(b => ({ ...b, materials: b.materials.includes(mcode) ? b.materials.filter(x => x !== mcode) : [...b.materials, mcode] }));
  const toggleOperator = (opId) => {
    const wasSelected = operatorIds.includes(opId);
    setOperatorIds(prev => wasSelected ? prev.filter(x => x !== opId) : [...prev, opId]);
    if (wasSelected) setTrucks(prev => prev.map(t => t.operatorId === opId ? { ...t, operatorId: '' } : t));
  };
  const toggleTruck = (truckId, defaultOpId) => {
    setTrucks(prev => {
      const exists = prev.find(t => t.truckId === truckId);
      if (exists) return prev.filter(t => t.truckId !== truckId);
      return [...prev, { truckId, operatorId: defaultOpId || '' }];
    });
  };
  const setTruckOperator = (truckId, opId) => setTrucks(prev => prev.map(t => t.truckId === truckId ? { ...t, operatorId: opId } : t));

  const cancel = () => navigate('/admin');
  const back = () => setStep(s => Math.max(1, s - 1));
  const next = () => setStep(s => Math.min(4, s + 1));

  const submit = () => {
    const id = effectiveCode;
    const newProject = {
      id,
      code: id + '-' + String(db.projects.length + 1).padStart(2, '0'),
      name: basics.name.trim(),
      gc: basics.gc.trim(),
      address: basics.address.trim(),
      startDate: basics.startDate,
      status: basics.status,
      material: basics.materials,
    };
    setDb(prev => ({
      ...prev,
      projects: [...prev.projects, newProject],
      operators: prev.operators.map(o => operatorIds.includes(o.id) ? { ...o, projectIds: [...o.projectIds, id] } : o),
      trucks: prev.trucks.map(t => {
        const sel = trucks.find(x => x.truckId === t.id);
        return sel ? { ...t, projectId: id, operatorId: sel.operatorId } : t;
      }),
    }));
    navigate('/admin/p/' + id);
  };

  const StepDot = ({ n, label }) => {
    const active = step === n;
    const done = step > n;
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: S[2], flex: 1, minWidth: 0 }}>
        <div style={{
          width: 28, height: 28, borderRadius: '50%',

          color: active ? C.bg : (done ? C.accent : C.inkDim),
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: F.mono, fontSize: 12, fontWeight: 700, flexShrink: 0,

      border: `1px solid ${active ? C.accent : (warn ? C.warn : C.ruleHi)}`,

        <StepDot n={2} label="Operators" />

                      border: `2px solid ${selected ? C.accent : C.ruleHi}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: C.bg, fontFamily: F.display, fontSize: 14, fontWeight: 700, flexShrink: 0,
                    }}>{selected ? '✓' : ''}</div>
                    <Avatar name={op.name} color={C.accent} />
                    <div style={{ flex: 1, minWidth: 140 }}>
                      <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink }}>{op.name}</div>
                      <div style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim, marginTop: 2 }}>{op.phone}</div>
                    </div>
                    <div style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>
                      {op.projectIds.length} {op.projectIds.length === 1 ? 'project' : 'projects'} · {trucksManaged} {trucksManaged === 1 ? 'truck' : 'trucks'}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim }}>{operatorIds.length} selected</div>
          </div>
        )}

        {step === 3 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: S[3] }}>
            <Label>Step 3 — Assign trucks</Label>
            <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim }}>Optional. Pick trucks for this project and assign each to one of the operators you selected.</div>
            <div>
              <Chip active={onlyUnassigned} onClick={() => setOnlyUnassigned(v => !v)}>Only show unassigned</Chip>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
              {db.trucks.filter(t => onlyUnassigned ? !t.projectId : true).map(t => {
                const sel = trucks.find(x => x.truckId === t.id);
                const selected = !!sel;
                const currentProj = t.projectId ? db.projects.find(p => p.id === t.projectId) : null;
                const currentOp = t.operatorId ? db.operators.find(o => o.id === t.operatorId) : null;
                const reassign = !!t.projectId;
                const typeLabel = (TRUCK_TYPES.find(x => x.code === t.type) || {}).label || t.type;
                return (
                  <div key={t.id} style={{
                    display: 'flex', alignItems: 'center', gap: S[3], padding: S[3],
                    background: selected ? C.accentSoft : C.surfaceHi,
                    border: `1px solid ${selected ? C.accent : C.ruleHi}`,
                    borderRadius: R.md, flexWrap: 'wrap',
                  }}>
                    <div onClick={() => toggleTruck(t.id)} style={{
                      width: 22, height: 22, borderRadius: 6,
                      background: selected ? C.accent : 'transparent',
                      border: `2px solid ${selected ? C.accent : C.ruleHi}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: C.bg, fontFamily: F.display, fontSize: 14, fontWeight: 700, flexShrink: 0, cursor: 'pointer',
                    }}>{selected ? '✓' : ''}</div>
                    <div onClick={() => toggleTruck(t.id)} style={{ flex: 1, minWidth: 180, cursor: 'pointer' }}>
                      <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink }}>#{t.plate} · {typeLabel}</div>
                      <div style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim, marginTop: 2 }}>
                        {t.hauler} · {currentProj ? `On ${currentProj.name}${currentOp ? ' / ' + currentOp.name : ''}` : 'Unassigned'}
                      </div>
                    </div>
                    {reassign && <Pill color={C.warn} soft={C.warnSoft}>Reassign</Pill>}
                    {selected && (
                      <select value={sel.operatorId} onChange={e => setTruckOperator(t.id, e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '8px 10px', fontSize: 13 }}>
                        <option value="">Pick operator…</option>
                        {operatorIds.map(opId => {
                          const op = db.operators.find(o => o.id === opId);
                          return op ? <option key={opId} value={opId}>{op.name}</option> : null;
                        })}
                      </select>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim }}>
              {trucks.length} selected{trucks.length > 0 && !trucksValid ? ' · pick an operator for each' : ''}
            </div>
          </div>
        )}

        {step === 4 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
            <Label>Step 4 — Review</Label>
            <div>
              <Label style={{ marginBottom: S[2] }}>Basics</Label>
              <div style={{ background: C.surfaceHi, borderRadius: R.md, padding: S[3], display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: S[3] }}>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Name</div><div style={{ fontFamily: F.body, color: C.ink }}>{basics.name}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Code</div><div style={{ fontFamily: F.mono, color: C.ink }}>{effectiveCode}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>GC</div><div style={{ fontFamily: F.body, color: C.ink }}>{basics.gc}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Address</div><div style={{ fontFamily: F.body, color: C.ink }}>{basics.address}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Start date</div><div style={{ fontFamily: F.mono, color: C.ink }}>{basics.startDate}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Status</div><div style={{ fontFamily: F.body, color: C.ink, textTransform: 'capitalize' }}>{basics.status}</div></div>
                <div style={{ gridColumn: '1 / -1' }}>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Materials</div>
                  <div style={{ display: 'flex', gap: S[2], flexWrap: 'wrap' }}>
                    {basics.materials.map(mc => { const m = MATERIALS.find(x => x.code === mc); return <Pill key={mc}>{m ? m.label : mc}</Pill>; })}
                  </div>
                </div>
              </div>
            </div>
            <div>
              <Label style={{ marginBottom: S[2] }}>Operators ({operatorIds.length})</Label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
                {operatorIds.map(opId => {
                  const op = db.operators.find(o => o.id === opId);
                  return op ? (
                    <div key={opId} style={{ display: 'flex', alignItems: 'center', gap: S[3], background: C.surfaceHi, borderRadius: R.md, padding: S[3] }}>
                      <Avatar name={op.name} color={C.accent} />
                      <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink }}>{op.name}</div>
                      <div style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>{op.phone}</div>
                    </div>
                  ) : null;
                })}
              </div>
            </div>
            <div>
              <Label style={{ marginBottom: S[2] }}>Trucks ({trucks.length})</Label>
              {trucks.length === 0 ? (
                <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, background: C.surfaceHi, borderRadius: R.md, padding: S[3] }}>No trucks assigned yet — you can add them later.</div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
                  {trucks.map(sel => {
                    const t = db.trucks.find(x => x.id === sel.truckId);
                    const op = db.operators.find(o => o.id === sel.operatorId);
                    const typeLabel = t ? ((TRUCK_TYPES.find(x => x.code === t.type) || {}).label || t.type) : '?';
                    return t ? (
                      <div key={sel.truckId} style={{ display: 'flex', alignItems: 'center', gap: S[3], background: C.surfaceHi, borderRadius: R.md, padding: S[3], flexWrap: 'wrap' }}>
                        <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink }}>#{t.plate} · {typeLabel}</div>
                        <div style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>{t.hauler}</div>
                        <div style={{ flex: 1 }} />
                        <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim }}>→ {op ? op.name : 'No operator'}</div>
                      </div>
                    ) : null;
                  })}
                </div>
              )}
            </div>
          </div>
        )}
      </Card>

      <div style={{ display: 'flex', justifyContent: 'space-between', gap: S[3], marginTop: S[5], flexWrap: 'wrap' }}>
        <Btn variant="ghost" onClick={cancel}>Cancel</Btn>
        <div style={{ display: 'flex', gap: S[2] }}>
          <Btn variant="secondary" onClick={back} disabled={step === 1}>Back</Btn>
          {step < 4 && (
            <Btn variant="primary" onClick={next} disabled={(step === 1 && !basicsValid) || (step === 2 && !operatorsValid) || (step === 3 && !trucksValid)}>Next</Btn>
          )}
          {step === 4 && (
            <Btn variant="primary" size="lg" onClick={submit} disabled={!basicsValid || !operatorsValid || !trucksValid}>Create project</Btn>
          )}
        </div>
      </div>
    </div>
  );
}

function AdminReports({ db, navigate }) {
  const [sort, setSort] = useState({ key: 'name', dir: 'asc' });

  // ----- KPIs -----
  const activeProjects = db.projects.filter(p => p.status === 'active');
  const openShifts = db.hours.filter(h => h.status === 'open');
  const onShiftNow = openShifts.length;
  const distinctOperatorsOnShift = new Set(
    openShifts.map(h => {
      const t = db.trucks.find(t => t.id === h.truckId);
      return t ? t.operatorId : null;
    }).filter(Boolean)
  ).size;

  const loadsToday = db.loads.filter(l => l.date === 'today');
  const loadsYesterday = db.loads.filter(l => l.date === 'yesterday');
  const todayCount = loadsToday.length;
  const yesterdayCount = loadsYesterday.length;
  let deltaPct = null;
  let deltaDir = null;
  if (yesterdayCount > 0) {
    const diff = todayCount - yesterdayCount;
    deltaPct = Math.round(Math.abs(diff / yesterdayCount) * 100);
    deltaDir = diff >= 0 ? 'up' : 'down';
  }

  const hoursToday = db.hours
    .filter(h => h.date === 'today')
    .reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
  const hoursYesterday = db.hours
    .filter(h => h.date === 'yesterday')
    .reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);

  // ----- Project status rows -----
  const projectRows = db.projects.map(p => {
    const ops = db.operators.filter(o => o.projectIds.includes(p.id));
    const trucks = db.trucks.filter(t => t.projectId === p.id);
    const pLoadsToday = db.loads.filter(l => l.projectId === p.id && l.date === 'today');
    const pLoadsYesterday = db.loads.filter(l => l.projectId === p.id && l.date === 'yesterday').length;
    const lastTime = pLoadsToday.reduce((latest, l) => (!latest || l.time > latest) ? l.time : latest, null);
    return {
      id: p.id,
      name: p.name,
      status: p.status || 'active',
      operators: ops.length,
      trucks: trucks.length,
      loadsToday: pLoadsToday.length,
      loadsYesterday: pLoadsYesterday,
      lastTime: lastTime || '—',
    };
  });

  const statusOrder = { active: 0, upcoming: 1, completed: 2 };
  const sortedRows = [...projectRows].sort((a, b) => {
    const va = a[sort.key];
    const vb = b[sort.key];
    let cmp;
    if (sort.key === 'status') cmp = (statusOrder[a.status] ?? 99) - (statusOrder[b.status] ?? 99);
    else if (typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb));
    return sort.dir === 'asc' ? cmp : -cmp;
  });

  const setSortKey = (k) => {
    setSort(s => s.key === k ? { ...s, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { key: k, dir: 'asc' });
  };

  // Custom sortable header (Th doesn't accept onClick/style props)
  const SortTh = ({ label, k, align = 'left' }) => {
    const active = sort.key === k;
    const arrow = active ? (sort.dir === 'asc' ? ' ▲' : ' ▼') : '';
    return (
      <th onClick={() => setSortKey(k)} style={{
        textAlign: align, padding: '10px 14px', borderBottom: `1px solid ${C.rule}`,
        fontFamily: F.mono, fontSize: 10, fontWeight: 600,
        color: active ? C.accent : C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase',
        whiteSpace: 'nowrap', cursor: 'pointer', userSelect: 'none',
      }}>{label}{arrow}</th>
    );
  };

  const statusColor = {
    active:    { color: C.accent, soft: C.accentSoft, label: 'Active' },
    upcoming:  { color: C.info,   soft: C.infoSoft,   label: 'Upcoming' },
    completed: { color: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: 'Completed' },
  };

  // ----- Operator productivity -----
  const operatorRows = db.operators.map(op => {
    const opTrucks = db.trucks.filter(t => t.operatorId === op.id);
    const opTruckIds = new Set(opTrucks.map(t => t.id));
    const ldsToday = db.loads.filter(l => l.date === 'today' && opTruckIds.has(l.truckId)).length;
    const hrsToday = db.hours
      .filter(h => h.date === 'today' && opTruckIds.has(h.truckId))
      .reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
    const activeProjs = op.projectIds.filter(pid => {
      const p = db.projects.find(p => p.id === pid);
      return p && p.status === 'active';
    }).length;
    return { id: op.id, name: op.name, loadsToday: ldsToday, hoursToday: hrsToday, activeProjects: activeProjs };
  })
    .sort((a, b) => b.loadsToday - a.loadsToday || b.hoursToday - a.hoursToday)
    .slice(0, 10);

  // ----- Truck utilization -----
  const truckRows = db.trucks.map(t => {
    const ldsToday = db.loads.filter(l => l.date === 'today' && l.truckId === t.id).length;
    const driver = db.drivers.find(d => d.id === t.driverId);
    const project = db.projects.find(p => p.id === t.projectId);
    const inService = db.hours.some(h => h.truckId === t.id && h.status === 'open');
    return {
      id: t.id,
      plate: t.plate,
      type: t.type,
      loadsToday: ldsToday,
      driverName: driver ? driver.name : '—',
      projectName: project ? project.name : '—',
      status: inService ? 'inservice' : 'idle',
    };
  }).sort((a, b) => b.loadsToday - a.loadsToday || String(a.plate).localeCompare(String(b.plate)));

  // ----- Top-level empty state: no projects -----
  if (db.projects.length === 0) {
    return (
      <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
        <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Reports' }]} navigate={navigate} />
        <EmptyState
          icon={<ProjectIcon size={40} />}
          title="No projects yet"
          body="Create one to start generating activity reports."
          action={<Btn variant="primary" onClick={() => navigate('/admin/new')}>+ New project</Btn>}
        />
      </div>
    );
  }

  const deltaColor = deltaDir === 'down' ? C.warn : C.ok;
  const deltaArrow = deltaDir === 'up' ? '▲' : '▼';

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Reports' }]} navigate={navigate} />

      <div style={{ marginBottom: S[5] }}>
        <Label color={C.accent} style={{ marginBottom: 6 }}>Live activity</Label>
        <h1 style={{ fontFamily: F.display, fontSize: 36, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>Reports</h1>
        <div style={{ fontFamily: F.body, fontSize: 13, color: C.inkDim, marginTop: 6 }}>Today vs yesterday across projects, operators, and trucks. Numbers update live as drivers log hours and loads.</div>
      </div>

      {/* A. Headline KPI row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[4] }}>
        <Card padding={S[4]}>
          <Stat
            label="Active projects"
            value={activeProjects.length}
            sub={`total ${db.projects.length}`}
          />
        </Card>
        <Card padding={S[4]}>
          <Stat
            label="On shift now"
            value={onShiftNow}
            sub={`${distinctOperatorsOnShift} operator${distinctOperatorsOnShift === 1 ? '' : 's'}`}
          />
        </Card>
        <Card padding={S[4]}>
          <Stat
            label="Loads today"
            value={todayCount}
            sub={
              yesterdayCount === 0
                ? 'no yesterday data'
                : `${deltaArrow} ${deltaPct}% vs yesterday (${yesterdayCount})`
            }
          />
        </Card>
        <Card padding={S[4]}>
          <Stat
            label="Hours today"
            value={fmtHours(hoursToday)}
            sub={`yesterday total ${fmtHours(hoursYesterday)}h`}
          />
        </Card>
      </div>

      {/* B. Daily activity summary */}
      <Card padding={S[4]} style={{ marginBottom: S[6] }}>
        <Label style={{ marginBottom: 6 }}>Daily activity</Label>
        {todayCount === 0 ? (
          <div style={{ fontFamily: F.body, fontSize: 14, color: C.inkDim }}>No loads logged today yet.</div>
        ) : yesterdayCount === 0 ? (
          <div style={{ fontFamily: F.display, fontSize: 16, color: C.ink, fontWeight: 600 }}>
            Today <span style={{ color: C.accent }}>{todayCount}</span> loads <span style={{ color: C.inkDim, fontWeight: 400, fontSize: 13 }}>(no yesterday comparison)</span>
          </div>
        ) : (
          <div style={{ fontFamily: F.display, fontSize: 16, color: C.ink, fontWeight: 600 }}>
            Today <span style={{ color: C.accent }}>{todayCount}</span> loads
            <span style={{ color: C.inkDim, fontWeight: 400, fontSize: 13 }}> — </span>
            <span style={{ color: deltaColor }}>{deltaArrow} {deltaPct}%</span>
            <span style={{ color: C.inkDim, fontWeight: 400, fontSize: 13 }}> vs yesterday ({yesterdayCount})</span>
          </div>
        )}
      </Card>

      {/* C. Project status table */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.accent}>Projects</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>{sortedRows.length}</span>
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              <SortTh label="Project" k="name" />
              <SortTh label="Status" k="status" />
              <SortTh label="Operators" k="operators" align="right" />
              <SortTh label="Trucks" k="trucks" align="right" />
              <SortTh label="Loads today" k="loadsToday" align="right" />
              <SortTh label="Loads yesterday" k="loadsYesterday" align="right" />
              <SortTh label="Last load" k="lastTime" align="right" />
            </tr>
          </thead>
          <tbody>
            {sortedRows.map(r => {
              const sc = statusColor[r.status] || statusColor.active;
              return (
                <Tr key={r.id} onClick={() => navigate(`/admin/p/${r.id}`)}>
                  <Td><span style={{ fontWeight: 600 }}>{r.name}</span></Td>
                  <Td><Pill color={sc.color} soft={sc.soft}>{sc.label}</Pill></Td>
                  <Td align="right" mono>{r.operators}</Td>
                  <Td align="right" mono>{r.trucks}</Td>
                  <Td align="right" mono style={{ fontWeight: 600 }}>{r.loadsToday}</Td>
                  <Td align="right" mono dim>{r.loadsYesterday}</Td>
                  <Td align="right" mono dim>{r.lastTime}</Td>
                </Tr>
              );
            })}
          </tbody>
        </table>
      </Card>

      {/* D. Operator productivity */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.accent}>Top operators today</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>{operatorRows.length} of {db.operators.length}</span>
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        {operatorRows.length === 0 ? (
          <div style={{ padding: S[5], textAlign: 'center', color: C.inkDim, fontFamily: F.body, fontSize: 13 }}>No operators on the roster yet.</div>
        ) : (
          <div>
            {operatorRows.map((op, i) => (
              <div key={op.id} style={{
                display: 'flex', alignItems: 'center', gap: S[4],
                padding: `${S[3]}px ${S[4]}px`,
                borderBottom: i < operatorRows.length - 1 ? `1px solid ${C.rule}` : 'none',
              }}>
                <div style={{
                  width: 28, textAlign: 'center', fontFamily: F.mono, fontSize: 13,
                  color: i < 3 ? C.accent : C.inkFaint, fontWeight: 700,
                }}>{i + 1}</div>
                <div style={{ flex: 1, fontFamily: F.display, fontSize: 14, fontWeight: 600, color: C.ink }}>{op.name}</div>
                <div style={{ textAlign: 'right', minWidth: 64 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 15, color: C.ink, fontWeight: 600 }}>{op.loadsToday}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase' }}>loads</div>
                </div>
                <div style={{ textAlign: 'right', minWidth: 64 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 15, color: C.ink, fontWeight: 600 }}>{fmtHours(op.hoursToday)}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase' }}>hours</div>
                </div>
                <div style={{ textAlign: 'right', minWidth: 64 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 15, color: C.ink, fontWeight: 600 }}>{op.activeProjects}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase' }}>projects</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* E. Truck utilization */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.accent}>Truck utilization</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ fontFamily: F.mono, fontSize: 11, color: C.inkDim }}>{truckRows.length}</span>
      </div>
      <Card padding={0}>
        {truckRows.length === 0 ? (
          <div style={{ padding: S[5], textAlign: 'center', color: C.inkDim, fontFamily: F.body, fontSize: 13 }}>No trucks on the roster yet.</div>
        ) : (
          <div>
            {truckRows.map((t, i) => (
              <div key={t.id} style={{
                display: 'flex', alignItems: 'center', gap: S[4],
                padding: `${S[3]}px ${S[4]}px`,
                borderBottom: i < truckRows.length - 1 ? `1px solid ${C.rule}` : 'none',
                flexWrap: 'wrap',
              }}>
                <div style={{
                  width: 28, textAlign: 'center', fontFamily: F.mono, fontSize: 13,
                  color: i < 3 ? C.accent : C.inkFaint, fontWeight: 700,
                }}>{i + 1}</div>
                <div style={{ minWidth: 80 }}>
                  <div style={{ fontFamily: F.display, fontSize: 14, fontWeight: 600, color: C.ink }}>#{t.plate}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase', marginTop: 2 }}>{t.type}</div>
                </div>
                <div style={{ flex: 1, minWidth: 120 }}>
                  <div style={{ fontFamily: F.body, fontSize: 13, color: C.ink }}>{t.driverName}</div>
                  <div style={{ fontFamily: F.body, fontSize: 12, color: C.inkDim, marginTop: 2 }}>{t.projectName}</div>
                </div>
                <StatusPill status={t.status} />
                <div style={{ textAlign: 'right', minWidth: 64 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 15, color: C.ink, fontWeight: 600 }}>{t.loadsToday}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase' }}>loads today</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

function AdminShell({ db, setDb, navigate, hash }) {
  const parts = hash.split('/').filter(Boolean);
  const resetDemoData = () => {
    if (!window.confirm('Reset all demo data? This will reload the page.')) return;
    try { window.localStorage.removeItem(DB_STORAGE_KEY); } catch (e) {}
    window.location.reload();
  };
  const resetBtn = <Btn variant="danger" size="sm" onClick={resetDemoData}>Reset demo data</Btn>;
  const navBtns = (
    <div style={{ display: 'flex', gap: S[2], alignItems: 'center' }}>
      <Btn variant="secondary" size="sm" onClick={() => navigate('/admin/reports')}>Reports</Btn>
      {resetBtn}
    </div>
  );
  return (
    <div>
      <Topbar navigate={navigate} role="Admin" current="Admin - all projects" right={navBtns} />
      {parts.length === 1 && <AdminProjects db={db} setDb={setDb} navigate={navigate} />}
      {parts.length === 2 && parts[1] === 'new' && <AdminNewProject db={db} setDb={setDb} navigate={navigate} />}
      {parts.length === 2 && parts[1] === 'reports' && <AdminReports db={db} navigate={navigate} />}
      {parts.length === 3 && parts[1] === 'p' && <AdminProject projectId={parts[2]} db={db} setDb={setDb} navigate={navigate} />}
      {parts.length === 5 && parts[3] === 'o' && <AdminOperator projectId={parts[2]} operatorId={parts[4]} db={db} setDb={setDb} navigate={navigate} />}
      {parts.length === 7 && parts[5] === 't' && <AdminTruck projectId={parts[2]} operatorId={parts[4]} truckId={parts[6]} db={db} setDb={setDb} navigate={navigate} />}
    </div>
  );
}

function OperatorShell({ db, setDb, navigate, hash }) {
  const parts = hash.split('/').filter(Boolean);
  // Build "current" label for topbar based on depth
  let current = 'All operators';
  if (parts.length >= 3 && parts[1] === 'o') {
    const op = db.operators.find(o => o.id === parts[2]);
    if (op) current = op.name;
    if (parts.length >= 5 && parts[3] === 'p') {
      const proj = db.projects.find(p => p.id === parts[4]);
      if (proj) current = `${op ? op.name : '?'} · ${proj.name}`;
      if (parts.length >= 7 && parts[5] === 't') {
        const tr = db.trucks.find(t => t.id === parts[6]);
        if (tr) current = `${op ? op.name : '?'} · ${proj ? proj.name : '?'} · #${tr.plate}`;
      }
    }
  }
  return (
    <div>
      <Topbar navigate={navigate} role="Operator" current={current} />
      {parts.length === 1 && <OperatorLanding db={db} navigate={navigate} />}
      {parts.length === 3 && parts[1] === 'o' && <OperatorHome operatorId={parts[2]} db={db} navigate={navigate} />}
      {parts.length === 5 && parts[3] === 'p' && <OperatorProject operatorId={parts[2]} projectId={parts[4]} db={db} setDb={setDb} navigate={navigate} />}
      {parts.length === 7 && parts[5] === 't' && <OperatorTruckView operatorId={parts[2]} projectId={parts[4]} truckId={parts[6]} db={db} setDb={setDb} navigate={navigate} />}
    </div>
  );
}
const DB_STORAGE_KEY = 'jse_db_v1';
const DB_SCHEMA_VERSION = 2;
const DB_REQUIRED_KEYS = ['projects', 'operators', 'trucks', 'drivers', 'hours', 'loads', 'invoices', 'rates'];

function App() {
  const [hash, navigate] = useHash();
  const [db, setDb] = useState(() => {
    const seed = {
      projects: PROJECTS_SEED,
      operators: OPERATORS_SEED,
      trucks: TRUCKS_SEED,
      drivers: DRIVERS_SEED,
      hours: HOURS_SEED,
      loads: LOADS_SEED,
      invoices: INVOICES_SEED,
      rates: RATES_INIT,
      schemaVersion: DB_SCHEMA_VERSION,
    };
    try {
      const raw = window.localStorage.getItem(DB_STORAGE_KEY);
      if (!raw) return seed;
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return seed;
      const valid = DB_REQUIRED_KEYS.every(k => k in parsed);
      if (!valid) return seed;
      if (parsed.schemaVersion === DB_SCHEMA_VERSION) return parsed;
      if (parsed.schemaVersion > DB_SCHEMA_VERSION) return seed;
      // Schema migration: backfill missing date fields on loads/hours, bump version, persist.
      const migrated = {
        ...parsed,
        loads: Array.isArray(parsed.loads)
          ? parsed.loads.map(l => l && l.date == null ? { ...l, date: 'yesterday' } : l)
          : parsed.loads,
        hours: Array.isArray(parsed.hours)
          ? parsed.hours.map(h => h && h.date == null ? { ...h, date: 'yesterday' } : h)
          : parsed.hours,
        schemaVersion: DB_SCHEMA_VERSION,
      };
      return migrated;
    } catch (e) {
      return seed;
    }
  });
  useEffect(() => {
    try {
      window.localStorage.setItem(DB_STORAGE_KEY, JSON.stringify(db));
    } catch (e) {
      // localStorage unavailable / quota exceeded — silently no-op
    }
  }, [db]);
  // Derive document.title from the current hash so the browser tab reflects context.
  useEffect(() => {
    const h = hash || '/';
    const parts = h.split('/').filter(Boolean);
    let title = 'Jobsite Exchange';
    if (h === '/' || h === '') title = 'Jobsite Exchange';
    else if (h.startsWith('/admin/reports')) title = 'JSE — Reports';
    else if (h.startsWith('/admin/new')) title = 'JSE — New Project';
    else if (parts[0] === 'admin' && parts[1] === 'p' && parts[2]) {
      const proj = db && db.projects ? db.projects.find(p => p.id === parts[2]) : null;
      if (proj && parts[3] === 'o' && parts[4]) {
        const op = db.operators.find(o => o.id === parts[4]);
        title = op ? `JSE — Admin — ${proj.name} / ${op.name}` : `JSE — Admin — ${proj.name}`;
      } else {
        title = proj ? `JSE — Admin — ${proj.name}` : 'JSE — Admin';
      }
    }
    else if (h.startsWith('/admin')) title = 'JSE — Admin';
    else if (parts[0] === 'operator' && parts[1] === 'o' && parts[2]) {
      const op = db && db.operators ? db.operators.find(o => o.id === parts[2]) : null;
      if (op && parts[3] === 'p' && parts[4]) {
        const proj = db.projects.find(p => p.id === parts[4]);
        title = proj ? `JSE — Operator — ${op.name} / ${proj.name}` : `JSE — Operator — ${op.name}`;
      } else {
        title = op ? `JSE — Operator — ${op.name}` : 'JSE — Operator';
      }
    }
    else if (h.startsWith('/operator')) title = 'JSE — Operator';
    else if (parts[0] === 'driver' && parts[1] === 'log') {
      title = 'JSE — Driver — Log load';
    }
    else if (parts[0] === 'driver' && parts[1] === 'truck' && parts[2]) {
      const tr = db && db.trucks ? db.trucks.find(t => t.id === parts[2]) : null;
      title = tr ? `JSE — Driver — Truck #${tr.plate}` : 'JSE — Driver';
    }
    else if (h.startsWith('/driver')) title = 'JSE — Driver';
    document.title = title;
  }, [hash, db]);
  const route = (hash || '/').split('/')[1] || '';
  return (
    <div>
      {route === '' && <Landing navigate={navigate} />}
      {route === 'admin' && <AdminShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
      {route === 'operator' && <OperatorShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
      {route === 'driver' && <DriverShell db={db} setDb={setDb} navigate={navigate} hash={hash} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
