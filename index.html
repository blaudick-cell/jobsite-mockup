// Single-step wizards: pass steps={['Details']} (or similar) — the step
// indicator hides itself and only Cancel + Submit show in the footer.
// =====================================================================
function WizardShell({
  steps, currentStep, onCancel, onBack, onNext, onSubmit,
  nextDisabled, submitDisabled, submitLabel = 'Create',
  crumbs, eyebrow, title, children, navigate,
}) {
  useEffect(() => { window.scrollTo(0, 0); }, [currentStep]);
  const total = steps.length;
  const showSteps = total > 1;
  const isLast = currentStep === total;

  const StepDot = ({ n, label }) => {
    const active = currentStep === n;
    const done = currentStep > n;
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: S[2], flex: 1, minWidth: 0 }}>
        <div style={{
          ...T.mono, width: 28, height: 28, borderRadius: '50%',

      </div>
    );
  };

  return (
    <div style={{ padding: S[6], maxWidth: 880, margin: '0 auto' }}>

        <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[5], flexWrap: 'wrap' }}>
          {steps.map((s, i) => <StepDot key={i} n={i + 1} label={s} />)}
        </div>

      <Card>{children}</Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', gap: S[3], marginTop: S[5], flexWrap: 'wrap' }}>
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
        <div style={{ display: 'flex', gap: S[2] }}>
          {showSteps && <Btn variant="secondary" onClick={onBack} disabled={currentStep === 1}>Back</Btn>}
          {showSteps && !isLast && (

// Shared input style used across all admin wizards.
const WIZARD_INPUT_STYLE = { background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '12px 14px', borderRadius: R.sm, fontFamily: F.body, fontSize: 15, width: '100%', boxSizing: 'border-box' };

// =====================================================================
// Site Conditions — live forecast widget for the Admin Control Center.
// Pulls Denver / Front Range data from the National Weather Service:
//   1) GET /points/{lat,lon}  →  read properties.forecast URL (gridpoint)
//   2) GET that gridpoint URL →  14 day/night periods, paired by calendar date
// NWS is keyless + CORS-open. Browsers send their own UA which satisfies NWS
// (the documented "User-Agent" requirement applies to server-side callers;
// fetch() can't override that header from the browser anyway).
// =====================================================================
const NWS_DENVER = { lat: 39.7392, lon: -104.9903, label: 'Front Range', city: 'Denver, CO' };

// Cached across re-mounts so we don't re-hit /points/ on every refresh tick.
let _nwsGridpointUrl = null;

// Map NWS shortForecast text → one of our icon keys.
function nwsShortToWxKind(short) {
  const s = (short || '').toLowerCase();
  if (s.includes('thunder') || s.includes('storm')) return 'storm';
  if (s.includes('snow') || s.includes('flurr') || s.includes('sleet') || s.includes('blizzard')) return 'snow';
  if (s.includes('rain') || s.includes('shower') || s.includes('drizzle')) return 'rain';
  if (s.includes('fog') || s.includes('haze') || s.includes('smoke')) return 'fog';
  if (s.includes('partly') || s.includes('mostly cloud') || s.includes('mostly sunny')) return 'partly';
  if (s.includes('cloud') || s.includes('overcast')) return 'cloud';
  if (s.includes('sun') || s.includes('clear') || s.includes('fair')) return 'sun';
  return 'cloud';
}

// NWS reports wind as "5 to 9 mph" or "6 mph"; extract the upper-bound number.
function nwsParseWindMph(speed) {
  if (!speed) return null;
  const nums = String(speed).match(/\d+/g);
  if (!nums) return null;
  return Math.max(...nums.map(Number));
}

// Pair 14 day/night periods into [{ iso, day, night }] for up to 7 calendar days.
// NWS may start with a "Tonight" period (no day component) — handle that.
function nwsPairDaily(periods) {
  const byIso = new Map();
  for (const p of periods) {
    const iso = (p.startTime || '').slice(0, 10);
    if (!iso) continue;
    if (!byIso.has(iso)) byIso.set(iso, { iso, day: null, night: null });
    const bucket = byIso.get(iso);
    if (p.isDaytime) bucket.day = p; else bucket.night = p;
  }
  return Array.from(byIso.values()).slice(0, 7);
}

// Derive haul-readiness label + grade pill tone from a day's conditions.
// Decision rule (per session spec, no AskUserQuestion):
//   precip >= 60% OR snow/storm        → HOLD     (C.warn, soft warn bg)
//   precip 20-59% OR rain OR wind >=25 → CAUTION  (C.warn, soft warn bg)
//   otherwise                          → OPTIMAL  (C.ok,   soft ok bg)
// Tokens only define C.ok / C.warn / C.info — there is no separate amber, so
// CAUTION + HOLD both ride C.warn and rely on the label to disambiguate.
function haulConditionFromNws({ wx, precipPct, windMph }) {
  const pct = precipPct == null ? 0 : precipPct;
  const wind = windMph == null ? 0 : windMph;
  if (pct >= 60 || wx === 'snow' || wx === 'storm') {
    return { grade: 'HOLD',    gradeTone: C.warn, gradeSoft: C.warnSoft, label: 'Muddy / Hold',   sub: 'high mud risk' };
  }
  if (pct >= 20 || wx === 'rain' || wind >= 25) {
    return { grade: 'CAUTION', gradeTone: C.warn, gradeSoft: C.warnSoft, label: 'Wet / Caution',  sub: 'soft ground possible' };
  }
  return   { grade: 'OPTIMAL', gradeTone: C.ok,   gradeSoft: C.okSoft,   label: 'Dry',             sub: 'no mud / freeze risk' };
}

// Inline SVG weather glyph — uses 'currentColor' so the parent can theme it.

        <path d="M8 17.5v3.5M6.5 19l3 1M6.5 20l3-1M12 17.5v3.5M10.5 19l3 1M10.5 20l3-1M16 17.5v3.5M14.5 19l3 1" />

    ),

      </g>
    ),
    fog: (
      <g {...s}>

  };
  return (

}

// Live forecast card — today hero + 7-day strip, fed by NWS.
// Refetches every 30 min; HH:MM clock ticks every minute without remounting.
function SiteConditionsCard() {
  const [forecast, setForecast] = useState(null);
  const [error, setError] = useState(null);
  const [clockTick, setClockTick] = useState(0);

  useEffect(() => {
    let alive = true;
    async function load() {
      try {
        if (!_nwsGridpointUrl) {
          const pointsRes = await fetch(`https://api.weather.gov/points/${NWS_DENVER.lat},${NWS_DENVER.lon}`, { headers: { Accept: 'application/geo+json' } });
          if (!pointsRes.ok) throw new Error(`NWS points ${pointsRes.status}`);
          const pointsJson = await pointsRes.json();
          _nwsGridpointUrl = pointsJson.properties && pointsJson.properties.forecast;
          if (!_nwsGridpointUrl) throw new Error('NWS missing forecast url');
        }
        const fcRes = await fetch(_nwsGridpointUrl, { headers: { Accept: 'application/geo+json' } });
        if (!fcRes.ok) throw new Error(`NWS forecast ${fcRes.status}`);
        const fcJson = await fcRes.json();
        const periods = (fcJson.properties && fcJson.properties.periods) || [];
        if (alive) { setForecast({ periods, fetchedAt: Date.now() }); setError(null); }
      } catch (e) {
        if (alive) setError(e.message || 'forecast unavailable');
      }
    }
    load();
    const refetchId = setInterval(load, 30 * 60 * 1000);
    return () => { alive = false; clearInterval(refetchId); };
  }, []);

  useEffect(() => {
    const id = setInterval(() => setClockTick(n => n + 1), 60000);
    return () => clearInterval(id);
  }, []);

  if (!forecast && !error) return <SiteConditionsSkeleton />;

  if (error || !forecast || forecast.periods.length === 0) {
    return (
      <Card padding={S[4]} style={{ display: 'flex', alignItems: 'flex-start', gap: S[2], flexDirection: 'column' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
          <Pill color={C.inkDim} soft="rgba(255,255,255,0.06)">SITE CONDITIONS</Pill>
          <span style={{ ...T.bodySm, color: C.inkDim }}>{NWS_DENVER.label}</span>
        </div>
        <div style={{ ...T.caption, color: C.inkFaint }}>Forecast unavailable · retrying every 30 min</div>
      </Card>
    );
  }

  const days = nwsPairDaily(forecast.periods);
  // Find "today" — first calendar date with a usable period. Use whichever of
  // day/night exists (so an evening fetch that opens with "Tonight" still works).
  const todayBucket = days[0] || { day: null, night: null };
  const todayPrimary = todayBucket.day || todayBucket.night;
  const todayWx = nwsShortToWxKind(todayPrimary && todayPrimary.shortForecast);
  const todayPrecipPct = (todayPrimary && todayPrimary.probabilityOfPrecipitation && todayPrimary.probabilityOfPrecipitation.value) || 0;
  const todayWind = nwsParseWindMph(todayPrimary && todayPrimary.windSpeed) || 0;
  const todayWindDir = (todayPrimary && todayPrimary.windDirection) || '';
  const todayTempNow = todayPrimary ? todayPrimary.temperature : null;
  const todayHi = todayBucket.day ? todayBucket.day.temperature : (todayPrimary ? todayPrimary.temperature : null);
  const todayLo = todayBucket.night ? todayBucket.night.temperature : null;
  const cond = haulConditionFromNws({ wx: todayWx, precipPct: todayPrecipPct, windMph: todayWind });

  const now = new Date();
  const hhmm = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

  return (
    <Card padding={0}>
      {/* Header: matches the existing small-tile header pattern. */}
      <div style={{ padding: `${S[3]}px ${S[4]}px`, borderBottom: `1px solid ${C.rule}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: S[2] }}>
        <div style={{ minWidth: 0 }}>
          <Label color={C.accent}>Site conditions</Label>
          <div style={{ ...T.bodySm, color: C.ink, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{NWS_DENVER.label} · {hhmm}</div>
        </div>
        <Pill color={cond.gradeTone} soft={cond.gradeSoft}>{cond.grade}</Pill>
      </div>

      {/* Today: 2x2 stat grid (matches the existing small-tile body). */}
      <div style={{ padding: S[4], display: 'grid', gridTemplateColumns: 'repeat(2, minmax(0, 1fr))', gap: S[4] }}>
        <div>
          <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 2 }}>TEMPERATURE</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={{ ...T.h4, fontFamily: F.mono, fontWeight: 700, color: C.ink }}>{todayTempNow != null ? `${todayTempNow}°F` : '—'}</div>
            <div style={{ color: C.inkDim, display: 'inline-flex' }}><WxIcon kind={todayWx} size={18} /></div>
          </div>
          <div style={{ ...T.caption, color: C.inkDim, marginTop: 2 }}>
            {todayHi != null ? `Hi ${todayHi}°` : ''}{todayHi != null && todayLo != null ? ' · ' : ''}{todayLo != null ? `Lo ${todayLo}°` : ''}
          </div>
        </div>
        <div>
          <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 2 }}>WIND</div>
          <div style={{ ...T.h4, fontFamily: F.mono, fontWeight: 700, color: C.ink }}>{todayWind} mph</div>
          <div style={{ ...T.caption, color: C.inkDim, marginTop: 2 }}>{todayWindDir || '—'}</div>
        </div>
        <div>
          <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 2 }}>PRECIP RISK</div>
          <div style={{ ...T.h4, fontFamily: F.mono, fontWeight: 700, color: todayPrecipPct >= 40 ? C.warn : C.ok }}>{todayPrecipPct}%</div>
          <div style={{ ...T.caption, color: C.inkDim, marginTop: 2 }}>next period</div>
        </div>
        <div>
          <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 2 }}>HAUL CONDITION</div>
          <div style={{ ...T.h4, fontFamily: F.display, fontWeight: 700, color: cond.gradeTone }}>{cond.label}</div>
          <div style={{ ...T.caption, color: C.inkDim, marginTop: 2 }}>{cond.sub}</div>
        </div>
      </div>

      {/* 7-day strip — condensed: dow / icon / hi / lo. */}
      <div style={{ borderTop: `1px solid ${C.rule}`, background: C.bg, padding: `${S[3]}px ${S[4]}px` }}>
        <div style={{ ...T.caption, color: C.inkFaint, marginBottom: S[2] }}>7-DAY FORECAST</div>
        <div className="site-cond-strip" style={{ display: 'grid', gridTemplateColumns: 'repeat(7, minmax(0, 1fr))', gap: 4 }}>
          {days.map((d, i) => {
            const isFirst = i === 0;
            const primary = d.day || d.night;
            const wx = nwsShortToWxKind(primary && primary.shortForecast);
            const hi = d.day ? d.day.temperature : (primary ? primary.temperature : null);
            const lo = d.night ? d.night.temperature : null;
            const wkLabel = primary ? primary.name : '';
            return (
              <div key={d.iso}
                aria-label={`${wkLabel} ${d.iso} · ${primary && primary.shortForecast} · high ${hi != null ? hi : 'n/a'}, low ${lo != null ? lo : 'n/a'}`}
                style={{
                  display: 'flex', flexDirection: 'column', alignItems: 'center',
                  gap: 2, padding: '4px 1px', minWidth: 0, overflow: 'hidden',
                  borderRadius: R.xs,
                  background: isFirst ? C.accentSoft : 'transparent',
                }}>
                <div style={{ ...T.micro, color: isFirst ? C.accent : C.inkDim, fontWeight: isFirst ? 700 : 600, letterSpacing: 0.4, textTransform: 'uppercase', fontSize: 9 }}>
                  {isFirst ? 'Today' : (isoToWeekdayShort ? isoToWeekdayShort(d.iso) : wkLabel.slice(0, 3))}
                </div>
                <div style={{ color: isFirst ? C.accent : C.inkDim, display: 'inline-flex' }}>
                  <WxIcon kind={wx} size={18} />
                </div>
                <div style={{ ...T.micro, color: C.ink, fontWeight: 600, fontSize: 10, lineHeight: 1.2 }}>{hi != null ? `${hi}°` : '—'}</div>
                <div style={{ ...T.micro, color: C.inkFaint, fontSize: 9, lineHeight: 1.2 }}>{lo != null ? `${lo}°` : ''}</div>
              </div>
            );
          })}
        </div>
      </div>
    </Card>
  );
}

// =====================================================================
// ADMIN
// =====================================================================
function AdminProjects({ db, setDb, navigate }) {
  // === Helpers (inlined into the dashboard so the refactor stays scoped) ===
  // Health classifier per UX spec — drives the StatusBadge tint + sorting.
  const healthFor = (p) => {
    if ((p.status || 'active') === 'completed') return 'completed';
    if (p.status === 'upcoming') return 'upcoming';
    if (p.pendingLoads >= 3) return 'critical';
    if (p.pendingLoads > 0 && p.trucksActive < p.trucks.length) return 'atrisk';
    return 'healthy';
  };
  const healthTone = (h) => ({
    healthy:   { c: C.ok,     soft: C.okSoft,                            label: 'Healthy' },
    atrisk:    { c: C.warn,   soft: C.warnSoft,                          label: 'At risk' },
    critical:  { c: C.danger || C.warn, soft: C.dangerSoft || C.warnSoft, label: 'Delayed'  },
    upcoming:  { c: C.info,   soft: C.infoSoft,                          label: 'Upcoming' },
    completed: { c: C.inkDim, soft: 'rgba(255,255,255,0.06)',            label: 'Completed' },
  }[h] || { c: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: h });

  // Lightweight bar primitives. Track + filled rail, accent fill, tone-aware.
  const ProgressBar = ({ pct, color = C.accent, height = 6 }) => {
    const w = Math.max(0, Math.min(100, pct || 0));
    return (
      <div style={{ width: '100%', height, background: C.surfaceHi, borderRadius: 999, overflow: 'hidden' }}>
        <div style={{ width: w + '%', height: '100%', background: color, borderRadius: 999, transition: 'width 240ms ease' }} />
      </div>
    );
  };
  const UtilizationBar = ({ active, total }) => {
    const segs = Math.max(0, total);
    if (segs === 0) return <div style={{ ...T.caption, color: C.inkFaint }}>no trucks</div>;
    return (
      <div style={{ display: 'flex', gap: 3, height: 6 }}>
        {Array.from({ length: segs }).map((_, i) => (
          <div key={i} style={{ flex: 1, height: '100%', background: i < active ? C.accent : C.surfaceHi, borderRadius: 2 }} />
        ))}
      </div>
    );
  };

  // === Enrich projects with all the operational fields the control center
  // needs. Most are derived from existing data; a couple are demo defaults
  // backfilled per UX spec (avgCycleTime, loadsTarget). ===
  const updateProject = (id, patch) => setDb(prev => ({ ...prev, projects: prev.projects.map(p => p.id === id ? { ...p, ...patch } : p) }));
  const projects = db.projects.map(p => {
    const ops = db.haulers.filter(o => o.projectIds.includes(p.id));
    const trucks = db.trucks.filter(t => t.projectId === p.id);
    const trucksActive = trucks.filter(t => t.driverId && db.hours.some(h => h.truckId === t.id && h.status === 'open')).length;
    const trucksAssigned = trucks.length;
    const projLoads = db.loads.filter(l => l.projectId === p.id);
    const loadsCompleted = projLoads.filter(l => l.status === 'approved').length;
    const pendingLoads = projLoads.filter(l => l.status === 'pending').length;
    // Loads in transit ≈ open shifts on this project's trucks (a load is "in
    // flight" while a driver is clocked-in on it).
    const loadsInTransit = trucksActive;
    const totalHours = db.hours.filter(h => h.projectId === p.id).reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
    const totalRevenue = db.hours.filter(h => h.projectId === p.id).reduce((s, h) => {
      const t = db.trucks.find(t => t.id === h.truckId);
      const rate = t ? db.rates[t.type] : 0;
      return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * rate;
    }, 0);
    // Haul requests on this project — used for target volume + dispatch queue.
    const reqs = (db.haulRequests || []).filter(r => r.projectId === p.id);
    const targetCY = reqs.reduce((s, r) => s + (r.volumeCY || 0), 0);
    // Approx 12 CY / load → quick loadsTarget so the progress bar reads.
    const loadsTarget = targetCY > 0 ? Math.max(1, Math.round(targetCY / 12)) : Math.max(loadsCompleted, 1);
    const loadPct = loadsTarget > 0 ? Math.round((loadsCompleted / loadsTarget) * 100) : 0;
    // Demo cycle time: avg(approved-load count × 24 min) / trucksActive. Tweakable.
    const avgCycleTime = trucksActive > 0 && loadsCompleted > 0
      ? Math.max(18, Math.round((totalHours * 60) / Math.max(1, loadsCompleted)))
      : 0;
    // ETA: at current cadence, hours-of-work-left ≈ pending × cycle.
    const minsLeft = pendingLoads * (avgCycleTime || 30);
    const estimatedCompletion = pendingLoads === 0
      ? '—'
      : (minsLeft < 90 ? minsLeft + 'm' : (minsLeft / 60).toFixed(1) + 'h');
    // Material + haul-type derived from the first material code; readable label.
    const matCodes = Array.isArray(p.material) ? p.material : [];
    const matLabels = matCodes.map(mc => {
      const m = MATERIALS.find(x => x.code === mc);
      return m ? m.label : mc;
    });
    const materialType = matLabels[0] || 'Mixed';
    // v16: project carries an explicit `haulType` (NEEDS=import, HAS=export).
    // Prefer that when set; fall back to the material-code derivation for
    // legacy / pre-v16 rows that never had the field stamped.
    const haulType = p.haulType === 'NEEDS' ? 'Import'
      : p.haulType === 'HAS' ? 'Export'
      : matCodes.includes('EX') ? 'Export'
      : matCodes.includes('CF') ? 'Import'
      : matCodes.includes('CR') ? 'Aggregate Import'
      : matCodes.includes('TS') ? 'Topsoil'
      : 'Transfer';
    // Pickup / dump pulled off the first haul request that carries them
    // (schema v12+, fields `pickupLocation` / `dropoffLocation` — each is an
    // { name, address } object). Render as a single line; fall back to the
    // project address if no haul request carries logistics yet.
    const fmtLoc = (loc) => (loc && typeof loc === 'object') ? (loc.name || loc.address || '') : (typeof loc === 'string' ? loc : '');
    const firstReq = reqs.find(r => fmtLoc(r.pickupLocation) || fmtLoc(r.dropoffLocation)) || {};
    const pickupLocation = fmtLoc(firstReq.pickupLocation) || p.address || '—';
    const dumpLocation = fmtLoc(firstReq.dropoffLocation) || p.address || '—';
    const enriched = { ...p, ops, trucks, trucksActive, trucksAssigned, totalLoads: loadsCompleted, loadsCompleted, loadsTarget, loadPct, pendingLoads, loadsInTransit, totalHours, totalRevenue, avgCycleTime, estimatedCompletion, materialType, haulType, pickupLocation, dumpLocation, reqs };
    enriched.healthStatus = healthFor(enriched);
    return enriched;
  });
  const active = projects.filter(p => (p.status || 'active') === 'active');
  const upcoming = projects.filter(p => p.status === 'upcoming');
  const completed = projects.filter(p => p.status === 'completed');

  // === Top-line operational KPIs ===
  const liveTrucksAll = db.trucks.filter(t => t.driverId && db.hours.some(h => h.truckId === t.id && h.status === 'open')).length;
  const loadsInTransitAll = active.reduce((s, p) => s + p.loadsInTransit, 0);
  const delayedCount = active.filter(p => p.healthStatus === 'critical' || p.healthStatus === 'atrisk').length;
  const pendingDispatches = (db.haulRequests || []).filter(r => r.status === 'pending').length;
  const cycleTimes = active.map(p => p.avgCycleTime).filter(v => v > 0);
  const avgCycle = cycleTimes.length > 0 ? Math.round(cycleTimes.reduce((s, v) => s + v, 0) / cycleTimes.length) : 0;
  const totalActiveRevenue = active.reduce((s, p) => s + p.totalRevenue, 0);
  const kpis = [
    { label: 'Active hauls',       value: active.length,           tone: C.accent, sub: active.length === 1 ? 'on the board' : 'on the board' },
    { label: 'Live trucks',        value: liveTrucksAll,           tone: C.ok,     sub: 'clocked-in now' },
    { label: 'Loads in transit',   value: loadsInTransitAll,       tone: C.info,   sub: 'across active hauls' },
    { label: 'Delayed / at risk',  value: delayedCount,            tone: delayedCount > 0 ? C.warn : C.inkDim, sub: 'needs attention' },
    { label: 'Pending dispatches', value: pendingDispatches,       tone: pendingDispatches > 0 ? C.warn : C.inkDim, sub: 'unmatched requests' },
    { label: 'Avg cycle time',     value: avgCycle > 0 ? avgCycle + ' min' : '—', tone: C.accent, sub: 'per load · active hauls' },
  ];

  // === Needs-Attention items ===
  const attentionItems = [];
  active.forEach(p => {
    if (p.pendingLoads > 0 && p.trucksActive < p.trucksAssigned) {
      attentionItems.push({
        id: 'att-trucks-' + p.id,
        severity: p.pendingLoads >= 3 ? 'critical' : 'warning',
        title: p.name,
        body: `${p.pendingLoads} pending load${p.pendingLoads === 1 ? '' : 's'}, only ${p.trucksActive} of ${p.trucksAssigned} trucks active`,
        actionLabel: 'Assign trucks',
        onAction: () => { window.alert('TODO: open assign-trucks modal for ' + p.name); },
      });
    }
  });
  (db.haulRequests || []).filter(r => r.status === 'pending').forEach(r => {
    const proj = db.projects.find(pp => pp.id === r.projectId);
    if (!proj) return;
    attentionItems.push({
      id: 'att-req-' + r.id,
      severity: 'warning',
      title: proj.name,
      body: `${r.volumeCY} CY of ${(MATERIALS.find(m => m.code === r.materialCode) || {}).label || r.materialCode} awaiting dispatch`,
      actionLabel: 'Open dispatch',
      onAction: () => navigate('/admin/requests/' + r.id),
    });
  });
  upcoming.forEach(p => {
    attentionItems.push({
      id: 'att-up-' + p.id,
      severity: 'info',
      title: p.name,
      body: 'Upcoming haul · needs truck assignments before start',
      actionLabel: 'Review haul',
      onAction: () => navigate('/admin/requests?projectId=' + p.id),
    });
  });
  // Offline / unassigned trucks (any roster truck with no driver) — surface
  // as info-severity so dispatchers can spot bench depth.
  const unassignedTrucks = db.trucks.filter(t => !t.driverId);
  if (unassignedTrucks.length > 0) {
    attentionItems.push({
      id: 'att-bench',
      severity: 'info',
      title: 'Driver pool',
      body: `${unassignedTrucks.length} truck${unassignedTrucks.length === 1 ? '' : 's'} on roster without an assigned driver`,
      actionLabel: 'Open dispatch',
      onAction: () => navigate('/admin/trucks/active'),
    });
  }
  attentionItems.sort((a, b) => {
    const order = { critical: 0, warning: 1, info: 2 };
    return order[a.severity] - order[b.severity];
  });

  const sevTone = (sev) => ({
    critical: { c: C.danger || C.warn, soft: C.dangerSoft || C.warnSoft, label: 'Critical' },
    warning:  { c: C.warn,   soft: C.warnSoft, label: 'Warning'  },
    info:     { c: C.info,   soft: C.infoSoft, label: 'Info'     },
  }[sev] || { c: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: sev });

  // === Dispatch queue (pending haul requests, prioritized) ===
  const queueItems = (db.haulRequests || []).filter(r => r.status === 'pending').map(r => {
    const proj = db.projects.find(pp => pp.id === r.projectId);
    const mat = MATERIALS.find(m => m.code === r.materialCode);
    const reqAssigned = (r.assignments || []).length;
    const priority = r.volumeCY >= 25 ? 'High' : r.volumeCY >= 12 ? 'Med' : 'Low';
    return { req: r, proj, mat, reqAssigned, priority };
  });
  const priorityTone = (p) => p === 'High' ? C.warn : p === 'Med' ? C.info : C.inkDim;

  // === Operational haul card — replaces the dense table row ===
  const HaulOperationalCard = ({ p, dim }) => {
    const tone = healthTone(p.healthStatus);
    return (
      <Card padding={0} style={dim ? { opacity: 0.65 } : {}}>
        <div style={{ padding: S[4], display: 'grid', gridTemplateColumns: 'minmax(0, 1.6fr) minmax(0, 1fr) minmax(0, 1fr) auto', gap: S[4], alignItems: 'start' }}
             className="haul-op-card-grid">
          <div style={{ minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: S[2], marginBottom: 4, flexWrap: 'wrap' }}>
              <h3 style={{ ...T.h4, fontWeight: 700, margin: 0, color: C.ink, letterSpacing: -0.3 }}>{p.name}</h3>
              <Pill color={tone.c} soft={tone.soft}>{tone.label}</Pill>
            </div>
            <div style={{ ...T.bodySm, color: C.inkDim, marginBottom: 2 }}>{p.gc}</div>
            <div style={{ ...T.caption, color: C.inkFaint, marginBottom: S[3] }}>{p.address}</div>
            <div style={{ display: 'flex', gap: S[2], flexWrap: 'wrap', marginBottom: S[2] }}>
              <Pill color={C.accent} soft={C.accentSoft}>{p.haulType}</Pill>
              <Pill color={C.inkDim} soft="rgba(255,255,255,0.05)">{p.materialType}</Pill>
            </div>
            {(() => {
              const remainingLoads = Math.max(0, (p.loadsTarget || 0) - (p.loadsCompleted || 0));
              const remainingCY = remainingLoads * 12;
              return (
                <div style={{ ...T.caption, color: C.inkDim, fontFamily: F.mono, lineHeight: 1.4 }}>
                  {remainingCY > 0 ? remainingCY.toLocaleString() + ' CY remaining' : 'target hit'}
                  <span style={{ color: C.inkFaint }}>{' · '}</span>
                  <span style={{ color: C.ink }}>{p.pickupLocation}</span>
                  <span style={{ color: C.accent, margin: '0 4px' }}>{'\u2192'}</span>
                  <span style={{ color: C.ink }}>{p.dumpLocation}</span>
                </div>
              );
            })()}
          </div>
          <div style={{ minWidth: 0 }}>
            <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 4 }}>LOADS</div>
            <div style={{ ...T.monoSm, color: C.ink, marginBottom: 6 }}>
              <span style={{ ...T.h4, fontWeight: 700, color: C.ink }}>{p.loadsCompleted}</span>
              <span style={{ color: C.inkDim }}> / {p.loadsTarget}</span>
              {p.pendingLoads > 0 && <span style={{ color: C.warn, marginLeft: S[2], fontWeight: 600 }}>+{p.pendingLoads} pending</span>}
            </div>
            <ProgressBar pct={p.loadPct} color={p.healthStatus === 'critical' ? (C.danger || C.warn) : p.healthStatus === 'atrisk' ? C.warn : C.accent} />
            <div style={{ ...T.caption, color: C.inkFaint, marginTop: S[3], marginBottom: 4 }}>TRUCKS</div>
            <div style={{ ...T.monoSm, color: C.ink, marginBottom: 6 }}>
              <span style={{ ...T.h4, fontWeight: 700, color: C.ink }}>{p.trucksActive}</span>
              <span style={{ color: C.inkDim }}> / {p.trucksAssigned} active</span>
            </div>
            <UtilizationBar active={p.trucksActive} total={p.trucksAssigned} />
          </div>
          <div style={{ minWidth: 0, display: 'flex', flexDirection: 'column', gap: S[2] }}>
            <div>
              <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 2 }}>AVG CYCLE</div>
              <div style={{ ...T.body, color: C.ink, fontFamily: F.mono, fontWeight: 600 }}>{p.avgCycleTime > 0 ? p.avgCycleTime + ' min' : '—'}</div>
            </div>
            <div>
              <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 2 }}>EST. COMPLETION</div>
              <div style={{ ...T.body, color: C.ink, fontFamily: F.mono, fontWeight: 600 }}>{p.estimatedCompletion}</div>
            </div>
            <div>
              <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 2 }}>HAULERS</div>
              <div style={{ ...T.body, color: C.ink, fontWeight: 600 }}>{p.ops.length}</div>
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'space-between', gap: S[2], alignItems: 'flex-end' }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: S[1], alignItems: 'stretch', minWidth: 130 }}>
              {p.healthStatus === 'critical' && (
                <Btn variant="primary" size="sm" onClick={() => navigate('/admin/requests?projectId=' + p.id)}>Resolve delay</Btn>
              )}
              {p.healthStatus === 'atrisk' && (
                <Btn variant="primary" size="sm" onClick={() => navigate('/admin/requests?projectId=' + p.id)}>Assign trucks</Btn>
              )}
              {p.healthStatus === 'healthy' && p.loadsCompleted >= p.loadsTarget && (
                <Btn variant="primary" size="sm" onClick={() => updateProject(p.id, { status: 'completed' })}>Close haul</Btn>
              )}
              {!(p.healthStatus === 'critical' || p.healthStatus === 'atrisk' || (p.healthStatus === 'healthy' && p.loadsCompleted >= p.loadsTarget)) && (
                <Btn variant="primary" size="sm" onClick={() => navigate('/admin/requests?projectId=' + p.id)}>Open dispatch</Btn>
              )}
              <Btn variant="secondary" size="xs" onClick={() => navigate('/admin/requests?projectId=' + p.id)}>View route</Btn>
            </div>
            <div style={{ ...T.caption, color: C.inkFaint, textAlign: 'right' }}>{fmtHours(p.totalHours)} hrs · {fmtMoney(p.totalRevenue)}</div>
          </div>
        </div>
      </Card>
    );
  };

  // === Live operations map — dark tactical dispatch view.
  //   Architecture intentionally mirrors a real-map integration so the inline
  //   SVG ROAD/CITY layers can be swapped for a Mapbox GL or MapLibre source
  //   without rewriting the route/marker/tooltip/filter code on top:
  //     • <BaseLayer />      → today: SVG roads + cities + terrain washes
  //                            tomorrow: real raster/vector tiles
  //     • <RouteLayer />     → projected pickup→dump paths with animated flow
  //     • <PickupMarker />,
  //       <DumpMarker />,
  //       <TruckMarker />   → SVG primitives that ride the route paths
  //     • <MapFilters />     → status chips (Active / Upcoming / Delayed / Completed)
  //     • <MetricsDrawer />  → collapsible side panel summarizing visible state
  //     • <RouteTooltip />,
  //       <PinnedRouteCard /> → hover preview + click-to-pin info card
  //   Real Mapbox swap, when ready: provide a public token, lift the projection
  //   helpers to the Mapbox `lng/lat` API, render the base layer with
  //   <mapboxgl.Map style="mapbox://styles/mapbox/dark-v11"> and keep the
  //   route/marker/tooltip code as overlays.
  // =====================================================================
  // LiveOperationsTileMap — MapLibre GL JS rendering CartoCDN `dark_all` raster
  // tiles, EXACTLY matching jobsiteexchange.com's real map look (see
  // map-recon.md for the tile URL we pulled out of their JS bundle). Overlays
  // pickup/dropoff markers + bezier-style straight-line routes from the v12
  // logistics fields. Falls back to the SVG `LiveOperationsMap` if MapLibre
  // failed to load (e.g. CDN blocked) — keeps /admin shippable in any network
  // condition. Geocoding via `db.geocode` pre-seeded cache (no live Nominatim
  // calls on first render — see GEOCODE_SEED in Block 2).
  // =====================================================================
  const LiveOperationsTileMap = () => {
    const mlAvailable = typeof window !== 'undefined' && typeof window.maplibregl !== 'undefined';
    const containerRef = useRef(null);
    const mapRef = useRef(null);
    const markersRef = useRef([]);

    // Resolve geocoded points from `db.geocode`. The cache is pre-seeded with
    // approximate coords for every known address; runtime Nominatim refines
    // them. resolveCoord falls through to null only if neither seed nor
    // runtime fetch has resolved the address yet.
    const geocode = (db && db.geocode) || {};
    const routesCache = (db && db.routes) || {};
    const resolveCoord = (addr) => (addr && geocode[addr]) || null;

    const projectPoints = (db.projects || []).map(p => {
      const c = resolveCoord(p.address);
      if (!c) return null;
      return { id: 'proj-' + p.id, type: 'project', coord: c, label: p.name + ' · ' + (p.gc || ''), status: p.status || 'active' };
    }).filter(Boolean);

    // v17: per-project OSRM driving routes. Each project carries explicit
    // `pickupLocation` + `dumpLocation` address strings; the map renders the
    // OSRM-fetched polyline if cached, otherwise a straight line as fallback
    // until OSRM completes. Status colors per project status.
    const projectRoutes = (db.projects || []).map(p => {
      const pickAddr = p.pickupLocation;
      const dumpAddr = p.dumpLocation;
      if (!pickAddr || !dumpAddr) return null;
      const key = pickAddr + '|' + dumpAddr;
      const cached = routesCache[key];
      const pick = resolveCoord(pickAddr);
      const dump = resolveCoord(dumpAddr);
      if (cached && Array.isArray(cached.coords) && cached.coords.length >= 2) {
        return { id: p.id, status: p.status || 'active', label: p.name, key, coords: cached.coords, distanceMeters: cached.distanceMeters, durationSeconds: cached.durationSeconds, isStraight: false, pickAddr, dumpAddr, pick, dump, projectAddress: p.address };
      }
      if (pick && dump) {
        return { id: p.id, status: p.status || 'active', label: p.name, key, coords: [[pick.lng, pick.lat], [dump.lng, dump.lat]], distanceMeters: null, durationSeconds: null, isStraight: true, pickAddr, dumpAddr, pick, dump, projectAddress: p.address };
      }
      return null;
    }).filter(Boolean);

    // Endpoints (pickup + dump markers) per project, derived from the same
    // address pair. Per Robert: drop the marker for the endpoint that IS the
    // project's own address — only the "other" endpoint (the off-site haul
    // address) should get a pin. The polyline still draws between BOTH
    // endpoints (it reads from `projectRoutes`, not this list). Normalize
    // address strings for the comparison so trailing whitespace / casing
    // edits later don't reintroduce the self-pin.
    // Dedupe by coord so two projects sharing an off-site address don't
    // double-render.
    const norm = s => (s || '').trim().toLowerCase();
    const projectEndpoints = [];
    const seenEndpoint = new Set();
    projectRoutes.forEach(rt => {
      const projN = norm(rt.projectAddress);
      if (rt.pick && norm(rt.pickAddr) !== projN) {
        const k = rt.pickAddr;
        if (!seenEndpoint.has(k)) { seenEndpoint.add(k); projectEndpoints.push({ id: rt.id + '-p', type: 'pickup', coord: rt.pick, label: rt.pickAddr, status: rt.status }); }
      }
      if (rt.dump && norm(rt.dumpAddr) !== projN) {
        const k = rt.dumpAddr;
        if (!seenEndpoint.has(k)) { seenEndpoint.add(k); projectEndpoints.push({ id: rt.id + '-d', type: 'dump', coord: rt.dump, label: rt.dumpAddr, status: rt.status }); }
      }
    });

    // Stable signature for the SOURCE-DATA effect: changes whenever a route's
    // coord list grows (e.g., OSRM completed and replaced the 2-pt straight
    // line with a 200-pt driving polyline). Triggers map.getSource().setData()
    // without recreating the map.
    const routesSignature = projectRoutes.map(rt => rt.key + '#' + rt.coords.length + (rt.isStraight ? 's' : 'o')).join('|');

    // Stable signature for the MARKERS effect: changes when the set of
    // endpoints (or their coords) changes. Drives reconciliation of marker
    // DOM elements so we don't rely on the one-shot `map.on('load')` capture.
    const endpointsSignature = projectEndpoints.map(p => p.id + '@' + p.coord.lng.toFixed(5) + ',' + p.coord.lat.toFixed(5) + ':' + p.type + ':' + (p.status || '')).join('|');

    // Hauler home-base pins. Resolved via the same geocode cache used by
    // project/endpoint markers — `db.haulers[*].address` is keyed into
    // GEOCODE_SEED in Block 2. Rendered as gray dots (separate from the
    // red/accent project pickup/dump pins) so a dispatcher can see at a
    // glance where each hauler is based. Skips haulers whose address
    // hasn't been geocoded yet (Nominatim falls through for any address
    // edited via EditableText but not yet resolved).
    const haulerPoints = (db.haulers || []).map(h => {
      const c = resolveCoord(h.address);
      if (!c) return null;
      return { id: 'hauler-' + h.id, type: 'hauler', coord: c, label: h.name + (h.address ? ' · ' + h.address : '') };
    }).filter(Boolean);
    const haulersSignature = haulerPoints.map(p => p.id + '@' + p.coord.lng.toFixed(5) + ',' + p.coord.lat.toFixed(5)).join('|');

    // Pending-route signature for the ASYNC-FETCH effect: changes when the set
    // of un-cached project routes changes. Used as a deps array so the effect
    // doesn't loop after a successful fetch.
    const pendingKey = (db.projects || [])
      .filter(p => p.pickupLocation && p.dumpLocation && !routesCache[p.pickupLocation + '|' + p.dumpLocation])
      .map(p => p.pickupLocation + '|' + p.dumpLocation)
      .join(',');

    // Async fetch: for each project whose route isn't cached yet, geocode any
    // missing endpoint via Nominatim, then call OSRM. Each successful step
    // writes back via setDb so the map's source data updates on next render.
    // Cancelled on unmount via the `cancelled` flag.
    useEffect(() => {
      if (!mlAvailable) return undefined;
      if (!pendingKey) return undefined;
      let cancelled = false;
      (async () => {
        const projects = (db.projects || []).filter(p => p.pickupLocation && p.dumpLocation);
        for (const p of projects) {
          if (cancelled) return;
          const key = p.pickupLocation + '|' + p.dumpLocation;
          if ((db.routes || {})[key]) continue;
          // Geocode endpoints if missing
          let pick = (db.geocode || {})[p.pickupLocation];
          let dump = (db.geocode || {})[p.dumpLocation];
          if (!pick) {
            const g = await geocodeAddress(p.pickupLocation);
            if (cancelled) return;
            if (g) { pick = g; setDb(prev => ({ ...prev, geocode: { ...(prev.geocode || {}), [p.pickupLocation]: g } })); }
          }
          if (!dump) {
            const g = await geocodeAddress(p.dumpLocation);
            if (cancelled) return;
            if (g) { dump = g; setDb(prev => ({ ...prev, geocode: { ...(prev.geocode || {}), [p.dumpLocation]: g } })); }
          }
          if (!pick || !dump) continue;
          const route = await fetchOSRMDrivingRoute(pick, dump);
          if (cancelled) return;
          if (route) {
            setDb(prev => ({ ...prev, routes: { ...(prev.routes || {}), [key]: route } }));
          }
        }
      })();
      return () => { cancelled = true; };
    }, [mlAvailable, pendingKey]); // eslint-disable-line react-hooks/exhaustive-deps

    // Source-data update effect: whenever projectRoutes changes (OSRM completed,
    // turning straight lines into real road geometry), push the new GeoJSON to
    // the existing source rather than recreating the map.
    //
    // Same setTimeout(0) defer as the markers effect — map-init runs later in
    // source order, so mapRef.current is null on the synchronous useEffect run.
    useEffect(() => {
      let cancelled = false;
      const t = setTimeout(() => {
        if (cancelled) return;
        if (!mapRef.current) return;
        const apply = () => {
          if (cancelled) return;
          const src = mapRef.current.getSource && mapRef.current.getSource('routes');
          if (!src) return;
          const features = projectRoutes.map(rt => ({
            type: 'Feature',
            properties: { id: rt.id, status: rt.status, isStraight: !!rt.isStraight },
            geometry: { type: 'LineString', coordinates: rt.coords },
          }));
          try { src.setData({ type: 'FeatureCollection', features }); } catch (e) { /* ignore */ }
        };
        // The 'routes' source is added inside map.on('load') in the map-init
        // effect. If load hasn't fired yet, wait for it; otherwise apply now.
        if (mapRef.current.loaded && mapRef.current.loaded()) {
          apply();
        } else if (mapRef.current.once) {
          mapRef.current.once('load', apply);
        }
      }, 0);
      return () => { cancelled = true; clearTimeout(t); };
    }, [routesSignature]); // eslint-disable-line react-hooks/exhaustive-deps

    // Markers effect — separated from the one-shot `map.on('load')` so the
    // markers re-render when projectEndpoints changes (e.g., when OSRM
    // resolves and updates the coord set). Previous architecture captured
    // projectEndpoints in the map.on('load') closure at first render, so if
    // data wasn't ready yet, markers never appeared.
    //
    // Builds halo+dot pin matched to jobsiteexchange.com's `.jx-haul-pin`
    // recipe verbatim (see map-recon-haul-calc.md). Container is flex-
    // centered so the dot's center sits at the container's center sits at
    // the marker's geographic point. anchor:'center' is mandatory —
    // MapLibre's default differs by element type and any drift means the
    // pin walks across the map as the user zooms.
    useEffect(() => {
      if (!mlAvailable) return undefined;
      // Defer with setTimeout(0) — the map-init useEffect is registered AFTER
      // this one in source order, so on the first render mapRef.current is
      // still null when this effect's body runs. A 0ms timeout pushes the
      // marker creation to the next macrotask, after all useEffect bodies in
      // the current commit have run (including map-init's, which sets
      // mapRef.current). Safe alternative to reordering effect registrations.
      let cancelled = false;
      const t = setTimeout(() => {
        if (cancelled) return;
        const map = mapRef.current;
        if (!map) return;
        // Halo gradients lifted verbatim from jobsiteexchange.com's
        // `.jx-haul-pin .jx-haul-pin-halo` background (see map-recon-haul-calc.md).
        // Pickup keeps the real-site red `#ef5b5b`; dump uses our brand accent
        // `#B3E635` for the dot but the gradient color stops are matched to it
        // so the halo reads as a coherent glow rather than two unrelated colors.
        const PICKUP_HALO = 'radial-gradient(circle, #f35f5f8c, #f35f5f2e 55%, #f35f5f00 75%)';
        const DUMP_HALO   = 'radial-gradient(circle, #b3e6358c, #b3e6352e 55%, #b3e63500 75%)';
        const mkHaloDotEl = (haloBackground, dotColor) => {
          const el = document.createElement('div');
          el.className = 'jx-haul-pin';
          el.style.cursor = 'pointer';
          const halo = document.createElement('span');
          halo.className = 'jx-haul-pin-halo';
          halo.style.background = haloBackground;
          const dot = document.createElement('span');
          dot.className = 'jx-haul-pin-dot';
          dot.style.background = dotColor;
          el.appendChild(halo);
          el.appendChild(dot);
          return el;
        };
        const haloFor = (type) => type === 'pickup' ? PICKUP_HALO : DUMP_HALO;
        const dotFor  = (type) => type === 'pickup' ? '#ef5b5b'    : '#B3E635';
        // Hauler home-base halo + dot — gray, slightly lower visual weight
        // than pickup/dump so they don't compete with the live operational
        // pins. C.inkDim = #9A9A9A.
        const HAULER_HALO = 'radial-gradient(circle, #9a9a9a66, #9a9a9a22 55%, #9a9a9a00 75%)';
        const HAULER_DOT  = '#9A9A9A';
        // Remove any previously-added markers so we don't accumulate duplicates
        // when projectEndpoints or haulerPoints changes.
        markersRef.current.forEach(m => { try { m.remove(); } catch (e) {} });
        markersRef.current = [];
        const addAll = () => {
          if (cancelled) return;
          try {
            projectEndpoints.forEach(pt => {
              const el = mkHaloDotEl(haloFor(pt.type), dotFor(pt.type));
              const marker = new window.maplibregl.Marker({ element: el, anchor: 'center' })
                .setLngLat([pt.coord.lng, pt.coord.lat])
                .setPopup(new window.maplibregl.Popup({ offset: 22, closeButton: false }).setHTML('<div style="font-family:Inter,sans-serif;font-size:12px;color:#0A0A0A;font-weight:600;">' + (pt.label || '').replace(/</g, '&lt;') + '</div>'))
                .addTo(map);
              markersRef.current.push(marker);
            });
            haulerPoints.forEach(pt => {
              const el = mkHaloDotEl(HAULER_HALO, HAULER_DOT);
              el.classList.add('jx-haul-pin-hauler');
              const marker = new window.maplibregl.Marker({ element: el, anchor: 'center' })
                .setLngLat([pt.coord.lng, pt.coord.lat])
                .setPopup(new window.maplibregl.Popup({ offset: 22, closeButton: false }).setHTML('<div style="font-family:Inter,sans-serif;font-size:12px;color:#0A0A0A;font-weight:600;">' + (pt.label || '').replace(/</g, '&lt;') + '</div>'))
                .addTo(map);
              markersRef.current.push(marker);
            });
          } catch (e) { /* swallow — partial markers are better than no markers */ }
        };
        if (map.loaded && map.loaded()) {
          addAll();
        } else {
          map.once && map.once('load', addAll);
        }
      }, 0);
      // Cleanup: cancel pending timeout + remove markers added so far.
      return () => {
        cancelled = true;
        clearTimeout(t);
        markersRef.current.forEach(m => { try { m.remove(); } catch (e) {} });
        markersRef.current = [];
      };
    }, [endpointsSignature, haulersSignature, mlAvailable]); // eslint-disable-line react-hooks/exhaustive-deps

    useEffect(() => {
      if (!mlAvailable || !containerRef.current) return;
      if (mapRef.current) return;
      const dpr = (typeof window !== 'undefined' && window.devicePixelRatio) || 1;
      const retina = dpr > 1 ? '@2x' : '';
      // Tile URL template matches jobsiteexchange.com's bundle exactly (per map-recon.md).
      const tileTemplate = `https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}${retina}.png`;
      const subdomains = ['a', 'b', 'c', 'd'];
      const tileUrls = subdomains.map(s => tileTemplate.replace('{s}', s));
      let map;
      try {
        map = new window.maplibregl.Map({
          container: containerRef.current,
          style: {
            version: 8,
            sources: {
              carto: {
                type: 'raster',
                tiles: tileUrls,
                tileSize: 256,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
              },
            },
            layers: [{ id: 'carto-layer', type: 'raster', source: 'carto' }],
          },
          center: [-105.0, 39.95],
          zoom: 8.4,
          attributionControl: { compact: true },
        });
        map.scrollZoom.disable();
        map.addControl(new window.maplibregl.NavigationControl({ showCompass: false, visualizePitch: false }), 'top-right');
      } catch (e) {
        // MapLibre threw during init — leave the SVG fallback path active by
        // simply not assigning mapRef. Render returns the fallback below.
        return;
      }
      mapRef.current = map;

      map.on('load', () => {
        // Each layer wrapped in try/catch — a single layer failing must NOT
        // block subsequent layers OR the marker creation that follows.
        // Previous bug: routes-lines threw on data-expression dasharray and
        // markers never got added because the exception escaped this callback.
        const routeFeatures = projectRoutes.map(rt => ({
          type: 'Feature',
          properties: { id: rt.id, status: rt.status, isStraight: !!rt.isStraight },
          geometry: { type: 'LineString', coordinates: rt.coords },
        }));
        try {
          map.addSource('routes', { type: 'geojson', data: { type: 'FeatureCollection', features: routeFeatures } });
        } catch (e) { /* source exists or addSource failed */ }
        const statusColor = ['match', ['get', 'status'],
          'active',    '#B3E635',
          'upcoming',  '#5AAEFF',
          'delayed',   '#FF6B47',
          'completed', '#9A9A9A',
          /* default */ '#B3E635',
        ];
        // Dark casing — sits under the colored route line for highway-shield depth.
        try { map.addLayer({
          id: 'routes-casing', type: 'line', source: 'routes',
          paint: { 'line-color': '#0A0A0A', 'line-width': 5, 'line-opacity': 0.55 },
          layout: { 'line-cap': 'round', 'line-join': 'round' },
        }); } catch (e) { /* ignore */ }
        // Underglow
        try { map.addLayer({
          id: 'routes-glow', type: 'line', source: 'routes',
          paint: { 'line-color': statusColor, 'line-width': 8, 'line-opacity': 0.22, 'line-blur': 5 },
          layout: { 'line-cap': 'round', 'line-join': 'round' },
        }); } catch (e) { /* ignore */ }
        // Solid bright line — OSRM-routed geometry only (filter by !isStraight).
        try { map.addLayer({
          id: 'routes-lines', type: 'line', source: 'routes',
          filter: ['==', ['get', 'isStraight'], false],
          paint: { 'line-color': statusColor, 'line-width': 3, 'line-opacity': 0.9 },
          layout: { 'line-cap': 'round', 'line-join': 'round' },
        }); } catch (e) { /* ignore */ }
        // Dashed line — straight-line fallback only (filter by isStraight==true).
        try { map.addLayer({
          id: 'routes-lines-fallback', type: 'line', source: 'routes',
          filter: ['==', ['get', 'isStraight'], true],
          paint: { 'line-color': statusColor, 'line-width': 3, 'line-opacity': 0.45, 'line-dasharray': [2, 2] },
          layout: { 'line-cap': 'round', 'line-join': 'round' },
        }); } catch (e) { /* ignore */ }

      });

      // Resize observer — MapLibre needs explicit resize() on container changes.
      let ro = null;
      try {
        ro = new ResizeObserver(() => { if (mapRef.current) mapRef.current.resize(); });
        ro.observe(containerRef.current);
      } catch (e) { /* no-op if ResizeObserver unavailable */ }

      return () => {
        if (ro) ro.disconnect();
        try { map.remove(); } catch (e) { /* ignore */ }
        mapRef.current = null;
      };
    }, [mlAvailable]); // eslint-disable-line react-hooks/exhaustive-deps

    if (!mlAvailable) return <LiveOperationsMap />;
    return (
      <div style={{ position: 'relative', width: '100%', marginTop: S[4] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3], gap: S[3], flexWrap: 'wrap' }}>
          <Label color={C.accent}>Live operations map</Label>
          <span style={{ ...T.caption, color: C.inkDim }}>
            {projectPoints.length} project{projectPoints.length === 1 ? '' : 's'} · {projectEndpoints.filter(p => p.type === 'pickup').length} pickup{projectEndpoints.filter(p => p.type === 'pickup').length === 1 ? '' : 's'} · {projectEndpoints.filter(p => p.type === 'dump').length} drop{projectEndpoints.filter(p => p.type === 'dump').length === 1 ? '' : 's'} · {haulerPoints.length} hauler{haulerPoints.length === 1 ? '' : 's'} · {projectRoutes.length} route{projectRoutes.length === 1 ? '' : 's'} {(() => {
              const osrm = projectRoutes.filter(r => !r.isStraight).length;
              const totalMeters = projectRoutes.filter(r => r.distanceMeters != null).reduce((s, r) => s + r.distanceMeters, 0);
              const totalMinutes = projectRoutes.filter(r => r.durationSeconds != null).reduce((s, r) => s + r.durationSeconds, 0) / 60;
              if (osrm === 0) return <span style={{ color: C.inkFaint }}> · fetching OSRM…</span>;
              return <span style={{ color: C.inkDim }}> · {(totalMeters / 1609.34).toFixed(1)} mi · {Math.round(totalMinutes)} min total</span>;
            })()}
          </span>
        </div>
        <div ref={containerRef} className="lom-tile-map" style={{ width: '100%', borderRadius: R.lg, overflow: 'hidden', border: `1px solid ${C.ruleHi}`, background: C.surface }} />
      </div>
    );
  };

  const LiveOperationsMap = () => {
    // -- Front Range projection. Viewport tuned to frame Denver metro +
    //    foothills + I-70 east corridor so every active haul sits inside.
    const VIEW = { lngMin: -106.4, lngMax: -104.2, latMin: 39.55, latMax: 40.35, w: 640, h: 400 };
    const projX = (lng) => ((lng - VIEW.lngMin) / (VIEW.lngMax - VIEW.lngMin)) * VIEW.w;
    const projY = (lat) => (1 - (lat - VIEW.latMin) / (VIEW.latMax - VIEW.latMin)) * VIEW.h;

    // -- City gazetteer. Tier drives label weight; bigger cities anchor the
    //    visual hierarchy and act as named waypoints.
    const CITIES = [
      { name: 'Denver',        lat: 39.7392, lng: -104.9903, tier: 1 },
      { name: 'Aurora',        lat: 39.7294, lng: -104.8319, tier: 1 },
      { name: 'Boulder',       lat: 40.0150, lng: -105.2705, tier: 1 },
      { name: 'Westminster',   lat: 39.8366, lng: -105.0372, tier: 2 },
      { name: 'Commerce City', lat: 39.8083, lng: -104.9339, tier: 2 },
      { name: 'Brighton',      lat: 39.9853, lng: -104.8208, tier: 2 },
      { name: 'Castle Rock',   lat: 39.3722, lng: -104.8561, tier: 2 },
      { name: 'Lakewood',      lat: 39.7047, lng: -105.0814, tier: 2 },
      { name: 'Bennett',       lat: 39.7592, lng: -104.4291, tier: 3 },
      { name: 'Winter Park',   lat: 39.8869, lng: -105.7625, tier: 3 },
      { name: 'Granby',        lat: 40.0858, lng: -105.9425, tier: 3 },
      { name: 'Idaho Springs', lat: 39.7425, lng: -105.5136, tier: 3 },
      { name: 'Golden',        lat: 39.7555, lng: -105.2211, tier: 3 },
    ];
    const cityByName = Object.fromEntries(CITIES.map(c => [c.name, c]));

    // -- Front Range road network. Each road carries a name + viewBox path that
    //    threads cities + a few interpolated bends to feel less polygonal. Drawn
    //    twice (outline + lighter inner) for a vector-tile highway look.
    const pt = (city) => [projX(cityByName[city].lng), projY(cityByName[city].lat)];
    const path = (segs) => 'M ' + segs.map((s, i) => i === 0 ? `${s[0]} ${s[1]}` : `L ${s[0]} ${s[1]}`).join(' ');
    const curvePath = (segs) => 'M ' + segs[0].join(' ') + ' ' + segs.slice(1).map((p, i) => {
      const prev = segs[i];
      const cx = (prev[0] + p[0]) / 2;
      const cy = (prev[1] + p[1]) / 2;
      return `Q ${cx} ${cy} ${p[0]} ${p[1]}`;
    }).join(' ');
    const ROADS = [
      // I-25 vertical spine
      { name: 'I-25', cls: 'highway', d: path([pt('Castle Rock'), [projX(-104.93), projY(39.50)], pt('Denver'), pt('Commerce City'), pt('Brighton'), [projX(-104.78), projY(40.30)]]) },
      // I-70 east — Denver → Aurora → Bennett → off-map east
      { name: 'I-70 E', cls: 'highway', d: path([pt('Denver'), pt('Aurora'), pt('Bennett'), [projX(-104.30), projY(39.74)]]) },
      // I-70 west / US-40 into foothills, then up to Winter Park & Granby
      { name: 'I-70 W', cls: 'highway', d: curvePath([pt('Denver'), pt('Golden'), [projX(-105.45), projY(39.70)], pt('Idaho Springs'), [projX(-105.65), projY(39.78)], pt('Winter Park'), pt('Granby')]) },
      // US-36 NW: Denver → Westminster → Boulder
      { name: 'US-36', cls: 'arterial', d: path([pt('Denver'), pt('Westminster'), pt('Boulder')]) },
      // E-470 outer ring (approximate arc around metro east)
      { name: 'E-470', cls: 'arterial', d: curvePath([[projX(-104.70), projY(39.50)], [projX(-104.65), projY(39.74)], [projX(-104.70), projY(40.00)], [projX(-104.85), projY(40.10)]]) },
      // C-470 west ring
      { name: 'C-470', cls: 'arterial', d: curvePath([[projX(-105.18), projY(39.55)], [projX(-105.12), projY(39.65)], pt('Lakewood'), [projX(-105.10), projY(39.80)]]) },
      // US-285 SW
      { name: 'US-285', cls: 'arterial', d: path([pt('Denver'), [projX(-105.10), projY(39.62)], [projX(-105.30), projY(39.55)]]) },
    ];
    // Smaller local-road web — tiny, very dim. Adds the "vector tile" busyness.
    const LOCAL_ROADS = [
      `M ${projX(-104.95)} ${projY(39.78)} L ${projX(-104.83)} ${projY(39.80)}`,
      `M ${projX(-105.05)} ${projY(39.70)} L ${projX(-104.95)} ${projY(39.66)}`,
      `M ${projX(-104.90)} ${projY(39.93)} L ${projX(-104.80)} ${projY(39.95)}`,
      `M ${projX(-105.15)} ${projY(39.90)} L ${projX(-105.05)} ${projY(39.85)}`,
      `M ${projX(-104.65)} ${projY(39.78)} L ${projX(-104.55)} ${projY(39.76)}`,
      `M ${projX(-105.25)} ${projY(39.78)} L ${projX(-105.18)} ${projY(39.74)}`,
    ];

    // -- Per-project pickup/dump preset (deterministic so map doesn't reshuffle).
    // v16 project ids — RR keeps its needs-import route; RG/GE both export
    // (HAS) so pickup is at-or-near the project site and dump trends
    // outbound to nearby commercial waste/transfer destinations. Arvada
    // isn't in the CITIES gazetteer so GE uses Denver→Westminster (closest
    // pair flanking Arvada along US-36 / W 68th Pl).
    const ROUTE_PRESETS = {
      'RR': { pickup: 'Denver', dump: 'Commerce City' }, // 5800 Federal — needs CF brought in
      'RG': { pickup: 'Golden', dump: 'Lakewood'      }, // 1105 Rogers — has CF to send out
      'GE': { pickup: 'Denver', dump: 'Westminster'   }, // Geos — has CF to send out (Arvada area)
    };
    const FALLBACK_PRESET = { pickup: 'Denver', dump: 'Aurora' };
    const distMiles = (a, b) => {
      const dx = (a.lng - b.lng) * 53;
      const dy = (a.lat - b.lat) * 69;
      return Math.sqrt(dx * dx + dy * dy);
    };
    const estDriveMin = (miles) => Math.max(5, Math.round((miles / 35) * 60));

    const allHauls = [...active, ...upcoming, ...completed];
    const enrichedRoutes = allHauls.map(p => {
      const preset = ROUTE_PRESETS[p.id] || FALLBACK_PRESET;
      const pk = cityByName[preset.pickup] || cityByName['Denver'];
      const dp = cityByName[preset.dump]   || cityByName['Aurora'];
      const miles = distMiles(pk, dp);
      const minutes = estDriveMin(miles);
      const routeStatus = p.status === 'completed' ? 'completed'
        : p.status === 'upcoming' ? 'upcoming'
        : (p.healthStatus === 'critical' || p.healthStatus === 'atrisk') ? 'delayed'
        : 'active';
      const cyPerDay = p.loadsCompleted > 0 ? Math.max(40, p.loadsCompleted * 12) : 0;
      const roundTrip = minutes * 2 + 8; // +8 min for load/unload
      const loadsPerDay = roundTrip > 0 ? Math.max(1, Math.floor((9 * 60) / roundTrip) * Math.max(1, p.trucksActive)) : 0;
      return {
        id: p.id,
        name: p.name,
        materialType: p.materialType,
        trucksActive: p.trucksActive,
        trucksAssigned: p.trucksAssigned,
        loadsCompleted: p.loadsCompleted,
        loadsTarget: p.loadsTarget,
        estimatedCompletion: p.estimatedCompletion,
        cyPerDay,
        loadsPerDay,
        pickupAddress: preset.pickup,
        dumpAddress: preset.dump,
        pickupLat: pk.lat, pickupLng: pk.lng,
        dumpLat: dp.lat,   dumpLng: dp.lng,
        estimatedDriveMinutes: minutes,
        roundTripMinutes: roundTrip,
        routeDistanceMiles: parseFloat(miles.toFixed(1)),
        routeStatus,
        pickupX: projX(pk.lng), pickupY: projY(pk.lat),
        dumpX:   projX(dp.lng), dumpY:   projY(dp.lat),
      };
    });

    // -- Filter + hover + pinned + drawer state.
    const [filters, setFilters] = useState({ active: true, upcoming: true, delayed: true, completed: false });
    const [hover, setHover] = useState(null);
    const [pinned, setPinned] = useState(null);
    const [drawerOpen, setDrawerOpen] = useState(false);
    const containerRef = useRef(null);
    const visible = enrichedRoutes.filter(r => filters[r.routeStatus]);
    const counts = {
      active:    enrichedRoutes.filter(r => r.routeStatus === 'active').length,
      upcoming:  enrichedRoutes.filter(r => r.routeStatus === 'upcoming').length,
      delayed:   enrichedRoutes.filter(r => r.routeStatus === 'delayed').length,
      completed: enrichedRoutes.filter(r => r.routeStatus === 'completed').length,
    };

    // -- Cluster nearby pickups so dense metros don't overwhelm the visual.
    //    Same-city pickups (>1 route) collapse to a single marker with a count.
    const pickupClusters = (() => {
      const groups = new Map();
      visible.forEach(r => {
        const key = r.pickupAddress;
        if (!groups.has(key)) groups.set(key, { city: key, x: r.pickupX, y: r.pickupY, members: [] });
        groups.get(key).members.push(r);
      });
      return Array.from(groups.values());
    })();

    // -- Route geometry: quadratic Bezier with a deterministic perpendicular
    //    offset per route id so multiple hauls between the same cities fan out.
    const routePath = (r) => {
      const mx = (r.pickupX + r.dumpX) / 2;
      const my = (r.pickupY + r.dumpY) / 2;
      const dx = r.dumpX - r.pickupX;
      const dy = r.dumpY - r.pickupY;
      const len = Math.max(1, Math.sqrt(dx * dx + dy * dy));
      const px = -dy / len, py = dx / len;
      const seed = (r.id || '').split('').reduce((s, c) => s + c.charCodeAt(0), 0);
      const offset = 24 + ((seed * 7) % 30) * ((seed % 2 === 0) ? 1 : -1);
      return `M ${r.pickupX} ${r.pickupY} Q ${mx + px * offset} ${my + py * offset} ${r.dumpX} ${r.dumpY}`;
    };
    const routeColor = (s) => s === 'completed' ? C.inkDim
      : s === 'upcoming'  ? C.info
      : s === 'delayed'   ? (C.danger || C.warn)
      : C.accent;

    // -- Status chip + icon row.
    const STATUS_ICONS = {
      active: (
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M3 7h11l3 5h4v5h-2a3 3 0 1 1-6 0H10a3 3 0 1 1-6 0H3z" />
        </svg>
      ),
      upcoming: (
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" />
        </svg>
      ),
      delayed: (
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M12 3l10 18H2z" /><path d="M12 10v5" />
        </svg>
      ),
      completed: (
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M4 12l5 5L20 6" />
        </svg>
      ),
    };
    const STATUS_DEF = {
      active:    { label: 'Active',    color: C.accent },
      upcoming:  { label: 'Upcoming',  color: C.info },
      delayed:   { label: 'Delayed',   color: C.danger || C.warn },
      completed: { label: 'Completed', color: C.inkDim },
    };
    const StatusChip = ({ k }) => {
      const on = filters[k];
      const def = STATUS_DEF[k];
      return (
        <button
          onClick={() => setFilters(prev => ({ ...prev, [k]: !prev[k] }))}
          style={{
            ...T.caption,
            display: 'inline-flex', alignItems: 'center', gap: 6,
            background: on ? (def.color === C.inkDim ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.6)') : 'transparent',
            color: on ? def.color : C.inkDim,
            border: `1px solid ${on ? def.color : C.rule}`,
            boxShadow: on ? `0 0 0 1px rgba(0,0,0,0.4), 0 0 14px -4px ${def.color}` : 'none',
            borderRadius: R.pill, padding: '4px 10px', fontWeight: 700, cursor: 'pointer',
            fontFamily: F.mono, letterSpacing: 0.4, textTransform: 'uppercase',
          }}
        >
          <span style={{ color: def.color, display: 'inline-flex' }}>{STATUS_ICONS[k]}</span>
          {def.label}
          <span style={{ color: C.inkFaint, fontFamily: F.mono }}>{counts[k]}</span>
        </button>
      );
    };

    // -- Drawer metrics summarize the currently-visible routes.
    const visibleActive = visible.filter(r => r.routeStatus === 'active');
    const drawerStats = {
      cyToday: visibleActive.reduce((s, r) => s + (r.cyPerDay || 0), 0),
      trucksLive: visibleActive.reduce((s, r) => s + r.trucksActive, 0),
      avgCycle: (() => {
        const vals = visibleActive.map(r => r.roundTripMinutes).filter(Boolean);
        return vals.length ? Math.round(vals.reduce((s, v) => s + v, 0) / vals.length) : 0;
      })(),
      atRisk: visible.filter(r => r.routeStatus === 'delayed').length,
      upcomingCount: visible.filter(r => r.routeStatus === 'upcoming').length,
    };
    const MetricBlock = ({ label, value, tone = C.ink }) => (
      <div style={{ padding: `${S[2]}px ${S[3]}px`, borderBottom: `1px solid ${C.rule}` }}>
        <div style={{ ...T.caption, color: C.inkFaint, letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 2 }}>{label}</div>
        <div style={{ ...T.body, fontFamily: F.mono, fontWeight: 700, color: tone }}>{value}</div>
      </div>
    );

    const onRouteEnter = (route) => (e) => {
      const rect = containerRef.current && containerRef.current.getBoundingClientRect();
      if (!rect) return;
      setHover({ route, x: e.clientX - rect.left, y: e.clientY - rect.top });
    };
    const onRouteMove = (e) => {
      if (!hover) return;
      const rect = containerRef.current && containerRef.current.getBoundingClientRect();
      if (!rect) return;
      setHover(h => h && ({ ...h, x: e.clientX - rect.left, y: e.clientY - rect.top }));
    };
    const onRouteLeave = () => setHover(null);
    const onRouteClick = (route) => (e) => { e.stopPropagation(); setPinned(route); };
    const onMapBgClick = () => { setPinned(null); };

    const liveTrucksOnMap = visibleActive.reduce((s, r) => s + r.trucksActive, 0);
    const hoverDim = hover ? hover.route.id : null;
    const pinnedDim = pinned ? pinned.id : null;
    const focusId = hoverDim || pinnedDim;

    return (
      <Card padding={0} style={{ overflow: 'hidden' }}>
        {/* === Header — title + status chip rail === */}
        <div style={{ padding: `${S[3]}px ${S[4]}px`, borderBottom: `1px solid ${C.rule}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: S[3], flexWrap: 'wrap' }}>
          <div>
            <Label color={C.accent}>Live operations map</Label>
            <div style={{ ...T.bodySm, color: C.ink, fontWeight: 600 }}>
              {liveTrucksOnMap} truck{liveTrucksOnMap === 1 ? '' : 's'} live · {visible.length} route{visible.length === 1 ? '' : 's'} · Front Range
            </div>
          </div>
          <div className="lom-filters" style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
            <StatusChip k="active" />
            <StatusChip k="upcoming" />
            <StatusChip k="delayed" />
            <StatusChip k="completed" />
            <button
              onClick={() => setDrawerOpen(v => !v)}
              title="Toggle metrics drawer"
              style={{
                ...T.caption, fontFamily: F.mono, letterSpacing: 0.4, textTransform: 'uppercase',
                background: drawerOpen ? 'rgba(0,0,0,0.6)' : 'transparent',
                color: drawerOpen ? C.accent : C.inkDim,
                border: `1px solid ${drawerOpen ? C.accent : C.rule}`,
                borderRadius: R.pill, padding: '4px 10px', fontWeight: 700, cursor: 'pointer',
                display: 'inline-flex', alignItems: 'center', gap: 6,
                boxShadow: drawerOpen ? `0 0 14px -4px ${C.accent}` : 'none',
              }}
            >
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M4 6h16M4 12h10M4 18h16" /></svg>
              Metrics
            </button>
          </div>
        </div>

        {/* === Map stage === */}
        <div
          ref={containerRef}
          onMouseMove={onRouteMove}
          onClick={onMapBgClick}
          style={{
            position: 'relative',
            background: '#070A0B',
          }}
        >
          <svg viewBox={`0 0 ${VIEW.w} ${VIEW.h}`} width="100%" style={{ display: 'block', maxHeight: 440 }} aria-label="Front Range dispatch map (mock)">
            <defs>
              {/* Tactical grid — very faint, sparse */}
              <pattern id="lomGridV2" width="80" height="80" patternUnits="userSpaceOnUse">
                <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#10171A" strokeWidth="0.7" />
              </pattern>
              {/* Terrain: foothills wash (W) + plains wash (E) */}
              <radialGradient id="lomTerrainWv2" cx="14%" cy="38%" r="38%">
                <stop offset="0%"   stopColor="#13241B" stopOpacity="0.95" />
                <stop offset="100%" stopColor="#13241B" stopOpacity="0" />
              </radialGradient>
              <radialGradient id="lomTerrainEv2" cx="82%" cy="58%" r="40%">
                <stop offset="0%"   stopColor="#10182A" stopOpacity="0.85" />
                <stop offset="100%" stopColor="#10182A" stopOpacity="0" />
              </radialGradient>
              {/* Edge vignette */}
              <radialGradient id="lomVignette" cx="50%" cy="50%" r="68%">
                <stop offset="60%"  stopColor="#000" stopOpacity="0" />
                <stop offset="100%" stopColor="#000" stopOpacity="0.55" />
              </radialGradient>
              <filter id="lomRouteGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.8" result="b" />
                <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
              <filter id="lomPickGlow" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur stdDeviation="1.6" result="b" />
                <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>

            {/* Background fills */}
            <rect width={VIEW.w} height={VIEW.h} fill="#070A0B" />
            <rect width={VIEW.w} height={VIEW.h} fill="url(#lomTerrainWv2)" />
            <rect width={VIEW.w} height={VIEW.h} fill="url(#lomTerrainEv2)" />
            <rect width={VIEW.w} height={VIEW.h} fill="url(#lomGridV2)" />

            {/* Foothills relief — west-side hatch */}
            <g opacity="0.18" stroke="#1F3A2C" strokeWidth="0.6" fill="none">
              {Array.from({ length: 8 }).map((_, i) => (
                <path key={'rl-' + i} d={`M ${10 + i * 12} 30 Q ${30 + i * 12} ${80 + (i % 3) * 30} ${20 + i * 14} 200`} />
              ))}
            </g>

            {/* Local road web */}
            <g opacity="0.4" stroke="#1B2125" strokeWidth="0.7" fill="none">
              {LOCAL_ROADS.map((d, i) => <path key={'lr-' + i} d={d} />)}
            </g>

            {/* Highways — outline + lighter inner stripe */}
            {ROADS.map((rd, i) => (
              <g key={'rd-' + i}>
                <path d={rd.d} fill="none" stroke="#0F1417" strokeWidth={rd.cls === 'highway' ? 6 : 4} strokeLinecap="round" strokeLinejoin="round" />
                <path d={rd.d} fill="none" stroke={rd.cls === 'highway' ? '#2E3942' : '#222B31'} strokeWidth={rd.cls === 'highway' ? 3 : 2} strokeLinecap="round" strokeLinejoin="round" />
              </g>
            ))}

            {/* Highway shields — small label tags near route midpoints */}
            <g pointerEvents="none">
              {ROADS.map((rd, i) => {
                // Pick a label anchor along the path: roughly the middle of each road
                const anchors = {
                  'I-25':   [projX(-104.96), projY(39.82)],
                  'I-70 E': [projX(-104.55), projY(39.74)],
                  'I-70 W': [projX(-105.55), projY(39.78)],
                  'US-36':  [projX(-105.15), projY(39.92)],
                  'E-470':  [projX(-104.66), projY(39.86)],
                  'C-470':  [projX(-105.12), projY(39.70)],
                  'US-285': [projX(-105.20), projY(39.58)],
                }[rd.name] || null;
                if (!anchors) return null;
                return (
                  <g key={'sh-' + i} transform={`translate(${anchors[0]} ${anchors[1]})`} opacity="0.55">
                    <rect x={-16} y={-7} width={32} height={14} rx={2} fill="#10181F" stroke="#2E3942" strokeWidth="0.6" />
                    <text x="0" y="3.5" textAnchor="middle" style={{ fontFamily: F.mono, fontSize: 8, fontWeight: 700 }} fill="#7A8893">{rd.name}</text>
                  </g>
                );
              })}
            </g>

            {/* City layer — tier-weighted */}
            <g pointerEvents="none">
              {CITIES.map(c => {
                const x = projX(c.lng), y = projY(c.lat);
                const r = c.tier === 1 ? 2.2 : c.tier === 2 ? 1.6 : 1.2;
                const fs = c.tier === 1 ? 11 : c.tier === 2 ? 9 : 8.5;
                const op = c.tier === 1 ? 0.85 : c.tier === 2 ? 0.65 : 0.55;
                const fw = c.tier === 1 ? 700 : 500;
                return (
                  <g key={'city-' + c.name}>
                    <circle cx={x} cy={y} r={r} fill="#5C6770" opacity={op} />
                    <text x={x + 6} y={y - 5} style={{ fontFamily: F.display, fontSize: fs, fontWeight: fw, letterSpacing: 0.3 }} fill="#7A8893" opacity={op}>{c.name}</text>
                  </g>
                );
              })}
            </g>

            {/* RouteLayer */}
            {visible.map(r => {
              const color = routeColor(r.routeStatus);
              const isActive = r.routeStatus === 'active';
              const d = routePath(r);
              const pathId = 'route-v2-' + r.id;
              const midX = (r.pickupX + r.dumpX) / 2;
              const midY = (r.pickupY + r.dumpY) / 2 - 16;
              const dim = focusId && focusId !== r.id ? 0.28 : 1;
              return (
                <g
                  key={'rt-' + r.id}
                  onMouseEnter={onRouteEnter(r)}
                  onMouseLeave={onRouteLeave}
                  onClick={onRouteClick(r)}
                  style={{ cursor: 'pointer', opacity: dim, transition: 'opacity 180ms ease' }}
                >
                  {/* Wide transparent hit target keeps hover stable */}
                  <path d={d} fill="none" stroke="transparent" strokeWidth="18" />
                  {/* Glow underlay */}
                  {isActive && (
                    <path d={d} fill="none" stroke={color} strokeWidth="6.5" strokeLinecap="round" opacity="0.28" filter="url(#lomRouteGlow)" />
                  )}
                  {/* Animated dashed flow on active routes — moves toward the dump */}
                  {isActive && (
                    <path d={d} fill="none" stroke={color} strokeWidth="2.4" strokeLinecap="round" strokeDasharray="6 8">
                      <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.9s" repeatCount="indefinite" />
                    </path>
                  )}
                  {/* Solid stroke for non-active */}
                  {!isActive && (
                    <path d={d} fill="none" stroke={color}
                      strokeWidth={r.routeStatus === 'delayed' ? 2.2 : 1.8}
                      strokeLinecap="round"
                      strokeDasharray={r.routeStatus === 'upcoming' ? '6 5' : r.routeStatus === 'completed' ? '2 7' : 'none'}
                      opacity={r.routeStatus === 'completed' ? 0.4 : 0.85}
                    />
                  )}
                  {/* TruckMarker — directional arrow rides the route */}
                  {isActive && r.trucksActive > 0 && (
                    <g>
                      <circle r="6" fill={color} opacity="0.22">
                        <animateMotion dur={`${Math.max(7, r.estimatedDriveMinutes / 2.2)}s`} repeatCount="indefinite" rotate="auto">
                          <mpath href={`#${pathId}-track`} />
                        </animateMotion>
                      </circle>
                      <g>
                        <animateMotion dur={`${Math.max(7, r.estimatedDriveMinutes / 2.2)}s`} repeatCount="indefinite" rotate="auto">
                          <mpath href={`#${pathId}-track`} />
                        </animateMotion>
                        <path d="M -3 -2 L 4 0 L -3 2 Z" fill={color} stroke={C.bg} strokeWidth="0.6" />
                      </g>
                    </g>
                  )}
                  {/* Hidden carrier path for animateMotion */}
                  <path id={`${pathId}-track`} d={d} fill="none" stroke="none" />
                  {/* Route label, larger + cleaner than v1 */}
                  <g pointerEvents="none">
                    <rect x={midX - 70} y={midY - 11} width={140} height={26} rx={4} fill="#080C0E" opacity="0.7" />
                    <text x={midX} y={midY + 1} textAnchor="middle" style={{ fontFamily: F.display, fontSize: 11, fontWeight: 700, letterSpacing: 0.3 }} fill={C.ink}>
                      {r.pickupAddress} → {r.dumpAddress}
                    </text>
                    <text x={midX} y={midY + 13} textAnchor="middle" style={{ fontFamily: F.mono, fontSize: 9, letterSpacing: 0.3 }} fill={color}>
                      {r.estimatedDriveMinutes}min · {r.routeDistanceMiles}mi
                    </text>
                  </g>
                </g>
              );
            })}

            {/* PickupMarker (clustered) — single marker per city, count badge if >1 */}
            {pickupClusters.map(cl => {
              const r = cl.members[0];
              const status = cl.members.some(m => m.routeStatus === 'active') ? 'active'
                : cl.members.some(m => m.routeStatus === 'delayed') ? 'delayed'
                : cl.members.some(m => m.routeStatus === 'upcoming') ? 'upcoming'
                : 'completed';
              const color = routeColor(status);
              const isActive = status === 'active';
              return (
                <g key={'pk-' + cl.city} pointerEvents="none" filter="url(#lomPickGlow)">
                  {isActive && (
                    <circle cx={cl.x} cy={cl.y} r="10" fill={color} opacity="0.22">
