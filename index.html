                border: `1px solid ${active ? C.accent : C.ruleHi}`,
                borderRadius: R.pill,
                padding: '6px 14px',
                fontFamily: F.display, fontSize: 13, fontWeight: 600,
                cursor: 'pointer', letterSpacing: -0.2,
              }}
            >{p.label}</button>
          );
        })}
      </div>
      {/* Mobile select */}
      <div className="jse-rangepicker-select">
        <select
          value={preset}
          onChange={e => setPreset(e.target.value)}
          style={{
            ...inputStyle, width: '100%', fontFamily: F.display, fontWeight: 600, fontSize: 14, padding: '10px 12px',
          }}
        >
          {RANGE_PRESETS.map(p => <option key={p.key} value={p.key}>{p.label}</option>)}
        </select>
      </div>
      {preset === 'custom' && (
        <div style={{ display: 'flex', gap: S[2], flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ ...T.monoSm, color: C.inkDim }}>From</span>
          <input type="date" value={customStart} max={customEnd || TODAY_ISO} onChange={e => setCustomStart(e.target.value)} style={inputStyle} />
          <span style={{ ...T.monoSm, color: C.inkDim }}>to</span>
          <input type="date" value={customEnd} min={customStart} max={TODAY_ISO} onChange={e => setCustomEnd(e.target.value)} style={inputStyle} />
        </div>
      )}
    </div>
  );
}

function AdminReports({ db, navigate }) {
  const [sort, setSort] = useState({ key: 'name', dir: 'asc' });
  const [preset, setPreset] = useState('today');
  const [customStart, setCustomStart] = useState(isoDaysAgo(6));
  const [customEnd, setCustomEnd] = useState(TODAY_ISO);
  const { startIso, endIso } = rangeFromPreset(preset, customStart, customEnd);

  // Pulse the KPI row when another browser tab pushes new data into our db.
  const remoteNonce = useContext(RemoteUpdateContext);
  const [flashing, setFlashing] = useState(false);
  useEffect(() => {
    if (remoteNonce === 0) return;
    setFlashing(true);
    const id = setTimeout(() => setFlashing(false), 1200);
    return () => clearTimeout(id);
  }, [remoteNonce]);

  // ----- KPIs -----
  const activeProjects = db.projects.filter(p => p.status === 'active');
  const openShifts = db.hours.filter(h => h.status === 'open');
  const onShiftNow = openShifts.length;
  const distinctHaulersOnShift = new Set(
    openShifts.map(h => {
      const t = db.trucks.find(t => t.id === h.truckId);
      return t ? t.haulerId : null;
    }).filter(Boolean)
  ).size;

  // Range-scoped loads + hours. All KPIs, tables, sparklines pull from these.
  const loadsInRange = db.loads.filter(l => l.date && isInRange(l.date, startIso, endIso));
  const hoursInRange = db.hours.filter(h => h.date && isInRange(h.date, startIso, endIso));
  const loadsCount = loadsInRange.length;
  const hoursTotal = hoursInRange.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);

  // For the delta sub-line, compare to the prior window of the same length.
  // (For "Today" preset this is yesterday — same behavior as before.)
  const rangeDays = (() => {
    const [y1,m1,d1] = startIso.split('-').map(Number);
    const [y2,m2,d2] = endIso.split('-').map(Number);
    const a = Date.UTC(y1, m1-1, d1);
    const b = Date.UTC(y2, m2-1, d2);
    return Math.round((b - a) / 86400000) + 1;
  })();
  const priorEndIso = (() => {
    const [y,m,d] = startIso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m-1, d));
    dt.setUTCDate(dt.getUTCDate() - 1);
    return dt.toISOString().slice(0, 10);
  })();
  const priorStartIso = (() => {
    const [y,m,d] = priorEndIso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m-1, d));
    dt.setUTCDate(dt.getUTCDate() - (rangeDays - 1));
    return dt.toISOString().slice(0, 10);
  })();
  const priorLoadsCount = db.loads.filter(l => l.date && isInRange(l.date, priorStartIso, priorEndIso)).length;
  const priorHoursTotal = db.hours
    .filter(h => h.date && isInRange(h.date, priorStartIso, priorEndIso))
    .reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);

  let deltaPct = null;
  let deltaDir = null;
  if (priorLoadsCount > 0) {
    const diff = loadsCount - priorLoadsCount;
    deltaPct = Math.round(Math.abs(diff / priorLoadsCount) * 100);
    deltaDir = diff >= 0 ? 'up' : 'down';
  }

  // Convenience flags + labels for UI strings that read "yesterday" vs "prior window".
  const isTodayPreset = preset === 'today';
  const priorLabel = isTodayPreset
    ? 'yesterday'
    : `prior ${rangeDays} day${rangeDays === 1 ? '' : 's'}`;

  // ----- Per-day buckets for sparklines + bar chart (always last 7 days for the chart) -----
  const last7Days = Array.from({ length: 7 }, (_, i) => isoDaysAgo(6 - i)); // oldest → newest
  const loadsPerDay7 = last7Days.map(iso => ({
    iso,
    count: db.loads.filter(l => l.date === iso).length,
  }));
  const hoursPerDay7 = last7Days.map(iso =>
    db.hours.filter(h => h.date === iso).reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0)
  );
  const shiftsPerDay7 = last7Days.map(iso =>
    db.hours.filter(h => h.date === iso).length
  );

  // ----- Project status rows (range-scoped) -----
  const projectRows = db.projects.map(p => {
    const ops = db.haulers.filter(o => o.projectIds.includes(p.id));
    const trucks = db.trucks.filter(t => t.projectId === p.id);
    const pLoadsInRange = db.loads.filter(l => l.projectId === p.id && l.date && isInRange(l.date, startIso, endIso));
    const pLoadsPrior = db.loads.filter(l => l.projectId === p.id && l.date && isInRange(l.date, priorStartIso, priorEndIso)).length;
    // "Last load" — last entry within the range. For multi-day ranges the latest
    // load may be on any day inside the range; prefer the latest ISO date, then latest time.
    const lastLoad = pLoadsInRange.reduce((best, l) => {
      if (!best) return l;
      if (l.date > best.date) return l;
      if (l.date === best.date && l.time > best.time) return l;
      return best;
    }, null);
    const avgPerDay = rangeDays > 0 ? +(pLoadsInRange.length / rangeDays).toFixed(1) : 0;
    return {
      id: p.id,
      name: p.name,
      status: p.status || 'active',
      haulers: ops.length,
      trucks: trucks.length,
      loadsInRange: pLoadsInRange.length,
      loadsPrior: pLoadsPrior,
      avgPerDay,
      lastTime: lastLoad ? (rangeDays === 1 ? lastLoad.time : `${isoToShortDate(lastLoad.date)} ${lastLoad.time}`) : '—',
    };
  });

  const statusOrder = { active: 0, upcoming: 1, completed: 2 };
  const sortedRows = [...projectRows].sort((a, b) => {
    const va = a[sort.key];
    const vb = b[sort.key];
    let cmp;
    if (sort.key === 'status') cmp = (statusOrder[a.status] ?? 99) - (statusOrder[b.status] ?? 99);
    else if (va == null && vb == null) cmp = 0;
    else if (va == null) cmp = -1;
    else if (vb == null) cmp = 1;
    else if (typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb));
    return sort.dir === 'asc' ? cmp : -cmp;
  });

  const setSortKey = (k) => {
    setSort(s => s.key === k ? { ...s, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { key: k, dir: 'asc' });
  };

  // Custom sortable header (Th doesn't accept onClick/style props)
  const SortTh = ({ label, k, align = 'left' }) => {
    const active = sort.key === k;
    const arrow = active ? (sort.dir === 'asc' ? ' â–²' : ' â–¼') : '';
    return (
      <th onClick={() => setSortKey(k)} style={{
        textAlign: align, padding: '10px 14px', borderBottom: `1px solid ${C.rule}`,
        fontFamily: F.mono, fontSize: 10, fontWeight: 600,
        color: active ? C.accent : C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase',
        whiteSpace: 'nowrap', cursor: 'pointer', userSelect: 'none',
      }}>{label}{arrow}</th>
    );
  };

  const statusColor = {
    active:    { color: C.accent, soft: C.accentSoft, label: 'Active' },
    upcoming:  { color: C.info,   soft: C.infoSoft,   label: 'Upcoming' },
    completed: { color: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: 'Completed' },
  };

  // ----- Hauler productivity (range-scoped) -----
  const haulerRows = db.haulers.map(op => {
    const opTrucks = db.trucks.filter(t => t.haulerId === op.id);
    const opTruckIds = new Set(opTrucks.map(t => t.id));
    const ldsInRange = db.loads.filter(l => l.date && isInRange(l.date, startIso, endIso) && opTruckIds.has(l.truckId)).length;
    const hrsInRange = db.hours
      .filter(h => h.date && isInRange(h.date, startIso, endIso) && opTruckIds.has(h.truckId))
      .reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
    const activeProjs = op.projectIds.filter(pid => {
      const p = db.projects.find(p => p.id === pid);
      return p && p.status === 'active';
    }).length;
    return { id: op.id, name: op.name, loadsInRange: ldsInRange, hoursInRange: hrsInRange, activeProjects: activeProjs };
  })
    .sort((a, b) => b.loadsInRange - a.loadsInRange || b.hoursInRange - a.hoursInRange)
    .slice(0, 10);

  // ----- Truck utilization (range-scoped) -----
  const truckRows = db.trucks.map(t => {
    const ldsInRange = db.loads.filter(l => l.date && isInRange(l.date, startIso, endIso) && l.truckId === t.id).length;
    const driver = db.drivers.find(d => d.id === t.driverId);
    const project = db.projects.find(p => p.id === t.projectId);
    const inService = db.hours.some(h => h.truckId === t.id && h.status === 'open');
    return {
      id: t.id,
      plate: t.plate,
      type: t.type,
      loadsInRange: ldsInRange,
      driverName: driver ? driver.name : '—',
      projectName: project ? project.name : '—',
      status: inService ? 'inservice' : 'idle',
    };
  }).sort((a, b) => b.loadsInRange - a.loadsInRange || String(a.plate).localeCompare(String(b.plate)));

  // ----- Top-level empty state: no projects -----
  if (db.projects.length === 0) {
    return (
      <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
        <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Reports' }]} navigate={navigate} />
        <EmptyState
          icon={<ProjectIcon size={40} />}
          title="No hauls yet"
          body="Create one to start generating activity reports."
          action={<Btn variant="primary" onClick={() => navigate('/admin/new')}>+ New haul</Btn>}
        />
      </div>
    );
  }

  const deltaColor = deltaDir === 'down' ? C.warn : C.ok;
  const deltaArrow = deltaDir === 'up' ? '▲' : '▼';

  // Range label for headlines + table headers (e.g. "Today", "Last 7 days").
  const presetMeta = RANGE_PRESETS.find(p => p.key === preset);
  const rangeLabel = preset === 'custom'
    ? `${isoToShortDate(startIso)} – ${isoToShortDate(endIso)}`
    : (presetMeta ? presetMeta.label : 'Range');
  const loadsColLabel = isTodayPreset
    ? 'Loads today'
    : (preset === 'yesterday' ? 'Loads yesterday' : 'Loads in range');
  const priorColLabel = isTodayPreset
    ? 'Loads yesterday'
    : `Avg/day`;

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Reports' }]} navigate={navigate} />

      <div style={{ marginBottom: S[4], display: 'flex', flexDirection: 'column', gap: S[3] }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Live activity</Label>
          <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>Reports</h1>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>
            Activity across hauls, haulers, and trucks. Numbers update live as drivers log hours and loads.
          </div>
        </div>

        {/* Date range picker */}
        <Card padding={S[3]} style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: S[3], flexWrap: 'wrap' }}>
            <Label>Date range</Label>
            <span style={{ ...T.monoSm, color: C.inkDim }}>
              {isoToShortDate(startIso)}{startIso !== endIso ? ` – ${isoToShortDate(endIso)}` : ''} · {rangeDays} {rangeDays === 1 ? 'day' : 'days'}
            </span>
          </div>
          <DateRangePicker
            preset={preset} setPreset={setPreset}
            customStart={customStart} setCustomStart={setCustomStart}
            customEnd={customEnd} setCustomEnd={setCustomEnd}
          />
        </Card>
      </div>

      {/* A. Headline KPI row with sparklines */}
      <div className={flashing ? 'jse-pulse' : undefined} style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[4] }}>
        <Card padding={S[4]}>
          <Stat
            label="Active hauls"
            value={activeProjects.length}
            sub={`total ${db.projects.length}`}

        </Card>
        <Card padding={S[4]}>

          />
          <div style={{ marginTop: S[2] }}>
            <Sparkline data={shiftsPerDay7} color={C.info} />
          </div>
        </Card>
        <Card padding={S[4]}>
          <Stat
            label={isTodayPreset ? 'Loads today' : `Loads (${rangeLabel.toLowerCase()})`}
            value={loadsCount}

          />
          <div style={{ marginTop: S[2] }}>

      {/* B. Daily activity summary */}

        ) : (

      {/* B2. 7-day bar chart */}

function AdminHaulRequests({ db, setDb, navigate }) {
  const [filter, setFilter] = useState('all'); // all | pending | matched | accepted | completed
  const requests = db.haulRequests || [];
  const counts = {
    all: requests.length,
    pending: requests.filter(r => r.status === 'pending').length,
    matched: requests.filter(r => r.status === 'matched').length,
    accepted: requests.filter(r => r.status === 'accepted').length,
    completed: requests.filter(r => r.status === 'completed').length,

  const Tab = ({ k, label }) => {
    const active = filter === k;
    return (
      <button onClick={() => setFilter(k)} style={{
        ...T.bodySm, background: active ? C.accent : 'transparent',

        border: `1px solid ${active ? C.accent : C.ruleHi}`,
        borderRadius: R.pill, padding: '6px 14px', fontWeight: 600, cursor: 'pointer',

    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>

      <div style={{ marginBottom: S[5] }}>

        <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>Match incoming requests to available haulers.</div>
      </div>
      <div style={{ display: 'flex', gap: S[2], flexWrap: 'wrap', marginBottom: S[4] }}>
        <Tab k="all" label="All" />
        <Tab k="pending" label="Pending" />
        <Tab k="matched" label="Matched" />
        <Tab k="accepted" label="Accepted" />
        <Tab k="completed" label="Completed" />

      <Card padding={0}>
        {visible.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[6], textAlign: 'center', color: C.inkDim}}>
            No {filter === 'all' ? '' : filter + ' '}requests.

          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr>
                <Th>Request ID</Th>
                <Th>Haul</Th>
                <Th>Material</Th>
                <Th align="right">Volume</Th>
                <Th>Requested</Th>
                <Th>Status</Th>
                <Th align="right">Action</Th>
              </tr>
            </thead>
            <tbody>
              {visible.map(req => {
                const project = db.projects.find(p => p.id === req.projectId);
                const material = MATERIALS.find(m => m.code === req.materialCode);
                const hauler = req.matchedHaulerId ? db.haulers.find(o => o.id === req.matchedHaulerId) : null;
                const truck  = req.matchedTruckId  ? db.trucks.find(t => t.id === req.matchedTruckId) : null;
                return (
                  <Tr key={req.id} onClick={() => navigate(`/admin/requests/${req.id}`)}>
                    <Td mono><span style={{ color: C.accent }}>{req.id}</span></Td>
                    <Td>{project ? project.name : '—'}</Td>
                    <Td>{material ? material.label : req.materialCode}</Td>
                    <Td align="right" mono><span style={{ color: C.accent, fontWeight: 700 }}>{req.volumeCY} CY</span></Td>
                    <Td mono dim>{req.requestedAt}</Td>
                    <Td>
                      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                        <StatusPill status={req.status} />
                        {req.status === 'pending' && (req.passedBy || []).length > 0 && (
                          <Pill color={C.inkDim} soft={'rgba(255,255,255,0.06)'}>Passed by {req.passedBy.length}</Pill>
                        )}

                    </Td>
                  </Tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function AdminHaulRequestDetail({ db, setDb, navigate, requestId }) {
  const requests = db.haulRequests || [];
  const req = requests.find(r => r.id === requestId);
  const [pickerHaulerId, setPickerHaulerId] = useState(null);
  const [assigningTruck, setAssigningTruck] = useState(false);
  const [addingDayFor, setAddingDayFor] = useState(null);
  const [newDayDate, setNewDayDate] = useState(TODAY_ISO);
  const [newDayStart, setNewDayStart] = useState('08:00');
  const [addLoadForm, setAddLoadForm] = useState({ truckId: null, date: null, time: '', cy: '' });
  if (!req) return <NotFound navigate={navigate} />;
  const project = db.projects.find(p => p.id === req.projectId);
  const material = MATERIALS.find(m => m.code === req.materialCode);
  const matMaterial = material ? material.label : req.materialCode;
  const assignments = req.assignments || [];
  const alreadyAssignedIds = new Set(assignments.map(a => a.truckId));
  const totalDeliveredCY = assignments.reduce((s, a) =>
    s + a.days.reduce((s2, d) => s2 + d.loads.reduce((s3, l) => s3 + (l.cy || 0), 0), 0), 0);
  const overallPct = req.volumeCY > 0 ? (totalDeliveredCY / req.volumeCY) * 100 : 0;

  // Suggested haulers (legacy picker, kept for grouped browse) — exclude haulers whose trucks are all assigned
  const suggestedHaulers = db.haulers.filter(op => {
    const pickable = db.trucks.filter(t => t.haulerId === op.id && !alreadyAssignedIds.has(t.id));
    return pickable.length > 0;
  });

  const updateReq = (mutator) => setDb(prev => ({
    ...prev,
    haulRequests: prev.haulRequests.map(r => r.id === req.id ? mutator(r) : r),
  }));

  const assignTruck = (haulerId, truckId) => {
    const assignedHauler = db.haulers.find(h => h.id === haulerId);
    const assignedTruck = db.trucks.find(t => t.id === truckId);
    const newAssignment = {
      truckId,
      haulerId,
      addedAt: Date.now(),
      days: [{ date: TODAY_ISO, startTime: req.requestedAt || '08:00', loads: [] }],
    };
    setDb(prev => appendActivity(
      {
        ...prev,
        haulRequests: prev.haulRequests.map(r => r.id === req.id ? {
          ...r,
          status: r.status === 'pending' ? 'matched' : r.status,
          matchedHaulerId: r.matchedHaulerId || haulerId,
          matchedTruckId: r.matchedTruckId || truckId,
          assignments: [...(r.assignments || []), newAssignment],
        } : r),
      },
      {
        type: 'haulRequest.truckAdded',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin added truck #${assignedTruck ? assignedTruck.plate : '?'} (${assignedHauler ? assignedHauler.name : 'unknown hauler'}) to ${req.id}`,
        refId: req.id,
      }
    ));
    setPickerHaulerId(null);
    setAssigningTruck(false);
  };

  const addDay = (truckId) => {
    updateReq(r => ({
      ...r,
      assignments: r.assignments.map(a => a.truckId === truckId
        ? { ...a, days: [...a.days, { date: newDayDate, startTime: newDayStart, loads: [] }] }
        : a),
    }));
    setAddingDayFor(null);
    setNewDayDate(TODAY_ISO);
    setNewDayStart('08:00');
  };

  const addLoad = (truckId, date, time, cy) => {
    const n = parseFloat(cy);
    if (!time || !Number.isFinite(n) || n <= 0) return;
    const newLoad = { id: 'hreq-load-' + Math.random().toString(36).substring(2, 7), time, cy: n };
    updateReq(r => ({
      ...r,
      assignments: r.assignments.map(a => a.truckId === truckId
        ? { ...a, days: a.days.map(d => d.date === date ? { ...d, loads: [...d.loads, newLoad] } : d) }
        : a),
    }));
    setAddLoadForm({ truckId: null, date: null, time: '', cy: '' });
  };

  const removeLoad = (truckId, date, loadId) => {
    updateReq(r => ({
      ...r,
      assignments: r.assignments.map(a => a.truckId === truckId
        ? { ...a, days: a.days.map(d => d.date === date ? { ...d, loads: d.loads.filter(l => l.id !== loadId) } : d) }
        : a),
    }));
  };

  const removeAssignment = (truckId) => {
    const assignedTruck = db.trucks.find(t => t.id === truckId);
    const target = assignments.find(a => a.truckId === truckId);
    const loadsOnTruck = target ? target.days.reduce((s, d) => s + d.loads.length, 0) : 0;
    const msg = loadsOnTruck > 0
      ? `Remove truck #${assignedTruck ? assignedTruck.plate : '?'} from this haul? ${loadsOnTruck} logged load${loadsOnTruck === 1 ? '' : 's'} will be discarded.`
      : `Remove truck #${assignedTruck ? assignedTruck.plate : '?'} from this haul?`;
    if (!confirm(msg)) return;
    updateReq(r => ({
      ...r,
      assignments: r.assignments.filter(a => a.truckId !== truckId),
      // Clear legacy matched fields if removing the very truck they pointed at,
      // so the UI's "Matched" pill doesn't keep lying.
      matchedHaulerId: r.matchedHaulerId && r.matchedTruckId === truckId ? null : r.matchedHaulerId,
      matchedTruckId:  r.matchedTruckId === truckId ? null : r.matchedTruckId,
    }));
  };

  const removeDay = (truckId, date) => {
    const target = assignments.find(a => a.truckId === truckId);
    if (!target) return;
    const day = target.days.find(d => d.date === date);
    const loadCount = day ? day.loads.length : 0;
    if (target.days.length <= 1) {
      alert("Can't remove the only day on this truck — remove the truck assignment instead.");
      return;
    }
    if (loadCount > 0 && !confirm(`Remove this day? ${loadCount} logged load${loadCount === 1 ? '' : 's'} will be discarded.`)) return;
    updateReq(r => ({
      ...r,
      assignments: r.assignments.map(a => a.truckId === truckId
        ? { ...a, days: a.days.filter(d => d.date !== date) }
        : a),
    }));
  };

  // Legacy assign (suggested-haulers list) — now routes through assignTruck for parity
  const assign = (haulerId, truckId) => assignTruck(haulerId, truckId);

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[
        { label: 'Admin', to: '/admin' },
        { label: 'Haul Requests', to: '/admin/requests' },
        { label: req.id },
      ]} navigate={navigate} />

      {/* Request summary */}
      <Card style={{ marginBottom: S[5] }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: S[4], flexWrap: 'wrap' }}>
          <div style={{ flex: 1, minWidth: 240 }}>
            <Label color={C.accent} style={{ marginBottom: 6 }}>Request {req.id}</Label>
            <h1 style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink }}>
              {req.volumeCY} CY of {material ? material.label : req.materialCode}
            </h1>
            <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>
              {project ? project.name : '—'} · requested at {req.requestedAt}
            </div>
            {req.notes && (
              <div style={{ ...T.bodySm, marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md, color: C.ink }}>
                {req.notes}
              </div>
            )}
          </div>
          <StatusPill status={req.status} />
        </div>
      </Card>

      {/* Assignments — multi-truck, multi-day per-truck loads with completion donuts */}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: S[3], gap: S[3], flexWrap: 'wrap' }}>
        <div>
          <Label>Assignments</Label>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 4 }}>
            {assignments.length === 0
              ? 'No trucks assigned yet.'
              : `${assignments.length} truck${assignments.length === 1 ? '' : 's'} assigned · ${totalDeliveredCY} of ${req.volumeCY} CY delivered (${Math.round(overallPct)}%)`}
          </div>
        </div>
        <Btn variant="primary" size="sm" onClick={() => setAssigningTruck(v => !v)}>
          {assigningTruck ? 'Cancel' : '+ Assign truck'}
        </Btn>
      </div>

      {assigningTruck && (() => {
        const pickableTrucks = db.trucks.filter(t => !alreadyAssignedIds.has(t.id));
        return (
          <Card style={{ marginBottom: S[4], padding: S[4], background: C.surfaceHi }}>
            <Label style={{ marginBottom: S[2] }}>Pick a truck</Label>
            {pickableTrucks.length === 0 ? (
              <div style={{ ...T.bodySm, color: C.inkFaint }}>All trucks are already assigned to this haul.</div>
            ) : (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: S[2] }}>
                {pickableTrucks.map(t => {
                  const tHauler = db.haulers.find(h => h.id === t.haulerId);
                  return (
                    <button key={t.id} onClick={() => assignTruck(t.haulerId, t.id)} style={{
                      ...T.bodySm, background: 'transparent', color: C.ink, border: `1px solid ${C.ruleHi}`,
                      borderRadius: R.pill, padding: '8px 14px', cursor: 'pointer', fontWeight: 600,
                    }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.color = C.accent; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = C.ruleHi; e.currentTarget.style.color = C.ink; }}
                    >#{t.plate} <span style={{ color: C.inkFaint, marginLeft: 4 }}>{t.type}</span><span style={{ color: C.inkFaint, marginLeft: 6 }}>· {tHauler ? tHauler.name : 'unassigned'}</span></button>
                  );
                })}
              </div>
            )}
          </Card>
        );
      })()}

      {assignments.length > 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(360px, 1fr))', gap: S[3], marginBottom: S[6] }}>
          {assignments.map(a => {
            const t = db.trucks.find(x => x.id === a.truckId);
            const aHauler = db.haulers.find(h => h.id === a.haulerId);
            const truckCY = a.days.reduce((s, d) => s + d.loads.reduce((s2, l) => s2 + (l.cy || 0), 0), 0);
            const truckPct = req.volumeCY > 0 ? (truckCY / req.volumeCY) * 100 : 0;
            const isAddingDay = addingDayFor === a.truckId;
            return (
              <Card key={a.truckId} padding={S[4]}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: S[3], marginBottom: S[3] }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ ...T.h4, fontWeight: 700, color: C.ink, letterSpacing: -0.3 }}>
                      #{t ? t.plate : a.truckId} <span style={{ ...T.bodySm, color: C.inkFaint, marginLeft: 4, fontWeight: 500 }}>{t ? t.type : ''}</span>
                    </div>
                    <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 2 }}>{aHauler ? aHauler.name : 'unknown hauler'}</div>
                    <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>{truckCY} CY delivered</div>
                  </div>
                  <Donut pct={truckPct} size={72} stroke={8} />
                  <button onClick={() => removeAssignment(a.truckId)} aria-label={`Remove truck ${t ? '#' + t.plate : ''} assignment`} title="Remove truck from this haul" style={{
                    background: 'transparent', border: 'none', color: C.inkFaint, cursor: 'pointer',
                    width: 28, height: 28, borderRadius: R.sm, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 18, lineHeight: 1, padding: 0, marginLeft: -4, marginTop: -4,
                  }}
                    onMouseEnter={e => { e.currentTarget.style.color = C.warn; e.currentTarget.style.background = C.warnSoft; }}
                    onMouseLeave={e => { e.currentTarget.style.color = C.inkFaint; e.currentTarget.style.background = 'transparent'; }}
                  >×</button>
                </div>

                {a.days.map(d => {
                  const dailyCY = d.loads.reduce((s, l) => s + (l.cy || 0), 0);
                  const isAddingLoad = addLoadForm.truckId === a.truckId && addLoadForm.date === d.date;
                  return (
                    <div key={d.date} style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: S[2], marginBottom: S[2] }}>
                        <div>
                          <div style={{ ...T.bodySm, fontWeight: 700, color: C.ink }}>
                            {isToday(d.date) ? 'Today' : isYesterday(d.date) ? 'Yesterday' : isoToShortDate(d.date)}
                            <span style={{ ...T.monoSm, color: C.inkFaint, marginLeft: 6, fontWeight: 500 }}>· start {d.startTime}</span>
                          </div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: S[2] }}>
                          <div style={{ ...T.monoSm, color: C.inkDim }}>{dailyCY} CY</div>
                          {a.days.length > 1 && (
                            <button onClick={() => removeDay(a.truckId, d.date)} aria-label="Remove day" title="Remove day" style={{
                              background: 'transparent', border: 'none', color: C.inkFaint, cursor: 'pointer',
                              width: 22, height: 22, borderRadius: R.xs, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                              fontSize: 16, lineHeight: 1, padding: 0,
                            }}
                              onMouseEnter={e => { e.currentTarget.style.color = C.warn; }}
                              onMouseLeave={e => { e.currentTarget.style.color = C.inkFaint; }}
                            >×</button>
                          )}
                        </div>
                      </div>

                      {d.loads.length === 0 ? (
                        <div style={{ ...T.caption, color: C.inkFaint, padding: `${S[2]}px 0` }}>No loads yet today.</div>
                      ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                          {d.loads.map(l => (
                            <div key={l.id} style={{ display: 'flex', alignItems: 'center', gap: S[2], ...T.bodySm }}>
                              <span style={{ ...T.monoSm, color: C.inkDim, minWidth: 48 }}>{l.time}</span>
                              <span style={{ flex: 1, color: C.ink }}>{l.cy} CY</span>
                              <button onClick={() => removeLoad(a.truckId, d.date, l.id)} style={{
                                background: 'transparent', border: 'none', color: C.inkFaint, cursor: 'pointer',
                                ...T.caption, padding: '2px 6px', borderRadius: R.xs,
                              }}
                                onMouseEnter={e => { e.currentTarget.style.color = C.warn; }}
                                onMouseLeave={e => { e.currentTarget.style.color = C.inkFaint; }}
                              >remove</button>
                            </div>
                          ))}
                        </div>
                      )}

                      {isAddingLoad ? (
                        <div style={{ marginTop: S[2], display: 'flex', gap: S[2], alignItems: 'center', flexWrap: 'wrap' }}>
                          <input type="time" value={addLoadForm.time} onChange={e => setAddLoadForm(f => ({ ...f, time: e.target.value }))}
                            style={{ ...T.bodySm, padding: '6px 8px', borderRadius: R.sm, border: `1px solid ${C.ruleHi}`, background: C.surface, color: C.ink }} />
                          <input type="number" min="0" step="0.5" placeholder="CY" value={addLoadForm.cy} onChange={e => setAddLoadForm(f => ({ ...f, cy: e.target.value }))}
                            style={{ ...T.bodySm, padding: '6px 8px', borderRadius: R.sm, border: `1px solid ${C.ruleHi}`, background: C.surface, color: C.ink, width: 80 }} />
                          <Btn variant="primary" size="sm" onClick={() => addLoad(a.truckId, d.date, addLoadForm.time, addLoadForm.cy)}>Add</Btn>
                          <Btn variant="ghost" size="sm" onClick={() => setAddLoadForm({ truckId: null, date: null, time: '', cy: '' })}>Cancel</Btn>
                        </div>
                      ) : (
                        <button onClick={() => setAddLoadForm({ truckId: a.truckId, date: d.date, time: '', cy: '' })} style={{
                          marginTop: S[2], background: 'transparent', border: `1px dashed ${C.ruleHi}`, color: C.accent,
                          ...T.caption, padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer', fontWeight: 600,
                        }}>+ Add load</button>
                      )}
                    </div>
                  );
                })}

                {isAddingDay ? (
                  <div style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md, display: 'flex', gap: S[2], alignItems: 'center', flexWrap: 'wrap' }}>
                    <input type="date" value={newDayDate} onChange={e => setNewDayDate(e.target.value)}
                      style={{ ...T.bodySm, padding: '6px 8px', borderRadius: R.sm, border: `1px solid ${C.ruleHi}`, background: C.surface, color: C.ink }} />
                    <input type="time" value={newDayStart} onChange={e => setNewDayStart(e.target.value)}
                      style={{ ...T.bodySm, padding: '6px 8px', borderRadius: R.sm, border: `1px solid ${C.ruleHi}`, background: C.surface, color: C.ink }} />
                    <Btn variant="primary" size="sm" onClick={() => addDay(a.truckId)}>Add day</Btn>
                    <Btn variant="ghost" size="sm" onClick={() => { setAddingDayFor(null); setNewDayDate(TODAY_ISO); setNewDayStart('08:00'); }}>Cancel</Btn>
                  </div>
                ) : (
                  <button onClick={() => setAddingDayFor(a.truckId)} style={{
                    marginTop: S[3], width: '100%', background: 'transparent', border: `1px dashed ${C.ruleHi}`, color: C.accent,
                    ...T.bodySm, padding: '8px 10px', borderRadius: R.sm, cursor: 'pointer', fontWeight: 600,
                  }}>+ Add day</button>
                )}
              </Card>
            );
          })}
        </div>
      )}

      {/* Suggested haulers */}
      <div style={{ marginBottom: S[3] }}>
        <Label>{req.status === 'pending' ? 'Suggested haulers' : 'Other haulers'}</Label>
      </div>
      <Card padding={0}>
        {suggestedHaulers.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>
            No haulers available right now.
          </div>
        ) : (
          <div style={{ maxHeight: '60vh', overflowY: 'auto' }}>
            {suggestedHaulers.map((op, i) => {
              const opTrucks = db.trucks.filter(t => t.haulerId === op.id && !alreadyAssignedIds.has(t.id));
              const isMatched = req.matchedHaulerId === op.id;
              const showPicker = pickerHaulerId === op.id;
              return (
                <div key={op.id} style={{
                  padding: S[4],
                  borderBottom: i < suggestedHaulers.length - 1 ? `1px solid ${C.rule}` : 'none',
                  background: isMatched ? C.accentSoft : 'transparent',
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: S[3], flexWrap: 'wrap' }}>
                    <Avatar name={op.name} color={C.accent} />
                    <div style={{ flex: 1, minWidth: 200 }}>
                      <div style={{ fontFamily: F.display, fontSize: 15, fontWeight: 600, color: C.ink }}>{op.name}</div>
                      <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>
                        {op.projectIds.length} project{op.projectIds.length === 1 ? '' : 's'} · {opTrucks.length} truck{opTrucks.length === 1 ? '' : 's'}
                      </div>
                    </div>
                    {isMatched
                      ? <Pill color={C.accent} soft={C.accentSoft}>Assigned</Pill>
                      : <Btn variant="primary" size="sm" onClick={() => setPickerHaulerId(showPicker ? null : op.id)}>{showPicker ? 'Cancel' : 'Assign'}</Btn>}
                  </div>
                  {showPicker && (
                    <div style={{ marginTop: S[3], padding: S[3], background: C.surfaceHi, borderRadius: R.md }}>
                      <Label style={{ marginBottom: S[2] }}>Pick a truck</Label>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: S[2] }}>
                        {opTrucks.length === 0 ? (
                          <span style={{ ...T.caption, color: C.inkFaint }}>This hauler has no trucks on the roster.</span>
                        ) : opTrucks.map(t => (
                          <button key={t.id} onClick={() => assign(op.id, t.id)} style={{
                            ...T.bodySm, background: 'transparent', color: C.ink, border: `1px solid ${C.ruleHi}`,
                            borderRadius: R.pill, padding: '8px 14px', cursor: 'pointer', fontWeight: 600,
                          }}
                            onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.color = C.accent; }}
                            onMouseLeave={e => { e.currentTarget.style.borderColor = C.ruleHi; e.currentTarget.style.color = C.ink; }}
                          >#{t.plate} <span style={{ color: C.inkFaint, marginLeft: 4 }}>{t.type}</span></button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
}

function AdminHaulerDetail({ db, setDb, navigate, haulerId }) {
  const hauler = db.haulers.find(o => o.id === haulerId);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({ name: '', phone: '', email: '' });
  if (!hauler) return <NotFound navigate={navigate} />;
  const projects = db.projects.filter(p => hauler.projectIds.includes(p.id));
  const trucks = db.trucks.filter(t => t.haulerId === hauler.id);
  const truckIds = new Set(trucks.map(t => t.id));
  const hours = db.hours.filter(h => truckIds.has(h.truckId));
  const loads = db.loads.filter(l => truckIds.has(l.truckId));
  const attachments = hauler.attachments || [];
  const updateHauler = (patch) => setDb(prev => ({ ...prev, haulers: prev.haulers.map(o => o.id === hauler.id ? { ...o, ...patch } : o) }));
  const totalHours = hours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
  const totalRevenue = hours.reduce((s, h) => {
    const t = trucks.find(x => x.id === h.truckId);
    return s + calcHours(h.clockIn, h.breakMin, h.clockOut) * (t ? db.rates[t.type] : 0);
  }, 0);

  const beginEdit = () => { setDraft({ name: hauler.name, phone: hauler.phone, email: hauler.email }); setEditing(true); };
  // Match the new-hauler wizard's email validator. Empty is allowed (some
  // haulers in the seed don't have an email); a non-empty value must look like
  // one. Save is disabled and an inline error renders below the input.
  const emailDraft = (draft.email || '').trim();
  const emailValid = emailDraft === '' || /.+@.+\..+/.test(emailDraft);
  const saveEdit = () => {
    if (!emailValid) return;
    updateHauler({ name: draft.name.trim() || hauler.name, phone: draft.phone.trim(), email: emailDraft });
    setEditing(false);
  };
  const cancelEdit = () => { setEditing(false); };

  // Attachments: 4 doc categories. Each entry shows current upload state or empty placeholder.
  // For the mockup we simulate uploads by generating filenames + ISO dates client-side.
  const DOC_TYPES = [
    { code: 'w9',        label: 'W-9',       hint: 'IRS W-9 tax form' },
    { code: 'insurance', label: 'Insurance', hint: 'Certificate of Insurance' },
    { code: 'msa',       label: 'MSA',       hint: 'Master Service Agreement' },
    { code: 'other',     label: 'Other',     hint: 'Safety certs, licenses, etc.' },
  ];
  const slug = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 24) || 'hauler';
  const uploadAttachment = (typeCode) => {
    // Suffix disambiguates same-day re-uploads of the same doc type so the
    // file list reads like distinct versions instead of one filename twice.
    const suffix = Math.random().toString(36).slice(2, 6);
    const filename = `${slug(hauler.name)}-${typeCode}-${TODAY_ISO}-${suffix}.pdf`;
    const newAtt = { id: 'att-' + Math.random().toString(36).substring(2, 7), type: typeCode, filename, uploadedAt: TODAY_ISO };
    const existing = attachments.filter(a => a.type !== typeCode);
    updateHauler({ attachments: [...existing, newAtt] });
  };
  const removeAttachment = (typeCode) => {
    updateHauler({ attachments: attachments.filter(a => a.type !== typeCode) });
  };

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[
        { label: 'Admin', to: '/admin' },
        { label: 'Haulers', to: '/admin/haulers' },
        { label: hauler.name },
      ]} navigate={navigate} />

      {editing ? (
        <Card style={{ marginBottom: S[5], padding: S[5] }}>

function AdminActiveTrucks({ db, setDb, navigate }) {
  // Group: every truck that has a driver assigned. Sort by status:
  // currently clocked-in first, then idle drivers, then no-driver trucks.
  const all = db.trucks.slice();
  const openShifts = (db.hours || []).filter(h => h.status === 'open');
  const truckHrMap = new Map(openShifts.map(h => [h.truckId, h]));

  // Modal state: { driver, truck } when admin is logging a load on someone's
  // behalf. Embedded DriverHome / DriverTruckDetail open the modal via the
  // onOpenLogLoad prop instead of navigating to /driver/log.
  const [logFor, setLogFor] = useState(null);

  const withDriver = all.filter(t => t.driverId).map(t => {
    const driver = db.drivers.find(d => d.id === t.driverId);
    const hr = truckHrMap.get(t.id);
    const isPaused = !!(hr && hr.pausedAt);
    return { truck: t, driver, hr, status: hr ? (isPaused ? 'paused' : 'active') : 'idle' };
  }).filter(x => x.driver);

  // Sort: active > paused > idle, then plate
  const order = { active: 0, paused: 1, idle: 2 };
  withDriver.sort((a, b) => order[a.status] - order[b.status] || a.truck.plate.localeCompare(b.truck.plate));

  const benchedTrucks = all.filter(t => !t.driverId);

  // Embedded driver widgets always stay inside admin — never delegate to /driver/*.
  // No-op for navigation calls from inside the embed; the modal handles log-load
  // and the back-link / DriverIncomingRequests are hidden by the `embedded` prop.
  const noopNavigate = () => {};

  const activeCount = withDriver.filter(w => w.status === 'active').length;
  const pausedCount = withDriver.filter(w => w.status === 'paused').length;
  const idleCount   = withDriver.filter(w => w.status === 'idle').length;

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Active Trucks' }]} navigate={navigate} />
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: S[5], gap: S[3], flexWrap: 'wrap' }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Active Trucks</Label>

// =====================================================================
// AdminActivity — reverse-chrono event feed at /admin/activity
// =====================================================================
// Reads db.activity (appended via appendActivity() on every mutation).
// On first render, advances db.activityLastReadAt to the latest event timestamp
// so the sidebar unread badge clears once the user has viewed the page.
function AdminActivity({ db, setDb, navigate }) {
  const activity = (db.activity || []).slice().sort((a, b) => b.timestamp - a.timestamp);
  const markedRef = useRef(false);
  useEffect(() => {
    if (markedRef.current) return;
    markedRef.current = true;
    const latest = activity.length ? activity[0].timestamp : 0;
    setDb(prev => {
      const lastRead = prev.activityLastReadAt || 0;
      if (latest <= lastRead) return prev;
      return { ...prev, activityLastReadAt: latest };
    });
    // Only run once on mount — mark-as-read fires on first view, not on every
    // re-render that follows new events arriving while the page is open.
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Pragmatic refId-prefix routing. Unknown / ambiguous refs are no-ops.
  const goRef = (evt) => {
    const id = evt.refId;
    if (!id) return;
    if (id.startsWith('hreq-')) { navigate('/admin/requests/' + id); return; }
    if (id.startsWith('op-'))   { navigate('/admin/haulers/' + id); return; }
    if (id.startsWith('tk-')) {
      const tr = db.trucks.find(t => t.id === id);
      if (tr && tr.haulerId) { navigate('/admin/haulers/' + tr.haulerId); return; }
      return;
    }
    if (id.startsWith('ld-')) {
      const ld = db.loads.find(l => l.id === id);
      if (ld && ld.projectId) { navigate('/admin/p/' + ld.projectId); return; }
      return;
    }
    if (id.startsWith('dr-')) {
      // No flat drivers index — fall back to haulers list.
      navigate('/admin/haulers'); return;
    }
    // Project codes are uppercase letters/digits without a known prefix.
    if (/^[A-Z0-9]{2,6}$/.test(id) && db.projects.some(p => p.id === id)) {
      navigate('/admin/p/' + id); return;
    }
  };

  // Group reverse-chrono by day. Buckets: 'Today' / 'Yesterday' / 'May 14' etc.
  const labelFor = (ts) => {
    const d = new Date(ts);
    const iso = d.toISOString().slice(0, 10);
    if (isToday(iso)) return 'Today';
    if (isYesterday(iso)) return 'Yesterday';
    return isoToShortDate(iso);
  };
  const groups = [];
  const byLabel = new Map();
  activity.forEach(e => {
    const lbl = labelFor(e.timestamp);
    if (!byLabel.has(lbl)) { byLabel.set(lbl, []); groups.push(lbl); }
    byLabel.get(lbl).push(e);
  });

  const fmtTime = (ts) => {
    const d = new Date(ts);
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  };

  // Color the actor avatar by role to give the feed scannable structure.
  const actorColorFor = (role) => {
    if (role === 'driver') return C.accent;
    if (role === 'hauler') return C.warn || C.accent;
    return C.inkDim;
  };
  // Build a "name" string for the Avatar component to derive initials from.
  // Avatar splits on whitespace and takes first letters — we feed it whatever
  // the actor's display name is so it produces sensible initials.
  const actorNameFor = (evt) => {
    if (evt.actorRole === 'admin') return 'Admin User';
    if (evt.actorRole === 'driver' && evt.actorId) {
      const d = db.drivers.find(x => x.id === evt.actorId);
      if (d) return d.name;
    }
    if (evt.actorRole === 'hauler' && evt.actorId) {
      const h = db.haulers.find(x => x.id === evt.actorId);
      if (h) return h.name;
    }
    return '?';
  };

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Activity' }]} navigate={navigate} />
      <div style={{ marginBottom: S[5] }}>
        <Label color={C.accent} style={{ marginBottom: 6 }}>Activity</Label>
        <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>What's been happening.</h1>
        <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>
          {activity.length} event{activity.length === 1 ? '' : 's'} across your network.
        </div>
      </div>

      {activity.length === 0 ? (
        <EmptyState
          icon={<ActivityIcon size={36} />}
          title="No activity yet"
          body="Events will appear here as drivers log loads, haulers approve, and admins assign requests."
        />
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: S[5] }}>
          {groups.map(label => (
            <div key={label}>
              <Label style={{ marginBottom: S[3] }}>{label}</Label>
              <Card padding={0}>
                {byLabel.get(label).map((evt, idx, arr) => {
                  const hasRef = !!evt.refId;
                  return (
                    <div
                      key={evt.id}
                      onClick={hasRef ? () => goRef(evt) : undefined}
                      style={{
                        display: 'flex', alignItems: 'flex-start', gap: S[3],
                        padding: `${S[3]}px ${S[4]}px`,
                        borderBottom: idx < arr.length - 1 ? `1px solid ${C.rule}` : 'none',
                        cursor: hasRef ? 'pointer' : 'default',
                        transition: 'background 0.12s',
                      }}
                      onMouseEnter={e => { if (hasRef) e.currentTarget.style.background = C.surfaceHi; }}
                      onMouseLeave={e => { if (hasRef) e.currentTarget.style.background = 'transparent'; }}
                    >
                      <div style={{ ...T.monoSm, color: C.inkFaint, width: 44, flexShrink: 0, paddingTop: 6 }}>{fmtTime(evt.timestamp)}</div>
                      <Avatar name={actorNameFor(evt)} color={actorColorFor(evt.actorRole)} size={32} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ ...T.body, color: C.ink, lineHeight: 1.45 }}>{evt.summary}</div>
                        <div style={{ ...T.caption, color: C.inkFaint, marginTop: 2 }}>{evt.type}</div>
                      </div>
                    </div>
                  );
                })}
              </Card>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Shared admin sidebar nav (desktop) + drawer (mobile).
// Renders the same nav items in both modes; parent controls visibility via CSS.
function AdminSidebar({ db, navigate, hash, onNavigate, variant = 'sidebar', haulersExpanded, setHaulersExpanded, reportsExpanded, setReportsExpanded }) {
  const requests = db.haulRequests || [];
  const pendingCount = requests.filter(r => r.status === 'pending').length;
  const activity = db.activity || [];
  const lastRead = db.activityLastReadAt || 0;
  const unreadCount = activity.filter(a => a.timestamp > lastRead).length;
  const parts = (hash || '').split('/').filter(Boolean);
  const onOverview = parts.length === 1 && parts[0] === 'admin';
  const onRequests = parts[1] === 'requests';
  const onActivity = parts[1] === 'activity';
  const onReporting = parts[1] === 'reporting';
  const onLiveStats = parts[1] === 'reports';
  const onPayments  = parts[1] === 'payments';
  const onActiveTrucks = parts[1] === 'trucks' && parts[2] === 'active';
  // Reports section covers both /admin/reporting AND /admin/reports (live stats sublink)
  const onReportsAny = onReporting || onLiveStats;
  // "Haulers" section is active for the new /admin/haulers/* routes AND for the
  // legacy /admin/p/:projId/o/:opId path which still drills into a hauler-on-project.
  const onHaulers  = parts[1] === 'haulers' || (parts[1] === 'p' && parts[3] === 'o');

  const go = (to) => { navigate(to); if (onNavigate) onNavigate(); };

  const Item = ({ icon, label, active, onClick, badge, expandable, expanded, onToggleExpand }) => {
    const rowBg = active ? C.accentSoft : 'transparent';
    const rowColor = active ? C.accent : C.inkDim;
    return (
      <div
        style={{
          display: 'flex', alignItems: 'stretch',
          background: rowBg, color: rowColor,
          borderLeft: `3px solid ${active ? C.accent : 'transparent'}`,
          borderRadius: R.md, overflow: 'hidden',
        }}
        onMouseEnter={e => { if (!active) { e.currentTarget.style.background = C.surfaceHi; e.currentTarget.style.color = C.ink; } }}
        onMouseLeave={e => { if (!active) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.inkDim; } }}
      >
        <button onClick={onClick} style={{
          ...T.body, flex: 1, display: 'flex', alignItems: 'center', gap: S[3],
          background: 'transparent', color: 'inherit',
          border: 'none', padding: '10px 12px', cursor: 'pointer', fontWeight: 600, textAlign: 'left',
        }}>
          <span style={{ display: 'inline-flex', flexShrink: 0 }} aria-hidden="true">{icon}</span>
          <span style={{ flex: 1 }}>{label}</span>
          {badge != null && badge > 0 && (
            <span style={{
              background: C.accent, color: C.bg, borderRadius: R.pill,
              padding: '2px 8px', fontFamily: F.mono, fontSize: 10, fontWeight: 700,
            }}>{badge}</span>
          )}
        </button>
        {expandable && (
          <button
            type="button"
            onClick={onToggleExpand}
            aria-expanded={!!expanded}
            aria-label={expanded ? `Collapse ${label}` : `Expand ${label}`}
            style={{
              ...T.monoSm, background: 'transparent', color: C.inkFaint, border: 'none',
              padding: '0 10px', cursor: 'pointer',
            }}
          ><span aria-hidden="true">{expanded ? '▾' : '▸'}</span></button>
        )}
      </div>
    );
  };

  const sortedHaulers = [...db.haulers].sort((a, b) => a.name.localeCompare(b.name));

  return (
    <nav style={{ display: 'flex', flexDirection: 'column', gap: S[1] }}>
      {variant === 'drawer' && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3], paddingBottom: S[3], borderBottom: `1px solid ${C.rule}` }}>
          <Brand size="sm" />
          <button onClick={onNavigate} aria-label="Close menu" style={{
            ...T.bodyLg, background: 'transparent', border: `1px solid ${C.ruleHi}`, color: C.inkDim,
            width: 30, height: 30, borderRadius: '50%', cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          }}>Ã—</button>
        </div>
      )}
      <Item
        icon={<ProjectIcon size={20} />}
        label="Hauling Overview"
        active={onOverview}
        onClick={() => go('/admin')}
      />
      <Item
        icon={<HaulRequestIcon size={20} />}
        label="Haul Requests"
        active={onRequests}
        badge={pendingCount}
        onClick={() => go('/admin/requests')}
      />
      <Item
        icon={<ActivityIcon size={20} />}
        label="Activity"
        active={onActivity}
        badge={unreadCount}
        onClick={() => go('/admin/activity')}
      />
      <Item
        icon={<ReportingIcon size={20} />}
        label="Reports"
        active={onReportsAny}
        expandable
        expanded={reportsExpanded}
        onToggleExpand={() => setReportsExpanded(v => !v)}
        onClick={() => go('/admin/reporting')}
      />
      {reportsExpanded && (
        <div style={{ marginLeft: S[5], display: 'flex', flexDirection: 'column', gap: 2, marginBottom: S[2] }}>
          <button onClick={() => go('/admin/reporting')} style={{
            ...T.bodySm, background: 'transparent', border: 'none', textAlign: 'left',
            padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer',
            color: onReporting ? C.accent : C.inkDim, fontWeight: onReporting ? 600 : 500,
          }}
            onMouseEnter={e => { if (!onReporting) { e.currentTarget.style.background = C.surfaceHi; e.currentTarget.style.color = C.ink; } }}
            onMouseLeave={e => { if (!onReporting) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.inkDim; } }}
          >Financial reports</button>
          <button onClick={() => go('/admin/reports')} style={{
            ...T.bodySm, background: 'transparent', border: 'none', textAlign: 'left',
            padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer',
            color: onLiveStats ? C.accent : C.inkDim, fontWeight: onLiveStats ? 600 : 500,
          }}
            onMouseEnter={e => { if (!onLiveStats) { e.currentTarget.style.background = C.surfaceHi; e.currentTarget.style.color = C.ink; } }}
            onMouseLeave={e => { if (!onLiveStats) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.inkDim; } }}
          >Live stats</button>
        </div>
      )}
      <Item
        icon={<PaymentsIcon size={20} />}
        label="Payments"
        active={onPayments}
        onClick={() => go('/admin/payments')}
      />
      <Item
        icon={<ActiveTruckIcon size={20} />}
        label="Active Trucks"
        active={onActiveTrucks}
        onClick={() => go('/admin/trucks/active')}
      />
      <Item
        icon={<HaulerIcon size={20} />}
        label="Haulers"
        active={onHaulers}
        expandable
        expanded={haulersExpanded}
        onToggleExpand={() => setHaulersExpanded(v => !v)}
        onClick={() => go('/admin/haulers')}
      />
      {haulersExpanded && (
        <div style={{ marginLeft: S[5], display: 'flex', flexDirection: 'column', gap: 2, marginBottom: S[2] }}>
          {sortedHaulers.map(op => (
            <button key={op.id} onClick={() => go(`/admin/haulers/${op.id}`)} style={{
              ...T.bodySm, background: 'transparent', border: 'none', textAlign: 'left',
              padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer', color: C.inkDim,
            }}
              onMouseEnter={e => { e.currentTarget.style.background = C.surfaceHi; e.currentTarget.style.color = C.ink; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.inkDim; }}
            >{op.name}</button>
          ))}
          <button onClick={() => go('/admin/haulers/new')} style={{
            ...T.bodySm, background: 'transparent', border: 'none', textAlign: 'left',
            padding: '6px 10px', borderRadius: R.sm, cursor: 'pointer', color: C.accent,
            fontFamily: F.display, fontWeight: 600,
          }}
            onMouseEnter={e => { e.currentTarget.style.background = C.surfaceHi; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}
          >+ Add hauler</button>
        </div>
      )}
    </nav>
  );
}

  const op = db.haulers.find(o => o.id === haulerId);

  const myTrucks = db.trucks.filter(t => t.haulerId === op.id);

  const myHours = db.hours.filter(h => myTruckIds.has(h.truckId));
  const totalHours = myHours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>

            const pTrucks = myTrucks.filter(t => t.projectId === p.id);
            const pTruckIds = new Set(pTrucks.map(t => t.id));
            const pLoads = myLoads.filter(l => pTruckIds.has(l.truckId));
            const pHours = myHours.filter(h => pTruckIds.has(h.truckId));

  const trucks = db.trucks.filter(t => t.projectId === projectId && t.haulerId === haulerId);
  const truckIds = new Set(trucks.map(t => t.id));
  const hours = db.hours.filter(h => truckIds.has(h.truckId));
  const loads = db.loads.filter(l => truckIds.has(l.truckId));
  const totalHours = hours.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
  const totalCY = loads.filter(l => l.status === 'approved').reduce((s, l) => s + (l.cy || 0), 0);
  const activeTrucks = trucks.filter(t => t.driverId && hours.some(h => h.truckId === t.id && h.status === 'open')).length;
  const pendingLoads = loads.filter(l => l.status === 'pending').length;

  const truckLink = (tId) => isAdmin

        { label: op.name },

        { label: op.name, to: `/hauler/o/${haulerId}` },

  const todayHours = truckHoursRows.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);

    ? [
        { label: 'Admin', to: '/admin' },
        { label: 'Hauls', to: '/admin' },
        { label: project.name, to: `/admin/p/${projectId}` },
        { label: op.name, to: `/admin/p/${projectId}/o/${haulerId}` },

function HaulerLogLoadForm({ truck, driver, project, db, setDb }) {
  const defaultMat = (project && project.material && project.material[0]) || 'CF';
  const [material, setMaterial] = useState(defaultMat);
  const [cy, setCy] = useState('');
  const [ticketNo, setTicketNo] = useState('');
  const [time, setTime] = useState(() => {
    const d = new Date();
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  });

  const inputStyle = { ...T.body, background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '10px 12px', borderRadius: R.sm, width: '100%', boxSizing: 'border-box' };
  const canSubmit = cy && parseFloat(cy) > 0;

  const submit = () => {
    if (!canSubmit) return;
    const existing = db.loads.map(l => parseInt((l.id || '').replace(/^ld-/, ''), 10)).filter(n => !isNaN(n));
    const nextNum = existing.length ? Math.max(...existing) + 1 : 1001;
    const newLoad = {
      id: 'ld-' + nextNum,
      driverId: driver ? driver.id : null,
      truckId: truck.id,
      projectId: truck.projectId,
      material,
      cy: parseFloat(cy),
      ticketNo: ticketNo || null,
      time,
      status: 'pending',
    };
    setDb(prev => appendActivity(
      { ...prev, loads: [...prev.loads, newLoad] },
      {
        type: 'load.logged',
        actorRole: 'driver',
        actorId: newLoad.driverId,
        summary: `${driver ? driver.name : 'A driver'} logged ${newLoad.cy} CY of ${materialLabel(newLoad.material)} on #${truck.plate}`,
        refId: newLoad.id,
      }
    ));
    setCy('');
    setTicketNo('');
    const d = new Date();
    setTime(String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'));
  };

  return (
    <div style={{ marginBottom: S[3] }}>
      <Label style={{ marginBottom: S[3] }}>Log new load · #{truck.plate}</Label>
      <Card>
        <div style={{ display: 'grid', gridTemplateColumns: '90px 1fr 1fr 100px auto', gap: S[3], alignItems: 'flex-end' }}>
          <div>
            <div style={{ ...T.caption, marginBottom: S[1] }}>Time</div>
            <input value={time} onChange={e => setTime(e.target.value)} placeholder="HH:MM" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: S[1] }}>Material</div>
            <select value={material} onChange={e => setMaterial(e.target.value)} style={inputStyle}>
              {MATERIALS.map(m => <option key={m.code} value={m.code}>{m.label}</option>)}
            </select>
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: S[1] }}>Ticket # (optional)</div>
            <input value={ticketNo} onChange={e => setTicketNo(e.target.value)} placeholder="e.g. T-44801" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: S[1] }}>CY</div>
            <input type="number" min="0" step="0.5" value={cy} onChange={e => setCy(e.target.value)} placeholder="e.g. 16" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
          <div>
            <Btn onClick={submit} disabled={!canSubmit}>+ Log load</Btn>
          </div>
        </div>
        <div style={{ ...T.micro, color: C.inkFaint, marginTop: S[3] }}>
          Driver: {driver ? driver.name : 'unassigned'} · Submits as pending for review.
        </div>
      </Card>
    </div>
  );
}

function HaulerTrucks({ projectId, opId, trucks, db, setDb }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({ plate: '', type: '', rate: '' });
  const addTruck = (form) => {
    const id = 'tk-' + Math.random().toString(36).substring(2, 7);
    setDb(prev => appendActivity(
      { ...prev, trucks: [...prev.trucks, { id, ...form, projectId, haulerId: opId, driverId: null }] },
      { type: 'truck.created', actorRole: 'hauler', actorId: opId, summary: `${haulerName(prev, opId)} added truck #${form.plate} on ${projectName(prev, projectId)}`, refId: id }
    ));
    setShowAdd(false);
  };
  const removeTruck = (id) => {
    if (!confirm('Remove this truck from the haul?')) return;
    setDb(prev => ({ ...prev, trucks: prev.trucks.filter(t => t.id !== id) }));
  };
  const beginEditTruck = (t) => {
    setEditingId(t.id);
    setDraft({ plate: t.plate, type: t.type, rate: String(db.rates[t.type] || 0) });
  };
  const cancelEditTruck = () => { setEditingId(null); };

    const rateNum = parseInt(draft.rate);

      ...prev,
      trucks: prev.trucks.map(t => t.id === id ? { ...t, plate: draft.plate.trim() || t.plate, type: draft.type } : t),
      rates: Number.isFinite(rateNum) && rateNum > 0 ? { ...prev.rates, [draft.type]: rateNum } : prev.rates,

          <tbody>
            {trucks.map(t => {

                    <Td align="right" mono>$<input value={draft.rate} onChange={e => setDraft(d => ({ ...d, rate: e.target.value }))} style={{ ...inlineInput, width: 70 }} />/hr</Td>
                    <Td>
                      <select value={draft.type} onChange={e => setDraft(d => ({ ...d, type: e.target.value, rate: String(db.rates[e.target.value] || 0) }))} style={{ ...inlineInput, fontFamily: F.body, width: 'auto' }}>
                        {TRUCK_TYPES.map(tt => <option key={tt.code} value={tt.code}>{tt.label}</option>)}
                      </select>
                    </Td>
                    <Td>{driver ? driver.name : <span style={{ color: C.inkFaint }}>— unassigned</span>}</Td>
                    <Td align="right">
                      <div style={{ display: 'flex', gap: S[1], justifyContent: 'flex-end' }}>

                  <Td>{driver ? driver.name : <span style={{ color: C.inkFaint }}>— unassigned</span>}</Td>
                  <Td align="right">
                    <div style={{ display: 'flex', gap: S[1], justifyContent: 'flex-end' }}>
                      <Btn variant="secondary" size="xs" onClick={() => beginEditTruck(t)}>Edit</Btn>

                    </div>

                </Tr>
              );
            })}

              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>

    setDb(prev => ({ ...prev, trucks: prev.trucks.map(t => t.id === truckId ? { ...t, driverId } : t) }));

function HaulerApprovals({ projectId, hours, loads, hauler, db, setDb }) {
  const pendingLoads = loads.filter(l => l.status === 'pending');
  const pendingHrs = hours.filter(h => h.status === 'pending');
  const updateLoad = (id, patch) => setDb(prev => ({ ...prev, loads: prev.loads.map(l => l.id === id ? { ...l, ...patch } : l) }));
  const updateHr = (id, patch) => setDb(prev => ({ ...prev, hours: prev.hours.map(h => h.id === id ? { ...h, ...patch } : h) }));
  const actorName = hauler ? hauler.name : 'A hauler';
  const actorId = hauler ? hauler.id : null;
  const approveLoad = (id) => {
    const ld = db.loads.find(l => l.id === id);
    setDb(prev => appendActivity(
      { ...prev, loads: prev.loads.map(l => l.id === id ? { ...l, status: 'approved' } : l) },
      {
        type: 'load.approved',
        actorRole: 'hauler',
        actorId,
        summary: ld ? `${actorName} approved ${ld.cy} CY of ${materialLabel(ld.material)}` : `${actorName} approved a load`,
        refId: id,
      }
    ));
  };
  const rejectLoad = (id) => {
    const ld = db.loads.find(l => l.id === id);
    setDb(prev => appendActivity(
      { ...prev, loads: prev.loads.filter(l => l.id !== id) },
      {
        type: 'load.rejected',
        actorRole: 'hauler',
        actorId,
        summary: ld ? `${actorName} rejected ${ld.cy} CY of ${materialLabel(ld.material)}` : `${actorName} rejected a load`,
        refId: null,
      }
    ));
  };
  const approveHr = (id) => {
    const hr = db.hours.find(h => h.id === id);
    const drv = hr ? db.drivers.find(d => d.id === hr.driverId) : null;
    const hrsCalc = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;
    setDb(prev => appendActivity(
      { ...prev, hours: prev.hours.map(h => h.id === id ? { ...h, status: 'open' } : h) },
      {
        type: 'hours.approved',
        actorRole: 'hauler',
        actorId,
        summary: drv ? `${actorName} approved ${fmtHours(hrsCalc)} hrs for ${drv.name}` : `${actorName} approved hours`,
        refId: null,
      }
    ));
  };
  const materialOptions = MATERIALS.map(m => ({ value: m.code, label: m.label }));
  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <h1 style={{ ...T.h2, fontWeight: 700, letterSpacing: -0.8, margin: 0, color: C.ink, marginBottom: 6 }}>Approvals</h1>
      <div style={{ ...T.bodySm, color: C.inkDim, marginBottom: S[5] }}>Click any value to fix typos before approving.</div>
      <div style={{ marginBottom: S[3], display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <Label>Pending loads ({pendingLoads.length})</Label>
        {pendingLoads.length > 0 && <Btn variant="secondary" size="sm" onClick={() => pendingLoads.forEach(l => approveLoad(l.id))}>Approve all</Btn>}
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        {pendingLoads.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>Nothing pending.</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead><tr><Th>Time</Th><Th>Truck</Th><Th>Driver</Th><Th>Material</Th><Th>CY</Th><Th>Photo</Th><Th></Th></tr></thead>
            <tbody>
              {pendingLoads.map(l => {
                const t = db.trucks.find(t => t.id === l.truckId);
                const d = db.drivers.find(d => d.id === l.driverId);
                return (
                  <Tr key={l.id}>
                    <Td mono><EditableText value={l.time} onSave={(v) => updateLoad(l.id, { time: v })} mono placeholder="HH:MM" /></Td>
                    <Td mono><span style={{ color: C.accent }}>#{t.plate}</span></Td>
                    <Td>{d.name}</Td>
                    <Td><EditableSelect value={l.material} options={materialOptions} onSave={(v) => updateLoad(l.id, { material: v })} /></Td>
                    <Td mono><span style={{ color: C.accent, fontWeight: 700 }}><EditableText value={String(l.cy != null ? l.cy : '')} onSave={(v) => updateLoad(l.id, { cy: parseFloat(v) || 0 })} mono /> CY</span></Td>
                    <Td>{l.photo ? <img src={l.photo} alt="" style={{ width: 32, height: 32, borderRadius: R.xs, objectFit: 'cover', cursor: 'pointer' }} onClick={() => window.open(l.photo, '_blank')} /> : <span style={{ ...T.micro, color: C.inkFaint}}>—</span>}</Td>
                    <Td align="right">
                      <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                        <Btn variant="ghost" size="xs" onClick={() => rejectLoad(l.id)}>Reject</Btn>
                        <Btn variant="ok" size="xs" onClick={() => approveLoad(l.id)}>Approve</Btn>
                      </div>
                    </Td>
                  </Tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
      <div style={{ marginBottom: S[3] }}><Label>Pending hour adjustments ({pendingHrs.length})</Label></div>
      <Card padding={0}>
        {pendingHrs.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim}}>Nothing pending.</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead><tr><Th>Driver</Th><Th>Truck</Th><Th>Clock-in</Th><Th>Break</Th><Th align="right">Hours</Th><Th></Th></tr></thead>
            <tbody>
              {pendingHrs.map(h => {
                const t = db.trucks.find(t => t.id === h.truckId);
                const d = db.drivers.find(d => d.id === h.driverId);
                return (
                  <Tr key={h.id}>
                    <Td>{d.name}</Td>
                    <Td mono><span style={{ color: C.accent }}>#{t.plate}</span></Td>
                    <Td mono><EditableText value={h.clockIn} onSave={(v) => updateHr(h.id, { clockIn: v })} mono placeholder="HH:MM" /></Td>
                    <Td mono><EditableText value={String(h.breakMin)} onSave={(v) => updateHr(h.id, { breakMin: parseInt(v) || 0 })} mono /> min</Td>
                    <Td align="right" mono>{fmtHours(calcHours(h.clockIn, h.breakMin, h.clockOut))}</Td>
                    <Td align="right"><Btn variant="ok" size="xs" onClick={() => approveHr(h.id)}>Approve</Btn></Td>
                  </Tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function HaulerInvoices({ hauler, projectId, project, trucks, hours, db, setDb }) {
  const [showDraft, setShowDraft] = useState(false);
  const invoices = (db.invoices || []).filter(i => i.haulerId === hauler.id && i.projectId === projectId);

  const buildDraft = () => {
    const today = new Date().toISOString().slice(0, 10);
    const lineItems = trucks.filter(t => hours.some(h => h.truckId === t.id)).map(t => {
      const hr = hours.find(h => h.truckId === t.id);
      const driver = db.drivers.find(d => d.id === t.driverId);
      const truckHours = hr ? calcHours(hr.clockIn, hr.breakMin, hr.clockOut) : 0;
      const rate = db.rates[t.type];
      return {
        id: 'li-' + Math.random().toString(36).substring(2, 7),
        truckPlate: t.plate, truckType: t.type, driverName: driver ? driver.name : '—',
        hours: parseFloat(truckHours.toFixed(2)), rate, amount: parseFloat((truckHours * rate).toFixed(2)),
      };
    });
    const loadCount = db.loads.filter(l => l.projectId === projectId && l.status === 'approved').length;
    const totalCY = db.loads.filter(l => l.projectId === projectId && l.status === 'approved').reduce((s, l) => s + (l.cy || 0), 0);
    return {
      id: 'inv-' + Date.now(),
      haulerId: hauler.id, projectId,
      number: 'INV-' + String(Math.floor(Math.random() * 9000) + 1000),
      periodStart: today, periodEnd: today,
      issuedDate: today,
      billTo: project.gc,
      lineItems,
      loadCount, totalCY,
      notes: '',
      status: 'draft',
    };
  };

  const [draft, setDraft] = useState(null);
  const startDraft = () => { setDraft(buildDraft()); setShowDraft(true); };

  const updateDraft = (patch) => setDraft(d => ({ ...d, ...patch }));
  const updateLine = (idx, patch) => setDraft(d => ({ ...d, lineItems: d.lineItems.map((li, i) => i === idx ? { ...li, ...patch, amount: parseFloat((((patch.hours != null ? patch.hours : li.hours) * (patch.rate != null ? patch.rate : li.rate))).toFixed(2)) } : li) }));
  const removeLine = (idx) => setDraft(d => ({ ...d, lineItems: d.lineItems.filter((_, i) => i !== idx) }));

  const sendInvoice = () => {
    const finalDraft = { ...draft, status: 'sent', sentAt: new Date().toISOString() };
    setDb(prev => appendActivity(
      { ...prev, invoices: [...(prev.invoices || []), finalDraft] },
      {
        type: 'invoice.sent',
        actorRole: 'hauler',
        actorId: hauler ? hauler.id : null,
        summary: `${hauler ? hauler.name : 'A hauler'} sent invoice ${finalDraft.number} to ${finalDraft.billTo}`,
        refId: null,
      }
    ));
    alert('Invoice ' + finalDraft.number + ' sent to ' + finalDraft.billTo + '.');
    setShowDraft(false);
    setDraft(null);
  };
