            // hash of truckId+now so the demo feels live without random churn.
            const openShifts = (db.hours || []).filter(h => h.status === 'open');
            const cycleStates = ['Loading', 'Hauling', 'Dumping', 'Returning'];
            const stateColor = (s) => s === 'Hauling' ? C.accent : s === 'Loading' ? C.info : s === 'Dumping' ? C.warn : s === 'Returning' ? C.inkDim : C.inkDim;
            const minutesSinceClockIn = (clockIn) => {
              const [hh, mm] = (clockIn || '00:00').split(':').map(Number);
              const now = new Date();
              return Math.max(0, (now.getHours() * 60 + now.getMinutes()) - (hh * 60 + mm));
            };
            const rows = openShifts.map(h => {
              const t = db.trucks.find(tt => tt.id === h.truckId);
              const d = db.drivers.find(dd => dd.id === h.driverId);
              const proj = db.projects.find(pp => pp.id === h.projectId);
              const mins = minutesSinceClockIn(h.clockIn);
              // Bucket: every ~12 min the truck moves to next state.
              const stateIdx = Math.floor(mins / 12) % cycleStates.length;
              const state = cycleStates[stateIdx];
              // ETA = remaining minutes in current cycle (12 - mins%12).
              const etaMin = 12 - (mins % 12);
              // Last ping: 5-55s ago, deterministic per truck.
              const ping = 5 + ((t ? t.plate.charCodeAt(0) : 0) % 50);
              return { h, t, d, proj, state, etaMin, ping };

                <Th>Dump</Th>
                <Th align="right">Priority</Th>
                <Th align="right">Action</Th>
              </tr>
            </thead>
            <tbody>
              {queueItems.map(({ req, proj, mat, reqAssigned, priority }) => (
                <Tr key={req.id} onClick={() => navigate('/admin/requests/' + req.id)}>
                  <Td>
                    <div style={{ ...T.bodySm, fontWeight: 700, color: C.ink }}>{proj ? proj.name : '—'}</div>
                    <div style={{ ...T.caption, color: C.inkDim }}>{proj ? proj.gc : ''}</div>
                  </Td>
                  <Td>{mat ? mat.label : req.materialCode}</Td>
                  <Td align="right" mono><span style={{ color: C.accent, fontWeight: 700 }}>{req.volumeCY} CY</span></Td>
                  <Td align="right" mono>{reqAssigned > 0 ? <span style={{ color: C.inkDim }}>{reqAssigned} assigned</span> : <span style={{ color: C.warn, fontWeight: 600 }}>unassigned</span>}</Td>
                  <Td dim>{(req.pickupLocation && (req.pickupLocation.name || req.pickupLocation.address)) || (proj ? proj.address : '—')}</Td>
                  <Td dim>{(req.dropoffLocation && (req.dropoffLocation.name || req.dropoffLocation.address)) || '—'}</Td>
                  <Td align="right"><Pill color={priorityTone(priority)} soft={priority === 'High' ? C.warnSoft : priority === 'Med' ? C.infoSoft : 'rgba(255,255,255,0.05)'}>{priority}</Pill></Td>
                  <Td align="right"><Btn variant="primary" size="xs" onClick={(e) => { e.stopPropagation(); navigate('/admin/requests/' + req.id); }}>Assign</Btn></Td>
                </Tr>
              ))}
            </tbody>
          </table>
        )}
      </Card>

      {/* Completed hauls — folded down, click to drill in */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.inkDim}>Completed</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ ...T.monoSm, color: C.inkDim }}>{completed.length}</span>
      </div>
      <Card padding={0}>
        {completed.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim }}>No completed hauls.</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr>
                <Th>Haul</Th>
                <Th>GC</Th>
                <Th align="right">Loads</Th>
                <Th align="right">Hours</Th>
                <Th align="right">Revenue</Th>
                <Th></Th>
              </tr>
            </thead>
            <tbody>
              {completed.map(p => (
                <Tr key={p.id} onClick={() => navigate('/admin/requests?projectId=' + p.id)} style={{ opacity: 0.7 }}>
                  <Td><span style={{ fontWeight: 600, color: C.ink }}>{p.name}</span></Td>
                  <Td dim>{p.gc}</Td>
                  <Td align="right" mono>{p.loadsCompleted}</Td>
                  <Td align="right" mono>{fmtHours(p.totalHours)}</Td>
                  <Td align="right" mono>{fmtMoney(p.totalRevenue)}</Td>
                  <Td align="right" style={{ color: C.accent }}><ChevronRight /></Td>
                </Tr>
              ))}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function NotFound({ navigate }) {

function AdminNewProject({ db, setDb, navigate }) {
  const [step, setStep] = useState(1);
  const [basics, setBasics] = useState({ name: '', code: '', gc: '', address: '', startDate: '', status: 'active', materials: [] });
  const [haulerIds, setHaulerIds] = useState([]);
  const [trucks, setTrucks] = useState([]);
  const [onlyUnassigned, setOnlyUnassigned] = useState(false);
  const [codeTouched, setCodeTouched] = useState(false);

  const inputStyle = WIZARD_INPUT_STYLE;

  const deriveCode = (name) => {
    const words = (name || '').trim().split(/\s+/).filter(Boolean);
    if (words.length === 0) return '';
    if (words.length === 1) return words[0].replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase();
    return words.map(w => w[0]).join('').replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase();
  };
  const effectiveCode = codeTouched ? basics.code.toUpperCase() : deriveCode(basics.name);

  const existingIds = new Set(db.projects.map(p => p.id));
  const codeDuplicate = effectiveCode && existingIds.has(effectiveCode);
  const duplicateOwner = codeDuplicate ? db.projects.find(p => p.id === effectiveCode) : null;
  const codeValid = effectiveCode.length >= 2 && effectiveCode.length <= 4 && !codeDuplicate;

  const basicsValid = !!basics.name.trim() && codeValid && !!basics.gc.trim() && !!basics.address.trim() && !!basics.startDate && basics.materials.length > 0;
  const haulersValid = haulerIds.length > 0;
  const trucksValid = trucks.every(t => t.haulerId && haulerIds.includes(t.haulerId));

  const toggleMaterial = (mcode) => setBasics(b => ({ ...b, materials: b.materials.includes(mcode) ? b.materials.filter(x => x !== mcode) : [...b.materials, mcode] }));
  const toggleHauler = (opId) => {
    const wasSelected = haulerIds.includes(opId);
    setHaulerIds(prev => wasSelected ? prev.filter(x => x !== opId) : [...prev, opId]);
    if (wasSelected) setTrucks(prev => prev.map(t => t.haulerId === opId ? { ...t, haulerId: '' } : t));
  };
  const toggleTruck = (truckId, defaultOpId) => {
    setTrucks(prev => {
      const exists = prev.find(t => t.truckId === truckId);
      if (exists) return prev.filter(t => t.truckId !== truckId);
      return [...prev, { truckId, haulerId: defaultOpId || '' }];
    });
  };
  const setTruckHauler = (truckId, opId) => setTrucks(prev => prev.map(t => t.truckId === truckId ? { ...t, haulerId: opId } : t));

  const cancel = () => navigate('/admin');
  const back = () => setStep(s => Math.max(1, s - 1));
  const next = () => setStep(s => Math.min(4, s + 1));

  const submit = () => {
    const id = effectiveCode;
    const newProject = {
      id,
      code: id + '-' + String(db.projects.length + 1).padStart(2, '0'),
      name: basics.name.trim(),
      gc: basics.gc.trim(),
      address: basics.address.trim(),
      startDate: basics.startDate,
      status: basics.status,
      material: basics.materials,
    };
    setDb(prev => appendActivity(
      {
        ...prev,
        projects: [...prev.projects, newProject],
        haulers: prev.haulers.map(o => haulerIds.includes(o.id) ? { ...o, projectIds: [...o.projectIds, id] } : o),
        trucks: prev.trucks.map(t => {
          const sel = trucks.find(x => x.truckId === t.id);
          return sel ? { ...t, projectId: id, haulerId: sel.haulerId } : t;
        }),
      },
      {
        type: 'project.created',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin created project ${newProject.name}`,
        refId: newProject.id,
      }
    ));
    navigate('/admin/requests?projectId=' + id);
  };

  const Chip = ({ active, onClick, children, warn }) => (
    <button onClick={onClick} style={{
      ...T.bodySm, background: active ? C.accent : 'transparent',
      color: active ? C.bg : (warn ? C.warn : C.ink),
      border: `1px solid ${active ? C.accent : (warn ? C.warn : C.ruleHi)}`,
      borderRadius: R.pill, padding: '8px 14px', fontWeight: 600,
      cursor: 'pointer',
    }}>{children}</button>
  );

  const nextDisabled = (step === 1 && !basicsValid) || (step === 2 && !haulersValid) || (step === 3 && !trucksValid);
  const allValid = basicsValid && haulersValid && trucksValid;

  return (
    <WizardShell
      navigate={navigate}
      steps={['Basics', 'Haulers', 'Trucks', 'Review']}

      onCancel={cancel}
      onBack={back}
      onNext={next}
      onSubmit={submit}
      nextDisabled={nextDisabled}
      submitDisabled={!allValid}
      submitLabel="Create haul"
      crumbs={[{ label: 'Admin', to: '/admin' }, { label: 'Hauls', to: '/admin' }, { label: 'New haul' }]}
      eyebrow="New haul"
      title="Create a new haul"
    >
        {step === 1 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
            <Label>Step 1 — Haul basics</Label>
            <div>
              <div style={{ ...T.caption, marginBottom: 4 }}>Haul name</div>
              <input value={basics.name} onChange={e => setBasics(b => ({ ...b, name: e.target.value }))} placeholder="e.g., West Side Phase 2" style={inputStyle} autoFocus />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3] }}>
              <div>
                <div style={{ ...T.caption, marginBottom: 4 }}>Code (2–4 chars)</div>
                <input value={effectiveCode} onChange={e => {
                  const v = e.target.value;
                  setCodeTouched(v.length > 0);
                  setBasics(b => ({ ...b, code: v }));
                }} placeholder="e.g., WSP" style={{ ...inputStyle, fontFamily: F.mono, textTransform: 'uppercase' }} maxLength={4} />
                {codeDuplicate && (
                  <div style={{ ...T.caption, color: C.warn, marginTop: 6 }}>
                    Code "{effectiveCode}" is already used by "{duplicateOwner.name}".
                  </div>
                )}
                {!codeDuplicate && effectiveCode && effectiveCode.length < 2 && (
                  <div style={{ ...T.caption, color: C.warn, marginTop: 6 }}>Code must be at least 2 characters.</div>
                )}
              </div>
              <div>
                <div style={{ ...T.caption, marginBottom: 4 }}>Start date</div>
                <input type="date" value={basics.startDate} onChange={e => setBasics(b => ({ ...b, startDate: e.target.value }))} style={inputStyle} />
              </div>
              <div>
                <div style={{ ...T.caption, marginBottom: 4 }}>Status</div>
                <select value={basics.status} onChange={e => setBasics(b => ({ ...b, status: e.target.value }))} style={inputStyle}>
                  <option value="active">Active</option>
                  <option value="upcoming">Upcoming</option>
                </select>
              </div>
            </div>
            <div>
              <div style={{ ...T.caption, marginBottom: 4 }}>General contractor</div>
              <input value={basics.gc} onChange={e => setBasics(b => ({ ...b, gc: e.target.value }))} placeholder="e.g., Acme Contractors" style={inputStyle} />
            </div>
            <div>
              <div style={{ ...T.caption, marginBottom: 4 }}>Address</div>
              <input value={basics.address} onChange={e => setBasics(b => ({ ...b, address: e.target.value }))} placeholder="e.g., 1234 Main St, Denver CO" style={inputStyle} />
            </div>
            <div>
              <div style={{ ...T.caption, marginBottom: S[2] }}>Materials (pick one or more)</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: S[2] }}>
                {MATERIALS.map(m => (
                  <Chip key={m.code} active={basics.materials.includes(m.code)} onClick={() => toggleMaterial(m.code)}>{m.label}</Chip>
                ))}
              </div>
            </div>
          </div>
        )}

        {step === 2 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: S[3] }}>
            <Label>Step 2 — Assign haulers</Label>
            <div style={{ ...T.bodySm, color: C.inkDim }}>Pick the haulers who will run this haul. You'll assign trucks to them in the next step.</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
              {db.haulers.map(op => {
                const selected = haulerIds.includes(op.id);
                const trucksManaged = db.trucks.filter(t => t.haulerId === op.id).length;
                return (
                  <div key={op.id} onClick={() => toggleHauler(op.id)} style={{
                    display: 'flex', alignItems: 'center', gap: S[3], padding: S[3],
                    background: selected ? C.accentSoft : C.surfaceHi,
                    border: `1px solid ${selected ? C.accent : C.ruleHi}`,
                    borderRadius: R.md, cursor: 'pointer', flexWrap: 'wrap',
                  }}>
                    <div style={{
                      ...T.body, width: 22, height: 22, borderRadius: 6,
                      background: selected ? C.accent : 'transparent',
                      border: `2px solid ${selected ? C.accent : C.ruleHi}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: C.bg, fontFamily: F.display, fontWeight: 700, flexShrink: 0,
                    }}>{selected ? 'âœ“' : ''}</div>
                    <Avatar name={op.name} color={C.accent} logo={op.logo} />
                    <div style={{ flex: 1, minWidth: 140 }}>
                      <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink }}>{op.name}</div>
                      <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>{op.phone}</div>
                    </div>
                    <div style={{ ...T.monoSm, color: C.inkDim }}>
                      {op.projectIds.length} {op.projectIds.length === 1 ? 'haul' : 'hauls'} · {trucksManaged} {trucksManaged === 1 ? 'truck' : 'trucks'}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ ...T.caption }}>{haulerIds.length} hauler{haulerIds.length === 1 ? '' : 's'} selected</div>
          </div>
        )}

        {step === 3 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: S[3] }}>
            <Label>Step 3 — Assign trucks</Label>
            <div style={{ ...T.bodySm, color: C.inkDim }}>Optional. Pick trucks for this haul and assign each to one of the haulers you selected.</div>
            <div>
              <Chip active={onlyUnassigned} onClick={() => setOnlyUnassigned(v => !v)}>Only show unassigned</Chip>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
              {db.trucks.filter(t => onlyUnassigned ? !t.projectId : true).map(t => {
                const sel = trucks.find(x => x.truckId === t.id);
                const selected = !!sel;
                const currentProj = t.projectId ? db.projects.find(p => p.id === t.projectId) : null;
                const currentOp = t.haulerId ? db.haulers.find(o => o.id === t.haulerId) : null;
                const reassign = !!t.projectId;
                const typeLabel = (TRUCK_TYPES.find(x => x.code === t.type) || {}).label || t.type;
                return (
                  <div key={t.id} style={{
                    display: 'flex', alignItems: 'center', gap: S[3], padding: S[3],
                    background: selected ? C.accentSoft : C.surfaceHi,
                    border: `1px solid ${selected ? C.accent : C.ruleHi}`,
                    borderRadius: R.md, flexWrap: 'wrap',
                  }}>
                    <div onClick={() => toggleTruck(t.id)} style={{
                      ...T.body, width: 22, height: 22, borderRadius: 6,
                      background: selected ? C.accent : 'transparent',
                      border: `2px solid ${selected ? C.accent : C.ruleHi}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: C.bg, fontFamily: F.display, fontWeight: 700, flexShrink: 0, cursor: 'pointer',
                    }}>{selected ? 'âœ“' : ''}</div>
                    <div onClick={() => toggleTruck(t.id)} style={{ flex: 1, minWidth: 180, cursor: 'pointer' }}>

                      <div style={{ ...T.monoSm, color: C.inkDim, marginTop: 2 }}>
                        {t.hauler} · {currentProj ? `On ${currentProj.name}${currentOp ? ' / ' + currentOp.name : ''}` : 'Unassigned'}
                      </div>
                    </div>
                    {reassign && <Pill color={C.warn} soft={C.warnSoft}>Reassign</Pill>}
                    {selected && (
                      <select value={sel.haulerId} onChange={e => setTruckHauler(t.id, e.target.value)} style={{ ...T.bodySm, ...inputStyle, width: 'auto', padding: '8px 10px'}}>
                        <option value="">Pick a hauler…</option>
                        {haulerIds.map(opId => {
                          const op = db.haulers.find(o => o.id === opId);
                          return op ? <option key={opId} value={opId}>{op.name}</option> : null;

                    )}

            </div>
            <div style={{ ...T.caption }}>
              {trucks.length} selected{trucks.length > 0 && !trucksValid ? ' · pick a hauler for each' : ''}
            </div>
          </div>
        )}

        {step === 4 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
            <Label>Step 4 — Review</Label>
            <div>
              <Label style={{ marginBottom: S[2] }}>Basics</Label>
              <div style={{ background: C.surfaceHi, borderRadius: R.md, padding: S[3], display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: S[3] }}>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Name</div><div style={{ fontFamily: F.body, color: C.ink }}>{basics.name}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Code</div><div style={{ fontFamily: F.mono, color: C.ink }}>{effectiveCode}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>GC</div><div style={{ fontFamily: F.body, color: C.ink }}>{basics.gc}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Address</div><div style={{ fontFamily: F.body, color: C.ink }}>{basics.address}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Start date</div><div style={{ fontFamily: F.mono, color: C.ink }}>{basics.startDate}</div></div>
                <div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Status</div><div style={{ fontFamily: F.body, color: C.ink, textTransform: 'capitalize' }}>{basics.status}</div></div>
                <div style={{ gridColumn: '1 / -1' }}>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>Materials</div>
                  <div style={{ display: 'flex', gap: S[2], flexWrap: 'wrap' }}>
                    {basics.materials.map(mc => { const m = MATERIALS.find(x => x.code === mc); return <Pill key={mc}>{m ? m.label : mc}</Pill>; })}
                  </div>
                </div>
              </div>
            </div>
            <div>
              <Label style={{ marginBottom: S[2] }}>Haulers ({haulerIds.length})</Label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
                {haulerIds.map(opId => {
                  const op = db.haulers.find(o => o.id === opId);
                  return op ? (
                    <div key={opId} style={{ display: 'flex', alignItems: 'center', gap: S[3], background: C.surfaceHi, borderRadius: R.md, padding: S[3] }}>
                      <Avatar name={op.name} color={C.accent} logo={op.logo} />
                      <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink }}>{op.name}</div>
                      <div style={{ ...T.monoSm, color: C.inkDim }}>{op.phone}</div>
                    </div>
                  ) : null;
                })}
              </div>
            </div>
            <div>
              <Label style={{ marginBottom: S[2] }}>Trucks ({trucks.length})</Label>
              {trucks.length === 0 ? (
                <div style={{ ...T.bodySm, color: C.inkDim, background: C.surfaceHi, borderRadius: R.md, padding: S[3] }}>No trucks assigned yet — you can add them later.</div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
                  {trucks.map(sel => {
                    const t = db.trucks.find(x => x.id === sel.truckId);
                    const op = db.haulers.find(o => o.id === sel.haulerId);
                    const typeLabel = t ? ((TRUCK_TYPES.find(x => x.code === t.type) || {}).label || t.type) : '?';
                    return t ? (
                      <div key={sel.truckId} style={{ display: 'flex', alignItems: 'center', gap: S[3], background: C.surfaceHi, borderRadius: R.md, padding: S[3], flexWrap: 'wrap' }}>
                        <div style={{ fontFamily: F.display, fontWeight: 600, color: C.ink }}>#{t.plate} · {typeLabel}</div>
                        <div style={{ ...T.monoSm, color: C.inkDim }}>{t.hauler}</div>
                        <div style={{ flex: 1 }} />
                        <div style={{ ...T.caption }}>→ {op ? op.name : 'No hauler'}</div>
                      </div>
                    ) : null;
                  })}
                </div>
              )}
            </div>
          </div>
        )}
    </WizardShell>
  );
}

// =====================================================================
// AdminNewHauler — 3-step wizard. /admin/haulers/new
//   1. Details (name, email, phone, optional company)
//   2. Assignments (multi-select active/upcoming projects, optional)
//   3. Review + Create
// On submit, creates a new hauler record with id 'op-xxxxx'.
// =====================================================================
function AdminNewHauler({ db, setDb, navigate }) {
  const [step, setStep] = useState(1);
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [phone, setPhone] = useState('');
  const [company, setCompany] = useState('');
  const [projectIds, setProjectIds] = useState([]);

  const inputStyle = WIZARD_INPUT_STYLE;
  const emailValid = /.+@.+\..+/.test(email.trim());
  const detailsValid = !!name.trim() && emailValid && !!phone.trim();

  const eligibleProjects = db.projects.filter(p => p.status === 'active' || p.status === 'upcoming');
  const toggleProject = (pid) =>
    setProjectIds(prev => prev.includes(pid) ? prev.filter(x => x !== pid) : [...prev, pid]);

  const cancel = () => navigate('/admin/haulers');
  const back   = () => setStep(s => Math.max(1, s - 1));
  const next   = () => setStep(s => Math.min(3, s + 1));
  const submit = () => {
    const newId = 'op-' + Math.random().toString(36).substring(2, 7);
    const newHauler = {
      id: newId,
      name: name.trim(),
      email: email.trim(),
      phone: phone.trim(),
      projectIds,
      ...(company.trim() ? { company: company.trim() } : {}),
    };
    setDb(prev => appendActivity(
      { ...prev, haulers: [...prev.haulers, newHauler] },
      {
        type: 'hauler.created',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin onboarded hauler ${newHauler.name}`,
        refId: newId,
      }
    ));
    navigate('/admin/haulers/' + newId);
  };

  const nextDisabled = step === 1 && !detailsValid;

  return (
    <WizardShell
      navigate={navigate}
      steps={['Details', 'Assignments', 'Review']}
      currentStep={step}

// =====================================================================
// AdminNewDriver — single-step wizard. /admin/drivers/new
// Fields: name (required), licenseNumber (optional), phone (required),
// default truck (optional — assigns this driver to a currently-unassigned
// truck on submit).
// =====================================================================
function AdminNewDriver({ db, setDb, navigate }) {
  const [name, setName] = useState('');
  const [licenseNumber, setLicenseNumber] = useState('');
  const [phone, setPhone] = useState('');
  const [defaultTruckId, setDefaultTruckId] = useState('');

  const inputStyle = WIZARD_INPUT_STYLE;
  const detailsValid = !!name.trim() && !!phone.trim();
  const unassignedTrucks = db.trucks.filter(t => !t.driverId);

  const cancel = () => navigate('/admin/haulers');
  const submit = () => {
    const newId = 'dr-' + Math.random().toString(36).substring(2, 7);
    const newDriver = {
      id: newId,
      name: name.trim(),
      phone: phone.trim(),
      ...(licenseNumber.trim() ? { licenseNumber: licenseNumber.trim() } : {}),
    };
    setDb(prev => appendActivity(
      {
        ...prev,
        drivers: [...prev.drivers, newDriver],
        trucks: defaultTruckId
          ? prev.trucks.map(t => t.id === defaultTruckId ? { ...t, driverId: newId } : t)
          : prev.trucks,
      },
      {
        type: 'driver.created',
        actorRole: 'admin',
        actorId: null,
        summary: `Admin added driver ${newDriver.name}`,
        refId: newId,
      }
    ));
    // If a truck was selected, land on that truck's hauler page when known;
    // otherwise return to the haulers list (no flat driver index exists).
    if (defaultTruckId) {
      const t = db.trucks.find(x => x.id === defaultTruckId);
      if (t && t.haulerId) { navigate('/admin/haulers/' + t.haulerId); return; }
    }
    navigate('/admin/haulers');
  };

  return (
    <WizardShell
      navigate={navigate}
      steps={['Details']}
      currentStep={1}
      onCancel={cancel}
      onSubmit={submit}
      submitDisabled={!detailsValid}
      submitLabel="Create driver"
      crumbs={[{ label: 'Admin', to: '/admin' }, { label: 'Haulers', to: '/admin/haulers' }, { label: 'New driver' }]}
      eyebrow="New driver"
      title="Add a driver to your network"
    >
      <div style={{ display: 'flex', flexDirection: 'column', gap: S[4] }}>
        <Label>Driver details</Label>
        <div>
          <div style={{ ...T.caption, marginBottom: 4 }}>Name</div>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g., Jane Smith" style={inputStyle} autoFocus />
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: S[3] }}>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>Phone</div>
            <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="e.g., (303) 555-0150" style={inputStyle} />
          </div>
          <div>
            <div style={{ ...T.caption, marginBottom: 4 }}>License number (optional)</div>
            <input value={licenseNumber} onChange={e => setLicenseNumber(e.target.value)} placeholder="e.g., CDL-A 12345678" style={{ ...inputStyle, fontFamily: F.mono }} />
          </div>
        </div>
        <div>
          <div style={{ ...T.caption, marginBottom: 4 }}>Default truck (optional)</div>
          <select value={defaultTruckId} onChange={e => setDefaultTruckId(e.target.value)} style={inputStyle}>
            <option value="">— Leave unassigned —</option>
            {unassignedTrucks.map(t => {
              const typeLabel = (TRUCK_TYPES.find(x => x.code === t.type) || {}).label || t.type;
              return <option key={t.id} value={t.id}>#{t.plate} · {typeLabel} · {t.hauler || 'Bench'}</option>;

            <div style={{ ...T.caption, color: C.inkDim, marginTop: 6 }}>No trucks are currently unassigned. You can assign this driver to a truck later.</div>
          )}

      </div>
    </WizardShell>
  );

// =====================================================================
// Charting primitives — small SVG components used by AdminReports.
// Hand-rolled, no chart libraries.
// =====================================================================

// Tiny line+area sparkline. `data` is an array of numbers (oldest → newest).
function Sparkline({ data, width = 120, height = 32, color = C.accent }) {
  if (!data || data.length === 0) return null;
  const max = Math.max(...data, 1);
  const stepX = width / Math.max(data.length - 1, 1);
  const points = data.map((v, i) => `${i * stepX},${height - (v / max) * height}`).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} aria-hidden="true" style={{ display: 'block' }}>
      <polygon points={`0,${height} ${points} ${width},${height}`} fill={color} opacity="0.18" />
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" />
    </svg>
  );
}

// Progress donut. `pct` is 0-100. Hand-rolled SVG, two concentric circles —
// surfaceHi rail + accent fill via stroke-dasharray. Used on AdminHaulRequestDetail
// to show per-truck completion of a multi-truck haul.
function Donut({ pct, size = 80, stroke = 8, label }) {
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  // Stroke arc always clamps to 100; text shows the raw % even when over-delivered
  // so an overage reads honestly. Over-100 also switches the stroke to C.warn.
  const raw = pct || 0;
  const clamped = Math.max(0, Math.min(1, raw / 100));
  const filled = clamped * circumference;
  const empty = circumference - filled;
  const isOver = raw > 100;
  const arcColor = isOver ? C.warn : C.accent;
  const textColor = isOver ? C.warn : C.ink;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-hidden="true" style={{ display: 'block' }}>
        <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke={C.surfaceHi} strokeWidth={stroke} />
        <circle
          cx={size / 2} cy={size / 2} r={radius} fill="none"
          stroke={arcColor} strokeWidth={stroke}
          strokeDasharray={`${filled} ${empty}`}
          strokeDashoffset={circumference / 4}
          transform={`rotate(-90 ${size / 2} ${size / 2})`}
          strokeLinecap="round"
        />
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        alignItems: 'center', justifyContent: 'center', flexDirection: 'column',
      }}>
        <div style={{ ...T.body, fontWeight: 700, color: textColor, lineHeight: 1 }}>{Math.round(raw)}%</div>
        {label && <div style={{ ...T.micro, color: C.inkDim, marginTop: 2 }}>{label}</div>}
      </div>
    </div>
  );
}

// 7-day bar chart. `data` is an array of { iso, count }. Hover/focus a bar →
// tooltip with date + count. SVG scales to its container via viewBox.
function BarChart({ data, color = C.accent, height = 180 }) {
  const [hovered, setHovered] = useState(null);
  const w = 560, h = height;
  const padL = 32, padR = 12, padT = 16, padB = 28;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const max = Math.max(...data.map(d => d.count), 1);
  // Round the y-axis max up to a "nice" number so labels read cleanly.
  const niceMax = (() => {
    if (max <= 5) return 5;
    if (max <= 10) return 10;
    if (max <= 20) return 20;
    if (max <= 50) return 50;
    return Math.ceil(max / 10) * 10;
  })();
  const barCount = data.length;
  const barSlot = innerW / barCount;
  const barW = Math.max(8, barSlot * 0.55);

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{ display: 'block', overflow: 'visible' }} role="img" aria-label="Loads per day, last 7 days">
        {/* Y-axis gridlines + labels at 0, max/2, max */}
        {[0, 0.5, 1].map((frac, i) => {
          const y = padT + innerH - frac * innerH;
          const labelVal = Math.round(niceMax * frac);
          return (
            <g key={i}>
              <line x1={padL} x2={w - padR} y1={y} y2={y} stroke={C.rule} strokeWidth="1" />
              <text x={padL - 8} y={y + 4} fill={C.inkFaint} fontSize="10" fontFamily={F.mono} textAnchor="end">{labelVal}</text>
            </g>
          );
        })}
        {/* Bars */}
        {data.map((d, i) => {
          const barH = (d.count / niceMax) * innerH;
          const x = padL + i * barSlot + (barSlot - barW) / 2;
          const y = padT + innerH - barH;
          const isHover = hovered === i;
          return (
            <g key={d.iso}>
              <rect
                className="jse-bar"
                x={x} y={y} width={barW} height={Math.max(barH, 2)}
                fill={d.iso === TODAY_ISO ? C.accent : color} opacity={isHover ? 1 : (d.iso === TODAY_ISO ? 1 : 0.7)}
                rx="3"
                onMouseEnter={() => setHovered(i)}
                onMouseLeave={() => setHovered(null)}
                onFocus={() => setHovered(i)}
                onBlur={() => setHovered(null)}
                tabIndex={0}
                aria-label={`${d.count} loads on ${isoToShortDate(d.iso)}`}
              />
              {/* Bar count above bar when hovered */}
              {isHover && (
                <text x={x + barW / 2} y={y - 6} fill={C.ink} fontSize="11" fontFamily={F.mono} textAnchor="middle" fontWeight="700">{d.count}</text>
              )}
              {/* Weekday label */}
              <text
                x={padL + i * barSlot + barSlot / 2}
                y={h - padB + 14}
                fill={d.iso === TODAY_ISO ? C.accent : C.inkFaint}
                fontSize="10"
                fontFamily={F.mono}
                textAnchor="middle"
                fontWeight={d.iso === TODAY_ISO ? 700 : 500}
              >
                {isoToWeekdayShort(d.iso)}
              </text>
            </g>
          );
        })}
      </svg>
      {/* Hover tooltip (HTML overlay, positioned with bar index) */}
      {hovered != null && (
        <div style={{
          position: 'absolute', top: 4, right: 4,
          background: C.surfaceMax, border: `1px solid ${C.ruleHi}`, borderRadius: R.md,
          padding: '6px 10px', pointerEvents: 'none',
          fontFamily: F.mono, fontSize: 11, color: C.ink,
        }}>
          <div style={{ color: C.inkDim, fontSize: 10, letterSpacing: 0.6, textTransform: 'uppercase' }}>{isoToShortDate(data[hovered].iso)}</div>
          <div style={{ color: C.accent, fontWeight: 700, marginTop: 2 }}>{data[hovered].count} {data[hovered].count === 1 ? 'load' : 'loads'}</div>
        </div>
      )}
    </div>
  );
}

// =====================================================================
// Date range picker — preset pills + custom date inputs.
// =====================================================================
const RANGE_PRESETS = [
  { key: 'today',     label: 'Today',         days: 1 },
  { key: 'yesterday', label: 'Yesterday',     days: 1 },
  { key: '7d',        label: 'Last 7 days',   days: 7 },
  { key: '30d',       label: 'Last 30 days',  days: 30 },
  { key: 'custom',    label: 'Custom',        days: null },
];

function rangeFromPreset(key, customStart, customEnd) {
  if (key === 'today')     return { startIso: TODAY_ISO, endIso: TODAY_ISO };
  if (key === 'yesterday') return { startIso: YESTERDAY_ISO, endIso: YESTERDAY_ISO };
  if (key === '7d')        return { startIso: isoDaysAgo(6), endIso: TODAY_ISO };
  if (key === '30d')       return { startIso: isoDaysAgo(29), endIso: TODAY_ISO };
  // custom — fall back to today if either input missing
  const s = customStart || TODAY_ISO;
  const e = customEnd || TODAY_ISO;
  return s <= e ? { startIso: s, endIso: e } : { startIso: e, endIso: s };
}

function DateRangePicker({ preset, setPreset, customStart, setCustomStart, customEnd, setCustomEnd }) {
  const inputStyle = {
    background: C.surface, color: C.ink, border: `1px solid ${C.ruleHi}`,
    borderRadius: R.md, padding: '8px 10px', fontFamily: F.mono, fontSize: 13,
    colorScheme: 'dark',
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: S[2], width: '100%' }}>
      {/* Desktop pills */}
      <div className="jse-rangepicker-pills">
        {RANGE_PRESETS.map(p => {
          const active = preset === p.key;
          return (
            <button
              key={p.key}
              onClick={() => setPreset(p.key)}
              style={{
                background: active ? C.accent : 'transparent',
                color: active ? C.bg : C.ink,
                border: `1px solid ${active ? C.accent : C.ruleHi}`,
                borderRadius: R.pill,
                padding: '6px 14px',
                fontFamily: F.display, fontSize: 13, fontWeight: 600,
                cursor: 'pointer', letterSpacing: -0.2,
              }}
            >{p.label}</button>
          );
        })}
      </div>
      {/* Mobile select */}
      <div className="jse-rangepicker-select">
        <select
          value={preset}
          onChange={e => setPreset(e.target.value)}
          style={{
            ...inputStyle, width: '100%', fontFamily: F.display, fontWeight: 600, fontSize: 14, padding: '10px 12px',
          }}
        >
          {RANGE_PRESETS.map(p => <option key={p.key} value={p.key}>{p.label}</option>)}
        </select>
      </div>
      {preset === 'custom' && (
        <div style={{ display: 'flex', gap: S[2], flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ ...T.monoSm, color: C.inkDim }}>From</span>
          <input type="date" value={customStart} max={customEnd || TODAY_ISO} onChange={e => setCustomStart(e.target.value)} style={inputStyle} />
          <span style={{ ...T.monoSm, color: C.inkDim }}>to</span>
          <input type="date" value={customEnd} min={customStart} max={TODAY_ISO} onChange={e => setCustomEnd(e.target.value)} style={inputStyle} />
        </div>
      )}
    </div>
  );
}

function AdminReports({ db, navigate }) {
  const [sort, setSort] = useState({ key: 'name', dir: 'asc' });
  const [preset, setPreset] = useState('today');
  const [customStart, setCustomStart] = useState(isoDaysAgo(6));
  const [customEnd, setCustomEnd] = useState(TODAY_ISO);
  const { startIso, endIso } = rangeFromPreset(preset, customStart, customEnd);

  // Pulse the KPI row when another browser tab pushes new data into our db.
  const remoteNonce = useContext(RemoteUpdateContext);
  const [flashing, setFlashing] = useState(false);
  useEffect(() => {
    if (remoteNonce === 0) return;
    setFlashing(true);
    const id = setTimeout(() => setFlashing(false), 1200);
    return () => clearTimeout(id);
  }, [remoteNonce]);

  // ----- KPIs -----
  const activeProjects = db.projects.filter(p => p.status === 'active');
  const openShifts = db.hours.filter(h => h.status === 'open');
  const onShiftNow = openShifts.length;
  const distinctHaulersOnShift = new Set(
    openShifts.map(h => {
      const t = db.trucks.find(t => t.id === h.truckId);
      return t ? t.haulerId : null;
    }).filter(Boolean)
  ).size;

  // Range-scoped loads + hours. All KPIs, tables, sparklines pull from these.
  const loadsInRange = db.loads.filter(l => l.date && isInRange(l.date, startIso, endIso));
  const hoursInRange = db.hours.filter(h => h.date && isInRange(h.date, startIso, endIso));
  const loadsCount = loadsInRange.length;
  const hoursTotal = hoursInRange.reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);

  // For the delta sub-line, compare to the prior window of the same length.
  // (For "Today" preset this is yesterday — same behavior as before.)
  const rangeDays = (() => {
    const [y1,m1,d1] = startIso.split('-').map(Number);
    const [y2,m2,d2] = endIso.split('-').map(Number);
    const a = Date.UTC(y1, m1-1, d1);
    const b = Date.UTC(y2, m2-1, d2);
    return Math.round((b - a) / 86400000) + 1;
  })();
  const priorEndIso = (() => {
    const [y,m,d] = startIso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m-1, d));
    dt.setUTCDate(dt.getUTCDate() - 1);
    return dt.toISOString().slice(0, 10);
  })();
  const priorStartIso = (() => {
    const [y,m,d] = priorEndIso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m-1, d));
    dt.setUTCDate(dt.getUTCDate() - (rangeDays - 1));
    return dt.toISOString().slice(0, 10);
  })();
  const priorLoadsCount = db.loads.filter(l => l.date && isInRange(l.date, priorStartIso, priorEndIso)).length;
  const priorHoursTotal = db.hours
    .filter(h => h.date && isInRange(h.date, priorStartIso, priorEndIso))
    .reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);

  let deltaPct = null;
  let deltaDir = null;
  if (priorLoadsCount > 0) {
    const diff = loadsCount - priorLoadsCount;
    deltaPct = Math.round(Math.abs(diff / priorLoadsCount) * 100);
    deltaDir = diff >= 0 ? 'up' : 'down';
  }

  // Convenience flags + labels for UI strings that read "yesterday" vs "prior window".
  const isTodayPreset = preset === 'today';
  const priorLabel = isTodayPreset
    ? 'yesterday'
    : `prior ${rangeDays} day${rangeDays === 1 ? '' : 's'}`;

  // ----- Per-day buckets for sparklines + bar chart (always last 7 days for the chart) -----
  const last7Days = Array.from({ length: 7 }, (_, i) => isoDaysAgo(6 - i)); // oldest → newest
  const loadsPerDay7 = last7Days.map(iso => ({
    iso,
    count: db.loads.filter(l => l.date === iso).length,
  }));
  const hoursPerDay7 = last7Days.map(iso =>
    db.hours.filter(h => h.date === iso).reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0)
  );
  const shiftsPerDay7 = last7Days.map(iso =>
    db.hours.filter(h => h.date === iso).length
  );

  // ----- Project status rows (range-scoped) -----
  const projectRows = db.projects.map(p => {
    const ops = db.haulers.filter(o => o.projectIds.includes(p.id));
    const trucks = db.trucks.filter(t => t.projectId === p.id);
    const pLoadsInRange = db.loads.filter(l => l.projectId === p.id && l.date && isInRange(l.date, startIso, endIso));
    const pLoadsPrior = db.loads.filter(l => l.projectId === p.id && l.date && isInRange(l.date, priorStartIso, priorEndIso)).length;
    // "Last load" — last entry within the range. For multi-day ranges the latest
    // load may be on any day inside the range; prefer the latest ISO date, then latest time.
    const lastLoad = pLoadsInRange.reduce((best, l) => {
      if (!best) return l;
      if (l.date > best.date) return l;
      if (l.date === best.date && l.time > best.time) return l;
      return best;
    }, null);
    const avgPerDay = rangeDays > 0 ? +(pLoadsInRange.length / rangeDays).toFixed(1) : 0;
    return {
      id: p.id,
      name: p.name,
      status: p.status || 'active',
      haulers: ops.length,
      trucks: trucks.length,
      loadsInRange: pLoadsInRange.length,
      loadsPrior: pLoadsPrior,
      avgPerDay,
      lastTime: lastLoad ? (rangeDays === 1 ? lastLoad.time : `${isoToShortDate(lastLoad.date)} ${lastLoad.time}`) : '—',
    };
  });

  const statusOrder = { active: 0, upcoming: 1, completed: 2 };
  const sortedRows = [...projectRows].sort((a, b) => {
    const va = a[sort.key];
    const vb = b[sort.key];
    let cmp;
    if (sort.key === 'status') cmp = (statusOrder[a.status] ?? 99) - (statusOrder[b.status] ?? 99);
    else if (va == null && vb == null) cmp = 0;
    else if (va == null) cmp = -1;
    else if (vb == null) cmp = 1;
    else if (typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb));
    return sort.dir === 'asc' ? cmp : -cmp;
  });

  const setSortKey = (k) => {
    setSort(s => s.key === k ? { ...s, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { key: k, dir: 'asc' });
  };

  // Custom sortable header (Th doesn't accept onClick/style props)
  const SortTh = ({ label, k, align = 'left' }) => {
    const active = sort.key === k;
    const arrow = active ? (sort.dir === 'asc' ? ' â–²' : ' â–¼') : '';
    return (
      <th onClick={() => setSortKey(k)} style={{
        textAlign: align, padding: '10px 14px', borderBottom: `1px solid ${C.rule}`,
        fontFamily: F.mono, fontSize: 10, fontWeight: 600,
        color: active ? C.accent : C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase',
        whiteSpace: 'nowrap', cursor: 'pointer', userSelect: 'none',
      }}>{label}{arrow}</th>
    );
  };

  const statusColor = {
    active:    { color: C.accent, soft: C.accentSoft, label: 'Active' },
    upcoming:  { color: C.info,   soft: C.infoSoft,   label: 'Upcoming' },
    completed: { color: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: 'Completed' },
  };

  // ----- Hauler productivity (range-scoped) -----
  const haulerRows = db.haulers.map(op => {
    const opTrucks = db.trucks.filter(t => t.haulerId === op.id);
    const opTruckIds = new Set(opTrucks.map(t => t.id));
    const ldsInRange = db.loads.filter(l => l.date && isInRange(l.date, startIso, endIso) && opTruckIds.has(l.truckId)).length;
    const hrsInRange = db.hours
      .filter(h => h.date && isInRange(h.date, startIso, endIso) && opTruckIds.has(h.truckId))
      .reduce((s, h) => s + calcHours(h.clockIn, h.breakMin, h.clockOut), 0);
    const activeProjs = op.projectIds.filter(pid => {
      const p = db.projects.find(p => p.id === pid);
      return p && p.status === 'active';
    }).length;
    return { id: op.id, name: op.name, loadsInRange: ldsInRange, hoursInRange: hrsInRange, activeProjects: activeProjs };
  })
    .sort((a, b) => b.loadsInRange - a.loadsInRange || b.hoursInRange - a.hoursInRange)
    .slice(0, 10);

  // ----- Truck utilization (range-scoped) -----
  const truckRows = db.trucks.map(t => {
    const ldsInRange = db.loads.filter(l => l.date && isInRange(l.date, startIso, endIso) && l.truckId === t.id).length;
    const driver = db.drivers.find(d => d.id === t.driverId);
    const project = db.projects.find(p => p.id === t.projectId);
    const inService = db.hours.some(h => h.truckId === t.id && h.status === 'open');
    return {
      id: t.id,
      plate: t.plate,
      type: t.type,
      loadsInRange: ldsInRange,
      driverName: driver ? driver.name : '—',
      projectName: project ? project.name : '—',
      status: inService ? 'inservice' : 'idle',
    };
  }).sort((a, b) => b.loadsInRange - a.loadsInRange || String(a.plate).localeCompare(String(b.plate)));

  // ----- Top-level empty state: no projects -----
  if (db.projects.length === 0) {
    return (
      <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
        <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Reports' }]} navigate={navigate} />
        <EmptyState
          icon={<ProjectIcon size={40} />}
          title="No hauls yet"
          body="Create one to start generating activity reports."
          action={<Btn variant="primary" onClick={() => navigate('/admin/new')}>+ New haul</Btn>}
        />
      </div>
    );
  }

  const deltaColor = deltaDir === 'down' ? C.warn : C.ok;
  const deltaArrow = deltaDir === 'up' ? '▲' : '▼';

  // Range label for headlines + table headers (e.g. "Today", "Last 7 days").
  const presetMeta = RANGE_PRESETS.find(p => p.key === preset);
  const rangeLabel = preset === 'custom'
    ? `${isoToShortDate(startIso)} – ${isoToShortDate(endIso)}`
    : (presetMeta ? presetMeta.label : 'Range');
  const loadsColLabel = isTodayPreset
    ? 'Loads today'
    : (preset === 'yesterday' ? 'Loads yesterday' : 'Loads in range');
  const priorColLabel = isTodayPreset
    ? 'Loads yesterday'
    : `Avg/day`;

  return (
    <div style={{ padding: S[6], maxWidth: 1280, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Reports' }]} navigate={navigate} />

      <div style={{ marginBottom: S[4], display: 'flex', flexDirection: 'column', gap: S[3] }}>
        <div>
          <Label color={C.accent} style={{ marginBottom: 6 }}>Live activity</Label>
          <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>Reports</h1>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>
            Activity across hauls, haulers, and trucks. Numbers update live as drivers log hours and loads.
          </div>
        </div>

        {/* Date range picker */}
        <Card padding={S[3]} style={{ display: 'flex', flexDirection: 'column', gap: S[2] }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: S[3], flexWrap: 'wrap' }}>
            <Label>Date range</Label>
            <span style={{ ...T.monoSm, color: C.inkDim }}>
              {isoToShortDate(startIso)}{startIso !== endIso ? ` – ${isoToShortDate(endIso)}` : ''} · {rangeDays} {rangeDays === 1 ? 'day' : 'days'}
            </span>
          </div>
          <DateRangePicker
            preset={preset} setPreset={setPreset}
            customStart={customStart} setCustomStart={setCustomStart}
            customEnd={customEnd} setCustomEnd={setCustomEnd}
          />
        </Card>
      </div>

      {/* A. Headline KPI row with sparklines */}
      <div className={flashing ? 'jse-pulse' : undefined} style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[3], marginBottom: S[4] }}>
        <Card padding={S[4]}>
          <Stat
            label="Active hauls"
            value={activeProjects.length}
            sub={`total ${db.projects.length}`}
          />
        </Card>
        <Card padding={S[4]}>
          <Stat
            label="On shift now"
            value={onShiftNow}
            sub={`${distinctHaulersOnShift} hauler${distinctHaulersOnShift === 1 ? '' : 's'}`}
          />
          <div style={{ marginTop: S[2] }}>
            <Sparkline data={shiftsPerDay7} color={C.info} />
          </div>
        </Card>
        <Card padding={S[4]}>
          <Stat
            label={isTodayPreset ? 'Loads today' : `Loads (${rangeLabel.toLowerCase()})`}
            value={loadsCount}
            sub={
              priorLoadsCount === 0
                ? `no ${priorLabel} data`
                : `${deltaArrow} ${deltaPct}% vs ${priorLabel} (${priorLoadsCount})`
            }
          />
          <div style={{ marginTop: S[2] }}>
            <Sparkline data={loadsPerDay7.map(d => d.count)} color={C.accent} />
          </div>
        </Card>
        <Card padding={S[4]}>
          <Stat
            label={isTodayPreset ? 'Hours today' : `Hours (${rangeLabel.toLowerCase()})`}
            value={fmtHours(hoursTotal)}
            sub={`${priorLabel} total ${fmtHours(priorHoursTotal)}h`}
          />
          <div style={{ marginTop: S[2] }}>
            <Sparkline data={hoursPerDay7} color={C.ok} />
          </div>
        </Card>
      </div>

      {/* B. Daily activity summary */}
      <Card padding={S[4]} style={{ marginBottom: S[4] }}>
        <Label style={{ marginBottom: 6 }}>{isTodayPreset ? 'Daily activity' : `${rangeLabel} activity`}</Label>
        {loadsCount === 0 ? (
          <div style={{ ...T.body, color: C.inkDim }}>No loads logged in this range.</div>
        ) : priorLoadsCount === 0 ? (
          <div style={{ ...T.bodyLg, fontFamily: F.display, color: C.ink, fontWeight: 600 }}>
            {isTodayPreset ? 'Today' : rangeLabel} <span style={{ color: C.accent }}>{loadsCount}</span> loads <span style={{ ...T.bodySm, color: C.inkDim, fontWeight: 400 }}>(no {priorLabel} comparison)</span>
          </div>
        ) : (
          <div style={{ ...T.bodyLg, fontFamily: F.display, color: C.ink, fontWeight: 600 }}>
            {isTodayPreset ? 'Today' : rangeLabel} <span style={{ color: C.accent }}>{loadsCount}</span> loads
            <span style={{ ...T.bodySm, color: C.inkDim, fontWeight: 400 }}> — </span>
            <span style={{ color: deltaColor }}>{deltaArrow} {deltaPct}%</span>
            <span style={{ ...T.bodySm, color: C.inkDim, fontWeight: 400 }}> vs {priorLabel} ({priorLoadsCount})</span>
          </div>
        )}
      </Card>

      {/* B2. 7-day bar chart */}
      <Card padding={S[4]} style={{ marginBottom: S[6] }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: S[3] }}>
          <Label>Loads per day, last 7 days</Label>
          <span style={{ ...T.monoSm, color: C.inkDim }}>hover for detail</span>
        </div>
        <BarChart data={loadsPerDay7} />
      </Card>

      {/* C. Project status table */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.accent}>Hauls</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ ...T.monoSm, color: C.inkDim }}>{sortedRows.length}</span>
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              <SortTh label="Haul" k="name" />
              <SortTh label="Status" k="status" />
              <SortTh label="Haulers" k="haulers" align="right" />
              <SortTh label="Trucks" k="trucks" align="right" />
              <SortTh label={loadsColLabel} k="loadsInRange" align="right" />
              <SortTh label={priorColLabel} k={isTodayPreset ? 'loadsPrior' : 'avgPerDay'} align="right" />
              <SortTh label="Last load" k="lastTime" align="right" />
            </tr>
          </thead>
          <tbody>
            {sortedRows.map(r => {
              const sc = statusColor[r.status] || statusColor.active;
              return (
                <Tr key={r.id} onClick={() => navigate(`/admin/requests?projectId=${r.id}`)}>
                  <Td><span style={{ fontWeight: 600 }}>{r.name}</span></Td>
                  <Td><Pill color={sc.color} soft={sc.soft}>{sc.label}</Pill></Td>
                  <Td align="right" mono>{r.haulers}</Td>
                  <Td align="right" mono>{r.trucks}</Td>
                  <Td align="right" mono style={{ fontWeight: 600 }}>{r.loadsInRange}</Td>
                  <Td align="right" mono dim>{isTodayPreset ? r.loadsPrior : r.avgPerDay}</Td>
                  <Td align="right" mono dim>{r.lastTime}</Td>
                </Tr>
              );
            })}
          </tbody>
        </table>
      </Card>

      {/* D. Hauler productivity */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.accent}>Top haulers {isTodayPreset ? 'today' : `(${rangeLabel.toLowerCase()})`}</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ ...T.monoSm, color: C.inkDim }}>{haulerRows.length} of {db.haulers.length}</span>
      </div>
      <Card padding={0} style={{ marginBottom: S[6] }}>
        {haulerRows.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim }}>No haulers on the roster yet.</div>
        ) : (
          <div>
            {haulerRows.map((op, i) => (
              <div key={op.id} style={{
                display: 'flex', alignItems: 'center', gap: S[4],
                padding: `${S[3]}px ${S[4]}px`,
                borderBottom: i < haulerRows.length - 1 ? `1px solid ${C.rule}` : 'none',
              }}>
                <div style={{
                  ...T.bodySm, width: 28, textAlign: 'center', fontFamily: F.mono,
                  color: i < 3 ? C.accent : C.inkFaint, fontWeight: 700,
                }}>{i + 1}</div>
                <div style={{ ...T.body, flex: 1, fontFamily: F.display, fontWeight: 600, color: C.ink }}>{op.name}</div>
                <div style={{ textAlign: 'right', minWidth: 64 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 15, color: C.ink, fontWeight: 600 }}>{op.loadsInRange}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase' }}>loads</div>
                </div>
                <div style={{ textAlign: 'right', minWidth: 64 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 15, color: C.ink, fontWeight: 600 }}>{fmtHours(op.hoursInRange)}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase' }}>hours</div>
                </div>
                <div style={{ textAlign: 'right', minWidth: 64 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 15, color: C.ink, fontWeight: 600 }}>{op.activeProjects}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase' }}>hauls</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* E. Truck utilization */}
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={C.accent}>Truck utilization</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ ...T.monoSm, color: C.inkDim }}>{truckRows.length}</span>
      </div>
      <Card padding={0}>
        {truckRows.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim }}>No trucks on the roster yet.</div>
        ) : (
          <div>
            {truckRows.map((t, i) => (
              <div key={t.id} style={{
                display: 'flex', alignItems: 'center', gap: S[4],
                padding: `${S[3]}px ${S[4]}px`,
                borderBottom: i < truckRows.length - 1 ? `1px solid ${C.rule}` : 'none',
                flexWrap: 'wrap',
              }}>
                <div style={{
                  ...T.bodySm, width: 28, textAlign: 'center', fontFamily: F.mono,
                  color: i < 3 ? C.accent : C.inkFaint, fontWeight: 700,
                }}>{i + 1}</div>
                <div style={{ minWidth: 80 }}>
                  <div style={{ ...T.body, fontFamily: F.display, fontWeight: 600, color: C.ink }}>#{t.plate}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase', marginTop: 2 }}>{t.type}</div>
                </div>
                <div style={{ flex: 1, minWidth: 120 }}>
                  <div style={{ ...T.bodySm, color: C.ink }}>{t.driverName}</div>
                  <div style={{ ...T.caption, marginTop: 2 }}>{t.projectName}</div>
                </div>
                <StatusPill status={t.status} />
                <div style={{ textAlign: 'right', minWidth: 64 }}>
                  <div style={{ fontFamily: F.mono, fontSize: 15, color: C.ink, fontWeight: 600 }}>{t.loadsInRange}</div>
                  <div style={{ fontFamily: F.mono, fontSize: 10, color: C.inkFaint, letterSpacing: 0.8, textTransform: 'uppercase' }}>{isTodayPreset ? 'loads today' : 'loads'}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

// =====================================================================
// Haul Requests — admin views (v3)
// =====================================================================
function AdminHaulRequests({ db, setDb, navigate, hash }) {
  const requests = db.haulRequests || [];
  // === Project filter, driven by `?projectId=<id>` on the hash ===
  // Legacy `/admin/p/:projectId` URLs redirect into this list pre-filtered
  // to that project's haul requests. The filter pill below offers a one-
  // click way out, and AdminProjects rows now jump straight here.
  const projectIdFilter = (() => {
    const params = new URLSearchParams((hash || '').split('?')[1] || '');
    const pid = params.get('projectId');
    return pid && db.projects.some(p => p.id === pid) ? pid : null;
  })();
  const filterProject = projectIdFilter ? db.projects.find(p => p.id === projectIdFilter) : null;
  // === Filter / search state ===
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [materialFilter, setMaterialFilter] = useState('all');
  const [priorityFilter, setPriorityFilter] = useState('all');

  // === Helpers — convert HH:MM to minutes since midnight, compute waiting age ===
  const hhmmToMin = (t) => {
    if (!t || typeof t !== 'string' || !t.includes(':')) return 0;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  };
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const fmtLoc = (loc) => (loc && typeof loc === 'object') ? (loc.name || loc.address || '') : (typeof loc === 'string' ? loc : '');

  // === Enrich each request with derived dispatch fields ===
  const enriched = requests.map(r => {
    const project = db.projects.find(pp => pp.id === r.projectId);
    const material = MATERIALS.find(mm => mm.code === r.materialCode);
    const reqMin = hhmmToMin(r.requestedAt);
    const waitingMin = Math.max(0, nowMin - reqMin);
    const trucksNeeded = Math.max(1, Math.ceil((r.volumeCY || 0) / 18));
    const trucksAssigned = (r.assignments || []).length || (r.matchedTruckId ? 1 : 0);
    // Priority: critical (>30m waiting + pending), high (pending, no trucks), normal, scheduled (future request)
    let priority = 'normal';
    if (r.status === 'pending') {
      if (waitingMin > 30) priority = 'critical';
      else if (trucksAssigned === 0) priority = 'high';
    } else if (r.status === 'completed') priority = 'scheduled';
    // Lifecycle state for the matched/accepted bucket
    let lifecycle = 'Searching';
    if (r.status === 'pending')        lifecycle = trucksAssigned > 0 ? 'Matching' : 'Searching';
    else if (r.status === 'matched')   lifecycle = 'Assigned';
    else if (r.status === 'accepted')  lifecycle = 'En route';
    else if (r.status === 'completed') lifecycle = 'Completed';
    // Material flow direction
    const matFlow = r.materialCode === 'EX' ? 'Export'
                  : r.materialCode === 'CF' ? 'Import — Clean Fill'
                  : r.materialCode === 'CR' ? 'Import — Aggregate'
                  : r.materialCode === 'TS' ? 'Topsoil Transfer'
                  : 'Transfer';
    // Distance estimate (demo)
    const distance = 8 + (r.id.charCodeAt(r.id.length - 1) % 28);
    return {
      r, project, material, waitingMin, trucksNeeded, trucksAssigned,
      priority, lifecycle, matFlow, distance,
      pickup: fmtLoc(r.pickupLocation) || (project ? project.address : ''),
      dropoff: fmtLoc(r.dropoffLocation) || (project ? project.address : ''),
    };
  });

  // === Apply filters ===
  const filtered = enriched.filter(e => {
    if (projectIdFilter && e.r.projectId !== projectIdFilter) return false;
    if (statusFilter !== 'all' && e.r.status !== statusFilter) return false;
    if (materialFilter !== 'all' && e.r.materialCode !== materialFilter) return false;
    if (priorityFilter !== 'all' && e.priority !== priorityFilter) return false;
    if (search) {
      const q = search.toLowerCase();
      const hay = (e.r.id + ' ' + (e.project ? e.project.name : '') + ' ' + (e.project ? e.project.gc : '') + ' ' + (e.material ? e.material.label : '') + ' ' + e.pickup + ' ' + e.dropoff).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const pending   = filtered.filter(e => e.r.status === 'pending');
  const active    = filtered.filter(e => e.r.status === 'matched' || e.r.status === 'accepted');
  const completed = filtered.filter(e => e.r.status === 'completed');

  // === Operations KPIs ===
  const openRequests   = enriched.filter(e => e.r.status === 'pending').length;
  const trucksNeededAll = enriched.filter(e => e.r.status === 'pending').reduce((s, e) => s + (e.trucksNeeded - e.trucksAssigned), 0);
  const activeMatches  = enriched.filter(e => e.r.status === 'matched' || e.r.status === 'accepted').length;
  const delayedReqs    = enriched.filter(e => e.priority === 'critical').length;
  const matchedWaits   = enriched.filter(e => e.r.status === 'matched' || e.r.status === 'accepted').map(e => e.waitingMin);
  const avgMatchMin    = matchedWaits.length > 0 ? Math.round(matchedWaits.reduce((s,v) => s+v,0) / matchedWaits.length) : 0;
  const todayVolumeCY  = enriched.filter(e => e.r.status !== 'completed').reduce((s, e) => s + (e.r.volumeCY || 0), 0);

  const kpis = [
    { label: 'Open requests',         value: openRequests,                                tone: openRequests > 0 ? C.warn : C.inkDim,  sub: 'awaiting match' },
    { label: 'Trucks needed',         value: trucksNeededAll,                             tone: trucksNeededAll > 0 ? C.accent : C.inkDim, sub: 'across pending' },
    { label: 'Active matches',        value: activeMatches,                               tone: C.ok,                                  sub: 'in motion' },
    { label: 'Avg match time',        value: avgMatchMin > 0 ? avgMatchMin + ' min' : '—', tone: C.info,                                sub: 'pickup → assignment' },
    { label: 'Delayed',               value: delayedReqs,                                 tone: delayedReqs > 0 ? (C.danger || C.warn) : C.inkDim, sub: 'waiting >30 min' },
    { label: 'Volume today',          value: todayVolumeCY + ' CY',                       tone: C.accent,                              sub: 'requested + active' },
  ];

  // === Priority + lifecycle tone helpers ===
  const priTone = (p) => ({
    critical:  { c: C.danger || C.warn, soft: C.dangerSoft || C.warnSoft, label: 'Critical' },
    high:      { c: C.warn,   soft: C.warnSoft, label: 'High' },
    normal:    { c: C.accent, soft: C.accentSoft, label: 'Normal' },
    scheduled: { c: C.info,   soft: C.infoSoft, label: 'Scheduled' },
  }[p] || { c: C.inkDim, soft: 'rgba(255,255,255,0.06)', label: p });
  const lifecycleTone = (s) => ({
    'Searching':  { c: C.warn,   soft: C.warnSoft },
    'Matching':   { c: C.info,   soft: C.infoSoft },
    'Assigned':   { c: C.accent, soft: C.accentSoft },
    'En route':   { c: C.ok,     soft: C.okSoft },
    'Completed':  { c: C.inkDim, soft: 'rgba(255,255,255,0.06)' },
  }[s] || { c: C.inkDim, soft: 'rgba(255,255,255,0.06)' });

  // === Recommended matches — derive from db.haulers/db.trucks for first pending ===
  const buildRecommendations = (e) => {
    if (!e) return [];
    return db.haulers.slice(0, 5).map((h, i) => {
      const haulerTrucks = db.trucks.filter(t => t.haulerId === h.id);
      const active = haulerTrucks.filter(t => t.driverId && (db.hours || []).some(hr => hr.truckId === t.id && hr.status === 'open')).length;
      const available = haulerTrucks.length - active;
      // Stable deterministic fields per hauler
      const minsAway = 6 + ((h.id.charCodeAt(h.id.length - 1) + i) % 22);
      const fulfillment = 88 + ((h.id.charCodeAt(0) + i * 7) % 11);
      const rateEst = e.material && e.material.code === 'CF' ? 125 : e.material && e.material.code === 'CR' ? 125 : e.material && e.material.code === 'TS' ? 140 : 130;
      return { hauler: h, available, totalTrucks: haulerTrucks.length, minsAway, fulfillment, rateEst };
    }).filter(rec => rec.available > 0).slice(0, 3);
  };
  const recTarget = pending[0] || enriched.find(e => e.r.status === 'pending');
  const recommendations = buildRecommendations(recTarget);

  // === Dispatch activity feed — recent events ===
  const activityFeed = (db.activity || []).slice().sort((a, b) => b.timestamp - a.timestamp).slice(0, 8);
  const fmtAgo = (ts) => {
    const sec = Math.max(1, Math.floor((Date.now() - ts) / 1000));
    if (sec < 60) return sec + ' sec ago';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + ' min ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + ' hr ago';
    return Math.floor(hr / 24) + ' d ago';
  };

  // === Dispatch-style row ===
  const DispatchRow = ({ e, last }) => {
    const tone = priTone(e.priority);
    const lct  = lifecycleTone(e.lifecycle);
    return (
      <div
        onClick={() => navigate('/admin/requests/' + e.r.id)}
        style={{
          padding: S[4],
          borderBottom: last ? 'none' : `1px solid ${C.rule}`,
          display: 'grid',
          gridTemplateColumns: 'minmax(0, 1.4fr) minmax(0, 1fr)',
          gap: S[4],
          alignItems: 'start',
          cursor: 'pointer',
          transition: 'background 120ms ease',
        }}
        onMouseEnter={ev => ev.currentTarget.style.background = 'rgba(255,255,255,0.025)'}
        onMouseLeave={ev => ev.currentTarget.style.background = 'transparent'}
      >
        {/* LEFT — id / haul / route / requested */}
        <div style={{ minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[2], flexWrap: 'wrap', marginBottom: 4 }}>
            <Pill color={tone.c} soft={tone.soft}>{tone.label}</Pill>
            <Pill color={lct.c} soft={lct.soft}>{e.lifecycle}</Pill>
          </div>
          <div style={{ ...T.body, fontWeight: 700, color: C.ink, marginBottom: 2 }}>{e.project ? e.project.name : '—'}</div>
          <div style={{ ...T.caption, color: C.inkDim }}>{e.project ? e.project.gc : ''}</div>
          <div style={{ ...T.caption, color: C.inkFaint, marginTop: 6, fontFamily: F.mono, lineHeight: 1.4 }}>
            <span style={{ color: C.ink }}>{e.pickup || '—'}</span>
            <span style={{ color: C.accent, margin: '0 4px' }}>{'→'}</span>
            <span style={{ color: C.ink }}>{e.dropoff || '—'}</span>
          </div>
          <div style={{ ...T.caption, color: C.inkDim, marginTop: 4 }}>
            Requested <span style={{ fontFamily: F.mono, color: C.ink }}>{e.r.requestedAt}</span>
            <span style={{ color: C.inkFaint }}> · </span>
            {e.r.status === 'pending'
              ? <span style={{ color: e.waitingMin > 30 ? (C.danger || C.warn) : C.warn, fontWeight: 600 }}>Waiting {e.waitingMin} min</span>
              : <span style={{ color: C.inkDim }}>Dispatched</span>}
          </div>
        </div>

        {/* CENTER — material / volume / trucks / distance */}
        <div style={{ minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[2], flexWrap: 'wrap', marginBottom: 6 }}>
            <Pill color={C.accent} soft={C.accentSoft}>{e.matFlow}</Pill>
            <Pill color={C.inkDim} soft="rgba(255,255,255,0.05)">{e.material ? e.material.label : e.r.materialCode}</Pill>
          </div>
          <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 2 }}>VOLUME</div>
          <div style={{ ...T.h4, fontFamily: F.mono, fontWeight: 700, color: C.ink, marginBottom: 6 }}>{e.r.volumeCY} CY</div>
          <div style={{ ...T.caption, color: C.inkDim, fontFamily: F.mono }}>
            <span style={{ color: C.ink, fontWeight: 600 }}>{e.trucksAssigned}/{e.trucksNeeded}</span> trucks
            <span style={{ color: C.inkFaint }}> · </span>
            <span>~{e.distance} mi</span>
            <span style={{ color: C.inkFaint }}> · </span>
            <span>~{Math.round(e.distance * 1.8)} min</span>
          </div>
          {/* Mini fulfillment bar */}
          <div style={{ marginTop: 6, height: 4, background: C.surfaceHi, borderRadius: 999, overflow: 'hidden' }}>
            <div style={{ width: Math.min(100, (e.trucksAssigned / Math.max(1, e.trucksNeeded)) * 100) + '%', height: '100%', background: e.priority === 'critical' ? (C.danger || C.warn) : C.accent, borderRadius: 999 }} />
          </div>
        </div>
      </div>
    );
  };

  const Section = ({ label, color, rows, emptyText }) => (
    <div style={{ marginBottom: S[5] }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: S[3], marginBottom: S[3] }}>
        <Label color={color}>{label}</Label>
        <div style={{ flex: 1, height: 1, background: C.rule }} />
        <span style={{ ...T.monoSm, color: C.inkDim }}>{rows.length}</span>
      </div>
      <Card padding={0}>
        {rows.length === 0 ? (
          <div style={{ ...T.bodySm, padding: S[5], textAlign: 'center', color: C.inkDim }}>{emptyText}</div>
        ) : rows.map((e, i) => <DispatchRow key={e.r.id} e={e} last={i === rows.length - 1} />)}
      </Card>
    </div>
  );

  const materialOptions = [{ value: 'all', label: 'All materials' }, ...MATERIALS.map(m => ({ value: m.code, label: m.label }))];
  const inputStyle = { ...T.body, background: C.surfaceHi, color: C.ink, border: `1px solid ${C.ruleHi}`, padding: '8px 10px', borderRadius: R.sm, fontFamily: F.body };

  return (
    <div style={{ padding: S[6], maxWidth: 1480, margin: '0 auto' }}>
      <Crumbs items={[{ label: 'Admin', to: '/admin' }, { label: 'Haul Requests' }]} navigate={navigate} />
      {filterProject && (
        <div style={{ marginBottom: S[3], display: 'flex', alignItems: 'center', gap: S[2], flexWrap: 'wrap' }}>
          <div style={{
            ...T.bodySm, display: 'inline-flex', alignItems: 'center', gap: S[2],
            padding: '6px 12px', borderRadius: R.pill,
            background: C.accentSoft, color: C.accent,
            border: `1px solid ${C.accent}`,
          }}>
            <span style={{ fontFamily: F.mono, fontSize: 11, letterSpacing: 0.4, textTransform: 'uppercase', opacity: 0.85 }}>Filtered by haul</span>
            <span style={{ fontWeight: 700 }}>{filterProject.name}</span>
            <button
              type="button"
              onClick={() => navigate('/admin/requests')}
              aria-label="Clear haul filter"
              style={{ background: 'transparent', border: 'none', color: C.accent, cursor: 'pointer', fontSize: 16, lineHeight: 1, padding: 0 }}
            >&times;</button>
          </div>
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: S[5], gap: S[3], flexWrap: 'wrap' }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: S[2], marginBottom: 6 }}>
            <span aria-hidden="true" style={{ width: 8, height: 8, borderRadius: '50%', background: C.ok, boxShadow: `0 0 0 0 ${C.ok}`, animation: 'jse-pulse 1.6s ease-out infinite' }} />
            <Label color={C.accent} style={{ margin: 0 }}>Live · dispatch marketplace</Label>
            <span style={{ ...T.caption, color: C.inkFaint, fontFamily: F.mono }}>· {db.haulers.length} haulers connected · GPS active · updated 8s ago</span>
          </div>
          <style>{`@keyframes jse-pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.55); } 70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }`}</style>
          <h1 style={{ ...T.h2Lg, fontWeight: 700, letterSpacing: -1.2, margin: 0, color: C.ink }}>Haul Requests</h1>
          <div style={{ ...T.bodySm, color: C.inkDim, marginTop: 6 }}>Match incoming demand to available trucks. Pending requests appear at the top with priority + waiting time.</div>
        </div>
        <Btn variant="primary" onClick={() => navigate('/admin/requests/new')}>+ New haul request</Btn>
      </div>

      {/* Operations KPI strip */}
      <div className="hcc-kpi-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: S[3], marginBottom: S[5] }}>
        {kpis.map(k => (
          <Card key={k.label} padding={S[4]}>
            <div style={{ ...T.caption, color: C.inkFaint, marginBottom: 6 }}>{k.label.toUpperCase()}</div>
            <div style={{ ...T.h2, fontWeight: 700, color: k.tone || C.ink, letterSpacing: -0.5, lineHeight: 1 }}>{k.value}</div>
            <div style={{ ...T.caption, color: C.inkDim, marginTop: 6 }}>{k.sub}</div>
          </Card>
        ))}
      </div>

      {/* Filter / sort bar */}
      <Card padding={S[3]} style={{ marginBottom: S[5] }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: S[2], flexWrap: 'wrap' }}>
          <input
            type="search"
            value={search}
            onChange={ev => setSearch(ev.target.value)}
            placeholder="Search by id, haul, GC, or location…"
            style={{ ...inputStyle, flex: 1, minWidth: 220 }}
          />
          <select value={statusFilter} onChange={ev => setStatusFilter(ev.target.value)} style={inputStyle}>
            <option value="all">All status</option>
            <option value="pending">Pending</option>
            <option value="matched">Matched</option>
            <option value="accepted">Accepted</option>
            <option value="completed">Completed</option>
          </select>
          <select value={materialFilter} onChange={ev => setMaterialFilter(ev.target.value)} style={inputStyle}>
            {materialOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
          <select value={priorityFilter} onChange={ev => setPriorityFilter(ev.target.value)} style={inputStyle}>
            <option value="all">All priority</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="normal">Normal</option>
            <option value="scheduled">Scheduled</option>
          </select>
          <div style={{ ...T.caption, color: C.inkDim, marginLeft: 'auto' }}>{filtered.length} of {enriched.length} requests</div>
        </div>
      </Card>

      {/* Main 2-col layout: requests | side rail */}
      <div className="hcc-attn-row" style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1.7fr) minmax(0, 1fr)', gap: S[4] }}>
        <div style={{ minWidth: 0 }}>
          <Section label="Pending"   color={C.warn}   rows={pending}   emptyText="No pending requests match the filters." />
          <Section label="Active"    color={C.accent} rows={active}    emptyText="No active matches." />
          <Section label="Completed" color={C.inkDim} rows={completed} emptyText="No completed requests yet." />
        </div>

        <div style={{ minWidth: 0, display: 'flex', flexDirection: 'column', gap: S[4] }}>
          {/* Recommended Matches */}
          <Card padding={0}>
            <div style={{ padding: `${S[3]}px ${S[4]}px`, borderBottom: `1px solid ${C.rule}` }}>
              <Label color={C.accent}>Recommended matches</Label>
              <div style={{ ...T.bodySm, color: C.ink, fontWeight: 600 }}>
                {recTarget ? `For ${haulRequestLabel(db, recTarget.r)}` : 'No pending request'}
              </div>
            </div>
